name: newman-e2e

# KAC-127 — Newman E2E authz suites against a real kind + helm umbrella stack.
#
# This is the heavy black-box gate: it builds every kacho-* :dev image, loads
# them into a kind cluster, helm-installs the umbrella (Postgres + Ory + OpenFGA
# + api-gateway + iam + vpc + compute), seeds the shared authz fixtures and runs
# the kacho-iam Newman authz matrices through the api-gateway REST endpoint.
#
# The two suites it gates (kacho-iam/tests/newman/cases/):
#   - authz-deny        — 6-subject default-deny matrix (288 cases)
#   - authz-sa-apitoken — ServiceAccount + API-token models 5-6 (30 cases)
#
# It is intentionally a SEPARATE workflow from the per-service fast `ci.yaml`
# (unit + lint + scan) because a full kind bring-up takes 15-30 min — it must
# not slow the fast feedback loop.
#
# Trigger: PR + push to KAC-127/main (epic integration branch) plus manual
# dispatch and a nightly schedule.
#
# Cross-repo gate (KAC-127): the authz code this suite exercises lives in the
# sibling service repos (kacho-iam / kacho-vpc / kacho-compute /
# kacho-api-gateway). Their own PR `ci.yaml` only generates+validates the
# Newman collection — it never runs it against a real stack. So each authz
# repo carries a `newman-trigger.yml` that fires a `repository_dispatch`
# (event type `newman-e2e`) at THIS repo and waits for the run conclusion.
# The dispatch carries a `client_payload` of {repo, ref, sha, source} so this
# workflow checks out the source sibling on the branch under test instead of
# the default KAC-127 pin (see the "resolve sibling refs" step below).

on:
  push:
    branches: [main, KAC-127]
  pull_request:
    branches: [main, KAC-127]
  workflow_dispatch: {}
  repository_dispatch:
    types: [newman-e2e]
  schedule:
    - cron: '0 4 * * *'   # nightly

permissions:
  contents: read

# kacho-geo is an external OSS dependency consumed as a PUBLISHED image (not
# rebuilt from source in this umbrella). Pin the known-good tag — the one
# running on the long-lived fe3455 stand — in one place so the docker-pull,
# kind-load and helm --set all stay in lockstep. Bump alongside the umbrella
# geo sub-chart default + values.dev.yaml when geo cuts a new known-good build.
env:
  KACHO_GEO_IMAGE: docker.io/prorobotech/kacho-geo:main-84d9d68f

jobs:
  newman-e2e:
    name: newman E2E (kind + helm umbrella)
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: { path: kacho-deploy }

      # Resolve the ref for each sibling checkout. Default pins are the latest
      # KAC-135: all sibling pins reverted to main after KAC-124/KAC-130/KAC-132 merges.
      - name: resolve sibling refs
        id: refs
        env:
          DISPATCH_REPO: ${{ github.event.client_payload.repo }}
          DISPATCH_REF: ${{ github.event.client_payload.ref }}
          DISPATCH_SOURCE: ${{ github.event.client_payload.source }}
        run: |
          set -euo pipefail
          # All sibling pins reverted to main — the Design-B verb-bearing stack
          # (proto#88 · iam#245 · vpc#9 · compute#64 · nlb#41 · api-gateway#99)
          # is merged, so the coordinated feature-branch pins are no longer needed.
          echo "REF_CORELIB=main"          >> "$GITHUB_ENV"
          echo "REF_PROTO=main"            >> "$GITHUB_ENV"
          echo "REF_VPC=main"              >> "$GITHUB_ENV"
          echo "REF_COMPUTE=main"          >> "$GITHUB_ENV"
          echo "REF_IAM=main"              >> "$GITHUB_ENV"
          echo "REF_GEO=main"              >> "$GITHUB_ENV"
          echo "REF_API_GATEWAY=main"      >> "$GITHUB_ENV"
          echo "REF_WORKSPACE=main"        >> "$GITHUB_ENV"
          echo "REF_UI=main"               >> "$GITHUB_ENV"
          # KAC-NLB: kacho-nlb sibling for helm dep (file://../../../kacho-nlb/deploy)
          # and Dockerfile build context (COPY ../kacho-nlb when ci-images target runs).
          echo "REF_NLB=main"              >> "$GITHUB_ENV"
          # kacho-registry sibling for helm dep (file://../../../kacho-registry/deploy).
          echo "REF_REGISTRY=main"         >> "$GITHUB_ENV"
          if [ -n "${DISPATCH_REPO:-}" ] && [ -n "${DISPATCH_REF:-}" ]; then
            # client_payload.repo may arrive as "PRO-Robotech/kacho-vpc" or
            # bare "kacho-vpc" — normalise to the kacho-<name> short form.
            short="${DISPATCH_REPO##*/}"
            short="${short#kacho-}"
            key="REF_$(echo "$short" | tr 'a-z-' 'A-Z_')"
            case "$short" in
              corelib|proto|vpc|compute|iam|api-gateway|workspace|ui|nlb)
                echo "${key}=${DISPATCH_REF}" >> "$GITHUB_ENV"
                echo "cross-repo dispatch: ${DISPATCH_REPO} @ ${DISPATCH_REF}"
                echo " (source run: ${DISPATCH_SOURCE:-n/a})" ;;
              *)
                echo "::warning::unknown dispatch repo '${DISPATCH_REPO}' — ignoring override" ;;
            esac
          else
            echo "no client_payload override — using per-sibling fix-branch pins"
          fi

      # Siblings are needed both as Go build context (Dockerfile COPY ../kacho-*)
      # and as helm sub-chart sources (umbrella Chart.yaml file:// deps). The
      # authz fixtures + newman suites also live in the sibling repos + the
      # workspace repo. Pinned to latest fix branches per KAC-132 cross-repo CI;
      # revert to main after merges. A `repository_dispatch` from an authz repo
      # overrides exactly one sibling ref (see "resolve sibling refs" above).
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: { repository: PRO-Robotech/kacho-corelib, ref: "${{ env.REF_CORELIB }}", path: kacho-corelib }
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: { repository: PRO-Robotech/kacho-proto, ref: "${{ env.REF_PROTO }}", path: kacho-proto }
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: { repository: PRO-Robotech/kacho-vpc, ref: "${{ env.REF_VPC }}", path: kacho-vpc }
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: { repository: PRO-Robotech/kacho-compute, ref: "${{ env.REF_COMPUTE }}", path: kacho-compute }
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: { repository: PRO-Robotech/kacho-iam, ref: "${{ env.REF_IAM }}", path: kacho-iam }
      # kacho-geo leaf-service (Geography Region/Zone, extracted from compute):
      # helm dep (vendored sub-chart) + Dockerfile build context for kacho-geo:dev.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: { repository: PRO-Robotech/kacho-geo, ref: "${{ env.REF_GEO }}", path: kacho-geo }
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: { repository: PRO-Robotech/kacho-api-gateway, ref: "${{ env.REF_API_GATEWAY }}", path: kacho-api-gateway }
      # KAC-NLB: kacho-nlb sibling (helm dep + Dockerfile build context).
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: { repository: PRO-Robotech/kacho-nlb, ref: "${{ env.REF_NLB }}", path: kacho-nlb }
      # kacho-registry sibling for helm dep (file://../../../kacho-registry/deploy).
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: { repository: PRO-Robotech/kacho-registry, ref: "${{ env.REF_REGISTRY }}", path: kacho-registry }
      # kacho-storage sub-chart is referenced from the umbrella via
      # `file://../../../kacho-storage/deploy` — checkout REQUIRED for `helm dep
      # update` (line "helm install umbrella" below), else it fails with
      # `Error: directory ../../../kacho-storage/deploy not found`. Best-effort
      # checkout + stub (default token may not reach it cross-repo); `storage.enabled`
      # defaults false in values.dev, so the stub is never templated for the stack.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        continue-on-error: true
        with: { repository: PRO-Robotech/kacho-storage, ref: main, path: kacho-storage }
      - name: stub kacho-storage/deploy if checkout was skipped
        working-directory: ${{ github.workspace }}
        run: |
          if [ ! -f kacho-storage/deploy/Chart.yaml ]; then
            mkdir -p kacho-storage/deploy/templates
            cat >kacho-storage/deploy/Chart.yaml <<'EOF'
          apiVersion: v2
          name: storage
          version: 0.1.0
          description: stub for CI (real chart in PRO-Robotech/kacho-storage)
          EOF
            : >kacho-storage/deploy/values.yaml
          fi
      # kacho-ui-future sibling (aliased `uif`) — best-effort + stub (default token
      # can't reach it cross-repo); enough for `helm dep update` (uif.enabled=false in
      # the newman/dev stack, so the stub is never rendered).
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        continue-on-error: true
        with: { repository: PRO-Robotech/kacho-ui-future, path: kacho-ui-future }
      - name: stub kacho-ui-future/deploy if checkout was skipped
        run: |
          if [ ! -f kacho-ui-future/deploy/Chart.yaml ]; then
            mkdir -p kacho-ui-future/deploy/templates
            cat >kacho-ui-future/deploy/Chart.yaml <<'EOF'
          apiVersion: v2
          name: uif
          version: 2.0.0
          description: stub for CI (real chart in PRO-Robotech/kacho-ui-future)
          EOF
            : >kacho-ui-future/deploy/values.yaml
          fi
        working-directory: ${{ github.workspace }}
      # kacho-workspace carries the shared authz-fixtures bootstrap
      # (tests/authz-fixtures/setup.sh + setup-jwt.py + patch-env.py).
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: { repository: PRO-Robotech/kacho-workspace, ref: "${{ env.REF_WORKSPACE }}", path: kacho-workspace }
      # kacho-ui is a private repo; best-effort checkout (parity with ci.yaml).
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        continue-on-error: true
        with: { repository: PRO-Robotech/kacho-ui, ref: "${{ env.REF_UI }}", path: kacho-ui }
      - name: stub kacho-ui/deploy if checkout was skipped (private repo)
        working-directory: ${{ github.workspace }}
        run: |
          if [ ! -f kacho-ui/deploy/Chart.yaml ]; then
            mkdir -p kacho-ui/deploy/templates
            cat >kacho-ui/deploy/Chart.yaml <<'EOF'
          apiVersion: v2
          name: ui
          version: 1.0.0
          description: stub for CI (real chart in private repo PRO-Robotech/kacho-ui)
          EOF
            : >kacho-ui/deploy/values.yaml
          fi

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with: { node-version: '20' }
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with: { python-version: '3.12' }
      - run: npm install -g newman

      # grpcurl — the authz fixture bootstrap upserts test users via the
      # InternalUserService.UpsertFromIdentity gRPC RPC (no REST mapping, KAC-125).
      - name: install grpcurl
        run: |
          set -euo pipefail
          GRPCURL_VERSION=1.9.1
          curl -fsSL -o /tmp/grpcurl.tar.gz \
            "https://github.com/fullstorydev/grpcurl/releases/download/v${GRPCURL_VERSION}/grpcurl_${GRPCURL_VERSION}_linux_x86_64.tar.gz"
          sudo tar -xzf /tmp/grpcurl.tar.gz -C /usr/local/bin grpcurl
          grpcurl --version

      # Build every kacho-* :dev image. Go services build with context = the
      # workspace root (Dockerfile COPY kacho-corelib / kacho-proto / kacho-<svc>).
      #
      # kacho-geo is intentionally NOT built here. It is now an external OSS
      # single-repo (own git history, versioned modules) and is consumed by the
      # umbrella as a PUBLISHED dependency, not rebuilt from source. Building it
      # from the OSS HEAD produced a runtime-broken image (geo-read 503 →
      # cascading compute newman failures); the umbrella pulls the known-good
      # published tag instead (see "pull published kacho-geo image" below).
      # Single-repo builds: each Dockerfile is `COPY . .` + `go mod download`
      # (versioned GitHub deps from the public proxy), so the build context is the
      # service's OWN checkout dir (`kacho-$svc`), NOT the workspace root — a
      # rootless workspace-root context fails `go mod download` (no go.mod).
      - name: build service images
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          for svc in vpc iam compute api-gateway nlb; do
            echo "=== build kacho-$svc:dev ==="
            docker build -f "kacho-$svc/Dockerfile" -t "kacho-$svc:dev" "kacho-$svc"
          done
          if [ -f kacho-ui/Dockerfile ]; then
            echo "=== build kacho-ui:dev ==="
            docker build -t kacho-ui:dev kacho-ui
          fi

      # INFRA sec-hardening r2 — image vulnerability gate. The umbrella images we
      # build from source (kacho-*:dev) are scanned for FIXABLE HIGH/CRITICAL CVEs
      # BEFORE they are loaded into kind. --ignore-unfixed keeps the gate
      # actionable (only CVEs with an available fix fail — a dependency bump in the
      # owning service repo), so unfixed upstream base-image noise never blocks.
      - name: install trivy (image scanner)
        env:
          TRIVY_VERSION: "0.72.0"
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"; cd "$tmp"
          base="https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}"
          curl -fsSLO "${base}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          curl -fsSLO "${base}/trivy_${TRIVY_VERSION}_checksums.txt"
          grep " trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz\$" \
            "trivy_${TRIVY_VERSION}_checksums.txt" | sha256sum -c -
          tar -xzf "trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" trivy
          sudo install -m 0755 trivy /usr/local/bin/trivy
          trivy --version
      - name: trivy image scan (kacho-*:dev — gate fixable HIGH,CRITICAL)
        run: |
          set -euo pipefail
          rc=0
          for img in kacho-vpc:dev kacho-iam:dev kacho-compute:dev kacho-api-gateway:dev kacho-nlb:dev; do
            echo "=== trivy image: $img ==="
            trivy image --scanners vuln --ignore-unfixed \
              --severity HIGH,CRITICAL --exit-code 1 --no-progress "$img" || rc=1
          done
          if [ -f "${GITHUB_WORKSPACE}/kacho-ui/Dockerfile" ] && docker image inspect kacho-ui:dev >/dev/null 2>&1; then
            echo "=== trivy image: kacho-ui:dev ==="
            trivy image --scanners vuln --ignore-unfixed \
              --severity HIGH,CRITICAL --exit-code 1 --no-progress kacho-ui:dev || rc=1
          fi
          exit "$rc"

      # geo is consumed as a published OSS dependency — pull the known-good
      # image (the one running on the long-lived fe3455 stand) instead of
      # building :dev from the OSS source. Tag is centralised in the umbrella
      # geo sub-chart default + values.dev.yaml (KACHO_GEO_IMAGE below keeps the
      # pull + the helm --set in lockstep).
      - name: pull published kacho-geo image
        run: |
          set -euo pipefail
          echo "=== pull ${KACHO_GEO_IMAGE} ==="
          docker pull "${KACHO_GEO_IMAGE}"

      - uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1
        with:
          config: kacho-deploy/kind/kind-config.yaml
          cluster_name: kacho

      - name: load images into kind
        run: |
          set -euo pipefail
          for img in kacho-vpc:dev kacho-iam:dev kacho-compute:dev kacho-api-gateway:dev kacho-nlb:dev; do
            kind load docker-image "$img" --name kacho
          done
          # geo: load the PUBLISHED known-good image (pulled above) into kind so
          # the geo Deployment runs the working build with imagePullPolicy
          # IfNotPresent and never hits the registry from inside the cluster.
          kind load docker-image "${KACHO_GEO_IMAGE}" --name kacho
          docker image inspect kacho-ui:dev >/dev/null 2>&1 \
            && kind load docker-image kacho-ui:dev --name kacho || true

      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4

      - name: helm install umbrella
        working-directory: kacho-deploy
        run: |
          set -euo pipefail
          # gen-tls-cert.sh writes the api-gateway-tls secret into namespace
          # kacho — create it first.
          kubectl create namespace kacho --dry-run=client -o yaml | kubectl apply -f -
          # INFRA sec-hardening — Pod Security Admission (restricted, warn+audit).
          kubectl label namespace kacho \
            pod-security.kubernetes.io/warn=restricted pod-security.kubernetes.io/warn-version=latest \
            pod-security.kubernetes.io/audit=restricted pod-security.kubernetes.io/audit-version=latest \
            --overwrite
          ./scripts/gen-tls-cert.sh || true
          cd helm/umbrella
          helm dep update
          # --wait is intentionally NOT used here: the openfga-bootstrap-job is a
          # post-install hook that runs AFTER the release converges, and it then
          # rolling-restarts iam/vpc/compute/api-gateway to pick up the real
          # OpenFGA store/model id. `helm --wait` would block on the pre-restart
          # generation. The explicit rollout waits below sequence it correctly.
          helm upgrade --install kacho-umbrella . -n kacho --create-namespace \
            -f values.dev.yaml --timeout 20m \
            --set cert-manager.enabled=false \
            --set mtls.enabled=false \
            --set vpc.mtls.enable=false \
            --set compute.mtls.enable=false \
            --set api-gateway.mtls.enable=false \
            --set kacho-nlb.mtls.enable=false \
            --set kacho-iam.mtls.enable=false \
            --set kacho-geo.mtls.enable=false \
            --set "kacho-geo.image=${KACHO_GEO_IMAGE}"

      # Phase 1 — wait for the data-plane Deployments + Postgres to converge.
      - name: wait for core deployments
        run: |
          set -euo pipefail
          echo "=== waiting for Postgres statefulsets ==="
          for sts in pg-iam pg-vpc pg-compute pg-openfga; do
            kubectl -n kacho rollout status "statefulset/kacho-umbrella-${sts}" --timeout=6m || true
          done
          echo "=== waiting for service Deployments (first generation) ==="
          # geo included: compute→geo (zone_id validation) is on the request path,
          # so geo must be Ready before the compute newman cases run.
          for dep in api-gateway kacho-iam vpc compute kacho-geo; do
            kubectl -n kacho rollout status "deploy/${dep}" --timeout=8m || true
          done
          kubectl -n kacho get pods -o wide || true

      # Phase 2 — wait for the post-install openfga-bootstrap Job to finish. It
      # writes the real store/model id Secrets and bumps the rolling-restart
      # annotation on the consumer Deployments.
      - name: wait for openfga-bootstrap job
        run: |
          set -euo pipefail
          echo "=== waiting for Job/openfga-bootstrap ==="
          ok=""
          for i in $(seq 1 60); do
            if kubectl -n kacho get job openfga-bootstrap >/dev/null 2>&1; then
              if kubectl -n kacho wait --for=condition=complete job/openfga-bootstrap --timeout=20s >/dev/null 2>&1; then
                echo "openfga-bootstrap complete"; ok=1; break
              fi
              if kubectl -n kacho get job openfga-bootstrap -o jsonpath='{.status.failed}' 2>/dev/null | grep -q '[1-9]'; then
                echo "openfga-bootstrap reported failures; dumping logs"
                kubectl -n kacho logs job/openfga-bootstrap --tail=100 || true
              fi
            fi
            echo "waiting for openfga-bootstrap ($i/60)..."; sleep 10
          done
          echo "=== openfga-bootstrap logs ==="
          kubectl -n kacho logs job/openfga-bootstrap --tail=200 || true
          [ -n "$ok" ] || echo "WARN: openfga-bootstrap did not reach complete — continuing, rollout wait below will surface the real state"

      # Phase 3 — wait for the bootstrap-triggered rolling restart to settle so
      # the authz suites run against a stack that has the real FGA store/model id.
      - name: wait for post-bootstrap rollout
        run: |
          set -euo pipefail
          # geo is NOT in the openfga-bootstrap restart set (it holds no FGA
          # store/model id — it only dials kacho-iam-internal:9091 for Check), so
          # it is not re-rolled here; its first-generation rollout above is final.
          for dep in kacho-iam api-gateway vpc compute; do
            echo "=== rollout status (post-bootstrap): $dep ==="
            kubectl -n kacho rollout status "deploy/${dep}" --timeout=8m || true
          done
          kubectl -n kacho get pods -o wide || true

      # Seed the shared authz fixtures and run the kacho-iam authz Newman
      # suites — both in ONE step.
      #
      # Why one step + port-forward (not the ingress): the api-gateway ingress
      # is annotated `backend-protocol: GRPC`, so nginx speaks HTTP/2-gRPC to
      # the backend and answers plain HTTP/1.1 REST POSTs with a 308 redirect
      # (the api-gateway's own cmux port multiplexes REST + gRPC and serves
      # REST/1.1 fine — only the GRPC-annotated ingress mangles it). Local dev
      # already reaches the gateway via `kubectl port-forward` for exactly this
      # reason; CI does the same. Both the api-gateway and kacho-iam-internal
      # port-forwards must live in the SAME `run:` block as their consumers —
      # each GitHub Actions step is a fresh shell, so a port-forward
      # backgrounded in an earlier step is already dead.
      - name: bootstrap fixtures + run kacho-iam authz newman suites
        run: |
          set -euo pipefail
          kubectl -n kacho port-forward svc/api-gateway 18080:8080 \
            >/tmp/api-gateway-pf.log 2>&1 &
          AGW_PF=$!
          # api-gateway cluster-internal admin REST listener (`internal-rest`
          # Service port, default :8081). It is the ONLY listener that serves
          # /iam/v1/internal/* REST paths (Internal* RPCs — UpsertFromIdentity,
          # InternalIAMService.Check/LookupSubject); the public cmux (:8080) 404s
          # them by design (ban #6). The iam-internal-only-check positive controls
          # and the rbac-subjects group-userset Check probe reach these Internal*
          # RPCs via {{internalBaseUrl}} = http://localhost:18081 (set below).
          kubectl -n kacho port-forward svc/api-gateway 18081:8081 \
            >/tmp/api-gateway-internal-pf.log 2>&1 &
          AGW_INT_PF=$!
          kubectl -n kacho port-forward svc/kacho-iam-internal 19091:9091 \
            >/tmp/iam-internal-pf.log 2>&1 &
          IAM_PF=$!
          trap 'kill "$AGW_PF" "$AGW_INT_PF" "$IAM_PF" 2>/dev/null || true' EXIT
          for i in $(seq 1 30); do
            up=1
            bash -c 'echo > /dev/tcp/127.0.0.1/18080' 2>/dev/null || up=0
            bash -c 'echo > /dev/tcp/127.0.0.1/18081' 2>/dev/null || up=0
            bash -c 'echo > /dev/tcp/127.0.0.1/19091' 2>/dev/null || up=0
            [ "$up" = 1 ] && { echo "port-forwards up (:18080 api-gateway, :18081 api-gateway internal-rest, :19091 iam-internal)"; break; }
            echo "waiting for port-forwards ($i/30)..."; sleep 2
          done
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:18080/healthz >/dev/null 2>&1; then
              echo "api-gateway healthz OK"; break
            fi
            echo "waiting for api-gateway healthz ($i/30)..."; sleep 5
          done

          # --- fixtures ---------------------------------------------------
          # setup.sh patches env files under $WORKSPACE_DIR/project/kacho-*;
          # the CI layout puts the sibling checkouts directly under
          # $GITHUB_WORKSPACE — symlink a `project/` view so patch-env.py
          # finds them.
          cd "${GITHUB_WORKSPACE}/kacho-workspace"
          mkdir -p project
          for s in kacho-iam kacho-vpc kacho-compute; do
            [ -e "project/$s" ] || ln -s "${GITHUB_WORKSPACE}/$s" "project/$s"
          done
          BASE_URL=http://localhost:18080 \
          IAM_INTERNAL_GRPC=localhost:19091 \
          VERBOSE=true \
          bash tests/authz-fixtures/setup.sh
          echo "=== authz-fixtures.json ==="
          cat tests/authz-fixtures/out/authz-fixtures.json

          # --- newman -----------------------------------------------------
          # internalBaseUrl → the api-gateway internal-rest port-forward (:18081)
          # so the Internal* REST probes (iam-internal-only-check positive controls,
          # rbac-subjects group-userset Check) reach /iam/v1/internal/* — they are
          # NOT on the public cmux (:18080).
          cd "${GITHUB_WORKSPACE}/kacho-iam"
          python3 tests/newman/scripts/gen.py
          tests/newman/scripts/run.sh \
            --env-var baseUrl=http://localhost:18080 \
            --env-var internalBaseUrl=http://localhost:18081

      - name: dump stack logs
        # `always()` (not `failure()`): newman exits 0 even with failed
        # assertions — the suite-green verdict is the LATER `assert authz
        # suites green` step. At this point in the job no step has failed yet,
        # so `failure()` would skip the dump exactly when the authz matrix is
        # red. Always dump so the per-resource FGA `no path` diagnostics
        # (vpc write-side tuple traces, openfga Secrets) are captured.
        if: always()
        run: |
          kubectl -n kacho get pods -o wide || true
          kubectl -n kacho get events --sort-by=.lastTimestamp | tail -40 || true
          for d in api-gateway kacho-iam vpc compute kacho-geo; do
            echo "=== logs: $d ==="
            # --all-containers + --prefix so init-container (migrate) crashes are
            # captured too — a crashlooping init leaves the pod PodInitializing and
            # its stderr is the ONLY signal (the main container never starts).
            kubectl -n kacho logs "deploy/$d" --all-containers=true --prefix --tail=200 || true
            # Previous-crash logs of the init container (current attempt may be
            # mid-restart with no fresh output).
            kubectl -n kacho logs "deploy/$d" -c migrate --previous --tail=100 2>/dev/null || true
            echo "=== describe: $d ==="
            kubectl -n kacho describe deploy "$d" | tail -40 || true
          done
          # The fixture (AccessBinding/Account/... Operations) runs at the very
          # start of the test step; by the time this dump runs the newman suite
          # has pushed those lines past --tail=200. Grep the FULL kacho-iam log
          # for async-operation failures so a masked `internal worker error`
          # (op-worker hides non-gRPC errors) is still diagnosable.
          echo "=== kacho-iam: operation / authz failures (full log grep) ==="
          kubectl -n kacho logs "deploy/kacho-iam" --tail=-1 2>/dev/null \
            | grep -iE 'operation failed|level":"ERROR|panic|tuple-write failed|authz' \
            | tail -80 || true
          # kacho-vpc write-side FGA: each Network/Subnet/... Create publishes a
          # `vpc_<type>:<id>#project@project:<pid>` hierarchy tuple from its
          # Operation worker. The fixture's seed-network Creates run at the start
          # of the test step → past --tail=200; grep the full vpc log so a
          # nil/disabled FGA writer or a failed tuple-write stays diagnosable.
          echo "=== kacho-vpc: write-side FGA traces (full log grep) ==="
          kubectl -n kacho logs "deploy/vpc" --tail=-1 2>/dev/null \
            | grep -iE 'fga|tuple|openfga|write-side|store_id|model_id|authz|level":"ERROR|operation failed|panic' \
            | tail -80 || true
          echo "=== openfga store/model secrets (keys only) ==="
          kubectl -n kacho get secret kacho-iam-openfga-store openfga-model-id \
            -o jsonpath='{range .items[*]}{.metadata.name}{": "}{.data}{"\n"}{end}' 2>/dev/null || true
          echo "=== openfga-bootstrap job logs ==="
          kubectl -n kacho logs job/openfga-bootstrap --tail=200 || true
          echo "=== port-forward logs ==="
          cat /tmp/api-gateway-pf.log 2>/dev/null || true
          cat /tmp/api-gateway-internal-pf.log 2>/dev/null || true
          cat /tmp/iam-internal-pf.log 2>/dev/null || true

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: newman-reports
          path: |
            kacho-iam/tests/newman/out/*.json
            kacho-iam/tests/newman/out/*.cli
            kacho-iam/tests/newman/out/summary.txt
            kacho-workspace/tests/authz-fixtures/out/authz-fixtures.json
          if-no-files-found: ignore

      # KAC-135 W0.3 — dynamic gate over EVERY generated collection.
      # Replaces the prior 2-suite hardcoded gate (authz-deny +
      # authz-sa-apitoken) that ignored 10/12 generated suites. Fails CI if
      # ANY suite has assertions.failed > 0 OR requests.failed > 0.
      - name: assert all newman suites green
        if: always()
        working-directory: kacho-iam/tests/newman
        # Shared gate — single source of truth for the known-RED whitelist
        # (kacho-iam/tests/newman/scripts/assert-suites-green.sh, on iam@main).
        # Replaces this repo's inline gate that drifted from kacho-iam's and
        # kept it RED on the shared iam authz suites.
        run: bash scripts/assert-suites-green.sh
      # baseline without preventing incremental work below W0 measurement.
      - name: coverage gate
        if: always()
        working-directory: kacho-iam/tests/newman
        env:
          COVERAGE_MIN: "30"
        run: |
          python3 scripts/coverage.py \
            --proto-glob '../../../kacho-proto/proto/kacho/cloud/iam/v1/*.proto' \
            --collections-glob 'collections/*.postman_collection.json' \
            --min "$COVERAGE_MIN"
