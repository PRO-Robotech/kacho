name: ci
on:
  push:
  pull_request:
  schedule:
    - cron: '0 3 * * *'   # nightly e2e
  workflow_dispatch: {}

permissions:
  contents: read

# kacho-deploy umbrella ссылается на sibling-чарты через
# `repository: file://../../../kacho-<svc>/deploy` (см. helm/umbrella/Chart.yaml).
# Чтобы `helm dep build` нашёл их в CI — клонируем все нужные siblings рядом с
# main-репо в одинаковом layout: kacho-workspace/project/{kacho-deploy, kacho-vpc, ...}.
# Это тот же паттерн, что используют kacho-vpc / kacho-compute CI workflows.
# KAC-124: kacho-resource-manager checkout удалён — backend упразднён.

defaults:
  run:
    working-directory: kacho-deploy

jobs:
  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: { path: kacho-deploy }

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: PRO-Robotech/kacho-vpc
          ref: main
          path: kacho-vpc
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: PRO-Robotech/kacho-compute
          ref: main
          path: kacho-compute
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: PRO-Robotech/kacho-api-gateway
          ref: main
          path: kacho-api-gateway
      # KAC-NLB: kacho-nlb sub-chart is referenced from umbrella via
      # `file://../../../kacho-nlb/deploy` — checkout required for helm dep
      # resolution. Default ref `main` (mirrors vpc/compute pin policy).
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: PRO-Robotech/kacho-nlb
          ref: main
          path: kacho-nlb
      # kacho-registry sub-chart is referenced from umbrella via
      # `file://../../../kacho-registry/deploy` — checkout required for helm dep
      # resolution. Default ref `main` (mirrors vpc/compute/nlb pin policy).
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: PRO-Robotech/kacho-registry
          ref: main
          path: kacho-registry
      # kacho-storage sub-chart (Storage control-plane) is referenced from umbrella via
      # `file://../../../kacho-storage/deploy` — checkout required for helm dep
      # resolution. Best-effort checkout + stub below (cross-repo GITHUB_TOKEN may not
      # reach it); `storage.enabled` defaults false in values.dev, so the stub is never
      # templated for lint.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        continue-on-error: true
        with:
          repository: PRO-Robotech/kacho-storage
          ref: main
          path: kacho-storage
      - name: stub kacho-storage/deploy if checkout was skipped
        run: |
          if [ ! -f kacho-storage/deploy/Chart.yaml ]; then
            mkdir -p kacho-storage/deploy/templates
            cat >kacho-storage/deploy/Chart.yaml <<'EOF'
          apiVersion: v2
          name: storage
          version: 0.1.0
          description: stub for CI (real chart in PRO-Robotech/kacho-storage)
          EOF
            : >kacho-storage/deploy/values.yaml
          fi
        working-directory: ${{ github.workspace }}
      # kacho-ui-future sub-chart (aliased `uif`) is referenced from umbrella via
      # `file://../../../kacho-ui-future/deploy`. The default GITHUB_TOKEN cannot
      # reach it from this repo's Actions (cross-repo access not granted), so this is
      # a best-effort checkout + a stub chart below — enough for `helm dep update` to
      # resolve the dependency. `uif.enabled` defaults false (values.dev renders with
      # it OFF), so the stub is never templated for lint.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        continue-on-error: true
        with:
          repository: PRO-Robotech/kacho-ui-future
          path: kacho-ui-future
      - name: stub kacho-ui-future/deploy if checkout was skipped
        run: |
          if [ ! -f kacho-ui-future/deploy/Chart.yaml ]; then
            mkdir -p kacho-ui-future/deploy/templates
            cat >kacho-ui-future/deploy/Chart.yaml <<'EOF'
          apiVersion: v2
          name: uif
          version: 2.0.0
          description: stub for CI (real chart in PRO-Robotech/kacho-ui-future)
          EOF
            : >kacho-ui-future/deploy/values.yaml
          fi
        working-directory: ${{ github.workspace }}
      # kacho-ui is a private repo; the default GITHUB_TOKEN cannot access it
      # (Not Found - https://docs.github.com/rest/repos/repos#get-a-repository).
      # Best-effort checkout: continue on failure and create a stub chart below so
      # the umbrella's `file://../../../kacho-ui/deploy` dependency resolves for lint.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        continue-on-error: true
        with:
          repository: PRO-Robotech/kacho-ui
          path: kacho-ui
      - name: stub kacho-ui/deploy if checkout was skipped (private repo)
        run: |
          if [ ! -f kacho-ui/deploy/Chart.yaml ]; then
            mkdir -p kacho-ui/deploy/templates
            cat >kacho-ui/deploy/Chart.yaml <<'EOF'
          apiVersion: v2
          name: ui
          version: 1.0.0
          description: stub for CI (real chart in private repo PRO-Robotech/kacho-ui)
          EOF
            : >kacho-ui/deploy/values.yaml
          fi
        working-directory: ${{ github.workspace }}

      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
      - run: cd helm/umbrella && helm dep update && helm lint . -f values.dev.yaml
      # values.prod.yaml — the fail-closed production profile. Lint + assert it
      # renders AND carries production-mode (NOT dev) + ssl-mode != disable for
      # every service (tests/helm/prod-profile-fail-closed-test.sh). The guard
      # also regression-checks that values.dev.yaml STILL renders mode:dev, so the
      # newman/dev stand is unaffected.
      - run: cd helm/umbrella && helm lint . -f values.prod.yaml
      - name: install yq (manifest-assertion harness)
        env:
          # Pinned version + published SHA256 (mikefarah/yq v4.44.3,
          # yq_linux_amd64). No `latest` mutable URL, no unverified download.
          YQ_VERSION: "4.44.3"
          YQ_SHA256: "a2c097180dd884a8d50c956ee16a9cec070f30a7947cf4ebf87d5f36213e9ed7"
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          curl -fsSL -o "$tmp/yq" \
            "https://github.com/mikefarah/yq/releases/download/v${YQ_VERSION}/yq_linux_amd64"
          echo "${YQ_SHA256}  $tmp/yq" | sha256sum -c -
          sudo install -m 0755 "$tmp/yq" /usr/local/bin/yq
          yq --version
      - run: make helm-manifest-test

      # INFRA sec-hardening — Trivy IaC misconfig gate. Renders the umbrella-owned
      # workloads (kacho-iam / kacho-geo / openfga-bootstrap + the auxiliary
      # kratos-selfservice-ui / minio-dev / hydra-trust-grants pods, r2) and fails
      # the build on any HIGH/CRITICAL Kubernetes misconfiguration (e.g. a dropped
      # securityContext, writable rootfs, over-broad RBAC). Scoped to templates we
      # own — upstream third-party sub-charts stay out of scope. Pinned trivy
      # version for reproducibility.
      - name: install trivy
        env:
          # Version-pinned release binary + integrity check against the
          # version-pinned checksums file. Replaces `curl … main/install.sh |
          # sudo sh` — no root exec of a mutable-branch script (SLSA/CWE-494).
          TRIVY_VERSION: "0.72.0"
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          cd "$tmp"
          base="https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}"
          curl -fsSLO "${base}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          curl -fsSLO "${base}/trivy_${TRIVY_VERSION}_checksums.txt"
          # Verify the archive against trivy's published (version-pinned) checksum.
          grep " trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz\$" \
            "trivy_${TRIVY_VERSION}_checksums.txt" | sha256sum -c -
          tar -xzf "trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" trivy
          sudo install -m 0755 trivy /usr/local/bin/trivy
          trivy --version
        working-directory: ${{ github.workspace }}
      - name: trivy IaC misconfig scan (kacho-* workloads — gate HIGH,CRITICAL)
        run: |
          set -euo pipefail
          mkdir -p /tmp/rendered
          cd helm/umbrella
          # Common --set flags to force the conditionally-rendered workloads on so
          # the gate actually sees them: openfga-bootstrap RBAC + the federation-in
          # trust-grants Job (needs a trusted issuer to render).
          # INFRA sec-hardening r3 — force-on EVERY conditionally-gated umbrella
          # Job/CronJob so the gate actually renders (and scans) them:
          # openfga-bootstrap + its postgres-init Job, the kacho-iam jwks-rotator
          # CronJob, the kacho-geo data-migration Job, and the federation-in
          # trust-grants Job.
          COMMON=( --set openfga-bootstrap.openfgaBootstrap.enabled=true
                   --set openfga-bootstrap.openfgaBootstrap.initDatabase=true
                   --set kacho-geo.dataMigration.enabled=true
                   --set kacho-iam.federationIn.enabled=true
                   --set kacho-iam.federationIn.trustedIssuers[0].issuer=https://idp.example.com
                   --set kacho-iam.federationIn.trustedIssuers[0].jwksUrl=https://idp.example.com/jwks
                   --set kacho-iam.federationIn.trustedIssuers[0].allowedSubjects[0]='*' )
          # INFRA sec-hardening r3 — enumerate ALL umbrella-owned pod-bearing
          # templates (Deployments + Jobs + CronJobs). r2 only covered the
          # long-running Deployments + a couple of hook Jobs, which is exactly why
          # the openfga-bootstrap / openfga-postgres-init / jwks-rotator /
          # geo-data-migration hardening could drift uncaught. Keep this list in
          # sync with any new kacho-owned Job/CronJob/Deployment/StatefulSet.
          for t in charts/kacho-iam/templates/deployment.yaml \
                   charts/kacho-iam/templates/jwks-rotator-cronjob.yaml \
                   charts/kacho-geo/templates/deployment.yaml \
                   charts/kacho-geo/templates/geo-data-migration-job.yaml \
                   charts/openfga-bootstrap/templates/openfga-bootstrap-rbac.yaml \
                   charts/openfga-bootstrap/templates/openfga-bootstrap-job.yaml \
                   charts/openfga-bootstrap/templates/openfga-postgres-init-job.yaml \
                   charts/kratos-selfservice-ui/templates/deployment.yaml \
                   templates/minio-dev.yaml \
                   templates/hydra-trust-grants-job.yaml; do
            helm template kacho-umbrella . -f values.dev.yaml \
              "${COMMON[@]}" --show-only "$t"
            echo '---'
          done > /tmp/rendered/kacho-workloads.yaml
          trivy config --severity HIGH,CRITICAL --exit-code 1 \
            --misconfig-scanners=kubernetes /tmp/rendered/kacho-workloads.yaml

  e2e-on-kind:
    runs-on: ubuntu-latest
    continue-on-error: true
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: { path: kacho-deploy }

      # kacho-iam source is built into kacho-iam:dev by `make dev-up`
      # (build-services SERVICES list) — its checkout is REQUIRED (the iam chart
      # itself is vendored under helm/umbrella/charts, but the IMAGE is built).
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: { repository: PRO-Robotech/kacho-iam, ref: main, path: kacho-iam }
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: { repository: PRO-Robotech/kacho-vpc, ref: main, path: kacho-vpc }
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: { repository: PRO-Robotech/kacho-compute, ref: main, path: kacho-compute }
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: { repository: PRO-Robotech/kacho-api-gateway, ref: main, path: kacho-api-gateway }
      # KAC-NLB: same checkout pattern as helm-lint job above.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: { repository: PRO-Robotech/kacho-nlb, ref: main, path: kacho-nlb }
      # kacho-registry sub-chart — same checkout pattern as helm-lint job above.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: { repository: PRO-Robotech/kacho-registry, ref: main, path: kacho-registry }
      # kacho-storage sub-chart — best-effort + stub (see helm-lint job). Required for
      # `helm dep update`; storage.enabled defaults false so the stub is never templated.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        continue-on-error: true
        with: { repository: PRO-Robotech/kacho-storage, ref: main, path: kacho-storage }
      - name: stub kacho-storage/deploy if checkout was skipped
        run: |
          if [ ! -f kacho-storage/deploy/Chart.yaml ]; then
            mkdir -p kacho-storage/deploy/templates
            cat >kacho-storage/deploy/Chart.yaml <<'EOF'
          apiVersion: v2
          name: storage
          version: 0.1.0
          description: stub for CI (real chart in PRO-Robotech/kacho-storage)
          EOF
            : >kacho-storage/deploy/values.yaml
          fi
        working-directory: ${{ github.workspace }}
      # kacho-ui-future sub-chart (aliased `uif`) — best-effort + stub (see helm-lint job).
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        continue-on-error: true
        with: { repository: PRO-Robotech/kacho-ui-future, path: kacho-ui-future }
      - name: stub kacho-ui-future/deploy if checkout was skipped
        run: |
          if [ ! -f kacho-ui-future/deploy/Chart.yaml ]; then
            mkdir -p kacho-ui-future/deploy/templates
            cat >kacho-ui-future/deploy/Chart.yaml <<'EOF'
          apiVersion: v2
          name: uif
          version: 2.0.0
          description: stub for CI (real chart in PRO-Robotech/kacho-ui-future)
          EOF
            : >kacho-ui-future/deploy/values.yaml
          fi
        working-directory: ${{ github.workspace }}
      # kacho-ui is a private repo; best-effort checkout (see helm-lint job).
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        continue-on-error: true
        with: { repository: PRO-Robotech/kacho-ui, path: kacho-ui }
      - name: stub kacho-ui/deploy if checkout was skipped (private repo)
        run: |
          if [ ! -f kacho-ui/deploy/Chart.yaml ]; then
            mkdir -p kacho-ui/deploy/templates
            cat >kacho-ui/deploy/Chart.yaml <<'EOF'
          apiVersion: v2
          name: ui
          version: 1.0.0
          description: stub for CI (real chart in private repo PRO-Robotech/kacho-ui)
          EOF
            : >kacho-ui/deploy/values.yaml
          fi
        working-directory: ${{ github.workspace }}

      - uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1
        with:
          config: kacho-deploy/kind/kind-config.yaml
          cluster_name: kacho
      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
      - name: /etc/hosts override for api.kacho.local
        run: sudo bash -c 'echo "127.0.0.1 api.kacho.local kacho.local" >> /etc/hosts'
      - name: run non-destructive E* scenarios (skip F1 — needs port 80 squatter)
        run: |
          for s in e2e/0.1/E*.sh; do
            echo "=== $s ==="
            bash "$s" || exit 1
          done
      # E8-dev-down-clean.sh in the loop above tears the cluster down; bring a fresh
      # stack up, seed fixtures, and run the API-level integration suites against it.
      - name: integration e2e (geography-move, cp-resource-model)
        env:
          BASE_URL: http://api.kacho.local:28080
        run: |
          make dev-up
          BASE_URL="$BASE_URL" ./ci/seed.sh
          for s in e2e/geography-move.sh e2e/cp-resource-model.sh; do
            echo "=== $s ==="
            BASE_URL="$BASE_URL" bash "$s" || exit 1
          done
