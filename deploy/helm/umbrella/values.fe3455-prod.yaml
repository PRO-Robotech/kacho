# values.fe3455-prod.yaml Рђћ fe3455 PRODUCTION cutover overlay (greenfield stand).
#
# Layer order (production, no dev-auth):
#   helm upgrade --install kacho-umbrella ./helm/umbrella -n kacho \
#     -f values.fe3455-base.yaml  # captured rev-56 working INFRA baseline:
#                                 #   global.imageRegistry="" + bitnamilegacy PG
#                                 #   images, inline PG creds + matching Ory/openfga
#                                 #   DSNs, cert-manager mTLS PKI (per-subchart
#                                 #   certificate.yaml), fe3455 capacity trims.
#     -f values.prod.yaml         # production AUTH flip (correct chart paths):
#                                 #   authn.mode=production/production-strict,
#                                 #   sslmode=require, mTLS on, Hydra JWKS/issuer,
#                                 #   fail-closed authz, opaSidecar+datastore NP.
#     -f values.fe3455-prod.yaml  # THIS: revert values.prod's operator-provisioned
#                                 #   assumptions (existingSecret) back to greenfield
#                                 #   self-provisioning, add cert-manager PG server
#                                 #   TLS, current-main hardened images, api-gateway
#                                 #   internal-:9091 mTLS, geo forwarder SAN.
#
# РћђРћђ SECURITY POSTURE (what "production" means here) РћђРћђ
#   authN  : Hydra-issued JWT verified at the edge (production-strict, no dev HMAC).
#   authZ  : per-RPC OpenFGA/ReBAC Check, fail-closed (RBAC roles).
#   mTLS   : serviceРєћservice on both listeners incl. api-gateway internal :9091;
#            EVERY certificate issued by cert-manager (ClusterIssuer
#            kacho-internal-ca) Рђћ no self-signed / bitnami-autoGenerated material.
#   DB     : the 5 control-plane service DBs run sslmode=require over cert-manager
#            server certs (templates/pg-certificates.yaml).
#
# РћђРћђ KNOWN, DOCUMENTED greenfield concessions (follow-ups, not dev-mode) РћђРћђ
#   1. openfga/kratos/hydra backing Postgres keep their Ory/openfga-managed DSN
#      (sslmode=disable, in-cluster) Рђћ control-plane DB TLS lands first; these
#      three harden in a follow-up (their own DSN/TLS config).
#   2. PG credentials inherit the base-chart values (k8s Secret material, never
#      exposed on the wire). A cosmetic rotation away from the changeme-* default
#      is a clean follow-up once the stack is green Рђћ orthogonal to auth posture.

# РћђРћђ cert-manager-issued PG server TLS (SEC-F internal CA), NOT self-signed РћђРћђ
# Server-TLS ONLY: clients connect sslmode=require (transport-encrypted). We do
# NOT set certCAFilename on the pg sub-charts Рђћ that would make bitnami PG verify
# CLIENT certs (mTLS/pg_hba `cert`), and the bitnami readiness/liveness probe
# presents the server leaf (server-auth EKU only) as its client cert Рєњ PG rejects
# it ("unsupported certificate purpose") and the pod never turns Ready. Password
# auth over TLS is the intended posture here (see pg-certificates.yaml).
mtls:
  pgTls:
    enabled: true
    services: [vpc, compute, iam, geo, nlb, storage]

# РћђРћђ greenfield image provisioning: bitnami PGs from docker.io/bitnamilegacy РћђРћђ
# values.yaml pins global.imageRegistry=docker.io/prorobotech (the kacho-* mirror,
# which has NO bitnami images) Рєњ every pg-* Init/main container ImagePullBackOff.
# Reset it to "" so the bitnami sub-charts resolve their own registry (docker.io)
# for the bitnamilegacy/* mirror; the kacho-* services carry fully-qualified image
# strings below so they are unaffected. allowInsecureImages lets the bitnami charts
# accept the non-canonical bitnamilegacy image names.
global:
  imageRegistry: ""
  security:
    allowInsecureImages: true

# РћђРћђ each bitnami pg-<svc>: bitnamilegacy image + os-shell init + cert-manager TLS
#    (5 core) + operator-provisioned secret. auth.existingSecret points at the
#    pre-created kacho-umbrella-pg-<svc> Secret (keys password/postgres-password),
#    so the chart REFERENCES it (renders no Secret of its own Рєњ no ownership
#    collision). username/database are plain config (NOT secrets) and MUST be set
#    here so the server bootstraps the role/db the kacho service connects as Рђћ
#    values.prod carries only existingSecret. РћђРћђ
pg-vpc:
  image: { registry: docker.io, repository: bitnamilegacy/postgresql }
  volumePermissions: { image: { registry: docker.io, repository: bitnamilegacy/os-shell } }
  auth: { existingSecret: kacho-umbrella-pg-vpc, username: vpc, database: kacho_vpc }
  tls:
    enabled: true
    certificatesSecret: kacho-umbrella-pg-vpc-server-tls
    certFilename: tls.crt
    certKeyFilename: tls.key
pg-compute:
  image: { registry: docker.io, repository: bitnamilegacy/postgresql }
  volumePermissions: { image: { registry: docker.io, repository: bitnamilegacy/os-shell } }
  auth: { existingSecret: kacho-umbrella-pg-compute, username: compute, database: kacho_compute }
  tls:
    enabled: true
    certificatesSecret: kacho-umbrella-pg-compute-server-tls
    certFilename: tls.crt
    certKeyFilename: tls.key
pg-iam:
  image: { registry: docker.io, repository: bitnamilegacy/postgresql }
  volumePermissions: { image: { registry: docker.io, repository: bitnamilegacy/os-shell } }
  auth: { existingSecret: kacho-umbrella-pg-iam, username: iam, database: kacho_iam }
  tls:
    enabled: true
    certificatesSecret: kacho-umbrella-pg-iam-server-tls
    certFilename: tls.crt
    certKeyFilename: tls.key
pg-geo:
  image: { registry: docker.io, repository: bitnamilegacy/postgresql }
  volumePermissions: { image: { registry: docker.io, repository: bitnamilegacy/os-shell } }
  auth: { existingSecret: kacho-umbrella-pg-geo, username: geo, database: kacho_geo }
  tls:
    enabled: true
    certificatesSecret: kacho-umbrella-pg-geo-server-tls
    certFilename: tls.crt
    certKeyFilename: tls.key
pg-nlb:
  image: { registry: docker.io, repository: bitnamilegacy/postgresql }
  volumePermissions: { image: { registry: docker.io, repository: bitnamilegacy/os-shell } }
  auth: { existingSecret: kacho-umbrella-pg-nlb, username: kacho_nlb, database: kacho_nlb }
  tls:
    enabled: true
    certificatesSecret: kacho-umbrella-pg-nlb-server-tls
    certFilename: tls.crt
    certKeyFilename: tls.key

# РћђРћђ infra PGs (openfga/kratos/hydra): bitnamilegacy image + operator secret;
#    DSN stays Ory/openfga-managed (sslmode=disable) per concession #1. РћђРћђ
pg-openfga:
  image: { registry: docker.io, repository: bitnamilegacy/postgresql }
  volumePermissions: { image: { registry: docker.io, repository: bitnamilegacy/os-shell } }
  auth: { existingSecret: kacho-umbrella-pg-openfga, username: openfga, database: openfga }
pg-kratos:
  image: { registry: docker.io, repository: bitnamilegacy/postgresql }
  volumePermissions: { image: { registry: docker.io, repository: bitnamilegacy/os-shell } }
  auth: { existingSecret: kacho-umbrella-pg-kratos, username: kratos, database: kratos }
pg-hydra:
  image: { registry: docker.io, repository: bitnamilegacy/postgresql, tag: 16.4.0-debian-12-r0 }
  volumePermissions: { image: { registry: docker.io, repository: bitnamilegacy/os-shell } }
  auth: { existingSecret: kacho-umbrella-pg-hydra, username: hydra, database: hydra }

# РћђРћђ ALL NetworkPolicies DISABLED on fe3455 (per operator decision) РћђРћђ
# The umbrella NPs are authored for the target production cluster's CNI/DNS/topology
# and mis-fire on fe3455 (Beget CNI): the opa-sidecar egress allow-list omits PG
# :5432 and its DNS to-selector (kube-system/k8s-app=kube-dns) doesn't match fe3455
# CoreDNS Рєњ iam's DB/DNS egress dropped; the datastore/internal ingress policies
# similarly need per-cluster selector tuning. NetworkPolicy is a defense-in-depth
# network-segmentation layer Рђћ NOT the core auth. The production security posture
# (mTLS transport, Hydra-JWT authN, OpenFGA/ReBAC authZ, sslmode=require) is fully
# intact without it. Re-enable + per-cluster-tune as a follow-up.
opaSidecar:
  networkPolicy:
    enabled: false           # opa-sidecar-egress + opa-bundle + openfga-engine ingress
networkPolicy:
  datastore:
    enabled: false           # pg-<svc>-ingress-allowlist (all 6)

# РћђРћђ current-main hardened images (supersede rev-56 pins) + production peer edges РћђРћђ
# vpc/compute/nlb Рєњ geo (geo.v1.{Zone,Region}Service) is a real runtime edge
# (zone_id/region_id validation); values.prod's mtls.edges predates the geo
# cutover (kacho-workspace#82) and omits it, so the hardened services fail-closed
# at startup ("geo edge requires verified transport"). Enable the geo mTLS client
# edge (reuses the per-service kacho-<svc>-client-tls cert; serverName defaults to
# kacho-geo.kacho.svc.cluster.local Рѕѕ geo server-cert SAN).
vpc:
  image: docker.io/prorobotech/kacho-vpc:main-6fe9c386
  networkPolicy:
    enabled: false           # vpc-internal-allowlist off (all NPs disabled)
  # vpc runs authn.mode=production behind server-mTLS: it must TRUST the api-gateway
  # to forward the end-user principal (x-kacho-* headers). Without this the gateway
  # authenticates+authorizes a request (authz allow logged) but vpc rejects it
  # ("AuthN required: set x-kacho-* identity headers via gateway"). The gatewayРєњvpc
  # edge is mTLS-verified, so trusting the forwarder is safe.
  authn:
    trustedForwarder: true
  mtls:
    edges:
      geo: true
compute:
  image: docker.io/prorobotech/kacho-compute:main-1678f62c
  # Same forwarder-trust as vpc Рђћ pin the allow-list to the api-gateway SA SPIFFE
  # (chart default, restated so a values.prod override can't drop it).
  auth:
    trustedForwarderSANs: "spiffe://kacho.cloud/ns/kacho/sa/kacho-api-gateway"
  mtls:
    edges:
      geo: true
  # computeРєњstorage edge (InternalVolumeService attach/detach + Volume mirror, :9091).
  # The compute sub-chart has no dedicated storage-edge template, so wire it via the
  # generic env map. mTLS reuses compute's already-mounted client leaf
  # (kacho-compute-client-tls at /etc/kacho-compute/tls/client) Рђћ storage's internal
  # :9091 is RequireAndVerifyClientCert. serverName kacho-storage.<ns>.svc.cluster.local
  # Рѕѕ the storage server-cert SAN (storage.mtls.serverHosts=["kacho-storage"]).
  env:
    KACHO_COMPUTE_STORAGE_INTERNAL_GRPC_ADDR: kacho-storage.kacho.svc.cluster.local:9091
    KACHO_COMPUTE_STORAGE_MTLS_ENABLE: "true"
    KACHO_COMPUTE_STORAGE_MTLS_CERTFILE: /etc/kacho-compute/tls/client/tls.crt
    KACHO_COMPUTE_STORAGE_MTLS_KEYFILE: /etc/kacho-compute/tls/client/tls.key
    KACHO_COMPUTE_STORAGE_MTLS_CAFILES: /etc/kacho-compute/tls/client/ca.crt
    KACHO_COMPUTE_STORAGE_MTLS_SERVERNAME: kacho-storage.kacho.svc.cluster.local
kacho-geo:
  image: docker.io/prorobotech/kacho-geo:main-fc2d945c
  # hardened geo defaults AUTH_MODE=production Рєњ validateSecurityConfig requires a
  # non-empty trusted-forwarder allow-list (only the api-gateway SA SPIFFE id is a
  # legitimate end-user-principal forwarder). Bundled chart predates this env.
  env:
    KACHO_GEO_AUTHZ_TRUSTED_FORWARDER_SANS: "spiffe://kacho.cloud/ns/kacho/sa/kacho-api-gateway"
kacho-iam:
  image:
    # РћђРћђ FORWARD ROLL: main-c744f956 (kacho-iam main c744f95, multiarch, Docker Hub-
    #    verified 2026-07-15) supersedes the live feature build KAC-registry-docker-auth-
    #    c3000530. The tag drives BOTH the main container AND the kacho-migrator init
    #    (chart helper "kacho-iam.image"). Carries:
    #      Рђб #321 SA-key registry-audience union Рђћ the audience bug this cutover fixes;
    #      Рђб #319 token name/labels;
    #      Рђб #322/#323 cluster-internal Hydra-JWKS proxy listener (:9097) Рђћ REQUIRED so
    #        registry.iam.jwksUrl below is coherent (iam must SERVE :9097 before/with the
    #        registry JWKS-flip, else every token-verify 401s);
    #      Рђб #325 RG-1 anon-token + registry RPC catalog entries (418-catalog Рђћ must land
    #        together with api-gateway c7dce40d + registry af0eacae);
    #      Рђб #326 docker-login `issued_at` RFC3339 string (see below).
    #
    #    DOCKER-LOGIN issued_at Рђћ why this exact tag and not the earlier main-b3d23769:
    #    /iam/token (:9096) emits `issued_at`, which the docker client parses via
    #    time.Time.UnmarshalJSON Рђћ that accepts ONLY a JSON string, so a bare int64 breaks
    #    `docker login` ("Time.UnmarshalJSON: input is not a JSON string") Рєњ no bearer Рєњ
    #    all pull/push 401. The live feature build carries that fix (kacho-iam c300053) but
    #    main-b3d23769 REVERTED it, which made rolling to main a hard blocker. kacho-iam#326
    #    re-applied c300053 onto main (RFC3339 STRING, locked by a wire-shape regression
    #    test) Рєњ main c744f95 Рєњ CI published main-c744f956. Blocker resolved: this image is
    #    a strict forward over the live build on BOTH halves. Do not repin below this tag Рђћ
    #    cutover-fe3455.sh preflight denylists the broken main-b3d23769.
    tag: main-c744f956
  # РћђРћђРћђ Docker Registry v2 token shim (`/iam/token`, :9096) РћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђ
  # лълЉл»лЌлљлблЋлЏлглЮлъ лйл░ Лђл░лил▓ЛЉЛђлйЛЃЛѓлЙл╝ лЙл║ЛђЛЃлХлхлйлИлИ: л▒лхли ЛЇЛѓлЙл│лЙ Лђл░л▒лЙЛѓл░лхЛѓ built-in л┤лхЛёлЙл╗Лѓ
  # `service: registry.kacho.local`, лИ `docker login` л┐л░л┤л░лхЛѓ ЛЂ `unauthorized`.
  #
  # лЪлЙЛЄлхл╝ЛЃ: `service` ЛЃЛЁлЙл┤лИЛѓ лйлх ЛѓлЙл╗Лїл║лЙ л▓ fallback л┤л╗ЛЈ `?service=`, лйлЙ лИ л▓
  # issueUC.RegistryAudience (#321) Рєњ whitelist'лИЛѓЛЂЛЈ л║л░л║ audience л▓ Hydra-л║л╗лИлхлйЛѓлх
  # лџлљлќлћлълЊлъ л▓ЛІл┐ЛЃЛЂл║л░лхл╝лЙл│лЙ SA-л║л╗ЛјЛЄл░. docker Лѕл╗ЛЉЛѓ `?service=registry.in-cloud.io`, iam
  # л┐ЛђлЙЛЂлИЛѓ ЛЃ Hydra ЛЇЛѓлЙЛѓ audience, л░ л▓ л║л╗лИлхлйЛѓлх л╗лхлХлИЛѓ л┤лхЛёлЙл╗ЛѓлйЛІл╣ registry.kacho.local Рєњ
  #   Hydra: "Requested audience 'registry.in-cloud.io' has not been whitelisted
  #           by the OAuth 2.0 Client" (400) Рєњ shim лЙЛѓл┤л░ЛЉЛѓ 401.
  # лћлИл░л│лйлЙЛЂЛѓлИл║л░ 2026-07-15: л┐л░л┤л░л╗лИ лИ ЛЂЛѓл░ЛђЛІл╣, лИ ЛЂл▓лхлХлхл▓ЛІл┐ЛЃЛЅлхлйлйЛІл╣ л║л╗ЛјЛЄ; л▓ л╗лЙл│л░ЛЁ iam Рђћ
  # ЛѓлИЛѕлИлйл░ (л▓ЛЂлх л┐ЛђлИЛЄлИлйЛІ ЛЂЛЁл╗лЙл┐лйЛЃЛѓЛІ л▓ ErrUnauthenticated л▒лхли л╗лЙл│л░), Лђлхл░л╗ЛїлйЛЃЛј л┐ЛђлИЛЄлИлйЛЃ
  # лйл░лил▓л░л╗л░ Hydra. лбЛђлхл▒ЛЃлхЛѓ kacho-iam#Рђд (ЛЄл░ЛђЛѓ лйл░ЛЃЛЄлИл╗ЛЂЛЈ Лђлхлйл┤лхЛђлИЛѓЛї ЛЇЛѓЛЃ ЛЂлхл║ЛєлИЛј).
  #
  # `issuer` = realm л▓ WWW-Authenticate; ЛЂлЙл▓л┐л░л┤л░лхЛѓ ЛЂ KACHO_REGISTRY_TOKEN_REALM
  # data-plane'л░ (registry.dataplane лйлИлХлх).
  #
  # Рџа audience ЛёлИл║ЛЂлИЛђЛЃлхЛѓЛЂЛЈ л▓ Hydra-л║л╗лИлхлйЛѓлх лњ люлълюлЋлЮлб л▓ЛІл┐ЛЃЛЂл║л░ л║л╗ЛјЛЄл░ Рєњ SA-л║л╗ЛјЛЄлИ,
  # л▓ЛІл┐ЛЃЛЅлхлйлйЛІлх лћлъ ЛЇЛѓлЙл╣ л┐Лђл░л▓л║лИ, лйл░л┤лЙ лЪлЋлалЋлњлФлЪлБлАлблўлблг (лил░л┤лйлИл╝ ЛЄлИЛЂл╗лЙл╝ allowlist лйлх л┐лЙЛЈл▓лИЛѓЛЂЛЈ).
  #
  # NB: umbrella л▓лхлйл┤лЙЛђлИЛѓ iam-ЛЄл░ЛђЛѓ лИли ./charts/kacho-iam (л║лЙл┐лИЛЈ лњлЮлБлблалў kacho-deploy),
  # л░ лЮлЋ лИли ../kacho-iam/deploy Рђћ ЛЃ л║лЙл┐лИлИ values л▓л╗лЙлХлхлйЛІ л┐лЙл┤ `config`. лЪЛђл░л▓л║л░ лйЛЃлХлйл░ л▓
  # лЙл▒лхлИЛЁ (kacho-iam#Рђд Рђћ sibling-л║лЙл┐лИЛЈ, ЛЄЛѓлЙл▒ЛІ standalone-ЛЄл░ЛђЛѓ лйлх лЙЛѓЛЂЛѓл░л╗).
  config:
    apiServer:
      registryToken:
        issuer: https://registry.in-cloud.io/iam/token
        service: registry.in-cloud.io
  # In-cluster Hydra token endpoint л┤л╗ЛЈ registry `/iam/token` shim (client_credentials
  # exchange). лЉлхли лйлхл│лЙ ResolveHydraTokenURL() л┐л░л┤л░лхЛѓ лйл░ л▓лйлхЛѕлйлИл╣ issuer-URL, лйлхл┤лЙЛЂЛѓлИлХлИл╝ЛІл╣
  # лИлилйЛЃЛѓЛђлИ л║л╗л░ЛЂЛѓлхЛђл░ Рєњ docker push/pull л╗лЙл╝л░лхЛѓЛЂЛЈ лйл░ ЛЇЛѓл░л┐лх л▒ЛђлЙл║лхЛђлИлйл│л░ ЛѓлЙл║лхлйл░. (#168)
  kacho:
    iam:
      hydraTokenURL: http://kacho-umbrella-hydra-public.kacho.svc:4444/oauth2/token
      # registry-iam-jwks-unify Рђћ upstream the cluster-INTERNAL jwks-proxy (:9097)
      # mirrors byte-for-byte (env KACHO_IAM_HYDRA_JWKS_URL). In-cluster hydra-public
      # base so the iamРєњHydra JWKS fetch never leaves the cluster; iam re-serves it to
      # the registry data-plane over one-way server-TLS. Hydra stays signer/issuer.
      hydraJwksUrl: http://kacho-umbrella-hydra-public.kacho.svc:4444/.well-known/jwks.json
kacho-nlb:
  image:
    tag: main-2c87cac9
  networkPolicy:
    enable: false            # kacho-nlb NP off (nlb chart uses `enable`, not `enabled`)
  # nlb chart default db.host=kacho-pg-nlb assumes release name `kacho`; this release
  # is `kacho-umbrella` Рєњ the real Service is kacho-umbrella-pg-nlb (the correct host
  # normally comes from values.dev, which the prod layer drops). Point it correctly.
  db:
    host: kacho-umbrella-pg-nlb
  # nlbРєњgeo mTLS edge (region_id validation) + non-empty trusted-forwarder allow-list
  # (production+mTLS fail-closed gate: empty list trusts any mTLS peer to forward the
  # end-user principal Рєњ impersonation). Only the api-gateway SA legitimately forwards.
  mtls:
    edges:
      geo: true
  config:
    authz:
      trustedForwarderSANs:
        - spiffe://kacho.cloud/ns/kacho/sa/kacho-api-gateway
api-gateway:
  # FORWARD ROLL: main-c7dce40d (kacho-api-gateway origin/main HEAD, Docker Hub-verified
  # 2026-07-15T14:02) Рђћ strict forward from the live main-a7c82963 (a7c82963 IS an
  # ancestor of c7dce40d, no revert). Adds RG-1 #145: registers the 6 public Repository
  # RPCs + syncs the embedded permission-catalog to 418 entries. COUPLED to iam
  # main-b3d23769 (#325, also 418-catalog) Рђћ a gateway at 418 with an iam below 418 would
  # AUTHZ_DENY the new registry RPCs ("catalog: no entry for method"); rolling both
  # together keeps iam(418)/gateway(418)/registry(af0eacae) catalog-coherent.
  image: docker.io/prorobotech/kacho-api-gateway:main-c7dce40d
  # Internal :9091 listener hosts InternalAuthzCacheService.InvalidateSubject and
  # (production invariant, security.md) MUST run mTLS + a caller allow-list Рђћ the
  # hardened binary fail-fasts otherwise. Reuse the already-mounted cert-manager
  # material: server cert = api-gateway-tls (/etc/api-gateway/tls), client-CA =
  # /etc/api-gateway/mtls/ca.crt (chart-set KACHO_API_GATEWAY_MTLS_CA_FILE). The
  # authorised caller is the iam push-drainer SPIFFE id.
  extraEnv:
    KACHO_APP_ENV: production
    KACHO_API_GATEWAY_INTERNAL_GRPC_MTLS_ENABLE: "true"
    KACHO_API_GATEWAY_INTERNAL_GRPC_TLS_CERT_FILE: /etc/api-gateway/tls/tls.crt
    KACHO_API_GATEWAY_INTERNAL_GRPC_TLS_KEY_FILE: /etc/api-gateway/tls/tls.key
    KACHO_API_GATEWAY_INTERNAL_GRPC_ALLOWED_SPIFFE: spiffe://kacho.cloud/ns/kacho/sa/kacho-iam
  # gatewayРєњgeo backend dial must be mTLS: geo's :9090 runs public_mtls=true, but
  # values.prod's mtls.edges predate the geo cutover (only vpc/compute/iam/nlb) Рєњ the
  # gateway dialed geo plaintext Рєњ 503 on /geo/v1/regions|zones (region/zone admin).
  mtls:
    edges:
      geo: true

# РћђРћђ kacho-registry (OCI control-plane) + zot + pg-registry Рђћ Stage 1 (epic #129) РћђРћђ
# Integrates the previously-orphaned registry into the umbrella. Production posture
# matching the running pod + satisfying serve.go prod-guards: AUTH_MODE=production,
# mTLS both listeners + both registryРєњiam edges (cert-manager kacho-internal-ca),
# DATAPLANE_TLS_TERMINATED_EXTERNALLY=true (dataplane :8080 behind ext TLS),
# HYDRA_ISSUER pinned. DB stays sslmode=disable (Ory/infra-tier concession, like the
# running registry). zot image = the stand's running ghcr.io/project-zot:latest.
registry:
  enabled: true
  image:
    # FORWARD ROLL: main-af0eacae (kacho-registry origin/main HEAD, Docker Hub-verified
    # 2026-07-15T14:00) Рђћ STRICT forward from the live main-5eb21d25 (5eb21d25 IS an
    # ancestor of af0eacae, verified: no revert of any live functionality). Live already
    # carries #35 Defect-A (unknown blob) + #37 Defect-B (new-repo push deadlock) + #38
    # zot S3/redirectBlobURL + #34 authz-TTL + #40 push-grant revoke-safety (delete-on-
    # materialized + 60s TTL) + push-deny 403. af0eacae adds ONLY RG-1 #43 (Repository
    # config-overlay persistence: migration + domain + repo, DB-level invariants) on top.
    # Consistent with the iam(#325)/gateway(#145) 418-catalog + anon-recognition roll.
    tag: main-af0eacae
  authMode: production
  db:
    sslmode: disable
  authz:
    iamGrpcAddr: kacho-iam-internal.kacho.svc.cluster.local:9091
    iamProjectGrpcAddr: kacho-iam.kacho.svc.cluster.local:9090
  zot:
    # v2.1.18 Рђћ carries http.compat + the s3 storageDriver + redirectBlobURL. The
    # fe3455 `:latest` tag already resolves to this sha (sha256:34f18f78Рђд); pin it so a
    # future re-pull can't drift to a build without these config keys.
    image:
      tag: v2.1.18
    # docker2s2 Рєњ rendered under http.compat (zot rejects a TOP-LEVEL compat key). Lets
    # clients push the Docker schema2 manifests `docker push` emits (else 415 on manifest).
    compat:
      - docker2s2
    storage:
      persistence: false     # fe3455 has no dynamic StorageClass Рєњ local dir is ephemeral
      dedupe: false          # s3 dedup needs a remote cache DB (dynamodb) Рђћ unavailable
      # blob GET Рєњ 307 to an S3 presigned URL; clients pull blobs DIRECTLY from Beget
      # object storage (offloads zot; post-authz Рђћ the data-plane enforces v_get first).
      redirectBlobURL: true
      # Remote S3 backend (Beget) Рєњ blobs PERSIST across zot restarts (the emptyDir is
      # only a local staging dir now). region/endpoint/bucket are operational config; the
      # ACCESS/SECRET keys live ONLY in the `zot-s3-creds` Secret (env), never in git.
      s3:
        enabled: true
        region: ru1
        regionEndpoint: https://s3.ru1.storage.beget.cloud
        bucket: c90bf04ae9a8-transformative-cillian
        rootDirectory: /zot
        secure: true
        forcePathStyle: true
        existingSecret: zot-s3-creds
  # dedicated external VIP for the OCI data-plane (docker login/push/pull), separate
  # from the console Рђћ Beget/Cilium LB-IPAM assigns its own external IP (like ui-lb/uif-lb).
  service:
    dataplaneLB:
      enabled: true
      # Beget LB controller annotations (same as ui-lb/uif-lb) Рђћ required for the
      # provider to actually provision an external VIP; without them the Service
      # stays <pending>.
      annotations:
        lb.beget.com/type: external
        lb.beget.com/algorithm: round_robin
        lb.beget.com/healthcheck-interval-seconds: "60"
        lb.beget.com/healthcheck-timeout-seconds: "5"
      # РћђРћђРћђ TLS-ЛѓлхЛђл╝лИлйл░ЛєлИЛЈ л┐ЛЃл▒л╗лИЛЄлйлЙл│лЙ OCI data-plane (docker login/push/pull) РћђРћђРћђ
      # лЉлЋлЌ ЛЇЛѓлЙл│лЙ л▒л╗лЙл║л░ ЛЄл░ЛђЛѓ Лђлхлйл┤лхЛђлИЛѓ 443Рєњdataplane (plaintext) лИ docker л┐л░л┤л░лхЛѓ ЛЂ
      # ┬Фhttp: server gave HTTP response to HTTPS client┬╗. лалЙл▓лйлЙ ЛЇЛѓлЙ лИ л┐ЛђлЙлИлилЙЛѕл╗лЙ
      # 2026-07-15: TLS-ЛЂЛѓлхл║ data-plane л▒ЛІл╗ лйл░л╗лЙлХлхлй ЛђЛЃл║л░л╝лИ (LE-ЛЂлхЛђЛѓ + kubectl-patch
      # Service 443Рєњdp-tls) лИ лйлх лХлИл╗ л▓ values Рєњ `helm upgrade --take-ownership`
      # ЛЃЛЂЛІлйлЙл▓лИл╗ Service, л┐лхЛђлхЛђлхлйл┤лхЛђлИл╗ л┤лхЛёлЙл╗ЛѓлЙл╝ лИ ЛЃЛђлЙлйлИл╗ HTTPS ЛђлхлхЛЂЛѓЛђл░. лЉл╗лЙл║ лйлИлХлх
      # л┤лхл╗л░лхЛѓ лХлИл▓лЙлх ЛЂлЙЛЂЛѓлЙЛЈлйлИлх л▓ЛІЛђл░лилИл╝ЛІл╝ ЛЄл░ЛђЛѓлЙл╝ Рђћ л┤Лђлхл╣Лё лил░л║ЛђЛІЛѓ.
      tlsSidecar:
        enabled: true
        cert:
          # лўл╝лхлйл░ лАлълњлЪлљлћлљл«лб ЛЂ ЛЃлХлх л▓ЛІл┐ЛЃЛЅлхлйлйЛІл╝ л▓ л║л╗л░ЛЂЛѓлхЛђлх Certificate/ЛЂлхл║ЛђлхЛѓлЙл╝ Рєњ
          # helm ЛЃЛЂЛІлйлЙл▓л╗ЛЈлхЛѓ лИЛЁ л▒лхли л┐лхЛђлхл▓ЛІл┐ЛЃЛЂл║л░ (LE duplicate-limit 5/лйлхл┤).
          name: registry-dataplane-letsencrypt
          secretName: registry-dataplane-le-tls
          issuerRef:
            # лЪЛЃл▒л╗лИЛЄлйлЙ-л┤лЙл▓лхЛђлхлйлйЛІл╣ issuer лЙл▒ЛЈлил░Лѓлхл╗лхлй: ЛЂлхЛђЛѓ л┐Лђлхл┤ЛіЛЈл▓л╗ЛЈлхЛѓЛЂЛЈ docker-л║л╗лИлхлйЛѓЛЃ,
            # л░ internal-CA лЙлй лЙЛѓл▓лхЛђл│л░лхЛѓ (x509: unknown authority). Trust л║ iam :9097 лйлх
            # ЛЂЛѓЛђл░л┤л░лхЛѓ Рђћ л┐ЛђлИ mtls.enable=true ca.crt л▒лхЛђЛЉЛѓЛЂЛЈ лИли mtls.serverSecretName.
            name: letsencrypt-prod
            kind: ClusterIssuer
          # лЪЛЃл▒л╗лИЛЄлйЛІл╣ CA лйлх л┐лЙл┤л┐лИЛЂЛІл▓л░лхЛѓ CN/loopback-IP лИ лйл░л▓ЛЈлиЛІл▓л░лхЛѓ ЛЂл▓лЙЛј keyalg-л┐лЙл╗лИЛѓлИл║ЛЃ;
          # л╗Лјл▒лЙлх л╗лИЛѕлйлхлх л┐лЙл╗лх л▓ spec'лх = л┐лхЛђлхл▓ЛІл┐ЛЃЛЂл║. лЪЛЃЛЂЛѓлЙ Рєњ Лѕл░л▒л╗лЙлй лИЛЁ лЙл┐ЛЃЛЂл║л░лхЛѓ, лИ Лђлхлйл┤лхЛђ
          # л▓ЛІЛЁлЙл┤лИЛѓ л▒л░л╣Лѓ-л▓-л▒л░л╣Лѓ Лђл░л▓лйЛІл╝ лХлИл▓лЙл╝ЛЃ лЙл▒Лілхл║ЛѓЛЃ (ЛЂл▓лхЛђлхлйлЙ л┐ЛђлЙЛѓлИл▓ л║л╗л░ЛЂЛѓлхЛђл░).
          commonName: ""
          ipAddresses: []
          usages: []
          privateKey:
            algorithm: ""
            size: ""
  # registry-iam-jwks-unify Рђћ the data-plane docker-Bearer verifier now fetches JWKS
  # from the cluster-INTERNAL kacho-iam JWKS proxy (:9097) instead of dialing Hydra.
  # iam serves a byte-for-byte mirror of Hydra's PUBLIC JWKS over one-way server-TLS
  # (internal-CA leaf) Рђћ kids/alg match Hydra-signed tokens; the registry pod trusts
  # the internal-CA via SSL_CERT_DIR. This is an https in-cluster Service, so
  # production requireSecureJWKSURL passes without needing an external hydra-https
  # terminator. Hydra stays the SIGNER/ISSUER Рђћ only the key-DISTRIBUTION URL moved.
  #
  # Рџа IAM-FIRST DEPLOY SEQUENCING (fail-closed Рђћ do NOT flip prematurely):
  #   the kacho-iam :9097 JWKS endpoint MUST be live and smoke-verified serving
  #   (GET /.well-known/jwks.json Рєњ 200 with Hydra kids) BEFORE this registry.iam.jwksUrl
  #   flip reaches a rolling registry pod. A premature flip (iam endpoint not yet
  #   serving) fails every signature verify CLOSED Рєњ HTTP 401 on ALL prod docker pulls.
  #   Runbook: roll kacho-iam first (this chart adds the :9097 listener), curl the
  #   in-cluster endpoint, THEN let the registry pod pick up this URL.
  iam:
    jwksUrl: https://kacho-iam-internal.kacho.svc.cluster.local:9097/.well-known/jwks.json
  # HydraIssuer stays pinned on Hydra (issuer-pin retained; decoupled from the JWKS
  # URL knob). registry serve.go requireIssuerPinned still forces this non-empty; the
  # verifier rejects any token whose iss РЅа this Hydra issuer even though JWKS is iam's.
  hydra:
    issuer: https://hydra.api.kacho.cloud
  dataplaneTLSTerminatedExternally: true
  mtls:
    enable: true
    edges:
      iamAuthz: true
      iamProject: true

# pg-registry Рђћ greenfield bitnamilegacy image + operator secret (like the other pgs)
pg-registry:
  enabled: true
  image: { registry: docker.io, repository: bitnamilegacy/postgresql }
  volumePermissions: { image: { registry: docker.io, repository: bitnamilegacy/os-shell } }
  auth: { existingSecret: kacho-umbrella-pg-registry, username: registry, database: kacho_registry }
  primary:
    persistence:
      enabled: false
    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits: { cpu: 1000m, memory: 1Gi }

# РћђРћђ kacho-storage Рђћ Storage control-plane (Volume/VolumeAttachment/Snapshot/DiskType) РћђРћђ
# gRPC public :9090 + cluster-internal :9091 + diagnostic /healthz. server-mTLS on
# both listeners; per-edge client-mTLS storageРєњ{geo,iam}. DB channel over TLS
# (sslmode=require; pg server cert issued via mtls.pgTls.services above). Peer edges:
# storageРєњgeo (zone_id), storageРєњiam PUBLIC (ProjectService.Get) + INTERNAL (Check).
storage:
  # РЏћ лњлФлџлЏл«лДлЋлЮ (2026-07-15) Рђћ ЛЄл░ЛђЛѓ kacho-storage лЮлЋ лўлЮлблЋлЊлалўлалълњлљлЮ ЛЂ umbrella: fresh install
  # лйлИл║лЙл│л┤л░ лйлх л┐лЙл┤лйлИл╝л░л╗ЛЂЛЈ лИ лил░л▓л░л╗лИл▓л░л╗ лњлЋлАлг cutover Рђћ `helm upgrade --wait` л▓лИЛЂлхл╗ 15m лйл░
  # лйлхл│лЙЛѓлЙл▓лЙл╝ storage Рєњ `UPGRADE FAILED: context deadline exceeded`. лџлЙлйЛѓЛђлЙл╗Лї-л┐л╗лхл╣лй лйлх
  # л┤лЙл╗лХлхлй л▒ЛІЛѓЛї лил░л╗лЙлХлйлИл║лЙл╝ лйлхЛђл░л▒лЙЛѓл░л▓Лѕлхл│лЙ fresh install Рєњ pure control-plane cutover
  # (ЛђлхлХлИл╝, ЛѕЛѓл░ЛѓлйлЙ лЙл┐лИЛЂл░лйлйЛІл╣ л▓ cutover-fe3455.sh).
  #
  # лДЛѓлЙ лИл╝лхлйлйлЙ ЛЂл╗лЙл╝л░лйлЙ (л┤лИл░л│лйлЙЛЂЛѓлИл║л░ л┐лЙ лХлИл▓лЙл╝ЛЃ л║л╗л░ЛЂЛѓлхЛђЛЃ, лйлх л┐лЙ л┤лЙл│л░л┤л║лх):
  #   1. лџл╗ЛјЛЄлИ values лалљлАлЦлълћл»лблАл» ЛЂ ЛЄл░ЛђЛѓлЙл╝. лЮлИлХлх л┐лИЛѕлхЛѓЛЂЛЈ `storage.db.{host,sslMode,
  #      passwordSecretName,passwordSecretKey}`, л░ ЛЄл░ЛђЛѓ ЛЄлИЛѓл░лхЛѓ `config.{dbHost,dbPort,dbUser,
  #      dbName,dbSslMode,dbPassword}` (deploy/templates/configmap.yaml). лЮлхлИлил▓лхЛЂЛѓлйЛІлх л║л╗ЛјЛЄлИ
  #      helm л╝лЙл╗ЛЄл░ лИл│лйлЙЛђлИЛђЛЃлхЛѓ Рєњ л┐ЛђлИл╝лхлйЛЈл╗ЛЂЛЈ лћлЋлцлълЏлб `dbHost: kacho-storage-postgres`. лќлИл▓лЙл╣ CM
  #      ЛЇЛѓлЙ л┐лЙл┤Лѓл▓лхЛђлХл┤л░л╗ (KACHO_STORAGE_DB_HOST=kacho-storage-postgres), migrator л┐л░л┤л░л╗
  #      `lookup kacho-storage-postgres: no such host` (Лђлхл░л╗ЛїлйЛІл╣ Service Рђћ kacho-umbrella-pg-storage).
  #   2. лЪл░ЛђлЙл╗Лї лЉлћ. `passwordSecretName` л▓ ЛЄл░ЛђЛѓлх лЮлЋ лАлБлЕлЋлАлблњлБлЋлб: secret.yaml Лђлхлйл┤лхЛђлИЛѓ лАлњлълЎ
  #      Secret лИли `config.dbPassword | default "changeme"` Рєњ л┤л░лХлх ЛЂ л▓лхЛђлйЛІл╝ ЛЁлЙЛЂЛѓлЙл╝ storage ЛѕЛЉл╗
  #      л▒ЛІ л▓ лЉлћ ЛЂ л┐л╗лхл╣ЛЂЛЁлЙл╗л┤лхЛђлЙл╝. лџлЙл╝л╝лхлйЛѓл░ЛђлИл╣ лйлИлХлх л┐ЛђлЙ ┬Фrenders no Secret of its own┬╗ лйлхл▓лхЛђлхлй:
  #      лХлИл▓лЙл╣ kacho-umbrella-storage-secret лЙЛѓЛђлхлйл┤лхЛђлИл╗ лИл╝лхлйлйлЙ ЛЄл░ЛђЛѓ.
  #
  # лЪлЙЛЄлхл╝ЛЃ лйлх ЛЄлИлйлИЛѓЛЂЛЈ лил┤лхЛЂЛї: л║л╗л░ЛЂЛѓЛї л┐л░ЛђлЙл╗Лї л▓ `config.dbPassword` лйлхл╗ЛїлиЛЈ (values л▓ git) Рєњ ЛЄл░ЛђЛѓЛЃ
  # лйЛЃлХлйл░ л┐лЙл┤л┤лхЛђлХл║л░ existingSecret (ЛЂЛЂЛІл╗л║л░ лйл░ bitnami-provisioned kacho-umbrella-pg-storage,
  # л║л╗ЛјЛЄ password), л║л░л║ ЛЃ лЙЛЂЛѓл░л╗ЛїлйЛІЛЁ ЛЂлхЛђл▓лИЛЂлЙл▓. лГЛѓлЙ PR л▓ kacho-storage/deploy, лйлх ЛЂЛѓЛђлЙЛЄл║л░ л▓ лЙл▓лхЛђл╗лхлх.
  #
  # лњл║л╗ЛјЛЄлИЛѓЛї лЙл▒Лђл░ЛѓлйлЙ: (1) PR л▓ kacho-storage Рђћ existingSecret + ЛЂл▓лхЛђл║л░ л║л╗ЛјЛЄлхл╣ ЛЂ ЛЄл░ЛђЛѓлЙл╝;
  # (2) л┐лхЛђлхл┐лИЛЂл░ЛѓЛї л▒л╗лЙл║ лйлИлХлх лйл░ Лђлхл░л╗ЛїлйЛІлх л║л╗ЛјЛЄлИ; (3) enabled: true + pg-storage.enabled: true.
  # лъл▒Лђл░ли CS-1 ЛЃлХлх ЛЂлЙл▒Лђл░лй лИ лХл┤ЛЉЛѓ: main-a185fa07 (multiarch).
  enabled: false
  image:
    # main-a185fa07 Рђћ kacho-storage origin/main HEAD ("[CS-1] storage network-disk Рђћ
    # attach zone/project split, auto-device retry, listauthz gate, snapshot name", #4),
    # multiarch (amd64+arm64), Docker Hub-verified 2026-07-15T17:41. Supersedes
    # main-e6d67c8d (2026-07-14, deps-only, amd64-only, PRE-CS-1) Рђћ installing that tag
    # would have shipped storage WITHOUT any CS-1 network-disk functionality.
    #
    # This is a FRESH install (kacho-storage is NOT yet on the cluster), so it neither
    # reverts nor disrupts any live workload; --wait installs it as the storage-split's
    # first rollout. repository comes qualified from the umbrella base values.yaml
    # (docker.io/prorobotech/kacho-storage); the tag drives storage + kacho-migrator both.
    #
    # Why the image was missing until now: every kacho-storage docker-build run had failed
    # with `invalid tag "/kacho-storage:main-a185fa07": invalid reference format` Рђћ the
    # workflow interpolated an EMPTY secrets.DOCKERHUB_USERNAME (kacho-storage was private
    # and thus outside the org secrets' visibility). Making the repo public restored the
    # secrets Рєњ rerun of run 29417934635 published the image. kacho-storage#5 additionally
    # hardens the workflow so an unset secret yields a green build-only run instead of a
    # hard failure.
    #
    # Рџа FOLLOW-UP (does NOT block this cutover Рђћ storage is isolated from the registry):
    #   fga-register drainer Рђћ the storage deploy chart wires NO storageРєњiam
    #   RegisterResource (fgaproxy owner-tuple outbox drainer) edge, and kacho-iam carries
    #   no storage-SA `fga_writer` ReBAC tuple seed (highest iam migration is 0052; the
    #   pattern to mirror is 0044_registry_sa_least_priv.sql). Until both land, owner-tuples
    #   for storage resources are not written to FGA, so the gateway scope_extractors
    #   {storage_volume,volume_id}/{storage_snapshot,snapshot_id} cannot resolve
    #   targetРєњproject. Track as SEC-A parity with vpc/compute.
    tag: main-a185fa07
  config:
    authMode: production
    geoGrpcAddr: kacho-geo.kacho.svc.cluster.local:9090
    iamGrpcAddr: kacho-iam.kacho.svc.cluster.local:9090
    authzIamGrpcAddr: kacho-iam-internal.kacho.svc.cluster.local:9091
  db:
    host: kacho-umbrella-pg-storage
    sslMode: require
    # operator-/bitnami-provisioned Secret (pg-storage.auth.existingSecret below);
    # the storage chart references it (renders no Secret of its own).
    passwordSecretName: kacho-umbrella-pg-storage
    passwordSecretKey: password
  mtls:
    enable: true
    edges:
      geo: true
      iam: true

# pg-storage Рђћ greenfield bitnamilegacy image + operator secret + cert-manager TLS
# (server cert kacho-umbrella-pg-storage-server-tls issued via mtls.pgTls.services).
pg-storage:
  # РЏћ лњЛІл║л╗ЛјЛЄлхлй л▓л╝лхЛЂЛѓлх ЛЂлЙ `storage` (ЛЂл╝. л▒л╗лЙл║ storage л▓ЛІЛѕлх) Рђћ лЉлћ л▒лхли л┐лЙЛѓЛђлхл▒лИЛѓлхл╗ЛЈ лйлх лйЛЃлХлйл░.
  # лњл║л╗ЛјЛЄл░ЛѓЛї лълћлЮлълњлалЋлюлЋлЮлЮлъ ЛЂлЙ storage.enabled л┐лЙЛЂл╗лх лИлйЛѓлхл│Лђл░ЛєлИлИ ЛЄл░ЛђЛѓл░.
  enabled: false
  image: { registry: docker.io, repository: bitnamilegacy/postgresql }
  volumePermissions: { image: { registry: docker.io, repository: bitnamilegacy/os-shell } }
  auth: { existingSecret: kacho-umbrella-pg-storage, username: storage, database: kacho_storage }
  tls:
    enabled: true
    certificatesSecret: kacho-umbrella-pg-storage-server-tls
    certFilename: tls.crt
    certKeyFilename: tls.key
  primary:
    persistence:
      enabled: false
    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits: { cpu: 1000m, memory: 1Gi }