# values.fe3455-prod.yaml — fe3455 PRODUCTION cutover overlay (greenfield stand).
#
# Layer order (production, no dev-auth):
#   helm upgrade --install kacho-umbrella ./helm/umbrella -n kacho \
#     -f values.fe3455-base.yaml  # captured rev-56 working INFRA baseline:
#                                 #   global.imageRegistry="" + bitnamilegacy PG
#                                 #   images, inline PG creds + matching Ory/openfga
#                                 #   DSNs, cert-manager mTLS PKI (per-subchart
#                                 #   certificate.yaml), fe3455 capacity trims.
#     -f values.prod.yaml         # production AUTH flip (correct chart paths):
#                                 #   authn.mode=production/production-strict,
#                                 #   sslmode=require, mTLS on, Hydra JWKS/issuer,
#                                 #   fail-closed authz, opaSidecar+datastore NP.
#     -f values.fe3455-prod.yaml  # THIS: revert values.prod's operator-provisioned
#                                 #   assumptions (existingSecret) back to greenfield
#                                 #   self-provisioning, add cert-manager PG server
#                                 #   TLS, current-main hardened images, api-gateway
#                                 #   internal-:9091 mTLS, geo forwarder SAN.
#
# ── SECURITY POSTURE (what "production" means here) ──
#   authN  : Hydra-issued JWT verified at the edge (production-strict, no dev HMAC).
#   authZ  : per-RPC OpenFGA/ReBAC Check, fail-closed (RBAC roles).
#   mTLS   : service↔service on both listeners incl. api-gateway internal :9091;
#            EVERY certificate issued by cert-manager (ClusterIssuer
#            kacho-internal-ca) — no self-signed / bitnami-autoGenerated material.
#   DB     : the 5 control-plane service DBs run sslmode=require over cert-manager
#            server certs (templates/pg-certificates.yaml).
#
# ── KNOWN, DOCUMENTED greenfield concessions (follow-ups, not dev-mode) ──
#   1. openfga/kratos/hydra backing Postgres keep their Ory/openfga-managed DSN
#      (sslmode=disable, in-cluster) — control-plane DB TLS lands first; these
#      three harden in a follow-up (their own DSN/TLS config).
#   2. PG credentials inherit the base-chart values (k8s Secret material, never
#      exposed on the wire). A cosmetic rotation away from the changeme-* default
#      is a clean follow-up once the stack is green — orthogonal to auth posture.

# ── cert-manager-issued PG server TLS (SEC-F internal CA), NOT self-signed ──
# Server-TLS ONLY: clients connect sslmode=require (transport-encrypted). We do
# NOT set certCAFilename on the pg sub-charts — that would make bitnami PG verify
# CLIENT certs (mTLS/pg_hba `cert`), and the bitnami readiness/liveness probe
# presents the server leaf (server-auth EKU only) as its client cert → PG rejects
# it ("unsupported certificate purpose") and the pod never turns Ready. Password
# auth over TLS is the intended posture here (see pg-certificates.yaml).
mtls:
  pgTls:
    enabled: true
    services: [vpc, compute, iam, geo, nlb, storage]

# ── greenfield image provisioning: bitnami PGs from docker.io/bitnamilegacy ──
# values.yaml pins global.imageRegistry=docker.io/prorobotech (the kacho-* mirror,
# which has NO bitnami images) → every pg-* Init/main container ImagePullBackOff.
# Reset it to "" so the bitnami sub-charts resolve their own registry (docker.io)
# for the bitnamilegacy/* mirror; the kacho-* services carry fully-qualified image
# strings below so they are unaffected. allowInsecureImages lets the bitnami charts
# accept the non-canonical bitnamilegacy image names.
global:
  imageRegistry: ""
  security:
    allowInsecureImages: true

# ── each bitnami pg-<svc>: bitnamilegacy image + os-shell init + cert-manager TLS
#    (5 core) + operator-provisioned secret. auth.existingSecret points at the
#    pre-created kacho-umbrella-pg-<svc> Secret (keys password/postgres-password),
#    so the chart REFERENCES it (renders no Secret of its own → no ownership
#    collision). username/database are plain config (NOT secrets) and MUST be set
#    here so the server bootstraps the role/db the kacho service connects as —
#    values.prod carries only existingSecret. ──
pg-vpc:
  image: { registry: docker.io, repository: bitnamilegacy/postgresql }
  volumePermissions: { image: { registry: docker.io, repository: bitnamilegacy/os-shell } }
  auth: { existingSecret: kacho-umbrella-pg-vpc, username: vpc, database: kacho_vpc }
  tls:
    enabled: true
    certificatesSecret: kacho-umbrella-pg-vpc-server-tls
    certFilename: tls.crt
    certKeyFilename: tls.key
pg-compute:
  image: { registry: docker.io, repository: bitnamilegacy/postgresql }
  volumePermissions: { image: { registry: docker.io, repository: bitnamilegacy/os-shell } }
  auth: { existingSecret: kacho-umbrella-pg-compute, username: compute, database: kacho_compute }
  tls:
    enabled: true
    certificatesSecret: kacho-umbrella-pg-compute-server-tls
    certFilename: tls.crt
    certKeyFilename: tls.key
pg-iam:
  image: { registry: docker.io, repository: bitnamilegacy/postgresql }
  volumePermissions: { image: { registry: docker.io, repository: bitnamilegacy/os-shell } }
  auth: { existingSecret: kacho-umbrella-pg-iam, username: iam, database: kacho_iam }
  tls:
    enabled: true
    certificatesSecret: kacho-umbrella-pg-iam-server-tls
    certFilename: tls.crt
    certKeyFilename: tls.key
pg-geo:
  image: { registry: docker.io, repository: bitnamilegacy/postgresql }
  volumePermissions: { image: { registry: docker.io, repository: bitnamilegacy/os-shell } }
  auth: { existingSecret: kacho-umbrella-pg-geo, username: geo, database: kacho_geo }
  tls:
    enabled: true
    certificatesSecret: kacho-umbrella-pg-geo-server-tls
    certFilename: tls.crt
    certKeyFilename: tls.key
pg-nlb:
  image: { registry: docker.io, repository: bitnamilegacy/postgresql }
  volumePermissions: { image: { registry: docker.io, repository: bitnamilegacy/os-shell } }
  auth: { existingSecret: kacho-umbrella-pg-nlb, username: kacho_nlb, database: kacho_nlb }
  tls:
    enabled: true
    certificatesSecret: kacho-umbrella-pg-nlb-server-tls
    certFilename: tls.crt
    certKeyFilename: tls.key

# ── infra PGs (openfga/kratos/hydra): bitnamilegacy image + operator secret;
#    DSN stays Ory/openfga-managed (sslmode=disable) per concession #1. ──
pg-openfga:
  image: { registry: docker.io, repository: bitnamilegacy/postgresql }
  volumePermissions: { image: { registry: docker.io, repository: bitnamilegacy/os-shell } }
  auth: { existingSecret: kacho-umbrella-pg-openfga, username: openfga, database: openfga }
pg-kratos:
  image: { registry: docker.io, repository: bitnamilegacy/postgresql }
  volumePermissions: { image: { registry: docker.io, repository: bitnamilegacy/os-shell } }
  auth: { existingSecret: kacho-umbrella-pg-kratos, username: kratos, database: kratos }
pg-hydra:
  image: { registry: docker.io, repository: bitnamilegacy/postgresql, tag: 16.4.0-debian-12-r0 }
  volumePermissions: { image: { registry: docker.io, repository: bitnamilegacy/os-shell } }
  auth: { existingSecret: kacho-umbrella-pg-hydra, username: hydra, database: hydra }

# ── ALL NetworkPolicies DISABLED on fe3455 (per operator decision) ──
# The umbrella NPs are authored for the target production cluster's CNI/DNS/topology
# and mis-fire on fe3455 (Beget CNI): the opa-sidecar egress allow-list omits PG
# :5432 and its DNS to-selector (kube-system/k8s-app=kube-dns) doesn't match fe3455
# CoreDNS → iam's DB/DNS egress dropped; the datastore/internal ingress policies
# similarly need per-cluster selector tuning. NetworkPolicy is a defense-in-depth
# network-segmentation layer — NOT the core auth. The production security posture
# (mTLS transport, Hydra-JWT authN, OpenFGA/ReBAC authZ, sslmode=require) is fully
# intact without it. Re-enable + per-cluster-tune as a follow-up.
opaSidecar:
  networkPolicy:
    enabled: false           # opa-sidecar-egress + opa-bundle + openfga-engine ingress
networkPolicy:
  datastore:
    enabled: false           # pg-<svc>-ingress-allowlist (all 6)

# ── current-main hardened images (supersede rev-56 pins) + production peer edges ──
# vpc/compute/nlb → geo (geo.v1.{Zone,Region}Service) is a real runtime edge
# (zone_id/region_id validation); values.prod's mtls.edges predates the geo
# cutover (kacho-workspace#82) and omits it, so the hardened services fail-closed
# at startup ("geo edge requires verified transport"). Enable the geo mTLS client
# edge (reuses the per-service kacho-<svc>-client-tls cert; serverName defaults to
# kacho-geo.kacho.svc.cluster.local ∈ geo server-cert SAN).
vpc:
  image: docker.io/prorobotech/kacho-vpc:main-b622b388
  networkPolicy:
    enabled: false           # vpc-internal-allowlist off (all NPs disabled)
  # vpc runs authn.mode=production behind server-mTLS: it must TRUST the api-gateway
  # to forward the end-user principal (x-kacho-* headers). Without this the gateway
  # authenticates+authorizes a request (authz allow logged) but vpc rejects it
  # ("AuthN required: set x-kacho-* identity headers via gateway"). The gateway→vpc
  # edge is mTLS-verified, so trusting the forwarder is safe.
  authn:
    trustedForwarder: true
  mtls:
    edges:
      geo: true
compute:
  image: docker.io/prorobotech/kacho-compute:main-b622b388
  # Same forwarder-trust as vpc — pin the allow-list to the api-gateway SA SPIFFE
  # (chart default, restated so a values.prod override can't drop it).
  auth:
    trustedForwarderSANs: "spiffe://kacho.cloud/ns/kacho/sa/kacho-api-gateway"
  mtls:
    edges:
      geo: true
      # compute→storage edge (InternalVolumeService attach/detach + Volume mirror, :9091)
      # is now FIRST-CLASS in the compute chart: storageInternalAddr (default
      # kacho-storage.kacho.svc.cluster.local:9091) + mtls.edges.storage → the
      # KACHO_COMPUTE_STORAGE_MTLS_* block. mTLS reuses compute's already-mounted client
      # leaf (kacho-compute-client-tls at /etc/kacho-compute/tls/client) — storage's
      # internal :9091 is RequireAndVerifyClientCert; serverName default
      # kacho-storage.kacho.svc.cluster.local ∈ the storage server-cert SAN
      # (storage.mtls.serverHosts=["kacho-storage"]). NB storage is disabled below
      # (chart not yet umbrella-integrated) so this edge is armed but not yet exercised.
      storage: true
kacho-geo:
  image: docker.io/prorobotech/kacho-geo:main-b622b388
  # hardened geo defaults AUTH_MODE=production → validateSecurityConfig requires a
  # non-empty trusted-forwarder allow-list (only the api-gateway SA SPIFFE id is a
  # legitimate end-user-principal forwarder). Bundled chart predates this env.
  env:
    KACHO_GEO_AUTHZ_TRUSTED_FORWARDER_SANS: "spiffe://kacho.cloud/ns/kacho/sa/kacho-api-gateway"
kacho-iam:
  image:
    # ── FORWARD ROLL: main-c744f956 (kacho-iam main c744f95, multiarch, Docker Hub-
    #    verified 2026-07-15) supersedes the live feature build KAC-registry-docker-auth-
    #    c3000530. The tag drives BOTH the main container AND the kacho-migrator init
    #    (chart helper "kacho-iam.image"). Carries:
    #      • #321 SA-key registry-audience union — the audience bug this cutover fixes;
    #      • #319 token name/labels;
    #      • #322/#323 cluster-internal Hydra-JWKS proxy listener (:9097) — REQUIRED so
    #        registry.iam.jwksUrl below is coherent (iam must SERVE :9097 before/with the
    #        registry JWKS-flip, else every token-verify 401s);
    #      • #325 RG-1 anon-token + registry RPC catalog entries (418-catalog — must land
    #        together with api-gateway c7dce40d + registry af0eacae);
    #      • #326 docker-login `issued_at` RFC3339 string (see below).
    #
    #    DOCKER-LOGIN issued_at — why this exact tag and not the earlier main-b3d23769:
    #    /iam/token (:9096) emits `issued_at`, which the docker client parses via
    #    time.Time.UnmarshalJSON — that accepts ONLY a JSON string, so a bare int64 breaks
    #    `docker login` ("Time.UnmarshalJSON: input is not a JSON string") → no bearer →
    #    all pull/push 401. The live feature build carries that fix (kacho-iam c300053) but
    #    main-b3d23769 REVERTED it, which made rolling to main a hard blocker. kacho-iam#326
    #    re-applied c300053 onto main (RFC3339 STRING, locked by a wire-shape regression
    #    test) → main c744f95 → CI published main-c744f956. Blocker resolved: this image is
    #    a strict forward over the live build on BOTH halves. Do not repin below this tag —
    #    cutover-fe3455.sh preflight denylists the broken main-b3d23769.
    tag: main-b622b388
  # ─── Docker Registry v2 token shim (`/iam/token`, :9096) ─────────────────────
  # ОБЯЗАТЕЛЬНО на развёрнутом окружении: без этого работает built-in дефолт
  # `service: registry.kacho.local`, и `docker login` падает с `unauthorized`.
  #
  # Почему: `service` уходит не только в fallback для `?service=`, но и в
  # issueUC.RegistryAudience (#321) → whitelist'ится как audience в Hydra-клиенте
  # КАЖДОГО выпускаемого SA-ключа. docker шлёт `?service=registry.in-cloud.io`, iam
  # просит у Hydra этот audience, а в клиенте лежит дефолтный registry.kacho.local →
  #   Hydra: "Requested audience 'registry.in-cloud.io' has not been whitelisted
  #           by the OAuth 2.0 Client" (400) → shim отдаёт 401.
  # Диагностика 2026-07-15: падали и старый, и свежевыпущенный ключ; в логах iam —
  # тишина (все причины схлопнуты в ErrUnauthenticated без лога), реальную причину
  # назвала Hydra. Требует kacho-iam#… (чарт научился рендерить эту секцию).
  #
  # `issuer` = realm в WWW-Authenticate; совпадает с KACHO_REGISTRY_TOKEN_REALM
  # data-plane'а (registry.dataplane ниже).
  #
  # ⚠ audience фиксируется в Hydra-клиенте В МОМЕНТ выпуска ключа → SA-ключи,
  # выпущенные ДО этой правки, надо ПЕРЕВЫПУСТИТЬ (задним числом allowlist не появится).
  #
  # NB: umbrella вендорит iam-чарт из ./charts/kacho-iam (копия ВНУТРИ kacho-deploy),
  # а НЕ из ../kacho-iam/deploy — у копии values вложены под `config`. Правка нужна в
  # обеих (kacho-iam#… — sibling-копия, чтобы standalone-чарт не отстал).
  config:
    apiServer:
      registryToken:
        issuer: https://registry.in-cloud.io/iam/token
        service: registry.in-cloud.io
  # In-cluster Hydra token endpoint для registry `/iam/token` shim (client_credentials
  # exchange). Без него ResolveHydraTokenURL() падает на внешний issuer-URL, недостижимый
  # изнутри кластера → docker push/pull ломается на этапе брокеринга токена. (#168)
  kacho:
    iam:
      hydraTokenURL: http://kacho-umbrella-hydra-public.kacho.svc:4444/oauth2/token
      # registry-iam-jwks-unify — upstream the cluster-INTERNAL jwks-proxy (:9097)
      # mirrors byte-for-byte (env KACHO_IAM_HYDRA_JWKS_URL). In-cluster hydra-public
      # base so the iam→Hydra JWKS fetch never leaves the cluster; iam re-serves it to
      # the registry data-plane over one-way server-TLS. Hydra stays signer/issuer.
      hydraJwksUrl: http://kacho-umbrella-hydra-public.kacho.svc:4444/.well-known/jwks.json
kacho-nlb:
  image:
    tag: main-b622b388
  networkPolicy:
    enable: false            # kacho-nlb NP off (nlb chart uses `enable`, not `enabled`)
  # nlb chart default db.host=kacho-pg-nlb assumes release name `kacho`; this release
  # is `kacho-umbrella` → the real Service is kacho-umbrella-pg-nlb (the correct host
  # normally comes from values.dev, which the prod layer drops). Point it correctly.
  db:
    host: kacho-umbrella-pg-nlb
  # nlb→geo mTLS edge (region_id validation) + non-empty trusted-forwarder allow-list
  # (production+mTLS fail-closed gate: empty list trusts any mTLS peer to forward the
  # end-user principal → impersonation). Only the api-gateway SA legitimately forwards.
  mtls:
    edges:
      geo: true
  config:
    authz:
      trustedForwarderSANs:
        - spiffe://kacho.cloud/ns/kacho/sa/kacho-api-gateway
api-gateway:
  # FORWARD ROLL: main-c7dce40d (kacho-api-gateway origin/main HEAD, Docker Hub-verified
  # 2026-07-15T14:02) — strict forward from the live main-a7c82963 (a7c82963 IS an
  # ancestor of c7dce40d, no revert). Adds RG-1 #145: registers the 6 public Repository
  # RPCs + syncs the embedded permission-catalog to 418 entries. COUPLED to iam
  # main-b3d23769 (#325, also 418-catalog) — a gateway at 418 with an iam below 418 would
  # AUTHZ_DENY the new registry RPCs ("catalog: no entry for method"); rolling both
  # together keeps iam(418)/gateway(418)/registry(af0eacae) catalog-coherent.
  image: docker.io/prorobotech/kacho-api-gateway:main-b622b388
  # Internal :9091 listener hosts InternalAuthzCacheService.InvalidateSubject and
  # (production invariant, security.md) MUST run mTLS + a caller allow-list — the
  # hardened binary fail-fasts otherwise. Reuse the already-mounted cert-manager
  # material: server cert = api-gateway-tls (/etc/api-gateway/tls), client-CA =
  # /etc/api-gateway/mtls/ca.crt (chart-set KACHO_API_GATEWAY_MTLS_CA_FILE). The
  # authorised caller is the iam push-drainer SPIFFE id.
  extraEnv:
    KACHO_APP_ENV: production
    KACHO_API_GATEWAY_INTERNAL_GRPC_MTLS_ENABLE: "true"
    KACHO_API_GATEWAY_INTERNAL_GRPC_TLS_CERT_FILE: /etc/api-gateway/tls/tls.crt
    KACHO_API_GATEWAY_INTERNAL_GRPC_TLS_KEY_FILE: /etc/api-gateway/tls/tls.key
    KACHO_API_GATEWAY_INTERNAL_GRPC_ALLOWED_SPIFFE: spiffe://kacho.cloud/ns/kacho/sa/kacho-iam
  # gateway→geo backend dial must be mTLS: geo's :9090 runs public_mtls=true, but
  # values.prod's mtls.edges predate the geo cutover (only vpc/compute/iam/nlb) → the
  # gateway dialed geo plaintext → 503 on /geo/v1/regions|zones (region/zone admin).
  mtls:
    edges:
      geo: true

# ── kacho-registry (OCI control-plane) + zot + pg-registry — Stage 1 (epic #129) ──
# Integrates the previously-orphaned registry into the umbrella. Production posture
# matching the running pod + satisfying serve.go prod-guards: AUTH_MODE=production,
# mTLS both listeners + both registry→iam edges (cert-manager kacho-internal-ca),
# DATAPLANE_TLS_TERMINATED_EXTERNALLY=true (dataplane :8080 behind ext TLS),
# HYDRA_ISSUER pinned. DB stays sslmode=disable (Ory/infra-tier concession, like the
# running registry). zot image = the stand's running ghcr.io/project-zot:latest.
registry:
  enabled: true
  image:
    # FORWARD ROLL: main-af0eacae (kacho-registry origin/main HEAD, Docker Hub-verified
    # 2026-07-15T14:00) — STRICT forward from the live main-5eb21d25 (5eb21d25 IS an
    # ancestor of af0eacae, verified: no revert of any live functionality). Live already
    # carries #35 Defect-A (unknown blob) + #37 Defect-B (new-repo push deadlock) + #38
    # zot S3/redirectBlobURL + #34 authz-TTL + #40 push-grant revoke-safety (delete-on-
    # materialized + 60s TTL) + push-deny 403. af0eacae adds ONLY RG-1 #43 (Repository
    # config-overlay persistence: migration + domain + repo, DB-level invariants) on top.
    # Consistent with the iam(#325)/gateway(#145) 418-catalog + anon-recognition roll.
    tag: main-b622b388
  authMode: production
  db:
    sslmode: disable
  authz:
    iamGrpcAddr: kacho-iam-internal.kacho.svc.cluster.local:9091
    iamProjectGrpcAddr: kacho-iam.kacho.svc.cluster.local:9090
  zot:
    # v2.1.18 — carries http.compat + the s3 storageDriver + redirectBlobURL. The
    # fe3455 `:latest` tag already resolves to this sha (sha256:34f18f78…); pin it so a
    # future re-pull can't drift to a build without these config keys.
    image:
      tag: v2.1.18
    # docker2s2 → rendered under http.compat (zot rejects a TOP-LEVEL compat key). Lets
    # clients push the Docker schema2 manifests `docker push` emits (else 415 on manifest).
    compat:
      - docker2s2
    storage:
      persistence: false     # fe3455 has no dynamic StorageClass → local dir is ephemeral
      dedupe: false          # s3 dedup needs a remote cache DB (dynamodb) — unavailable
      # blob GET → 307 to an S3 presigned URL; clients pull blobs DIRECTLY from Beget
      # object storage (offloads zot; post-authz — the data-plane enforces v_get first).
      redirectBlobURL: true
      # Remote S3 backend (Beget) → blobs PERSIST across zot restarts (the emptyDir is
      # only a local staging dir now). region/endpoint/bucket are operational config; the
      # ACCESS/SECRET keys live ONLY in the `zot-s3-creds` Secret (env), never in git.
      s3:
        enabled: true
        region: ru1
        regionEndpoint: https://s3.ru1.storage.beget.cloud
        bucket: c90bf04ae9a8-transformative-cillian
        rootDirectory: /zot
        secure: true
        forcePathStyle: true
        existingSecret: zot-s3-creds
  # dedicated external VIP for the OCI data-plane (docker login/push/pull), separate
  # from the console — Beget/Cilium LB-IPAM assigns its own external IP (like ui-lb/uif-lb).
  service:
    dataplaneLB:
      enabled: true
      # Beget LB controller annotations (same as ui-lb/uif-lb) — required for the
      # provider to actually provision an external VIP; without them the Service
      # stays <pending>.
      annotations:
        lb.beget.com/type: external
        lb.beget.com/algorithm: round_robin
        lb.beget.com/healthcheck-interval-seconds: "60"
        lb.beget.com/healthcheck-timeout-seconds: "5"
      # ─── TLS-терминация публичного OCI data-plane (docker login/push/pull) ───
      # БЕЗ этого блока чарт рендерит 443→dataplane (plaintext) и docker падает с
      # «http: server gave HTTP response to HTTPS client». Ровно это и произошло
      # 2026-07-15: TLS-стек data-plane был наложен руками (LE-серт + kubectl-patch
      # Service 443→dp-tls) и не жил в values → `helm upgrade --take-ownership`
      # усыновил Service, перерендерил дефолтом и уронил HTTPS реестра. Блок ниже
      # делает живое состояние выразимым чартом — дрейф закрыт.
      tlsSidecar:
        enabled: true
        cert:
          # Имена СОВПАДАЮТ с уже выпущенным в кластере Certificate/секретом →
          # helm усыновляет их без перевыпуска (LE duplicate-limit 5/нед).
          name: registry-dataplane-letsencrypt
          secretName: registry-dataplane-le-tls
          issuerRef:
            # Публично-доверенный issuer обязателен: серт предъявляется docker-клиенту,
            # а internal-CA он отвергает (x509: unknown authority). Trust к iam :9097 не
            # страдает — при mtls.enable=true ca.crt берётся из mtls.serverSecretName.
            name: letsencrypt-prod
            kind: ClusterIssuer
          # Публичный CA не подписывает CN/loopback-IP и навязывает свою keyalg-политику;
          # любое лишнее поле в spec'е = перевыпуск. Пусто → шаблон их опускает, и рендер
          # выходит байт-в-байт равным живому объекту (сверено против кластера).
          commonName: ""
          ipAddresses: []
          usages: []
          privateKey:
            algorithm: ""
            size: ""
  # registry-iam-jwks-unify — the data-plane docker-Bearer verifier now fetches JWKS
  # from the cluster-INTERNAL kacho-iam JWKS proxy (:9097) instead of dialing Hydra.
  # iam serves a byte-for-byte mirror of Hydra's PUBLIC JWKS over one-way server-TLS
  # (internal-CA leaf) — kids/alg match Hydra-signed tokens; the registry pod trusts
  # the internal-CA via SSL_CERT_DIR. This is an https in-cluster Service, so
  # production requireSecureJWKSURL passes without needing an external hydra-https
  # terminator. Hydra stays the SIGNER/ISSUER — only the key-DISTRIBUTION URL moved.
  #
  # ⚠ IAM-FIRST DEPLOY SEQUENCING (fail-closed — do NOT flip prematurely):
  #   the kacho-iam :9097 JWKS endpoint MUST be live and smoke-verified serving
  #   (GET /.well-known/jwks.json → 200 with Hydra kids) BEFORE this registry.iam.jwksUrl
  #   flip reaches a rolling registry pod. A premature flip (iam endpoint not yet
  #   serving) fails every signature verify CLOSED → HTTP 401 on ALL prod docker pulls.
  #   Runbook: roll kacho-iam first (this chart adds the :9097 listener), curl the
  #   in-cluster endpoint, THEN let the registry pod pick up this URL.
  iam:
    jwksUrl: https://kacho-iam-internal.kacho.svc.cluster.local:9097/.well-known/jwks.json
  # HydraIssuer stays pinned on Hydra (issuer-pin retained; decoupled from the JWKS
  # URL knob). registry serve.go requireIssuerPinned still forces this non-empty; the
  # verifier rejects any token whose iss ≠ this Hydra issuer even though JWKS is iam's.
  hydra:
    issuer: https://hydra.api.kacho.cloud
  dataplaneTLSTerminatedExternally: true
  mtls:
    enable: true
    edges:
      iamAuthz: true
      iamProject: true
      # registry→geo RegionService.Get (public :9090, REG-1 F4). geo runs hardened
      # (AUTH_MODE=production) and requires verified transport, so arm the client-mTLS
      # edge (reuses registry-client-tls; serverName default kacho-geo.kacho.svc.cluster.local
      # ∈ geo server-cert SAN). Without it the geo peer rejects the insecure dial.
      geo: true

# pg-registry — greenfield bitnamilegacy image + operator secret (like the other pgs)
pg-registry:
  enabled: true
  image: { registry: docker.io, repository: bitnamilegacy/postgresql }
  volumePermissions: { image: { registry: docker.io, repository: bitnamilegacy/os-shell } }
  auth: { existingSecret: kacho-umbrella-pg-registry, username: registry, database: kacho_registry }
  primary:
    persistence:
      enabled: false
    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits: { cpu: 1000m, memory: 1Gi }

# ── kacho-storage — Storage control-plane (Volume/VolumeAttachment/Snapshot/DiskType) ──
# gRPC public :9090 + cluster-internal :9091 + diagnostic /healthz. server-mTLS on
# both listeners; per-edge client-mTLS storage→{geo,iam}. DB channel over TLS
# (sslmode=require; pg server cert issued via mtls.pgTls.services above). Peer edges:
# storage→geo (zone_id), storage→iam PUBLIC (ProjectService.Get) + INTERNAL (Check).
storage:
  # ✅ ВКЛЮЧЁН (2026-07-20) — чарт kacho-storage интегрирован с umbrella
  # (services/storage/deploy: fullnameOverride kacho-storage, certificate.yaml +
  # mtls.*, db.* existingSecret, storage→iam fga-register). Три блокера прошлой
  # попытки закрыты в чарте, не оверлее:
  #   1. Ключи выровнены: чарт читает config.{authMode,geo/iam/authzIamGrpcAddr,
  #      fgaRegisterDrainerEnabled} + db.{host,port,user,name,sslMode,
  #      passwordSecretName,passwordSecretKey} — ровно то, что пишется ниже (раньше
  #      чарт читал config.dbHost и молча дефолтил kacho-storage-postgres → migrator
  #      `no such host`).
  #   2. Пароль БД — existingSecret через secretKeyRef на bitnami-provisioned
  #      kacho-umbrella-pg-storage (ключ password); chart-rendered placeholder-Secret
  #      удалён (secret.yaml). Пароль НЕ в git.
  #   3. Имя ресурсов — fullnameOverride kacho-storage → Service/Deployment/DNS =
  #      kacho-storage (SAN server-cert'а + compute→storage dial-host совпадают).
  # fga-register (SEC-D / CS-1 GAP-D): storage→iam RegisterResource owner-tuple
  # (KACHO_STORAGE_IAM_CLIENT_MTLS_* + fgaRegisterDrainerEnabled) + iam-seed
  # 0057_storage_sa_least_priv (sva(md5("kacho-storage"))#fga_writer@iam_fgaproxy:
  # system) → gateway scope_extractors {storage_volume,volume_id}/
  # {storage_snapshot,snapshot_id} резолвят target→project (анти-BOLA), SEC-A
  # parity с vpc/compute.
  enabled: true
  image:
    # kacho-storage image (docker.io/prorobotech/kacho-storage from base values.yaml);
    # tag drives storage + kacho-migrator both. main-b622b388 — coherent with the
    # vpc/compute/nlb release SHA pinned above.
    tag: main-b622b388
  config:
    authMode: production
    # storage→geo (zone_id) + storage→iam PUBLIC (ProjectService.Get, :9090) +
    # INTERNAL (Check + RegisterResource fga-register, :9091).
    geoGrpcAddr: kacho-geo.kacho.svc.cluster.local:9090
    iamGrpcAddr: kacho-iam.kacho.svc.cluster.local:9090
    authzIamGrpcAddr: kacho-iam-internal.kacho.svc.cluster.local:9091
    # fga-register drainer (SEC-D / CS-1 GAP-D). Chart default already true; restated
    # for prod-explicitness. Requires authzIamGrpcAddr (set) + mtls.edges.iam (below).
    fgaRegisterDrainerEnabled: true
  db:
    host: kacho-umbrella-pg-storage
    sslMode: require
    # operator-/bitnami-provisioned Secret (pg-storage.auth.existingSecret below);
    # the storage chart references it via secretKeyRef (renders no Secret of its own).
    passwordSecretName: kacho-umbrella-pg-storage
    passwordSecretKey: password
  # server-mTLS on both listeners + per-edge client-mTLS storage→{geo,iam}. Один
  # client-leaf (kacho-storage-client-tls) на все storage→iam-дозвоны; serverName
  # default kacho-iam.kacho.svc.cluster.local ∈ iam server-cert SAN (валиден и для
  # :9090, и для internal :9091).
  mtls:
    enable: true
    edges:
      geo: true
      iam: true

# pg-storage — greenfield bitnamilegacy image + operator secret + cert-manager TLS
# (server cert kacho-umbrella-pg-storage-server-tls issued via mtls.pgTls.services).
pg-storage:
  # ✅ Включён вместе со `storage` (см. блок storage выше) — БД потребителя storage.
  enabled: true
  image: { registry: docker.io, repository: bitnamilegacy/postgresql }
  volumePermissions: { image: { registry: docker.io, repository: bitnamilegacy/os-shell } }
  auth: { existingSecret: kacho-umbrella-pg-storage, username: storage, database: kacho_storage }
  tls:
    enabled: true
    certificatesSecret: kacho-umbrella-pg-storage-server-tls
    certFilename: tls.crt
    certKeyFilename: tls.key
  primary:
    persistence:
      enabled: false
    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits: { cpu: 1000m, memory: 1Gi }