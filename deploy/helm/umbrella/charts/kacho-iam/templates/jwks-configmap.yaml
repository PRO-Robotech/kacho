{{- if .Values.opaSidecar.enabled }}
{{/*
KAC-127 Phase 3 (acceptance §5.6, P3-D8) — public-key ConfigMap for OPA JWS
verification of kacho-iam-signed bundles.
==========================================================================

This ConfigMap holds the **public** half of the kacho-iam JWKS signing key.
OPA sidecars (across api-gateway / iam / vpc / compute / lb pods) mount this
ConfigMap as a volume at `/jwks/` and reference the PEM in their `opa-sidecar-config`
`keys[].key` field.

Source of truth: Phase 2 JWKS rotator (`jwks-rotator-cronjob.yaml` in
kacho-iam sub-chart) writes the **current** active key here on every rotation.
Initial bootstrap key — generated by `kacho-iam migrate` (Phase 1 / 2.0) and
exported to this ConfigMap at first deploy via `kacho-iam jwks export-current`.

`resource-policy: keep` ensures helm-upgrade preserves the in-place rotator
updates (this ConfigMap is helm-deployed but rotator-managed at runtime).

Configurable values:
  opaSidecar.jwks.configMapName  — Name of ConfigMap (default `kacho-iam-jwks`).
  opaSidecar.signingKeyId        — kid that identifies the PEM file in this CM.
  opaSidecar.jwks.bootstrapKeyPem — base64-or-PEM seed value. Empty by default;
                                    Phase 2 rotator writes the real key.

Multi-JWK support: during 2h key rotation grace window
(KACHO_OPA_BUNDLE_KEY_ROTATION_GRACE_SECONDS), this ConfigMap may contain
BOTH `<old-kid>.pem` and `<new-kid>.pem` entries — OPA loads both keys per
`opaSidecar.signingKeyId` mapping; bundle signature verifies against whichever
JWK has the matching kid in the JWS header.
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.opaSidecar.jwks.configMapName | default "kacho-iam-jwks" }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: helm
    app.kubernetes.io/part-of: kacho
    kacho.cloud/component: jwks-public
    kacho.cloud/phase: "3"
    kacho.cloud/kac-ticket: KAC-127
  annotations:
    "helm.sh/resource-policy": keep
    "kacho.cloud/managed-by-rotator": "true"
data:
  # Placeholder PEM. Phase 2 JWKS rotator will overwrite this with the real
  # public key (ES256 SEC1 / PKIX format) at the next rotation tick.
  # Empty PEM is fine for first install — OPA fails-closed (cannot verify
  # bundle signature), and `kacho-iam migrate` runs `jwks export-current` post-
  # migration to seed the real key before sidecar starts polling.
  {{ .Values.opaSidecar.signingKeyId | default "kacho-iam-signing-key-current" }}.pem: |
{{ .Values.opaSidecar.jwks.bootstrapKeyPem | default "" | indent 4 }}
{{- end }}