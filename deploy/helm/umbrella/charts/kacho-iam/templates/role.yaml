{{/*
Минимальные права для kacho-iam ServiceAccount.
На E0 — пусто (configmap-чтение покрыто defaultами k8s). Скелет — для следующих
фаз, если потребуется чтение Secret'ов / coordination-leases для leader-election.
*/}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "kacho-iam.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kacho-iam.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      - {{ .Values.db.passwordSecretName | quote }}
      - {{ .Values.config.extapi.openfga.storeIdSecretName | quote }}
    verbs: ["get"]
