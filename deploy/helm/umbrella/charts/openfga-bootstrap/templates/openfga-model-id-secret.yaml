{{- if .Values.openfgaBootstrap.enabled }}
{{/*
KAC-127 Phase 3 (acceptance §2.2, P3-D2) — placeholder Secret openfga-model-id.
=============================================================================

OpenFGA Authorization Model v2 is **versioned + immutable** (P3-D1). Each change
to the DSL produces a new `authorization_model_id` ULID. We pin this id on every
Check call (no implicit "latest") — so all kacho-* pods need a way to read the
**current** id at startup.

P3-D2 chose Kubernetes Secret `openfga-model-id` (key `current`) as the source-of-
truth, because:
  - Secret is atomic-updatable (helm-upgrade replaces stringData;
    Secret-ref env via valueFrom is re-read on pod restart).
  - RBAC on Secret is stricter than ConfigMap by default in most clusters,
    suiting cluster-internal authz config.
  - Reused infrastructure (E3 baseline `kacho-iam-openfga-store` Secret already
    used the same access pattern for store_id).

This template materializes the **placeholder** Secret at helm-install time. It
deliberately ships with `current=""` and `store_id=""`. The bootstrap-job
(see openfga-bootstrap-job.yaml) then `kubectl apply --dry-run=client -o yaml |
kubectl apply -f -` patches the actual values once the OpenFGA engine returns
the real model_id. Sub-sequent helm upgrades that re-produce this template do
NOT overwrite the bootstrap-job-managed data, because we use the helm hook
annotation `"helm.sh/resource-policy": keep` — Helm leaves the resource alone
on upgrade and only the bootstrap-job touches its data.

Consumers (kacho-iam Deployment env):
  - KACHO_IAM_OPENFGA_MODEL_ID  (valueFrom.secretKeyRef.name=openfga-model-id, key=current)
  - KACHO_IAM_OPENFGA_STORE_ID  (valueFrom.secretKeyRef.name=openfga-model-id, key=store_id)
  Both fields marked `optional: true` so pods can start before bootstrap-job
  completes on a fresh install (they retry FGA Check on cache miss).

DO NOT remove this Secret from the chart — if absent, bootstrap-job's first
`kubectl annotate` call will fail (cannot annotate non-existent resource).
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.openfgaBootstrap.modelIdSecretName | default "openfga-model-id" }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: helm
    app.kubernetes.io/part-of: kacho
    kacho.cloud/component: openfga-bootstrap
    kacho.cloud/phase: "3"
    kacho.cloud/kac-ticket: KAC-127
  annotations:
    # Helm hook: create only at install-time; subsequent upgrades preserve data
    # managed by bootstrap-job. `resource-policy: keep` ensures helm uninstall
    # also retains the Secret (operator can explicitly clean up if needed).
    "helm.sh/hook": pre-install
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  # Initial placeholder values. The bootstrap-job will overwrite these
  # at post-install via `kubectl create secret --dry-run=client | kubectl apply`.
  current: ""
  store_id: ""
{{- end }}
