{{- if .Values.openfgaBootstrap.enabled }}
{{/*
KAC-127 Phase 3 (acceptance §5.1 / design §4) — full OpenFGA Authorization Model v2.
=====================================================================================

KAC-127 reconciliation: `model.fga` / `model.json` ниже — сгенерированы из
**канонического** артефакта `kacho-proto/proto/kacho/cloud/iam/v1/fga_model.fga`
(единый источник истины). DSL покрывает:
  - cluster (singleton `cluster_kacho_root`) с system_admin / system_viewer /
    billing_admin / console / any_admin (alias for system_admin since KAC-214 /
    RBAC v2 dropped the break-glass surface).
  - account / project tiers (B2B Organization tier fully removed — RBAC-2026
    Contract-B). account.admin = direct subjects `or owner`; flat per-object
    materialization, no access cascade (Contract-A).
  - per-service resource-types: vpc_network / vpc_subnet / vpc_security_group /
    vpc_route_table / vpc_address / vpc_gateway /
    vpc_network_interface / vpc_address_pool / compute_instance / compute_disk /
    compute_image / compute_snapshot / nlb_network_load_balancer /
    nlb_target_group.
  - IAM resource-types (per-resource scope в permission catalog scope_extractor):
    iam_user / iam_service_account / iam_group / iam_role / iam_access_binding /
    iam_condition.
  - 6 предустановленных Conditions (mfa_fresh / non_expired / source_ip_in_range /
    jit_window / business_hours / device_compliant). break_glass_window removed
    in KAC-214 (RBAC v2).

Bootstrap-job (см. openfga-bootstrap-job.yaml) реализует idempotent-deploy
(sha256-compare DSL с current Secret annotation, skip-write если совпадает;
иначе WriteAuthorizationModel из `data.model.json` + patch Secret
`openfga-model-id.current` + annotate Deployments для rolling-restart).

KAC-127 (deploy#38 fix): bootstrap-job больше НЕ делает runtime DSL→JSON
transform. Причина: `openfga/cli` image — distroless single-binary (нет
`/bin/sh`), `fga model transform` умеет писать только в stdout (нет `--output`),
поэтому init-container `dsl-transform` падал `exec: "/bin/sh": not found`.
Решение — pre-transform на build/commit-time: `data.model.json` ниже —
готовый OpenFGA-JSON, сгенерированный `fga model transform` из `data.model.fga`.
DSL frozen (design §4), drift невозможен; regenerate-команда — см.
`make openfga-model-json` (kacho-deploy/Makefile). Bootstrap-job читает
`model.json` напрямую и шлёт его `WriteAuthorizationModel`-эндпоинту;
`model.fga` остаётся для human-readable diff + sha256-idempotency.

Naming convention (запреты #2): все types — kacho.cloud.<domain>-style.
Conditions — CEL-syntax (OpenFGA 1.5+ stable feature, см. P3-D3).

ВНИМАНИЕ при edit'е:
  - НЕ редактировать DSL здесь напрямую. Канонический источник —
    `kacho-proto/proto/kacho/cloud/iam/v1/fga_model.fga`. После правки канона
    регенерировать оба блока: `make openfga-model-json`.
  - Любое изменение DSL → новый authorization_model_id (P3-D1: versioned +
    immutable). Bootstrap-job detect'ит sha256-diff DSL'а и пишет новую модель.
  - На rollback (helm rollback) FGA-engine retains old model_id (immutable, никогда
    не удаляет) → rollback просто пиннит Secret обратно. См. P3.GWT-04.

DataSource хранения id'а — Kubernetes Secret `openfga-model-id` (P3-D2):
  metadata.name        = openfga-model-id
  metadata.namespace   = {{ .Release.Namespace }}
  data.current         = <base64 model_id ULID>
  annotations:
    kacho-deploy/last-applied-dsl-sha256: <hex>
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.openfgaBootstrap.authorizationModelConfigMap }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: helm
    app.kubernetes.io/part-of: kacho
    kacho.cloud/component: openfga-bootstrap
    kacho.cloud/phase: "3"
    kacho.cloud/kac-ticket: KAC-127
  annotations:
    # Hash content of DSL — позволяет bootstrap-job-у быстро sha256-compare без
    # пересчёта на каждый запуск (idempotency fast-path).
    kacho.cloud/dsl-version: "v2"
data:
  model.fga: |-
    model
      schema 1.1

    # OpenFGA Authorization Model v2 — Kachō (rbac-2026 Contract-A: FLAT INDEX).
    #
    # This file is the **canonical source** of the authorization model. It is
    # bundled into kacho-proto so every consumer (kacho-iam, openfga-bootstrap-job,
    # admin-UI catalog) reads from the same artifact. Helm umbrella's
    # `openfga-model-stub-configmap.yaml` is generated from this file at
    # image-build time (acceptance §5.1) — `make openfga-model-json`.
    #
    # rbac-2026 Contract-A (Explicit RBAC model 2026, acceptance §0 D-5 / §9):
    # the model is now a **FLAT INDEX** (Zanzibar-as-storage). The ReBAC ACCESS
    # cascade is GONE — there are no more `<rel> from account|project|cluster|
    # load_balancer` access-derivations and no `scope_grant` carrier (`type
    # scope_grant` + `sg_*` pointers + `g_*_<type>` grant-resolvers, #177 — all
    # removed). Access is materialized PER-OBJECT by the iam reconciler; Check is a
    # direct tuple lookup plus the cluster-admin short-circuit (D-9, in Go, on
    # `cluster:cluster_kacho_root#system_admin`).
    #
    # What is KEPT and why:
    #   - direct relation-tuples on every type (`v_*`, tier viewer/editor/admin) —
    #     the materialized flat index;
    #   - cluster super-admin relations (system_admin/system_viewer/...) — D-9
    #     short-circuit anchor (relation-tuple must exist even though the gate is
    #     enforced in Go);
    #   - STRUCTURAL parent-pointer relations (`account: [account]`,
    #     `project: [project]`, `cluster: [cluster]`, `load_balancer: [...]`) —
    #     needed for list-by-account, owner-binding lifecycle and the
    #     cluster-singleton write-enforcement. These are typed pointers, NOT access
    #     cascades (no `from` derivation reads them);
    #   - CEL conditions (unchanged).
    #
    # Contract-B (acceptance D-12) REMOVED the B2B `type organization` and every
    # `... from organization` derivation — Organization is fully gone.
    #
    # DSL conventions (acceptance §4):
    #   - `cluster:cluster_kacho_root`     — singleton enforced on write-side
    #     (P3-D17). One global cluster object.
    #   - `account` / `project` — STRUCTURAL parents
    #     (cluster ▶ account ▶ project ▶ <domain resource>);
    #     parent-pointers only, no access cascade (Contract-A flat).
    #   - per-domain object types — `vpc_network`, `vpc_subnet`, `vpc_address`,
    #     `vpc_security_group`, `vpc_route_table`, `vpc_gateway`,
    #     `vpc_network_interface`, `vpc_address_pool`,
    #     `compute_instance`, `compute_disk`, `compute_image`, `compute_snapshot`,
    #     `nlb_network_load_balancer`, `nlb_target_group`,
    #     `nlb_listener` (KAC-178 §4 — Listener as first-class FGA object),
    #     `iam_role`, `iam_access_binding`, `iam_service_account`, `iam_group`,
    #     `iam_user`, `iam_condition`.
    #   - relations: `viewer` / `editor` / `admin` / `owner` / `member` per the
    #     YC-style roles vocabulary (KAC-121).
    #   - conditional relations: `with` clause names a Condition (built-in or
    #     custom) — FGA pre-compiles CEL on `WriteAuthorizationModel`.

    # ---------------------------------------------------------------------------
    # Generic principal / subject types.
    # ---------------------------------------------------------------------------

    type user

    type service_account

    type federated_subject

    # group — subject-grouping type. `group#member` usersets are accepted as
    # direct subjects on hierarchy + resource relations.
    type group
      relations
        define member: [user, service_account, federated_subject, group#member]

    # ---------------------------------------------------------------------------
    # Cluster — singleton "cluster_kacho_root". Write-side enforcement rejects
    # tuples with any other object id (P3-D17).
    #   - system_admin  — standing cluster administrator.
    #   - system_viewer — read-only cluster catalog viewer.
    #   - billing_admin — cluster-wide billing.
    #   - console       — cluster console access, MFA-gated.
    #   - any_admin     — alias for system_admin (kept as a relation name so
    #                     hierarchy `any_admin from cluster` references stay
    #                     valid across many downstream type definitions).
    # ---------------------------------------------------------------------------

    type cluster
      relations
        define system_admin: [user, service_account]
        define system_viewer: [user, service_account]
        define billing_admin: [user, service_account]
        define console: [user with mfa_fresh, service_account with mfa_fresh]
        define any_admin: system_admin
        # KAC-178 §3: viewer — общий read-relation для глобальных reference-данных
        # (compute.Region, compute.Zone, …), к которым каталог permissions
        # привязан через scope_extractor {object_type: cluster, from_request_field: '*'}.
        # `user:*` userset делает справочные данные читаемыми ЛЮБЫМ authenticated
        # subject'ом (как и должно быть для tenant-facing reference-data). Также
        # включает system_viewer / any_admin transitively. До этого relation'а на
        # cluster не было `viewer` вообще → catalog `required_relation: "viewer"`
        # на cluster-scope'ed RPC всегда возвращал deny → UI dashboard падал.
        define viewer: [user, user:*, service_account] or system_viewer or any_admin
        # KAC-198 follow-up: editor + admin — derived-relation aliases.
        # iam/internal/service/authorize_service.go::resolveActionToRelation
        # maps verbs to canonical relations:
        #   get / list      → viewer    (covered above)
        #   create / update → editor
        #   delete          → admin
        # Cluster-scoped Internal admin RPCs (compute.regions.delete, etc.)
        # land on object cluster:cluster_kacho_root with derived relation
        # admin/editor. Without these aliases, FGA Check returned no-path for
        # every system_admin user even though their tuple was correct.
        # `system_admin` covers BOTH editor + admin so a single tuple grants
        # full mutation rights. `any_admin` is an alias for system_admin.
        define editor: [user, service_account] or system_admin or any_admin
        define admin: [user, service_account] or system_admin or any_admin

    # ---------------------------------------------------------------------------
    # Identity & hierarchy — account → project. (B2B Organization fully removed in
    # RBAC-2026 Contract-B; cluster is the only structural parent above account.)
    # ---------------------------------------------------------------------------

    type account
      relations
        define cluster: [cluster]
        define owner: [user]
        define admin: [user, service_account, group#member] or owner
        define editor: [user, service_account, group#member] or admin
        # Contract-A (flat): the SEC-L `or system_viewer from cluster` read-cascade is
        # REMOVED — account.viewer is no longer derived from a cluster relation. The
        # kacho-vpc-operator's account-list visibility is now materialized per-object
        # by the iam reconciler (direct viewer tuples on each account).
        # Contract-B: the `... from organization` disjuncts and the `organization`
        # parent-pointer are REMOVED — B2B Organization is fully gone (D-12).
        define viewer: [user, service_account, group#member] or editor
        define billing_admin: [user, service_account] or admin
        # rbac-2026 P2 (D-6): account becomes a verb-bearing resource. These v_*
        # relations are object-level read/write on the account OBJECT ITSELF — DIRECT
        # subjects only, NO `or … from …` cascade, and NOT implied by viewer/editor/
        # admin tiers (independent). A grant of e.g. `iam.account.get` materializes
        # `account:<id> # v_get @ subj` → "see the account in a selector without any
        # access to its contents" (D-2: no implicit hierarchy cascade into content).
        # Full verb-set for symmetry with leaf resource types.
        define v_get: [user, service_account, group#member]
        define v_list: [user, service_account, group#member]
        define v_create: [user, service_account, group#member]
        define v_update: [user, service_account, group#member]
        define v_delete: [user, service_account, group#member]

    type project
      relations
        define account: [account]
        # Contract-A (flat): `cluster` is kept ONLY as a structural parent-pointer
        # (project:<id>#cluster@cluster tuple written on Create) — the SEC-L
        # `system_viewer from cluster` read-cascade is removed (per-object now).
        define cluster: [cluster]
        define admin: [user, service_account, group#member]
        define editor: [user, service_account, group#member] or admin
        define viewer: [user, service_account, group#member] or editor
        # rbac-2026 P2 (D-6): project becomes a verb-bearing resource. Same contract
        # as account.v_* — DIRECT subjects only, NO cascade, NOT implied by tiers.
        # A grant materializes `project:<id> # v_get @ subj` (object-level access to
        # the project itself, never to its contents — D-2). Full verb-set for
        # symmetry with leaf resource types.
        define v_get: [user, service_account, group#member]
        define v_list: [user, service_account, group#member]
        define v_create: [user, service_account, group#member]
        define v_update: [user, service_account, group#member]
        define v_delete: [user, service_account, group#member]

    # ---------------------------------------------------------------------------
    # IAM resources. Group / ServiceAccount / Role / User are account-scoped
    # (their `parent` relation cascades from the owning Account); AccessBinding
    # / Condition are project-scoped (their `parent` cascades from the Project
    # the binding is attached to).
    # ---------------------------------------------------------------------------

    type iam_user
      relations
        define account: [account]
        define subject: [user]
        define admin: [user, service_account, group#member]
        # editor / viewer — directly-assignable (subject-list), а не computed-only:
        # reconciler пишет back-compat tier-tuple (`iam_user:<id> # viewer @ subj`),
        # и computed-only relation (`viewer: subject or editor`) отверг бы такую запись
        # (poison). v_* НЕ union-ятся в tier (Design B развязка, D-6a).
        define editor: [user, service_account, group#member] or admin
        define viewer: [user, service_account, group#member] or subject or editor
        define v_get: [user, service_account, group#member]
        define v_list: [user, service_account, group#member]
        define v_create: [user, service_account, group#member]
        define v_update: [user, service_account, group#member]
        define v_delete: [user, service_account, group#member]

    type iam_service_account
      relations
        define account: [account]
        define admin: [user, service_account, group#member]
        define editor: [user, service_account, group#member] or admin
        define viewer: [user, service_account, group#member] or editor
        define user: [user, service_account] or editor
        define token_creator: [user, service_account] or admin
        define v_get: [user, service_account, group#member]
        define v_list: [user, service_account, group#member]
        define v_create: [user, service_account, group#member]
        define v_update: [user, service_account, group#member]
        define v_delete: [user, service_account, group#member]

    type iam_group
      relations
        define account: [account]
        define member: [user, service_account]
        define admin: [user, service_account, group#member]
        define editor: [user, service_account, group#member] or admin
        define viewer: [user, service_account, group#member] or editor
        define v_get: [user, service_account, group#member]
        define v_list: [user, service_account, group#member]
        define v_create: [user, service_account, group#member]
        define v_update: [user, service_account, group#member]
        define v_delete: [user, service_account, group#member]

    type iam_role
      relations
        define account: [account]
        define admin: [user, service_account, group#member]
        # editor / viewer — directly-assignable (poison-fix): reconciler пишет
        # back-compat tier-tuple, computed-only relation отверг бы запись. v_* НЕ
        # union-ятся в tier (Design B развязка, D-6a).
        define editor: [user, service_account, group#member] or admin
        define viewer: [user, service_account, group#member] or editor
        define v_get: [user, service_account, group#member]
        define v_list: [user, service_account, group#member]
        define v_create: [user, service_account, group#member]
        define v_update: [user, service_account, group#member]
        define v_delete: [user, service_account, group#member]

    type iam_access_binding
      relations
        define project: [project]
        define account: [account]
        define cluster: [cluster]
        define admin: [user, service_account, group#member]
        define editor: [user, service_account, group#member] or admin
        define viewer: [user, service_account, group#member] or editor
        define v_get: [user, service_account, group#member]
        define v_list: [user, service_account, group#member]
        define v_create: [user, service_account, group#member]
        define v_update: [user, service_account, group#member]
        define v_delete: [user, service_account, group#member]

    type iam_condition
      relations
        define project: [project]
        define admin: [user, service_account, group#member]
        # editor / viewer — directly-assignable (poison-fix): reconciler пишет
        # back-compat tier-tuple, computed-only relation отверг бы запись. v_* НЕ
        # union-ятся в tier (Design B развязка, D-6a).
        define editor: [user, service_account, group#member] or admin
        define viewer: [user, service_account, group#member] or editor
        define v_get: [user, service_account, group#member]
        define v_list: [user, service_account, group#member]
        define v_create: [user, service_account, group#member]
        define v_update: [user, service_account, group#member]
        define v_delete: [user, service_account, group#member]

    # SEC-A/SEC-C — FGA-proxy authority object. Modules (kacho-vpc / kacho-compute /
    # kacho-nlb) NEVER write to FGA directly; they call InternalIAMService.
    # RegisterResource/UnregisterResource, gated by a ReBAC Check
    # `service_account:<sva>#fga_writer@iam_fgaproxy:system` (authzguard.FGAProxyGate,
    # fgaProxyObject="iam_fgaproxy:system"). Without this type the Check is rejected
    # by OpenFGA ("object type is undefined in the authorization model" → status 400),
    # the gate denies every module, and NO owner-hierarchy tuple is ever written — so
    # resource creators cannot view their own resources once real authz is enforced.
    # The fga_writer tuples are seeded by kacho-iam migration 0009 (least-priv).
    type iam_fgaproxy
      relations
        define fga_writer: [service_account]

    # ---------------------------------------------------------------------------
    # VPC domain.
    # ---------------------------------------------------------------------------

    type vpc_network
      relations
        define project: [project]
        define admin: [user, service_account, group#member]
        define editor: [user, service_account, group#member] or admin
        define viewer: [user, service_account, group#member] or editor
        define v_get: [user, service_account, group#member]
        define v_list: [user, service_account, group#member]
        define v_create: [user, service_account, group#member]
        define v_update: [user, service_account, group#member]
        define v_delete: [user, service_account, group#member]

    type vpc_subnet
      relations
        define project: [project]
        define admin: [user, service_account, group#member]
        define editor: [user, service_account, group#member] or admin
        define viewer: [user, service_account, group#member] or editor
        define use: [user, service_account] or editor
        define v_get: [user, service_account, group#member]
        define v_list: [user, service_account, group#member]
        define v_create: [user, service_account, group#member]
        define v_update: [user, service_account, group#member]
        define v_delete: [user, service_account, group#member]

    type vpc_security_group
      relations
        define project: [project]
        define admin: [user, service_account, group#member]
        define editor: [user, service_account, group#member] or admin
        define viewer: [user, service_account, group#member] or editor
        define v_get: [user, service_account, group#member]
        define v_list: [user, service_account, group#member]
        define v_create: [user, service_account, group#member]
        define v_update: [user, service_account, group#member]
        define v_delete: [user, service_account, group#member]

    type vpc_route_table
      relations
        define project: [project]
        define admin: [user, service_account, group#member]
        define editor: [user, service_account, group#member] or admin
        define viewer: [user, service_account, group#member] or editor
        define v_get: [user, service_account, group#member]
        define v_list: [user, service_account, group#member]
        define v_create: [user, service_account, group#member]
        define v_update: [user, service_account, group#member]
        define v_delete: [user, service_account, group#member]

    type vpc_address
      relations
        define project: [project]
        define admin: [user, service_account, group#member]
        define editor: [user, service_account, group#member] or admin
        define viewer: [user, service_account, group#member] or editor
        define use: [user, service_account] or editor
        define v_get: [user, service_account, group#member]
        define v_list: [user, service_account, group#member]
        define v_create: [user, service_account, group#member]
        define v_update: [user, service_account, group#member]
        define v_delete: [user, service_account, group#member]

    type vpc_gateway
      relations
        define project: [project]
        define admin: [user, service_account, group#member]
        define editor: [user, service_account, group#member] or admin
        define viewer: [user, service_account, group#member] or editor
        define v_get: [user, service_account, group#member]
        define v_list: [user, service_account, group#member]
        define v_create: [user, service_account, group#member]
        define v_update: [user, service_account, group#member]
        define v_delete: [user, service_account, group#member]

    type vpc_network_interface
      relations
        define project: [project]
        define admin: [user, service_account, group#member]
        define editor: [user, service_account, group#member] or admin
        define viewer: [user, service_account, group#member] or editor
        define v_get: [user, service_account, group#member]
        define v_list: [user, service_account, group#member]
        define v_create: [user, service_account, group#member]
        define v_update: [user, service_account, group#member]
        define v_delete: [user, service_account, group#member]

    type vpc_address_pool
      relations
        define cluster: [cluster]
        define admin: [user, service_account]
        define viewer: [user, service_account] or admin
        define v_get: [user, service_account, group#member]
        define v_list: [user, service_account, group#member]
        define v_create: [user, service_account, group#member]
        define v_update: [user, service_account, group#member]
        define v_delete: [user, service_account, group#member]

    # ---------------------------------------------------------------------------
    # Compute domain.
    # ---------------------------------------------------------------------------

    type compute_instance
      relations
        define project: [project]
        define admin: [user, service_account, group#member]
        define editor: [user, service_account, group#member] or admin
        define viewer: [user, service_account, group#member] or editor
        define ssh: [user with mfa_fresh, service_account] or admin
        define console: [user with mfa_fresh] or admin
        define v_get: [user, service_account, group#member]
        define v_list: [user, service_account, group#member]
        define v_create: [user, service_account, group#member]
        define v_update: [user, service_account, group#member]
        define v_delete: [user, service_account, group#member]

    type compute_disk
      relations
        define project: [project]
        define admin: [user, service_account, group#member]
        define editor: [user, service_account, group#member] or admin
        define viewer: [user, service_account, group#member] or editor
        define use: [user, service_account] or editor
        define v_get: [user, service_account, group#member]
        define v_list: [user, service_account, group#member]
        define v_create: [user, service_account, group#member]
        define v_update: [user, service_account, group#member]
        define v_delete: [user, service_account, group#member]

    type compute_image
      relations
        define project: [project]
        define admin: [user, service_account, group#member]
        define editor: [user, service_account, group#member] or admin
        define viewer: [user, service_account, group#member] or editor
        define use: [user, service_account] or editor
        define v_get: [user, service_account, group#member]
        define v_list: [user, service_account, group#member]
        define v_create: [user, service_account, group#member]
        define v_update: [user, service_account, group#member]
        define v_delete: [user, service_account, group#member]

    type compute_snapshot
      relations
        define project: [project]
        define admin: [user, service_account, group#member]
        define editor: [user, service_account, group#member] or admin
        define viewer: [user, service_account, group#member] or editor
