description: "Kachō — Ory Kratos self-service UI (login / registration / recovery / settings). Wraps the official oryd/kratos-selfservice-ui-node image; the kacho-ui nginx hard-proxies /login,/registration,... to the `kratos-selfservice-ui` Service. Template reads .Values.kratosSelfServiceUI.* — supplied by the umbrella under the `kratos-selfservice-ui:` key."