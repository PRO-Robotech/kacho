# ┌───────────────────────────────────────────────────────────────────────────┐
# │ SECURITY — throwaway DEV/CI credentials only.                              │
# │                                                                           │
# │ Every credential in this file (DB passwords `changeme-dev-*`, MinIO       │
# │ `changeme-dev-minio-*`) is a NON-SECRET PLACEHOLDER for the ephemeral kind │
# │ stand (`make dev-up`) and the newman CI cluster ONLY. They are committed   │
# │ to git deliberately so the local stand is reproducible — they carry no    │
# │ confidentiality and MUST NEVER be reused on a shared, staging or           │
# │ production cluster.                                                        │
# │                                                                           │
# │ Production sources every credential from external-secrets / SealedSecret  │
# │ (values.prod.yaml: minioDev.enabled=false, DB passwords via existingSecret │
# │ + ssl-mode=require). The prod profile is fail-closed and guarded by        │
# │ tests/helm/prod-profile-fail-closed-test.sh. Rotate/override these         │
# │ placeholders before any non-dev use.                                      │
# │ See docs/security/dev-credentials.md.                                     │
# └───────────────────────────────────────────────────────────────────────────┘

# yc CLI compatibility shim (kacho-yc-shim repo) — advertised endpoint that
# yc CLI dials AFTER calling ApiEndpointService.List for service discovery.
# In dev we use localhost:18443 because that is the port-forward to ingress-nginx
# (kubectl -n kacho port-forward svc/kacho-umbrella-ingress-nginx-controller 18443:443).
# In production the value would be api.kacho.local:443.
# KAC-127 — dev-стенд (kind) использует локально-загруженные образы `:dev`
# (`kind load docker-image kacho-*:dev`), а не DockerHub. pullPolicy IfNotPresent —
# образ уже в node-кэше kind. Чтобы тянуть из DockerHub в dev — убрать эти
# override'ы (вернётся registry/tag из values.yaml).

# KAC-127 — обнуляем global.imageRegistry для dev. В values.yaml он =
# `docker.io/prorobotech` (DockerHub-namespace для kacho-* образов). Но
# third-party sub-chart'ы (Ory kratos/hydra/keto, OpenFGA, bitnami postgresql)
# тоже уважают `global.imageRegistry` и подставляют его перед СВОИМ image →
# получается несуществующий `docker.io/prorobotech/oryd/hydra`. На dev-стенде
# kacho-* образы и так заданы явной строкой `image: kacho-*:dev` (flat-string,
# global.imageRegistry не используется этими sub-chart'ами), поэтому обнуление
# global безопасно для kacho-сервисов и чинит pull third-party образов
# (Ory → docker.io/oryd/*, OpenFGA → docker.io/openfga/*).
global:
  imageRegistry: ""

# ─── cluster-internal mTLS (default ON for the dev stand) ──────────────────
# The whole scheme runs on mTLS: cert-manager mints an internal-CA, every
# component gets a server/client leaf cert, and every service→service edge below
# is verified mTLS. `make dev-up` brings this up in two phases (cert-manager
# first, then the Issuer/Certificate CRs + per-edge enable) to avoid the
# webhook-not-ready race. Set mtls.enabled=false (+ cert-manager.enabled=false)
# to fall back to the insecure dev stand.
mtls:
  enabled: true
cert-manager:
  enabled: true

api-gateway:
  advertisedEndpoint: localhost:18443
  image: kacho-api-gateway:dev
  imagePullPolicy: IfNotPresent
  # sec-hardening (r8): the composition-root prod-guard (validateProductionAuthzConfig)
  # treats an EMPTY KACHO_APP_ENV as production-class and fails closed when authn.mode=dev
  # or the dev HMAC secret is set (CWE-347 symmetric-key principal forgery, CWE-1188). The
  # dev profile runs authn.mode=dev + devSecret intentionally, so it MUST label the env as
  # dev-class here — otherwise the gateway refuses to boot. Emitted via the subchart's
  # generic extraEnv passthrough (the fixed env block does not template APP_ENV).
  #
  # The var name is KACHO_APP_ENV (domain-LESS): config.go binds it via
  # `envconfig:"KACHO_APP_ENV"` — a cross-cutting deployment-env label, NOT the
  # per-domain KACHO_<DOMAIN>_<NAME> scheme. The earlier KACHO_API_GATEWAY_APP_ENV
  # was read by nothing → cfg.AppEnv stayed "" → prod-guard fired anyway.
  extraEnv:
    KACHO_APP_ENV: dev
  # mTLS: backend-dial client to every backend (cert + per-edge env). Hybrid
  # external listener (cert-or-JWT). Cert config (issuer/spiffe/secret) — chart values.
  mtls:
    enable: true
    hybridExternal: true
    # Server leaf for the external listener, issued by kacho-internal-ca (keys
    # tls.crt/tls.key → tls.certPath/keyPath). Without it the pod mounts the
    # `api-gateway-tls` secret (tls.enabled=true) that nothing provisions.
    serverSecretName: api-gateway-tls
    edges:
      vpc: true
      compute: true
      iam: true
      nlb: true
      geo: true        # gateway→geo (+ geoInternal) mTLS; backends.geo uses chart default kacho-geo.* (geo cutover, kacho-workspace#82)
      registry: true   # gateway→registry backend mTLS (registry.mtls.enable=true → server RequireAndVerifyClientCert)
      storage: true    # gateway→storage backend mTLS (storage.mtls.enable=true); needs the storage edge added to the gateway chart (below)
  # KAC-NLB: pre-wire kacho-nlb public + internal endpoints so that when the
  # api-gateway proxy un-freezes the loadbalancer domain (see
  # kacho-api-gateway/internal/allowlist/list.go — `loadbalancer заморожен`),
  # `kacho-nlb.kacho.svc.cluster.local:9090` / `kacho-nlb-internal:9091` are
  # already resolvable through the chart's `backends.*` map (template:
  # kacho-api-gateway/deploy/templates/deployment.yaml emits env vars
  # conditionally — these become `KACHO_API_GATEWAY_NLB_GRPC` /
  # `KACHO_API_GATEWAY_NLB_INTERNAL_GRPC` once the sub-chart adds the
  # corresponding `{{- if .Values.backends.nlb }}` block).
  backends:
    vpc: vpc.kacho.svc.cluster.local:9090
    vpcInternal: vpc.kacho.svc.cluster.local:9091
    compute: compute.kacho.svc.cluster.local:9090
    computeInternal: compute.kacho.svc.cluster.local:9091
    iam: kacho-iam.kacho.svc.cluster.local:9090
    iamInternal: kacho-iam-internal.kacho.svc.cluster.local:9091
    nlb: kacho-nlb.kacho.svc.cluster.local:9090
    nlbInternal: kacho-nlb-internal.kacho.svc.cluster.local:9091
    # registry Service is `registry` / `registry-internal` (registry chart .Values.name),
    # NOT `kacho-registry` — the gateway RegistryAddr default dials `kacho-registry` and
    # would NXDOMAIN 503 every registry control-plane REST call. Override to the real name.
    registry: registry.kacho.svc.cluster.local:9090
    registryInternal: registry-internal.kacho.svc.cluster.local:9091
  # KAC-127 (#40): dev-mode auth-interceptor HS256 secret. Without it every
  # Bearer JWT is ignored and all principals collapse to system:bootstrap —
  # anonymous / bootstrap / per-user tokens become indistinguishable, which
  # makes the authz-deny matrix untestable.
  #
  # Dev-ONLY secret. Production (values.prod.yaml) uses authn.mode=production
  # with Hydra JWKS RS256 and never this value — committing it here is safe
  # (this is the kind dev stand, not prod). MUST stay in sync with the secret
  # the authz-fixtures JWT minter signs with
  # (tests/authz-fixtures/setup.sh DEV_SECRET default).
  authn:
    mode: dev
    devSecret: kacho-dev-jwt-secret-2026
  # KAC-127: Phase 3 per-RPC authz middleware — ENABLED.
  #
  # The two structural blockers that previously forced `enabled: false` are
  # resolved (kacho-api-gateway#20):
  #   * Problem 1 — `RestRouter` is now wired (NewRestRouter, route table
  #     generated from the proto `google.api.http` annotations); REST paths
  #     resolve to gRPC FQNs so catalog lookups succeed.
  #   * Problem 2 — the permission catalog is fully populated (264/264 RPCs
  #     annotated in kacho-proto; the warnings file is empty).
  #
  # failOpen=false (fail-closed); iamAuthorizeUrl unset → derived from the
  # `iam` backend (public 9090); AuthorizeService.Check is the public RPC,
  # not routed through internal :9091 (loop-prevention #6).
  authz:
    enabled: true
    failOpen: false
    # checkTimeoutMs — per-Check hard deadline (KACHO_API_GATEWAY_AUTHZ_CHECK_TIMEOUT_MS).
    # Default 200ms is too tight for the kind dev stand: the FIRST gateway→iam-internal
    # Check pays a cold mTLS handshake (>200ms) → both attempts DeadlineExceeded →
    # "authz service unavailable" (code 14) on the very first authorised mutation
    # (seed Project.Create FATAL, and transient flakiness on cold suites). Once the
    # gRPC connection is warm Checks are sub-ms, so this only widens the cold-start
    # window. Prod keeps the 200ms default (values.prod.yaml unaffected).
    checkTimeoutMs: 2000
  # KAC-127 Phase 2 — Hydra JWKS for RS256 access-token verification.
  #
  # After register+login the SPA carries a Hydra-issued RS256 access token. The
  # gateway auth path validates it by fetching Hydra's JWKS. config.go derives
  # the JWKS endpoint from KACHO_HYDRA_ISSUER unless KACHO_HYDRA_JWKS_URL is set
  # explicitly; the derived default (`https://hydra.api.kacho.cloud/...`) is NOT
  # reachable from inside the cluster (Hydra's dev self.issuer is
  # `http://localhost:28080/.ory/hydra/public/`). So point the gateway at the
  # in-cluster Hydra PUBLIC Service directly.
  #
  # Service: `kacho-umbrella-hydra-public` (release kacho-umbrella), port 4444,
  # JWKS path `/.well-known/jwks.json` (Ory Hydra chart service-public.yaml).
  # Without this the gateway fetches the unreachable default → Hydra tokens are
  # never validated → WhoAmI / Account / Project return code 16 AUTHN_REQUIRED.
  # SEC-J: the verifier does an EXACT-match `iss` check, so the gateway issuer
  # MUST equal Hydra's `self.issuer` (hydra.config.urls.self.issuer below =
  # `http://localhost:28080/.ory/hydra/public/`) — the identity-string Hydra
  # stamps into the token `iss` claim (browser never navigates there). Without
  # it, KACHO_HYDRA_ISSUER derives the unreachable external default and every
  # real login token fails the iss check → AUTHN_REQUIRED persists.
  hydra:
    jwksUrl: "http://kacho-umbrella-hydra-public.kacho.svc.cluster.local:4444/.well-known/jwks.json"
    issuer: "http://localhost:28080/.ory/hydra/public/"

compute:
  image: kacho-compute:dev
  imagePullPolicy: IfNotPresent
  # Dev/newman profile deploys iam+vpc+geo but NOT kacho-storage (storage.enabled=false,
  # SERVICES в deploy/Makefile = iam vpc compute api-gateway nlb). Компьют-конфиг
  # ДЕФОЛТИТ KACHO_COMPUTE_STORAGE_INTERNAL_GRPC_ADDR на `kacho-storage…:9091`
  # (config.go, непустой default — как iam/geo/vpc). В dev этот адрес не резолвится →
  # каждая storage-зависимая instance-op (Delete-instance volume-release, AttachDisk,
  # DetachDisk) ретраит down-peer'а retry.OnUnavailable ~30s → завершается code=14
  # "storage service unavailable", а newman poll-budget (~15s) истекает раньше →
  # done:false-каскад (instance-суита) + провал cleanup-Delete в list-filter. Пустой
  # addr → NoopStorageClient (main.go): ListAttachments пуст → step-3 delete-саги и
  # Detach быстрые, Attach → быстрый fail-fast (не 30s-hang). envconfig(kelseyhightower):
  # env, выставленный в "" (present), ПЕРЕБИВАЕТ непустой default (default только при
  # unset). Прод не затронут — values.fe3455-prod.yaml выставляет реальный addr явно.
  # Attach/Detach-VOLUME кейсы (INST-AD/INST-DD) требуют ЖИВОГО storage — зелёные только
  # в umbrella-e2e со storage.enabled=true, не в этом compute-only профиле.
  # storageInternalAddr — first-class compute-chart key (deployment renders
  # KACHO_COMPUTE_STORAGE_INTERNAL_GRPC_ADDR from it). storage is now LIVE in the
  # dev umbrella (storage.enabled=true below), so point compute at it instead of ""
  # (NoopStorageClient). Enables AttachDisk/DetachDisk/ListAttachments + the
  # Delete-instance volume-release step. The 30s-hang risk the "" guarded only
  # applied when storage was DOWN — with storage Ready the InternalVolumeService
  # resolves fast. serverName.storage (compute→storage mTLS) chart default
  # kacho-storage.kacho.svc.cluster.local ∈ storage server-cert SAN.
  storageInternalAddr: kacho-storage.kacho.svc.cluster.local:9091
  # Delete-instance сага (internal/service/instance.go) НЕ становится fast-success от
  # одного лишь storage-Noop: перед step-3 (storage volume-release) идёт step-2 —
  # NIC-release через compute→vpc InternalNetworkInterfaceService.ListByInstance на
  # vpc INTERNAL :9091 (нижний mTLS-листенер, НЕ public :9090). Этот edge в
  # dev/newman-профиле не доступен компьюту (transport codes.Unavailable — единственный
  # retryable-код: не 5s-DeadlineExceeded, не authz-403), поэтому ListByInstance жжёт
  # весь 30s retry.OnUnavailable-бюджет ЛЮБОГО Delete (шаг безусловный, вызывается даже
  # для инстансов без NIC) > 15s newman poll → done:false. Это ровно тот же класс, что
  # ce01e92 закрыл для storage, но для vpc-NIC-ребра: 36 Delete-instance зависаний +
  # каскад cleanup-Delete по всей instance-суите. Пустой addr → NoopNicClient (main.go):
  # ListByInstance пуст (задокументированный degraded-path delete-саги — при неподнятом
  # peer'е NIC-привязки не отслеживаются) → step-2 мгновенный → Delete завершается.
  # В этом профиле NIC-attach всё равно не работает (:attachNetworkInterface отдаёт 403
  # на gateway), а NIC-mirror и так пуст (graceful-degrade), так что рабочей
  # функциональности не теряем. Прод не затронут — vpcInternalAddr там реальный
  # (compute chart default vpc.kacho.svc.cluster.local:9091). NIC-AD/DD-кейсы требуют
  # ЖИВОГО vpc-internal — зелёные только в umbrella-e2e, не в compute-only профиле.
  vpcInternalAddr: ""
  # Dev kind stack: pg-compute (bitnami postgres) serves NO TLS, so the migrator
  # + serve DB channel must be sslmode=disable. The compute chart DEFAULTS to
  # `require` (stricter than vpc/iam, which default to disable), which here fails
  # with "server refused TLS connection" → the migrate init container
  # CrashLoopBackOff (pod stuck PodInitializing). Service→service mTLS stays on
  # (mtls.enable=true below); only the ephemeral in-cluster DB channel is
  # plaintext — exactly like vpc/iam in this dev profile.
  db:
    sslMode: disable
  # Dev kind stack runs auth.mode=dev (like kacho-geo + vpc/iam): the umbrella
  # helm install disables server-mTLS for every service (--set
  # compute.mtls.enable=false), but the compute chart DEFAULTS auth.mode=
  # production, whose boot-guard REQUIRES server-mTLS on both listeners
  # (forwarded principal trusted on plaintext → subject spoofing) AND a non-empty
  # trusted-forwarder list. production + mtls-off = refuse-to-start
  # CrashLoopBackOff. The chart's deployment.yaml itself notes "dev stand
  # overrides auth.mode=dev + mtls.enable=false + db.sslMode=disable" — this
  # supplies the missing auth.mode override (ephemeral CI stand only; prod keeps
  # production, see values.prod.yaml).
  auth:
    mode: dev
  # mTLS: server (gateway/vpc/nlb dial here) + client (compute→iam, compute→vpc, compute→geo, compute→storage).
  mtls:
    enable: true
    edges:
      iamRegister: true
      iamProject: true
      iamAuthz: true
      vpc: true
      geo: true        # compute→geo zone_id validation (geo cutover, kacho-workspace#82)
      storage: true    # compute→storage InternalVolumeService (attach/detach) over mTLS;
                       # serverName.storage chart default kacho-storage.kacho.svc.cluster.local ∈ storage SAN
  # KAC-178 follow-up: compute authzIam.grpcAddr дефолт `kacho-iam:9091` в
  # kacho-compute/deploy/values.yaml неверный — Service `kacho-iam`
  # экспонирует только port 9090 (public AuthorizeService);
  # `InternalIAMService.Check` живёт на `kacho-iam-internal:9091`. Без этого
  # override compute per-RPC authz interceptor бил в closed port → i/o
  # timeout → "authorization service unavailable" на каждом list/get RPC
  # (instances/disks/images/snapshots, и т.п.).
  authzIam:
    grpcAddr: kacho-iam-internal.kacho.svc.cluster.local:9091
    tls: false
  # KAC-198 follow-up: write-side FGA for new compute resources
  # (`compute_<resource>:<id>#project@project:<project_id>`) so per-resource
  # Get/Update/Delete Checks resolve via `viewer from project` cascade.
  # Same store + bootstrap-Secrets as vpc/nlb.
  authz:
    tupleWrite:
      enabled: true
      openfgaEndpoint: kacho-umbrella-openfga:8080
      storeIdSecretName: kacho-iam-openfga-store
      storeIdSecretKey: store_id
      modelIdSecretName: openfga-model-id
      modelIdSecretKey: current
      timeoutMs: 2000

# ─── kacho-storage — Storage control-plane (Volume/Snapshot/Image/DiskType) ───
# Enabled for the dev/newman stand. Base values.yaml keeps it OFF and pins the
# image to :main-latest (a documented placeholder that doesn't exist) → override
# back to the local kind image (Makefile SERVICES builds kacho-storage:dev).
# storage is FAIL-CLOSED on its peer edges (serve.go dialPeer + geo_client): an
# empty geo/iam addr → Volume.Create returns Unavailable, so the geo/iam edges
# MUST be wired. iam+geo run server-mTLS (RequireAndVerifyClientCert) → storage
# MUST run mtls.enable=true (client-mTLS to them is coupled to server-mTLS under
# one flag). Added to MTLS_SUBCHARTS in deploy/Makefile (phase-1 bootstrap gate).
storage:
  enabled: true
  image:
    repository: kacho-storage   # local kind image (kacho-storage:dev)
    tag: dev
    pullPolicy: IfNotPresent
  config:
    # dev relaxes the prod-guard that would force TLS-DB; service→service mTLS stays ON.
    authMode: dev
    geoGrpcAddr: kacho-geo.kacho.svc.cluster.local:9090        # storage→geo ZoneService.Get (zone_id), :9090
    iamGrpcAddr: kacho-iam.kacho.svc.cluster.local:9090        # storage→iam ProjectService.Get, :9090
    authzIamGrpcAddr: kacho-iam-internal.kacho.svc.cluster.local:9091  # per-RPC Check + RegisterResource, :9091
    # Materialize owner-tuples so gateway scope_extractors {storage_volume,volume_id}/
    # {storage_snapshot,snapshot_id} resolve target→project (own-resource authz).
    # Requires authzIamGrpcAddr + mtls.edges.iam + iam seed 0057_storage_sa_least_priv.
    fgaRegisterDrainerEnabled: true
  db:
    # bitnami pg-storage Service (release alias) + its auto-provisioned Secret.
    host: kacho-umbrella-pg-storage
    sslMode: disable            # dev pg serves no TLS (chart default 'require' would refuse)
    passwordSecretName: kacho-umbrella-pg-storage
    passwordSecretKey: password
  # server-mTLS both listeners + client-mTLS storage→{geo,iam}. serverName.geo/iam
  # chart defaults (kacho-geo… / kacho-iam.kacho.svc.cluster.local) are in the peer SANs.
  mtls:
    enable: true
    edges:
      geo: true
      iam: true

# backing Postgres for kacho-storage (schema kacho_storage). Service
# kacho-umbrella-pg-storage; auto-Secret kacho-umbrella-pg-storage key `password`.
pg-storage:
  enabled: true
  auth:
    username: storage
    password: changeme-dev-storage   # NON-SECRET dev placeholder (see file header)
    database: kacho_storage
  primary:
    persistence:
      enabled: true
      size: 5Gi
    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits:   { cpu: 1500m, memory: 1Gi }
  image:
    repository: bitnamilegacy/postgresql
  volumePermissions:
    image:
      repository: bitnamilegacy/os-shell

# ─── kacho-geo (Geography Region/Zone leaf-service) ─────────────────────────
# geo is now an external OSS single-repo, consumed as a PUBLISHED dependency
# (not rebuilt from source in this umbrella). The dev stand + newman-e2e pull
# the known-good published tag (the build running on the long-lived fe3455
# stand) instead of a locally-built `kacho-geo:dev` — building from the OSS HEAD
# produced a runtime-broken image (geo-read 503 → cascading compute failures).
# Bump this tag in lockstep with newman-e2e.yml KACHO_GEO_IMAGE + the geo
# sub-chart default when geo cuts a new known-good build.
# dev = insecure posture (AUTH_MODE=dev) BUT mTLS is ON on the dev stand, so
# server-creds on both listeners + the geo→iam Check client edge are enabled
# (mirrors compute/vpc). authzIam stays wired at iam-internal :9091.
kacho-geo:
  # Use the branch build (`make build-services` → kacho-geo:dev, kind-loaded), NOT a
  # pinned external main-<sha> image. geo was the ONLY service still pinned to an
  # external main image (docker.io/prorobotech/kacho-geo:main-84d9d68f) while every
  # other service runs its :dev branch build — so the dev/CI stand ran STALE geo
  # (pre-GEO-1 internal admin: GetInternal unimplemented, op-id==resourceId, no
  # sync Operation{done:true}, malformed-id→404). That masked the GEO-1 redesign
  # from the geo newman suite. Point at the branch build so GEO-1 is exercised.
  image: kacho-geo:dev
  imagePullPolicy: IfNotPresent
  # GEO-1 serve.go added a dev-fatal secure-by-default boot-guard: an EMPTY
  # trusted-forwarder allow-list refuses to start UNLESS the dev opt-in is set
  # (services/geo/cmd/kacho-geo/serve.go validateSecurityConfig). The dev stand
  # runs auth.mode=dev with an empty forwarder SAN list (trust-any is the dev
  # posture), so the opt-in is required or the new geo binary CrashLoopBackOffs.
  # Prod profiles instead pin trustedForwarderSANs (values.*-prod.yaml).
  env:
    KACHO_GEO_AUTHZ_TRUST_ANY_FORWARDER: "true"
  mtls:
    enable: true
    edges:
      iamAuthz: true
  # S7: the one-time compute→geo geography copy is complete; compute no longer
  # owns/serves Region/Zone (tables dropped). geo seeds its own baseline, so the
  # migration Job is obsolete (and would fail reading the dropped kacho_compute
  # source). Disabled — the gated template stays as a one-time tool only.
  dataMigration:
    enabled: false

ingress-nginx:
  controller:
    # Standard kind+ingress-nginx pattern: hostPort на kind-ноде,
    # extraPortMappings в kind-config мапит хост:80 → нода:80.
    hostPort:
      enabled: true
      ports:
        http: 80
        https: 443
    service:
      type: ClusterIP
    nodeSelector:
      ingress-ready: "true"
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Equal
        effect: NoSchedule
    # На single-node kind кластере с одним replica — без anti-affinity
    affinity: {}
    publishService:
      enabled: false
    extraArgs:
      publish-status-address: localhost

# KAC-124: pg-resource-manager values удалён — Postgres-инстанс упразднён вместе с backend'ом.

pg-vpc:
  auth:
    username: vpc
    password: changeme-dev-vpc
    database: kacho_vpc
  primary:
    persistence:
      # kind: дефолтный StorageClass `standard` (local-path) — данные переживают
      # рестарт/redeploy пода (но не `kind delete cluster`).
      enabled: true
      size: 5Gi
    resources:
      requests:
        cpu: 100m
        memory: 1Gi
      limits:
        cpu: 4000m
        memory: 4Gi
    extendedConfiguration: |
      synchronous_commit = local
      max_connections = 300
      shared_buffers = 512MB
      work_mem = 16MB
      effective_cache_size = 2GB
      checkpoint_timeout = 15min
      max_wal_size = 2GB
  image:
    repository: bitnamilegacy/postgresql
  volumePermissions:
    image:
      repository: bitnamilegacy/os-shell


pg-compute:
  auth:
    username: compute
    password: changeme-dev-compute
    database: kacho_compute
  primary:
    persistence:
      enabled: true
      size: 5Gi
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: 2000m
        memory: 2Gi
    extendedConfiguration: |
      synchronous_commit = local
      max_connections = 300
      shared_buffers = 256MB
      work_mem = 16MB
      effective_cache_size = 1GB
  image:
    repository: bitnamilegacy/postgresql
  volumePermissions:
    image:
      repository: bitnamilegacy/os-shell


# kacho-vpc — admin networkpolicy для :9091.
# В dev-стенде disabled (port-forward kachoctl-ipam должен работать).
# В prod values эту секцию переопределить enabled=true + adminPodsSelector.
vpc:
  # KAC-127 — local kind-loaded image (см. комментарий у api-gateway выше).
  image: kacho-vpc:dev
  imagePullPolicy: IfNotPresent
  # mTLS: server (gateway/compute/nlb dial here) + client (vpc→iam, vpc→compute, vpc→geo).
  mtls:
    enable: true
    edges:
      iamRegister: true
      iamProject: true
      iamAuthz: true
      compute: true
      geo: true        # vpc→geo zone_id validation (geo cutover, kacho-workspace#82)
  networkPolicy:
    enabled: false
    adminPodsSelector: {}
  # KAC-127 issue #22: write-side FGA. Each VPC resource Create publishes
  # `vpc_<resource>:<id>#project@project:<project_id>` into the shared OpenFGA
  # store so per-resource Get/Update/Delete Checks resolve. store-id / model-id
  # are bootstrap-job-populated Secrets, injected as config ENV-override.
  authz:
    # KAC-127 Phase 4 — FGA-filtered List: List RPCs return 200 with only the
    # caller-visible ids instead of a per-RPC 403. Required for the authz
    # matrix *-LS-*-EMPTY scope-filter cases.
    listFilter:
      enabled: true
      authorizeEndpoint: kacho-iam.kacho.svc.cluster.local:9090
    tupleWrite:
      enabled: true
      # OpenFGA HTTP API (http port 8080; grpc is 8081). Same store kacho-iam
      # writes its account/project tuples into.
      openfgaEndpoint: kacho-umbrella-openfga:8080
      storeIdSecretName: kacho-iam-openfga-store
      storeIdSecretKey: store_id
      modelIdSecretName: openfga-model-id
      modelIdSecretKey: current
      timeoutMs: 2000

