# ═══════════════════════════════════════════════════════════════════════════
# values.dev-prod.yaml — PRODUCTION security posture on the LOCAL kind stand.
# ═══════════════════════════════════════════════════════════════════════════
#
# WHY: security.md — «любой деплой = production-mode + mTLS/JWT»; auth.mode=dev
# is a documented security debt (anonymous/HS256/plaintext-DB). The dev stand
# ran authn.mode=dev + sslmode=disable, which MASKS every prod-guard defect. This
# profile brings the SAME kind stand up in the real production security posture so
# those defects surface locally instead of on a prod cluster.
#
# LAYERED ON TOP of values.dev.yaml (like values.fe3455.yaml is) — it inherits ALL
# kind-local adaptations from dev (local kacho-*:dev images, ingress hostPort,
# in-cluster Hydra issuer/JWKS, pg hosts + inline dev secrets) and flips ONLY the
# security knobs from insecure-dev → production:
#
#   helm upgrade --install kacho-umbrella ./helm/umbrella -n kacho \
#     -f ./helm/umbrella/values.dev.yaml \
#     -f ./helm/umbrella/values.dev-prod.yaml \
#     --wait --timeout 12m
#
# ── What this flips (vs the insecure-dev base) ──────────────────────────────
#   1. AuthN mode  dev → production / production-strict  (gateway, iam, vpc, geo,
#      compute, storage, nlb, registry). Anonymous fail-closed; Bearer required;
#      Hydra RS256 only (HS256 dev-secret path OFF). KACHO_APP_ENV=production so
#      the composition-root prod-guard treats the deploy as production-class.
#   2. AuthZ breakglass  true → false  (geo, registry, nlb, vpc). Real per-RPC
#      IAM Check on BOTH listeners (public + internal :9091); no breakglass bypass.
#   3. Postgres ssl-mode  disable → require  — encrypted DB transport (the prod
#      floor). Each kacho pg-<svc> serves a self-signed TLS cert (bitnami
#      tls.autoGenerated); sslmode=require encrypts without cert-verification,
#      which is exactly right for an in-cluster self-signed server cert on kind.
#   4. mTLS stays ON (inherited from values.dev.yaml phase-2) — service→service is
#      already verified-client-cert on every edge; production simply never relaxes
#      it and now the boot-guards REQUIRE it (production + mtls-off = refuse-start).
#
# ── Prerequisite secrets (provisioned out-of-band by scripts/dev-prod-secrets.sh) ─
# iam production-strict Config.Validate fails fast without these (defense-in-depth):
#   - kacho-iam-hook-token       (key: token)    — Hydra token-hook HMAC
#   - kacho-iam-jwks-enc-key      (key: enc_key)  — JWKS private-key encryption
# On the insecure-dev stand both are optional secretKeyRefs (absent) → dev iam
# boots without them; production iam MUST have them.

# ─── api-gateway (edge) — production-strict authN ───────────────────────────
api-gateway:
  # Composition-root prod-guard (validateProductionAuthzConfig): an env NOT labelled
  # dev-class is treated as production → it REFUSES to boot if authn.mode=dev or a
  # dev HMAC secret is present (CWE-347 symmetric-key principal forgery). Flip the
  # label to production and drop the dev path.
  #
  # Internal :9091 gRPC listener (InternalAuthzCacheService.InvalidateSubject, dialed
  # by the iam subject-change push-drainer) is ALWAYS up and validateProductionInternal
  # Listener FATAL-fails in a production-class env unless it runs mTLS + a SPIFFE
  # allow-list. The gateway chart has no first-class knob for this (dev-masked gap —
  # values.prod.yaml renders but the pod would Fatalf at boot). Wire it via the chart's
  # generic extraEnv passthrough, reusing the already-mounted server cert
  # (/etc/api-gateway/tls, api-gateway-tls) + backend-dial CA (/etc/api-gateway/mtls/
  # ca.crt, already exported as KACHO_API_GATEWAY_MTLS_CA_FILE). Allow-list = the iam
  # module SPIFFE SAN (the only authorised caller of InvalidateSubject).
  extraEnv:
    KACHO_APP_ENV: production
    KACHO_API_GATEWAY_INTERNAL_GRPC_MTLS_ENABLE: "true"
    KACHO_API_GATEWAY_INTERNAL_GRPC_TLS_CERT_FILE: /etc/api-gateway/tls/tls.crt
    KACHO_API_GATEWAY_INTERNAL_GRPC_TLS_KEY_FILE: /etc/api-gateway/tls/tls.key
    KACHO_API_GATEWAY_INTERNAL_GRPC_ALLOWED_SPIFFE: spiffe://kacho.cloud/ns/kacho-iam/sa/kacho-iam
  authn:
    mode: production-strict     # Bearer REQUIRED + Hydra RS256; missing token → 401
    devSecret: ""               # HS256 dev path OFF (guard fails if non-empty in prod)
  # UNIFICATION: verify RS256 tokens through the iam :9097 JWKS proxy, NOT Hydra :4444
  # directly (registry-iam-jwks-unify — iam is the single JWKS facade; direct-Hydra dial
  # is forbidden). iam :9097 is a byte-identical short-TTL mirror of Hydra's public JWKS
  # (Hydra stays issuer/signer); it serves plain HTTP cluster-internal (jwks_proxy_mtls=
  # false) so no CA wiring is needed. `issuer` (iss-pin) is unchanged — inherited from
  # values.dev.yaml (Hydra self.issuer). Requires the :9097 upstream fix (kacho-iam.env).
  hydra:
    jwksUrl: "http://kacho-iam-internal.kacho.svc.cluster.local:9097/.well-known/jwks.json"

# ─── kacho-vpc ──────────────────────────────────────────────────────────────
vpc:
  authn:
    mode: production            # anonymous fail-closed
  repository:
    postgres:
      sslMode: require
  authz:
    breakglass: false

# ─── kacho-compute (no public mode knob; posture = mTLS + authzIam + sslmode) ─
# The compute chart DEFAULTS auth.mode=production (dev flips it to dev). Restore
# production + require the encrypted DB channel. mTLS + authzIam already wired in dev.
compute:
  auth:
    mode: production
  db:
    sslMode: require

# ─── kacho-geo (Region/Zone leaf) ───────────────────────────────────────────
kacho-geo:
  authMode: production           # anonymous fail-closed on BOTH listeners
  authzBreakglass: false         # real per-RPC Check (internal :9091 NOT exempt)
  db:
    sslmode: require
  # trusted-forwarder-SANs (gateway SPIFFE) inherited from values.dev.yaml env.

# ─── kacho-storage ──────────────────────────────────────────────────────────
storage:
  config:
    authMode: production
  db:
    sslMode: require

# ─── kacho-iam (authz authority + identity tier) — production-strict ────────
kacho-iam:
  config:
    authn:
      mode: production-strict    # Bearer required + Config.Validate requires hook/jwks secrets
    repository:
      postgres:
        sslMode: require         # production-strict enforces ssl-mode ∈ {require,verify-ca,verify-full}
  env:
    # UNIFICATION FIX (dev-masked): the iam :9097 JWKS proxy — the endpoint every
    # service is supposed to verify RS256 tokens through (registry-iam-jwks-unify) —
    # derives its upstream from KACHO_IAM_HYDRA_ISSUER = https://hydra.api.kacho.cloud,
    # the EXTERNAL ingress host that is UNREACHABLE in-cluster → the proxy fail-closes
    # 502 and NO service can verify through it (they silently fall back to Hydra-direct,
    # defeating the unification). Point the upstream at the in-cluster Hydra PUBLIC
    # Service (same fix api-gateway.hydra.jwksUrl already carries). ResolveHydraJWKSURL
    # honours this explicit override ahead of the issuer-derived default.
    KACHO_IAM_HYDRA_JWKS_URL: "http://kacho-umbrella-hydra-public.kacho.svc.cluster.local:4444/.well-known/jwks.json"

# ─── kacho-nlb ──────────────────────────────────────────────────────────────
kacho-nlb:
  config:
    mode: production
    authz:
      breakglass: false
      # production + mtls.server.enable requires a non-empty forwarder allow-list
      # (empty ⇒ any mTLS peer may forge the forwarded end-user principal). The only
      # trusted forwarder is the api-gateway (same SPIFFE SAN geo/compute trust).
      trustedForwarderSANs:
        - spiffe://kacho.cloud/ns/kacho/sa/kacho-api-gateway
  db:
    sslmode: require

# ─── kacho-registry ─────────────────────────────────────────────────────────
# production-strict: registry's DB-sslmode guard fires ONLY in production-strict (plain
# `production` leaves DB plaintext). The control-plane guard (validateSecurityConfig —
# authz-addr + both-listener mTLS) is NOT mode-gated: it runs whenever breakglass=off.
# The Docker DATA-plane (push/pull VIP) is out-of-scope on kind (dataplaneLB off) →
# DataplaneAddr empty → the data-plane guards (https-JWKS / issuer-pin / dataplane-TLS-
# ack) stay dormant, so production-strict boots cleanly control-plane-only on kind.
registry:
  authMode: production-strict
  db:
    sslmode: require
  authz:
    breakglass: false
  # Data-plane proxy (KACHO_REGISTRY_DATAPLANE_ADDR is always a non-empty listen addr →
  # the proxy is always built → its 3 production guards fire): (1) requireSecureJWKSURL —
  # verify docker identity-JWT via the iam :9097 JWKS proxy over HTTPS (unification: iam
  # is the JWKS facade, NOT Hydra direct; chart default is http:// which FAILS the guard);
  # (2) requireIssuerPinned — pin the expected iss to Hydra's self.issuer; (3) require
  # DataplaneTLSAck — operator ack the plaintext data-plane sits behind external TLS.
  # The Docker data-plane itself is NOT exercised on kind (dataplaneLB off) — these are
  # config-level boot guards, no live fetch, so registry boots control-plane-only.
  iam:
    jwksUrl: "https://kacho-iam-internal.kacho.svc.cluster.local:9097/.well-known/jwks.json"
  hydra:
    issuer: "http://localhost:28080/.ory/hydra/public/"
  dataplaneTLSTerminatedExternally: true

# ─── Per-service Postgres — serve self-signed TLS so sslmode=require works ───
# bitnami tls.autoGenerated uses helm genSignedCert cached via secrets.lookup
# (idempotent across upgrades — the cert is NOT regenerated once the -crt Secret
# exists). Self-signed server cert; clients use sslmode=require (encrypt, do not
# verify) — the correct floor for an in-cluster self-signed cert.
pg-vpc:
  tls:
    enabled: true
    autoGenerated: true
pg-compute:
  tls:
    enabled: true
    autoGenerated: true
pg-iam:
  tls:
    enabled: true
    autoGenerated: true
pg-geo:
  tls:
    enabled: true
    autoGenerated: true
pg-nlb:
  tls:
    enabled: true
    autoGenerated: true
pg-storage:
  tls:
    enabled: true
    autoGenerated: true
pg-registry:
  tls:
    enabled: true
    autoGenerated: true

# ── Hydra OAuth2 token/refresh webhooks → kacho-iam :9092 (production-mode) ──
# WAS MISSING from this overlay → Hydra never sent X-Kacho-Hook-Token, so iam's
# hook (:9092 /iam/v1/hooks/token) 401'd → Hydra 500 → EVERY client_credentials
# exchange failed (registry SA-keys AND the #58 bootstrap-token mint), independent
# of #58. Mirror of values.prod.yaml (the prod stand has this; the kind overlay
# dropped it). url is https because production-mode turns on iam :9092 server-TLS;
# Hydra trusts the kacho-iam server cert via the mounted internal-CA bundle.
hydra:
  config:
    oauth2:
      token_hook:
        url: "https://kacho-iam-internal.kacho.svc.cluster.local:9092/iam/v1/hooks/token"
        auth:
          type: api_key
          config:
            in: header
            name: X-Kacho-Hook-Token
            value: ${KACHO_IAM_HOOK_TOKEN}
      refresh_token_hook:
        url: "https://kacho-iam-internal.kacho.svc.cluster.local:9092/iam/v1/hooks/refresh"
        auth:
          type: api_key
          config:
            in: header
            name: X-Kacho-Hook-Token
            value: ${KACHO_IAM_HOOK_TOKEN}
  deployment:
    # Ory Hydra does NOT interpolate ${KACHO_IAM_HOOK_TOKEN} inside config-YAML — the
    # placeholder would ship as a literal X-Kacho-Hook-Token → HMAC verify 401. The
    # OAUTH2_*_HOOK_AUTH_CONFIG_VALUE env-overrides (Ory config-path → env naming)
    # override the YAML value with the real secret. SSL_CERT_FILE points Hydra's Go
    # TLS client at the internal-CA bundle so it trusts the iam :9092 server cert.
    extraEnv:
      - name: KACHO_IAM_HOOK_TOKEN
        valueFrom:
          secretKeyRef:
            name: kacho-iam-hook-token
            key: token
      - name: OAUTH2_TOKEN_HOOK_AUTH_CONFIG_VALUE
        valueFrom:
          secretKeyRef:
            name: kacho-iam-hook-token
            key: token
      - name: OAUTH2_REFRESH_TOKEN_HOOK_AUTH_CONFIG_VALUE
        valueFrom:
          secretKeyRef:
            name: kacho-iam-hook-token
            key: token
      - name: SSL_CERT_FILE
        value: /etc/kacho-iam-ca/ca.crt
    extraVolumes:
      - name: kacho-iam-internal-ca
        secret:
          secretName: kacho-iam-server-tls
          items:
            - key: ca.crt
              path: ca.crt
    extraVolumeMounts:
      - name: kacho-iam-internal-ca
        mountPath: /etc/kacho-iam-ca
        readOnly: true
