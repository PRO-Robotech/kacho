{{- if .Values.minioDev.enabled }}
{{- /*
  INFRA sec-hardening r2 — minio-dev root credentials as a Secret (secretKeyRef
  indirection) instead of plaintext env in the Deployment / init Job manifests.
  Dev-only: minioDev.enabled defaults false and values.prod.yaml never enables it
  (prod points at external S3 with Vault/SealedSecret creds). When an operator
  supplies their own Secret via `minioDev.existingSecret`, the chart references it
  and skips generating this one.
*/}}
{{- if not .Values.minioDev.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: minio-dev-root
  namespace: {{ .Release.Namespace }}
  labels:
    app: minio-dev
    app.kubernetes.io/managed-by: helm
    app.kubernetes.io/part-of: kacho
    kacho.cloud/component: minio-dev
type: Opaque
stringData:
  rootUser: {{ .Values.minioDev.rootUser | quote }}
  rootPassword: {{ .Values.minioDev.rootPassword | quote }}
{{- end }}
{{- end }}
