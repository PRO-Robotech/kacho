{{- /*
  PG server TLS via cert-manager (SEC-F internal-CA) — NOT bitnami self-signed.
  Production requires DB transport encryption (sslmode=require on every kacho
  service). Every certificate in the stack, including the Postgres server certs,
  is issued by the cluster-internal cert-manager CA (ClusterIssuer
  {{ $ca.clusterIssuerName }}) — no self-signed/autoGenerated
  material anywhere. Each bitnami pg-<svc> subchart consumes the resulting Secret
  via `pg-<svc>.tls.certificatesSecret` (server auth); clients connect
  sslmode=require (transport-encrypted, not SAN-pinned — see values.prod.yaml).

  Gated on mtls.pgTls.enabled; the service list is mtls.pgTls.services.

  NB: `and` в Go-шаблонах НЕ короткозамкнутый — он вычисляет ВСЕ аргументы. Поэтому
  `and .Values.mtls.enabled .Values.mtls.pgTls.enabled` падает nil-pointer'ом на
  профиле, где секции mtls.pgTls нет вовсе (dev), ЕЩЁ ДО проверки первого условия —
  т.е. «gated» гард не гейтил, а ронял рендер всего umbrella. Отсюда `default dict`:
  отсутствующая секция → пустой dict → .enabled = nil = false.
*/ -}}
{{- $mtls := .Values.mtls | default dict -}}
{{- $pgTls := $mtls.pgTls | default dict -}}
{{- if and $mtls.enabled $pgTls.enabled -}}
{{- $ca := .Values.mtls.internalCA -}}
{{- $rel := .Release.Name -}}
{{- $ns := .Release.Namespace -}}
{{- range $svc := $pgTls.services }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ printf "%s-pg-%s-server-tls" $rel $svc | quote }}
  namespace: {{ $ns | quote }}
  labels:
    app.kubernetes.io/name: {{ printf "pg-%s" $svc | quote }}
    app.kubernetes.io/component: pg-server-tls
    app.kubernetes.io/part-of: kacho
spec:
  secretName: {{ printf "%s-pg-%s-server-tls" $rel $svc | quote }}
  duration: 2160h        # 90d
  renewBefore: 360h      # 15d
  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always
  usages:
    - server auth
  dnsNames:
    - {{ printf "%s-pg-%s" $rel $svc | quote }}
    - {{ printf "%s-pg-%s.%s.svc" $rel $svc $ns | quote }}
    - {{ printf "%s-pg-%s.%s.svc.cluster.local" $rel $svc $ns | quote }}
    - {{ printf "%s-pg-%s-hl" $rel $svc | quote }}
    - {{ printf "%s-pg-%s-hl.%s.svc.cluster.local" $rel $svc $ns | quote }}
    - "localhost"
  issuerRef:
    name: {{ $ca.clusterIssuerName | quote }}
    kind: ClusterIssuer
    group: cert-manager.io
{{- end }}
{{- end }}
