{{- if .Values.security.txt.enabled }}
# KAC-127 Phase 12 — security.txt per RFC 9116 (https://datatracker.ietf.org/doc/html/rfc9116).
#
# Served at https://<domain>/.well-known/security.txt (and any subdomain
# that proxies through the api-gateway ingress). Contact info and policy
# URL are runtime-configurable from .Values.security.contactEmail and
# .Values.security.policyUrl.
apiVersion: v1
kind: ConfigMap
metadata:
  name: kacho-security-txt
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: security-txt
    app.kubernetes.io/managed-by: helm
    kacho.cloud/component: security-disclosure
  annotations:
    kacho.cloud/source: "rfc-9116"
data:
  security.txt: |
    # Kachō Cloud — Security Disclosure
    # https://www.rfc-editor.org/rfc/rfc9116
    #
    # Generated by helm at {{ now | date "2006-01-02T15:04:05Z" }}
    # Source: kacho-deploy/helm/umbrella/templates/security-txt-configmap.yaml

    Contact: mailto:{{ .Values.security.contactEmail }}
    {{- range .Values.security.altContacts }}
    Contact: {{ . }}
    {{- end }}

    # Expires no later than 1 year from generation.
    Expires: {{ now | date "2006-01-02T15:04:05Z" }}

    Encryption: {{ .Values.security.pgpKeyUrl }}

    # Where to send acknowledgments of disclosed vulnerabilities.
    Acknowledgments: {{ .Values.security.acknowledgmentsUrl }}

    # Public policy / safe-harbor terms.
    Policy: {{ .Values.security.policyUrl }}

    # Hiring page for security researchers / engineers.
    Hiring: {{ .Values.security.hiringUrl }}

    # Preferred language for security communications.
    Preferred-Languages: en, ru

    # Canonical URLs for this file.
    Canonical: https://{{ .Values.kacho.domain }}/.well-known/security.txt
    {{- range .Values.security.alternateCanonical }}
    Canonical: {{ . }}
    {{- end }}
{{- end }}
