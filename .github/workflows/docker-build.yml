# docker-build — multiarch-сборка и пуш образов всех сервисов монорепы.
#
# Одна матрица вместо 8 отдельных per-repo workflow. Build-context — КОРЕНЬ репо
# (единый Go-модуль), Dockerfile берётся по раскладке: services/<svc>/ либо gateway/.
#
# Теги: <branch>-<sha8>.

name: docker-build

on:
  push:
    branches:
      - main
      - "KAC-*"
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

# ОБЯЗАТЕЛЬНО при одном self-hosted-ранере. На ubuntu-latest каждый job получал свою
# VM и прогоны шли параллельно — очередь не копилась. Здесь ранер ОДИН: два пуша подряд
# ставят 16 job'ов в очередь, и она растёт быстрее, чем разбирается (~1.5 мин на образ).
# Образы устаревшего коммита никому не нужны — отменяем предыдущий прогон этой же ветки.
concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Namespace для тега при НЕзаданных секретах. Тег обязан остаться WELL-FORMED и в
  # build-only режиме: пустой namespace даёт "/kacho-x:tag", а Docker reference grammar
  # запрещает пустой name-компонент → buildx падает `invalid reference format` ДО пуша,
  # т.е. build-only путь ломается вместе с push'ем (реальный инцидент kacho-storage,
  # 2026-07-15: все docker-build падали, образ CS-1 не собирался).
  FALLBACK_NS: local

jobs:
  build:
    name: образы (8 шт, один job)
    # self-hosted (beget-runner): docker-демон живой, 12 ядер, и главное — КЭШ СЛОЁВ
    # ПЕРЕЖИВАЕТ ПРОГОНЫ. На ubuntu-latest каждая джоба — чистая VM, кэш тянется по сети
    # из type=gha; здесь builder-контейнер остаётся между запусками и кэш локальный.
    #
    # Метка, а НЕ имя: `beget-runner` — имя ранера, метки у него self-hosted/Linux/X64.
    # `runs-on: beget-runner` не сматчится ни с чем и висит в очереди молча.
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: benjlevesque/short-sha@v4.0
        id: short-sha
        with: { length: 8 }

      - name: sanitize branch
        id: sanitize
        run: echo "branch=$(echo "${GITHUB_REF_NAME}" | sed 's/\//-/g')" >> "$GITHUB_OUTPUT"

      - name: gate on DockerHub secrets
        id: gate
        env:
          DH_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          DH_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          # Эмитим И push, И namespace: тег НИКОГДА не подставляет секрет напрямую
          # (см. FALLBACK_NS выше — пустой секрет ронял бы даже build-only).
          if [ -n "$DH_USER" ] && [ -n "$DH_TOKEN" ]; then
            echo "push=true" >> "$GITHUB_OUTPUT"
            echo "ns=$DH_USER" >> "$GITHUB_OUTPUT"
          else
            echo "push=false" >> "$GITHUB_OUTPUT"
            echo "ns=$FALLBACK_NS" >> "$GITHUB_OUTPUT"
            echo "::warning::DOCKERHUB secrets unset — build only, no push (ns '$FALLBACK_NS')"
          fi

      - name: login to Docker Hub
        if: steps.gate.outputs.push == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: QEMU
        uses: docker/setup-qemu-action@v3
        with: { image: mirror.gcr.io/tonistiigi/binfmt:latest }

      # ПЕРСИСТЕНТНЫЙ builder: cleanup=false не даёт снести его после джобы. Внутренний
      # кэш buildkit живёт в томе этого контейнера → переживает прогоны, и cache-from/to
      # по сети не нужны вовсе. На ubuntu-latest так нельзя (VM одноразовая).
      - name: Buildx (персистентный builder)
        uses: docker/setup-buildx-action@v3
        with:
          name: kacho-persistent
          driver-opts: image=mirror.gcr.io/moby/buildkit:buildx-stable-1
          cleanup: false

      # ОДИН job на все 8 образов вместо matrix. Матрица имеет смысл там, где job'ы идут
      # ПАРАЛЛЕЛЬНО — на ubuntu-latest каждый получал свою VM. Ранер ОДИН, поэтому она
      # давала лишь 8 ПОСЛЕДОВАТЕЛЬНЫХ job'ов, а GitHub передаёт ранеру каждый следующий
      # с задержкой ~минуту. Замерено: сумма самих сборок 5.4 мин, а прогон — 14 мин;
      # ~8 мин съели 7 лишних передач. Цикл убирает их и переиспользует один
      # checkout/QEMU/buildx (шаги job'а суммарно ~25с, из них checkout 1с —
      # на self-hosted workspace переживает прогоны и чекаутится инкрементально).
      #
      # type=gha не нужен: кэш лежит внутри персистентного builder'а локально, gha тянул
      # бы его по сети поверх уже локального — чистый проигрыш.
      - name: сборка образов (8 шт)
        run: |
          set -uo pipefail
          # image:dir — контекст сборки КОРЕНЬ монорепы (единый go.mod + pkg/ + proto/
          # нужны каждому образу), меняется только -f Dockerfile.
          images="kacho-iam:services/iam
          kacho-vpc:services/vpc
          kacho-compute:services/compute
          kacho-geo:services/geo
          kacho-nlb:services/nlb
          kacho-storage:services/storage
          kacho-registry:services/registry
          kacho-api-gateway:gateway"

          push_flag=""
          [ "${{ steps.gate.outputs.push }}" = "true" ] && push_flag="--push"

          # Собираем ВСЕ, потом падаем — а не set -e на первой. Иначе первый же сбой
          # прячет состояние остальных семи, и вместо «упал registry» видно «упало что-то».
          failed=""
          for entry in $images; do
            image="${entry%%:*}"; dir="${entry##*:}"
            echo "::group::$image"
            if docker buildx build \
                 --builder kacho-persistent \
                 --platform linux/amd64,linux/arm64 \
                 --provenance=false \
                 -f "./$dir/Dockerfile" \
                 -t "${{ steps.gate.outputs.ns }}/$image:${{ steps.sanitize.outputs.branch }}-${{ steps.short-sha.outputs.sha }}" \
                 $push_flag . ; then
              echo "✓ $image"
            else
              echo "::error::сборка $image упала"; failed="$failed $image"
            fi
            echo "::endgroup::"
          done

          if [ -n "$failed" ]; then echo "УПАЛИ:$failed"; exit 1; fi
          echo "✓ все 8 образов собраны"

      # ОБЯЗАТЕЛЬНО для self-hosted: на ubuntu-latest VM одноразовая и мусор исчезает сам,
      # здесь кэш buildkit копится вечно. На ранере свободно ~16 ГБ — без уборки он
      # забьётся, и сборки начнут падать на `no space left on device` (в момент, никак не
      # связанный с коммитом, который это переполнил).
      #
      # keep-storage 6GB: держим горячий кэш (он и даёт весь выигрыш), срезаем хвост.
      # if: always() — мусор надо убрать и когда сборка упала, иначе красный прогон
      # оставляет за собой полный диск.
      - name: prune кэша buildkit (диск ранера не резиновый)
        if: always()
        run: |
          docker buildx prune --builder kacho-persistent --keep-storage=6GB --force 2>/dev/null || true
          echo "=== диск после уборки:"; df -h / | tail -1
