# ci — единый гейт монорепы.
#
# Заменяет 10 отдельных per-repo CI (proto/corelib/7 сервисов/gateway). Один модуль →
# один `go build ./...` проверяет ВЕСЬ граф разом: рассинхрон вроде «сервис отстал от
# corelib» или «код обогнал proto» падает здесь, а не всплывает при деплое через месяц.
# GitHub читает workflow ТОЛЬКО из корня — per-service .github/ были бы мертвы, поэтому
# их не существует.

name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    name: build · vet · gofmt · test -race
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go mod download
        run: go mod download

      - name: build
        run: go build ./...

      - name: vet
        run: go vet ./...

      - name: gofmt
        run: |
          # Сгенерённое исключаем: его форматирует генератор, а не человек.
          unformatted=$(gofmt -l $(git ls-files '*.go' | grep -vE '\.pb\.go$|_grpc\.pb\.go$|\.pb\.gw\.go$') || true)
          if [ -n "$unformatted" ]; then echo "gofmt needed:"; echo "$unformatted"; exit 1; fi

      # -short ОБЯЗАТЕЛЕН: без него сюда затягиваются integration-тесты, поднимающие
      # postgres:16 через testcontainers на КАЖДОМ из 202 пакетов → джоба упиралась в
      # `panic: test timed out after 15m0s` (23 минуты wall-clock и красный CI).
      # Локально с -short — 5 секунд. Integration гоняет отдельная джоба ниже.
      - name: test -race -short (unit)
        run: go test ./... -race -short -count=1 -timeout 5m

  integration:
    name: integration (${{ matrix.svc }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        svc: [iam, vpc, compute, geo, nlb, storage, registry]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go mod download

      # internal/repo/*integration_test.go поднимают postgres:16 через testcontainers
      # (Docker есть на ubuntu-latest). Отдельная джоба, а НЕ часть unit-прогона:
      # иначе -short-путь исчезает и быстрый сигнал (59с) тонет в контейнерах.
      #
      # МАТРИЦА ПО СЕРВИСАМ, а не один прогон на все 45 пакетов. Причина: одним job'ом
      # это не влезает — iam/internal/repo/kacho/pg держит 398 тестов против
      # testcontainers-Postgres и под -race выбирает 15m в одиночку:
      #   panic: test timed out after 15m0s   (весь job шёл 35 минут и падал)
      # В polyrepo этой нагрузки не было: у kacho-iam integration-джобы НЕ СУЩЕСТВОВАЛО
      # вовсе — его 398 pg-тестов не гонялись в CI НИКОГДА. Монорепа их подхватила
      # (это плюс: покрытие, которого не было), но им нужен свой бюджет.
      # Матрица заодно параллелит: wall-clock = самый долгий сервис, а не сумма.
      #
      # -p 1 ВНУТРИ сервиса: пакеты сериализуются. Под -race + Docker-contention
      # параллельные testcontainers-пакеты голодают друг у друга ресурсы, и
      # concurrent-кейсы (CAS/EXCLUDE/SKIP-LOCKED) флакают. Дизайн — из polyrepo kacho-vpc/nlb.
      - name: integration ${{ matrix.svc }} (-p 1, сериализовано)
        run: |
          # `go list`, а НЕ шелл-глоб: `./services/*/internal/repo/...` не работает —
          # bash глобит СЛОВО ЦЕЛИКОМ, а `...` не каталог, совпадений нет → паттерн уходит
          # в go test литералом («lstat …: no such file or directory»), и job краснеет за
          # 18с не запустив НИ ОДНОГО теста. go list заодно сам разбирается с тем, что у
          # geo нет internal/clients.
          pkgs=$(go list ./services/${{ matrix.svc }}/... | grep -E '/internal/(repo|clients)(/|$)' || true)
          if [ -z "$pkgs" ]; then echo "нет integration-пакетов у ${{ matrix.svc }} — пропуск"; exit 0; fi
          echo "пакетов: $(echo "$pkgs" | wc -l)"
          echo "$pkgs" | xargs go test -race -count=1 -timeout 25m -p 1

  proto:
    name: buf lint · breaking · generate-diff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      # Пин: buf влияет и на lint-правила, и на генерацию. Разъезд local-vs-CI уже
      # стоил ложного «unused import» (свежий buf ловит то, что 1.69.0 пропускал) —
      # находка была ВЕРНАЯ, но версия должна быть одна и та же у всех.
      - uses: bufbuild/buf-setup-action@v1
        with:
          version: 1.69.0

      - name: buf lint
        working-directory: proto
        run: buf lint

      - name: buf breaking (vs main)
        if: github.event_name == 'pull_request'
        working-directory: proto
        run: buf breaking --against "https://github.com/${{ github.repository }}.git#branch=main,subdir=proto"

      # Стабы закоммичены → они ОБЯЗАНЫ совпадать с .proto. Иначе кто-то правил
      # сгенерённое руками (что вдобавок бьёт rawDesc — см. README) либо забыл
      # перегенерировать после правки .proto.
      - name: generate-diff (стабы в синхроне с .proto)
        run: |
          # БЕЗ @latest: версии плагинов пинит go.mod через tools/tools.go. Плагины
          # ОПРЕДЕЛЯЮТ содержимое pkg/api — с @latest версия у разработчика и в CI
          # разъезжается по времени, и этот самый generate-diff начинает мигать
          # «фантомным диффом» при нетронутых .proto.
          go install google.golang.org/protobuf/cmd/protoc-gen-go
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc
          go install github.com/grpc-ecosystem/grpc-gateway/v2/protoc-gen-grpc-gateway

          # Рукописные файлы, живущие рядом со стабами (напр.
          # registry_rest_routing_test.go — ловит REST-shadow catch-all-роутов), buf НЕ
          # генерит. `rm -rf pkg/api` их сносит, и diff показывал бы их как удаление —
          # гейт краснел не из-за расхождения стабов, а из-за собственной уборки.
          # Поэтому: запоминаем их список ДО сноса и возвращаем из git ПОСЛЕ генерации.
          git ls-files pkg/api | grep -vE '\.pb\.go$|_grpc\.pb\.go$|\.pb\.gw\.go$' > /tmp/handwritten.list || true
          echo "рукописных файлов в pkg/api: $(wc -l < /tmp/handwritten.list)"

          rm -rf pkg/api
          (cd proto && buf generate)
          while read -r f; do [ -n "$f" ] && git checkout -- "$f"; done < /tmp/handwritten.list

          if ! git diff --quiet -- pkg/api; then
            echo "::error::pkg/api разошёлся с proto/ — прогони 'cd proto && buf generate' и закоммить"
            git diff --stat -- pkg/api
            exit 1
          fi

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      # go install, а НЕ golangci-lint-action: action ставит предсобранный бинарь, и
      # если он собран Go старше нашего go.mod — падает с
      #   "the Go language version (go1.24) used to build golangci-lint is lower than
      #    the targeted Go version (1.25.7)"
      # Сборка из исходников нашим же toolchain'ом делает этот рассинхрон невозможным.
      - name: install golangci-lint (нашим toolchain'ом)
        # Пин версии: с @latest новые линтеры/правила прилетают сами и роняют CI без
        # единой правки кода. Версия обязана быть собрана Go >= go.mod (см. ниже) —
        # go install собирает НАШИМ toolchain'ом, поэтому рассинхрон невозможен.
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
      - name: golangci-lint
        run: golangci-lint run --timeout=10m

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  helm:
    name: helm lint · template (dev + prod)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4

      # Только `helm lint`, БЕЗ голого `helm template <chart>`: последний НЕ является
      # валидным гейтом — часть чартов ОСОЗНАННО падает без секретов (kacho-nlb:
      # «db.password is required when db.existingSecret is empty» — fail-closed,
      # дефолтного пароля нет и быть не должно). Такой рендер наказывал бы за
      # правильный дизайн. Реальную интеграцию даёт рендер umbrella с ПРОФИЛЕМ (ниже).
      - name: lint сервисных чартов
        run: |
          for c in services/*/deploy gateway/deploy ui-future/deploy; do
            [ -f "$c/Chart.yaml" ] || continue
            echo "=== $c"; helm lint "$c"
          done

      # Рендер umbrella с профилем — гейт, который ловит класс «шаблон падает только на
      # реальном профиле»: `and` в Go-шаблонах не короткозамкнутый (pg-certificates ронял
      # ВЕСЬ рендер), забытый сабчарт в MTLS_OFF, pg на несуществующем образе.
      #
      # Был ВЫКЛЮЧЕН, пока ui-future жил снаружи: umbrella ссылается на него file://, и
      # `helm dependency build` без sibling-чекаута не проходил. После переезда ui-future
      # в монорепу гейт вернулся.
      #
      # prod-профиль требует values.fe3455-ory.yaml (gitignored — несёт креды кластера),
      # поэтому в CI рендерим dev + prod-БЕЗ-ory: этого хватает, чтобы поймать
      # шаблонные дефекты, а секрет остаётся вне репозитория.
      - name: umbrella dependency build (без sibling-чекаутов)
        working-directory: deploy/helm/umbrella
        run: helm dependency build

      - name: umbrella template — dev-профиль
        working-directory: deploy/helm/umbrella
        run: helm template ci . -f values.dev.yaml > /dev/null

      - name: umbrella template — prod-профиль
        working-directory: deploy/helm/umbrella
        run: helm template ci . -f values.prod.yaml -f values.fe3455.yaml -f values.fe3455-prod.yaml > /dev/null

      - name: mtls-off список покрывает values.dev.yaml
        working-directory: deploy
        run: make check-mtls-off-complete
