# ci — единый гейт монорепы.
#
# Заменяет 10 отдельных per-repo CI (proto/corelib/7 сервисов/gateway). Один модуль →
# один `go build ./...` проверяет ВЕСЬ граф разом: рассинхрон вроде «сервис отстал от
# corelib» или «код обогнал proto» падает здесь, а не всплывает при деплое через месяц.
# GitHub читает workflow ТОЛЬКО из корня — per-service .github/ были бы мертвы, поэтому
# их не существует.

name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    name: build · vet · gofmt · test -race
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go mod download
        run: go mod download

      - name: build
        run: go build ./...

      - name: vet
        run: go vet ./...

      - name: gofmt
        run: |
          # Сгенерённое исключаем: его форматирует генератор, а не человек.
          unformatted=$(gofmt -l $(git ls-files '*.go' | grep -vE '\.pb\.go$|_grpc\.pb\.go$|\.pb\.gw\.go$') || true)
          if [ -n "$unformatted" ]; then echo "gofmt needed:"; echo "$unformatted"; exit 1; fi

      - name: test -race
        run: go test ./... -race -count=1 -timeout 900s

  proto:
    name: buf lint · breaking · generate-diff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: bufbuild/buf-setup-action@v1

      - name: buf lint
        working-directory: proto
        run: buf lint

      - name: buf breaking (vs main)
        if: github.event_name == 'pull_request'
        working-directory: proto
        run: buf breaking --against "https://github.com/${{ github.repository }}.git#branch=main,subdir=proto"

      # Стабы закоммичены → они ОБЯЗАНЫ совпадать с .proto. Иначе кто-то правил
      # сгенерённое руками (что вдобавок бьёт rawDesc — см. README) либо забыл
      # перегенерировать после правки .proto.
      - name: generate-diff (стабы в синхроне с .proto)
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          go install github.com/grpc-ecosystem/grpc-gateway/v2/protoc-gen-grpc-gateway@latest

          # Рукописные файлы, живущие рядом со стабами (напр.
          # registry_rest_routing_test.go — ловит REST-shadow catch-all-роутов), buf НЕ
          # генерит. `rm -rf pkg/api` их сносит, и diff показывал бы их как удаление —
          # гейт краснел не из-за расхождения стабов, а из-за собственной уборки.
          # Поэтому: запоминаем их список ДО сноса и возвращаем из git ПОСЛЕ генерации.
          git ls-files pkg/api | grep -vE '\.pb\.go$|_grpc\.pb\.go$|\.pb\.gw\.go$' > /tmp/handwritten.list || true
          echo "рукописных файлов в pkg/api: $(wc -l < /tmp/handwritten.list)"

          rm -rf pkg/api
          (cd proto && buf generate)
          while read -r f; do [ -n "$f" ] && git checkout -- "$f"; done < /tmp/handwritten.list

          if ! git diff --quiet -- pkg/api; then
            echo "::error::pkg/api разошёлся с proto/ — прогони 'cd proto && buf generate' и закоммить"
            git diff --stat -- pkg/api
            exit 1
          fi

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      # go install, а НЕ golangci-lint-action: action ставит предсобранный бинарь, и
      # если он собран Go старше нашего go.mod — падает с
      #   "the Go language version (go1.24) used to build golangci-lint is lower than
      #    the targeted Go version (1.25.7)"
      # Сборка из исходников нашим же toolchain'ом делает этот рассинхрон невозможным.
      - name: install golangci-lint (нашим toolchain'ом)
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
      - name: golangci-lint
        run: golangci-lint run --timeout=10m

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  helm:
    name: helm lint · template (dev + prod)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4

      # Только `helm lint`, БЕЗ голого `helm template`.
      #
      # `helm template <chart>` без values НЕ является валидным гейтом: часть чартов
      # ОСОЗНАННО падает без секретов (kacho-nlb: «db.password is required when
      # db.existingSecret is empty» — fail-closed, дефолтного пароля нет и быть не
      # должно). Т.е. такой рендер наказывал бы за правильный дизайн.
      #
      # Реальную интеграцию проверяет рендер umbrella с профилем, но он требует
      # file://-чекаутов ui/ui-future, которые ПОКА не перенесены в монорепу. Вернуть
      # сюда `helm template ./deploy/helm/umbrella -f values.dev.yaml`, как только они
      # переедут (тогда же покрыть prod-профиль).
      - name: lint сервисных чартов
        run: |
          for c in services/*/deploy gateway/deploy; do
            [ -f "$c/Chart.yaml" ] || continue
            echo "=== $c"; helm lint "$c"
          done

      - name: mtls-off список покрывает values.dev.yaml
        working-directory: deploy
        run: make check-mtls-off-complete
