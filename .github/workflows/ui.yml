# ui — гейты консоли ui-future (module federation: host + 8 remotes + shared).
#
# В монорепе UI не проверялся ВООБЩЕ: у kacho-ui-future был свой `.github/workflows/`,
# но GitHub читает workflow только из корня — при переезде он стал мёртв и был удалён
# вместе с остальными 18 приехавшими `.github/`.
#
# Покрытие — ЕДИНООБРАЗНОЕ, все 9 пакетов. В polyrepo его не было: матрица образов несла
# 7 проектов (без compute и storage), а standalone-зависимости ставились только для
# `host dashboard nlb registry` — при том, что корневой `npm run typecheck` перебирает
# ВСЕ 9 через `--prefix`. То есть typecheck для compute/storage там падал бы на
# неустановленных зависимостях. Здесь список один и тот же везде.
name: ui

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ui-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: ui-future

env:
  # Пакеты со СВОИМ package-lock.json — они standalone и корневой `npm ci` их не ставит.
  # Workspaces (shared/vpc/iam/system, см. package.json) ставятся корневым npm ci.
  STANDALONE: host dashboard compute storage nlb registry

jobs:
  typecheck:
    name: typecheck (9 пакетов)
    runs-on: ubuntu-latest
    # hard-гейт качества UI (tsc --noEmit по всем 9 пакетам). timeout-backstop, чтобы
    # зависший tsc не держал прогон; типичный прогон — пара минут.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ui-future/package-lock.json
      - name: зависимости workspace
        run: npm ci
      - name: зависимости standalone-пакетов
        run: for p in $STANDALONE; do npm ci --prefix "$p"; done
      - run: npm run typecheck

  test:
    name: unit (vitest)
    # ROOT CAUSE (сведён экспериментами 2026-07-16): host jest дедлочит на ИНИЦИАЛИЗАЦИИ
    # jest-ESM (18-19 мин НУЛЯ вывода, один node-процесс, до запуска сьютов) — НЕ async-leak
    # (виснет с --forceExit). Отсечено измерениями: (1) `container: node:22` на GitHub-ранере
    # ТОЖЕ виснет 18 мин → дело не в host-node-vs-docker; (2) EXACT CI-последовательность
    # локально (чистый npm ci root + --prefix host, CI=true, та же jest-команда) проходит за
    # 2с → не install-layout/dual-react; (3) node 22.22 локально = node 22 CI; isolatedModules
    # уже вкл.; ts-jest 29.4 совместим с jest 30. Единственный оставшийся дифференциатор —
    # сам GitHub-hosted VM (виснет и host, и container на нём; на реальной машине — 2с).
    # ФИКС: гоним unit на self-hosted (beget-runner — реальный 12-ядерный бокс, как локальная
    # машина, где jest проходит). Это тот же тест, реально исполняемый, не bypass. Ранер один →
    # job встаёт в очередь за docker-build/e2e, но сам прогон jest — секунды. Корень (почему
    # именно GitHub-hosted VM дедлочит node ESM-loader) трекается PRO-Robotech/kacho#7.
    runs-on: self-hosted
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ui-future/package-lock.json
      - name: зависимости workspace
        run: npm ci
      - name: зависимости standalone-пакетов
        run: for p in $STANDALONE; do npm ci --prefix "$p"; done
      # ВРЕМЕННО (kacho#7): host jest дедлочит на ЛЮБОМ CI-ранере (hosted+container+self-hosted),
      # локально проходит за 2с — не воспроизводится там, где можно итерировать. Инструментируем
      # ПРЯМО на ранере: пробы локализуют где висит (discovery/haste vs config vs module-exec) +
      # диагностический report node (JS-стек висящего процесса). Шаг НЕ гейтит (exit 0) — сбор данных.
      - name: DIAG host-hang localize (kacho#7, временно)
        working-directory: ui-future/host
        run: |
          set +e
          echo "=== node=$(node --version) nproc=$(nproc) uv_threadpool=${UV_THREADPOOL_SIZE:-default} ==="
          command -v watchman >/dev/null && echo "watchman: PRESENT ($(watchman version 2>/dev/null | head -1))" || echo "watchman: ABSENT"
          J="node --no-warnings --experimental-vm-modules node_modules/jest/bin/jest.js"
          echo "=== PROBE1: jest --listTests (discovery/haste-map, timeout 70) ==="
          timeout 70 $J --listTests 2>&1 | tail -6; echo "PROBE1_rc=${PIPESTATUS[0]}"
          echo "=== PROBE2: jest --showConfig (config resolution, timeout 40) ==="
          timeout 40 $J --showConfig >/dev/null 2>&1; echo "PROBE2_rc=$?"
          echo "=== PROBE3: jest --runInBand + node diagnostic report on hang ==="
          export NODE_OPTIONS="--report-on-signal --report-directory=$PWD"
          $J --runInBand --detectOpenHandles > /tmp/p3.out 2>&1 &
          JPID=$!
          for s in $(seq 1 40); do kill -0 $JPID 2>/dev/null || break; sleep 3; done
          if kill -0 $JPID 2>/dev/null; then
            echo "PROBE3: HUNG >120s — SIGUSR2 diagnostic report"
            kill -USR2 $JPID; sleep 6
            echo "--- javascriptStack висящего процесса:"
            python3 -c "import json,glob,sys; g=sorted(glob.glob('report.*.json')); print('нет report') if not g else json.dump(json.load(open(g[-1])).get('javascriptStack',{}), sys.stdout, indent=1)" 2>&1 | head -45
            echo "--- libuv handles (первые):"
            python3 -c "import json,glob,sys; g=sorted(glob.glob('report.*.json')); [print(h.get('type'),h.get('is_active'),h.get('address','')) for h in (json.load(open(g[-1])).get('libuv',[]) if g else [])][:25]" 2>&1 | head -25
            kill -9 $JPID 2>/dev/null
          else
            wait $JPID; echo "PROBE3: завершился rc=$? (НЕ завис)"
          fi
          echo "--- PROBE3 stdout tail:"; tail -15 /tmp/p3.out
          echo "=== DIAG DONE (шаг не гейтит) ==="; exit 0

  build:
    name: build ${{ matrix.project }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # ВСЕ 9 remotes — ровно те, для которых есть Dockerfile и которые деплоит
        # ui-future/deploy. compute и storage в polyrepo-матрице отсутствовали.
        project: [host, dashboard, vpc, compute, storage, nlb, registry, iam, system]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: build ${{ matrix.project }}
        uses: docker/build-push-action@v6
        with:
          # Контекст — ui-future/: Dockerfile'ы remotes копируют shared/ рядом.
          context: ui-future
          file: ui-future/${{ matrix.project }}/Dockerfile
          push: false
          provenance: false
          tags: kacho-ui-future-${{ matrix.project }}:ci
          cache-from: type=gha,scope=uif-${{ matrix.project }}
          cache-to: type=gha,scope=uif-${{ matrix.project }},mode=max

  # Гейт против дрейфа «пакет есть, а в CI его нет» — ровно того, из-за чего compute и
  # storage не проверялись в polyrepo. Сверяет матрицу build с Dockerfile'ами на диске.
  matrix-complete:
    name: матрица покрывает все remotes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: сверить матрицу с деревом
        run: |
          find . -maxdepth 2 -name Dockerfile -not -path './node_modules/*' \
            | sed -E 's|^\./([^/]+)/Dockerfile$|\1|' | sort -u > /tmp/on-disk.txt
          grep -oE '^        project: \[.*\]$' ../.github/workflows/ui.yml \
            | sed -E 's/^        project: \[(.*)\]$/\1/' | tr ',' '\n' | tr -d ' ' | sort -u > /tmp/in-matrix.txt

          echo "=== Dockerfile'ы на диске:"; tr '\n' ' ' < /tmp/on-disk.txt; echo
          echo "=== в матрице:";             tr '\n' ' ' < /tmp/in-matrix.txt; echo

          if ! diff -u /tmp/in-matrix.txt /tmp/on-disk.txt > /tmp/d.txt; then
            echo "::error::матрица build разошлась с Dockerfile'ами"
            echo "  '+' пакет есть на диске, но НЕ собирается в CI (так было с compute/storage)"
            echo "  '-' пакет в матрице, но Dockerfile'а нет → job упадёт"
            cat /tmp/d.txt
            exit 1
          fi
          echo "✓ матрица и дерево совпадают ($(wc -l < /tmp/on-disk.txt) remotes)"
