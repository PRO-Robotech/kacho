syntax = "proto3";

package kacho.iam.authz.v1;

import "google/protobuf/descriptor.proto";

option go_package = "github.com/PRO-Robotech/kacho/pkg/api/kacho/iam/authz/v1;authzv1";

// Authz options — per-RPC annotations consumed by `protoc-gen-kacho-permissions`
// to build the canonical `permission_catalog.json` and by the kacho-iam authz
// middleware at runtime.
//
// Usage on an RPC:
//
//   rpc Create(CreateNetworkRequest) returns (operation.Operation) {
//     option (kacho.iam.authz.v1.permission)        = "vpc.networks.create";
//     option (kacho.iam.authz.v1.required_relation) = "editor";
//     option (kacho.iam.authz.v1.scope_extractor)   = {
//       object_type:        "project"
//       from_request_field: "project_id"
//     };
//     option (kacho.iam.authz.v1.required_acr_min)  = "2";
//   }
//
// All options are emitted into the catalog. `permission`,
// `required_relation`, `scope_extractor.object_type` and
// `scope_extractor.from_request_field` are required. `required_acr_min` is
// optional and defaults to "2". `hide_existence` is optional and defaults to
// false.
//
// Extension field numbers are inside the kacho.iam-reserved range
// `[50000, 50999]` to avoid collision with `kacho.cloud.api` (87334) and
// `kacho.cloud.validation` (101400+).

// permission — canonical permission string in `<domain>.<resource>.<verb>` form,
// or the literal `"<exempt>"` for RPCs that intentionally bypass authz
// (e.g. `OperationService.Get` on the internal port).
extend google.protobuf.MethodOptions {
  string permission = 50001;
}

// required_relation — OpenFGA relation name to be checked on the scope object
// (`viewer` / `editor` / `owner` / `admin` / domain-specific).
extend google.protobuf.MethodOptions {
  string required_relation = 50002;
}

// scope_extractor — how to derive the OpenFGA scope object from the request.
extend google.protobuf.MethodOptions {
  ScopeExtractor scope_extractor = 50003;
}

// required_acr_min — minimum ACR (Authentication Context Class Reference) level
// required for this RPC. Encoded as a string for forward compatibility with
// non-numeric ACR values. Default `"2"` when not set.
extend google.protobuf.MethodOptions {
  string required_acr_min = 50004;
}

// hide_existence — when true, the api-gateway authz middleware surfaces an
// authenticated deny on this RPC as NotFound (gRPC 5 / HTTP 404) with NO deny
// reasons, instead of PermissionDenied (gRPC 7 / HTTP 403 + `deny_reasons`).
//
// The gateway Check runs BEFORE the owning service, so a 403 here would both (a)
// override the owner's hide-existence contract for a resource whose very
// existence must stay hidden from an unauthorized caller and (b) echo the iam
// enforcement-Check deny reason ("subject … lacks relation … ; current direct
// relations: [...]") into the client response — a relations/existence oracle
// (security.md #6, hardening-invariant #5). Enforcement is unchanged: the deny
// still blocks the request; only the surfaced code/body differ.
//
// Set it on verb-bearing RPCs over a concrete per-resource scope whose owner
// answers a denied caller with NotFound (reads AND mutations of a resource the
// caller must not learn the existence of). Read `/Get` RPCs over a `v_get`
// concrete scope are hidden by the gateway heuristic even without this flag; the
// flag is required for the mutation verbs (`v_update` / `v_delete`), which the
// heuristic deliberately does not cover. Default false (plain PermissionDenied).
extend google.protobuf.MethodOptions {
  bool hide_existence = 50005;
}

// ScopeExtractor describes how the kacho-iam authz middleware extracts an
// OpenFGA scope object from an incoming RPC request.
message ScopeExtractor {
  // OpenFGA object type the scope id resolves to. Either a hierarchy scope
  // (`cluster` / `account` / `project`) or a per-resource
  // object type registered in the authorization model (`vpc_network`,
  // `compute_disk`, `iam_group`, `iam_role`, ...). The api-gateway authz
  // middleware builds the FGA Check object as `<object_type>:<id>` where the
  // id is taken from `from_request_field`. Must be non-empty.
  string object_type = 1;

  // Name of the proto request field from which the scope id is taken. Must be
  // a top-level field on the request message and a non-empty string.
  string from_request_field = 2;

  // Name of the proto request field from which the OpenFGA *object type* is
  // derived at request time (scope-polymorphic RPCs). When set + non-empty,
  // the api-gateway authz middleware reads this top-level string field off the
  // request and uses its value as the FGA Check object type instead of the
  // static `object_type` above. The static `object_type` then serves only as
  // the fallback when the field is absent/empty.
  //
  // Used by AccessBindingService.ListByScope, where the bound resource scope
  // (project|account|cluster) is carried by the request `resource_type` field —
  // a single fixed `object_type` cannot express it (a hardcoded `project` made
  // account/cluster-scoped reads check `project:<id>` → 403). Empty for the
  // overwhelming majority of RPCs, which have a fixed scope type.
  string object_type_from_request_field = 3;
}
