syntax = "proto3";

package kacho.cloud.vpc.v1;
import "google/api/annotations.proto";
import "kacho/iam/authz/v1/authz_options.proto";
import "kacho/cloud/vpc/v1/network.proto";

option go_package = "github.com/PRO-Robotech/kacho/pkg/api/kacho/cloud/vpc/v1;vpcv1";

// InternalNetworkService — internal-only operations над Network.
//
// Exposed на cluster-internal порту kacho-vpc (9091). На external TLS endpoint
// эти методы НЕ должны быть доступны: они несут инфра-чувствительные данные и
// относятся к Internal-only поверхности.
//
// PoolSelector RPC удалены: label-cascade на Network не покрывал
// external IP (external Address не имеет network_id).
service InternalNetworkService {
  // SetDefaultSecurityGroupId проставляет computed-поле
  // Network.default_security_group_id. Это единственный способ выставить это
  // поле — публичный Update.UpdateMask его не принимает (поле OUTPUT_ONLY).
  // Идемпотентно: повторный вызов с тем же sg_id — no-op.
  //
  // Errors:
  //   - NotFound: network не существует.
  //   - InvalidArgument: sg_id не относится к этой network (FK validation).
  //   - FailedPrecondition: network уже имеет другой default_security_group_id.
  rpc SetDefaultSecurityGroupId(SetDefaultSecurityGroupIdRequest) returns (SetDefaultSecurityGroupIdResponse) {
    option (kacho.iam.authz.v1.permission)        = "vpc.networks.set_default_sg";
    option (kacho.iam.authz.v1.required_relation) = "system_admin";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "cluster"
      from_request_field: "*"
    };
    option (kacho.iam.authz.v1.required_acr_min) = "1";
  }

  // GetNetwork — internal-only read, возвращающий Network вместе с
  // инфра-чувствительным vrf_id (SRv6 VRF идентификатор data-plane). Этот
  // инфра-чувствительный идентификатор НЕ публикуется
  // на public NetworkService (Get/List) и на external TLS endpoint —
  // только cluster-internal (:9091).
  //
  // Errors:
  //   - InvalidArgument: malformed network_id.
  //   - NotFound: network не существует.
  rpc GetNetwork(GetInternalNetworkRequest) returns (GetInternalNetworkResponse) {
    // Custom-verb путь `:internal` отличает от public GET /vpc/v1/networks/{id}.
    // Регистрируется ТОЛЬКО на cluster-internal mux (api-gateway vpcInternalAddr).
    option (google.api.http)                      = { get: "/vpc/v1/networks/{network_id}:internal" };
    option (kacho.iam.authz.v1.permission)        = "vpc.networks.get_internal";
    // GetNetwork — READ инфра-чувствительного vrf_id: гейтим read-tier
    // `system_viewer` (а не `system_admin`). Нужный потребитель — kacho-vpc-net
    // оператор (least-priv `system_viewer@cluster`, SEC-L mig 0010). `system_viewer`
    // НЕ содержит wildcard `user:*` → tenant'ы read-доступа не получают (инфра
    // закрыта); мутация SetDefaultSecurityGroupId — по-прежнему system_admin.
    option (kacho.iam.authz.v1.required_relation) = "system_viewer";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "cluster"
      from_request_field: "*"
    };
    option (kacho.iam.authz.v1.required_acr_min) = "1";
  }
}

message SetDefaultSecurityGroupIdRequest {
  string network_id = 1;
  string security_group_id = 2;
}

message SetDefaultSecurityGroupIdResponse {}

message GetInternalNetworkRequest {
  string network_id = 1;
}

message GetInternalNetworkResponse {
  // Публичная проекция Network (без инфра-полей).
  Network network = 1;

  // SRv6 VRF идентификатор data-plane. Инфра-чувствительный — присутствует
  // ТОЛЬКО в этом internal-ответе, никогда на public Network.
  uint32 vrf_id = 2;
}
