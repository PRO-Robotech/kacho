syntax = "proto3";

package kacho.cloud.vpc.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/PRO-Robotech/kacho/pkg/api/kacho/cloud/vpc/v1;vpcv1";

// SubnetPlacementType — дискриминатор размещения подсети. Обязателен; задаётся
// при Create и immutable. UNSPECIFIED невалиден (не дефолтит в ZONAL).
enum SubnetPlacementType {
  SUBNET_PLACEMENT_TYPE_UNSPECIFIED = 0;
  // ZONAL — unicast-адреса, подсеть живёт в одной зоне доступности (zone_id).
  ZONAL = 1;
  // REGIONAL — anycast-префикс, анонсируется active-active из здоровых зон
  // региона (region_id); адреса region-scoped, без зональности.
  REGIONAL = 2;
}

// A Subnet resource. For more information, see [Subnets](/docs/vpc/concepts/network#subnet).
message Subnet {
  // 9 — legacy route_table oneof slot (retired). 10/11 — legacy
  // v4_cidr_blocks/v6_cidr_blocks (retired in redesign VPC-1 F7: the flat
  // "all blocks" array is split into an explicit immutable primary anchor
  // + additional ranges — see ipv4_cidr_primary/ipv4_cidr_blocks below).
  // 13 — legacy dhcp_options (retired VPC-1 F9/VPC-1-43: Network-level
  // DHCP/DNS-resolver knobs dropped by design).
  reserved 9, 10, 11, 13;
  reserved "dhcp_options";
  // ID of the subnet.
  string id = 1;

  // ID of the folder that the subnet belongs to.
  string project_id = 2;

  // Creation timestamp in [RFC3339](https://www.ietf.org/rfc/rfc3339.txt) text format.
  google.protobuf.Timestamp created_at = 3;

  // Name of the subnet. 
  // The name must be unique within the folder. 
  // Value must match the regular expression ``\|[a-zA-Z]([-_a-zA-Z0-9]{0,61}[a-zA-Z0-9])?``.
  string name = 4;

  // Optional description of the subnet. 0-256 characters long.
  string description = 5;

  // Resource labels, `key:value` pairs. 
  // No more than 64 per resource. 
  // The maximum string length in characters for each value is 63. 
  // Each value must match the regular expression `[-_0-9a-z]*`. 
  // The string length in characters for each key must be 1-63. 
  // Each key must match the regular expression `[a-z][-_0-9a-z]*`.
  map<string, string> labels = 6;

  // ID of the network the subnet belongs to.
  string network_id = 7;

  // Placement discriminator (required, immutable). ZONAL — unicast addresses in
  // one availability zone; REGIONAL — anycast prefix announced active-active from
  // the healthy zones of a region. Exactly one of zone_id / region_id is set.
  SubnetPlacementType placement_type = 15;

  // ID of the availability zone (set iff placement_type == ZONAL).
  string zone_id = 8;

  // ID of the region (set iff placement_type == REGIONAL). The subnet is
  // region-scoped; its prefix is anycast across the region's zones.
  string region_id = 14;

  // ID of route table the subnet is linked to.
  string route_table_id = 12;

  // Primary IPv4 CIDR anchor (immutable, set at Create). Must be a subset of one
  // of the parent network's ipv4_cidr_blocks supernet blocks. Empty for a v6-only
  // subnet. For example, 10.20.0.0/24. Minimum /28, maximum /16.
  string ipv4_cidr_primary = 16;

  // Additional IPv4 CIDR ranges beyond the primary anchor, added/removed via
  // AddCidrBlocks/RemoveCidrBlocks. Each must be within a supernet block and disjoint.
  repeated string ipv4_cidr_blocks = 17;

  // Primary IPv6 CIDR anchor (immutable). Empty for a v4-only subnet.
  string ipv6_cidr_primary = 18;

  // Additional IPv6 CIDR ranges beyond the primary anchor (verb-pair mutation).
  repeated string ipv6_cidr_blocks = 19;
}

enum IpVersion {
  IP_VERSION_UNSPECIFIED = 0;
  IPV4 = 1;
  IPV6 = 2;
}
