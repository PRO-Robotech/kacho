syntax = "proto3";

package kacho.cloud.vpc.v1;

import "kacho/cloud/vpc/v1/network_interface.proto";
import "kacho/iam/authz/v1/authz_options.proto";

option go_package = "github.com/PRO-Robotech/kacho/pkg/api/kacho/cloud/vpc/v1;vpcv1";

// InternalNetworkInterfaceService — cluster-internal RPC (port 9091; ban #6),
// reachable ONLY on the internal listener over mTLS, NOT on the external TLS
// endpoint. Pure gRPC service→service (no google.api.http mapping).
//
// It carries NIC↔Instance attach coordination. Attach is compute-initiated and
// self-describing: the request carries instance_id / instance_name /
// instance_zone_id / project_id, and kacho-vpc validates against its own
// `network_interfaces` (+ `subnets`) rows and performs an atomic CAS on
// `used_by_id` (with zone-coherence + anycast/REGIONAL-subnet exception). kacho-vpc
// NEVER calls compute (that would create a compute↔vpc cycle — retrospective
// KAC-266, which removed the public AttachToInstance/DetachFromInstance in favour
// of this internal self-describing attach; the mirror of storage
// InternalVolumeService).
//
// All RPCs are synchronous (the CAS is instantaneous); the tenant-facing mutation
// stays async through the compute-side `AttachNetworkInterface` Operation, so ban #9
// is not violated. AuthN (mTLS) + AuthZ (per-RPC Check) apply on this listener as
// well; Attach/Detach carry writer permissions with an object-scoped extractor on
// `nic_id`; ListByInstance is a viewer-tier batched read.
service InternalNetworkInterfaceService {
  // Attach — atomic CAS on `network_interfaces.used_by_id` (self-describing).
  // Idempotent on replay (already-ours → OK). kacho-vpc validates its own NIC +
  // subnet rows (free-or-ours, same project, zone-coherent unless the subnet is
  // REGIONAL/anycast) and never calls compute.
  rpc Attach(AttachNetworkInterfaceRequest) returns (AttachNetworkInterfaceResponse) {
    option (kacho.iam.authz.v1.permission)        = "vpc.network_interfaces.attach";
    option (kacho.iam.authz.v1.required_relation) = "editor";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "vpc_network_interface"
      from_request_field: "nic_id"
    };
    option (kacho.iam.authz.v1.required_acr_min) = "1";
  }

  // Detach — idempotent release of the NIC↔Instance binding (clears used_by_id /
  // used_by_index) when the binding belongs to the given instance; a NIC that is
  // already free → OK.
  rpc Detach(DetachNetworkInterfaceRequest) returns (DetachNetworkInterfaceResponse) {
    option (kacho.iam.authz.v1.permission)        = "vpc.network_interfaces.detach";
    option (kacho.iam.authz.v1.required_relation) = "editor";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "vpc_network_interface"
      from_request_field: "nic_id"
    };
    option (kacho.iam.authz.v1.required_acr_min) = "1";
  }

  // ListByInstance — batched read of NIC attachments for the given instances, used
  // by compute to build the read-only mirror on Instance.Get / Instance.List (not
  // N+1).
  rpc ListByInstance(ListNetworkInterfacesByInstanceRequest) returns (ListNetworkInterfacesByInstanceResponse) {
    option (kacho.iam.authz.v1.permission)        = "vpc.network_interfaces.listByInstance";
    option (kacho.iam.authz.v1.required_relation) = "viewer";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "cluster"
      from_request_field: "*"
    };
    option (kacho.iam.authz.v1.required_acr_min) = "1";
  }
}

// AttachNetworkInterfaceRequest — self-describing attach payload (kacho-vpc
// validates its own `network_interfaces` + `subnets` rows against these values; it
// does not call compute).
message AttachNetworkInterfaceRequest {
  // ID of the NIC (kacho-vpc NetworkInterface, prefix "enp") to attach.
  string nic_id = 1;

  // ID of the instance the NIC is attached to (cross-service, no FK).
  string instance_id = 2;

  // Name of the instance at attach time (write-time snapshot).
  string instance_name = 3;

  // Zone of the instance (used for zone-coherence; kacho-vpc never calls compute).
  string instance_zone_id = 4;

  // ID of the project (used for project-coherence).
  string project_id = 5;

  // Slot index on the instance (eth0=0, eth1=1, …), unique within the instance.
  // Optional: if unset, kacho-vpc assigns the first free slot atomically.
  int32 index = 6;
}

message AttachNetworkInterfaceResponse {
  // The updated NIC (used_by set, status ACTIVE) after a successful attach.
  NetworkInterface network_interface = 1;
}

message DetachNetworkInterfaceRequest {
  // ID of the NIC to detach.
  string nic_id = 1;

  // ID of the instance the NIC is detached from.
  string instance_id = 2;
}

message DetachNetworkInterfaceResponse {
  // The updated NIC (used_by cleared, status AVAILABLE) after detach.
  NetworkInterface network_interface = 1;
}

message ListNetworkInterfacesByInstanceRequest {
  // IDs of the instances to list NIC attachments for (batched).
  repeated string instance_ids = 1;
}

message ListNetworkInterfacesByInstanceResponse {
  // Flat list of NIC attachments across the requested instances. Each entry carries
  // its owning instance_id so the caller can group them.
  repeated NetworkInterfaceAttachmentInfo network_interfaces = 1;
}

// NetworkInterfaceAttachmentInfo — a single NIC attachment enriched with the
// instance-local slot `index` (which does not live on the public NetworkInterface
// message) and a denormalised mirror of the NIC's addressing. Used by the batched
// ListByInstance to build the compute-side Instance.network_interfaces[] mirror.
message NetworkInterfaceAttachmentInfo {
  // ID of the attached NIC (kacho-vpc NetworkInterface, prefix "enp").
  string nic_id = 1;

  // ID of the instance the NIC is attached to.
  string instance_id = 2;

  // Slot index on the instance (eth0=0, eth1=1, …).
  int32 index = 3;

  // Denormalised mirror of the NIC's addressing (source of truth = kacho-vpc
  // NetworkInterface); output-only.
  string subnet_id = 4;
  string primary_v4_address = 5;
  string primary_v6_address = 6;
  repeated string security_group_ids = 7;
  string mac_address = 8;
}
