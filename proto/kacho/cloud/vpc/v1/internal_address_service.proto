syntax = "proto3";

package kacho.cloud.vpc.v1;

import "google/protobuf/timestamp.proto";
import "kacho/iam/authz/v1/authz_options.proto";

option go_package = "github.com/PRO-Robotech/kacho/pkg/api/kacho/cloud/vpc/v1;vpcv1";

// InternalAddressService — internal RPC, exposed только на cluster-internal порту
// kacho-vpc (не через api-gateway). Используется kacho-vpc-controllers для
// IP-allocation (IPAM встроен в kacho-vpc) и
// peer-сервисами (kacho-compute) для привязки/отвязки "кто использует адрес"
// (referrer-tracking, surfaced через SubnetService.ListUsedAddresses).
//
// Контракт всех RPC: атомарное выполнение в одной Postgres-tx, идемпотентность
// по `address_id` (повторный вызов на уже-allocated address возвращает existing
// IP без изменений).
service InternalAddressService {
  // AllocateInternalIP резолвит target subnet (через addresses.internal_ipv4.subnet_id),
  // выбирает next-free IPv4 из subnet.v4_cidr_blocks[0], атомарно вставляет в БД
  // под защитой UNIQUE (subnet_id, internal_ip) constraint (миграция 0014).
  // Retry на UNIQUE-violation внутри сервиса; max attempts настраивается deploy-time.
  //
  // Errors:
  //   - NotFound: address или subnet не существует.
  //   - FailedPrecondition: address уже имеет allocated IP (idempotent повтор
  //     возвращает Ok с existing IP без error'а).
  //   - ResourceExhausted: subnet exhausted (нет free IP после max retries).
  rpc AllocateInternalIP(AllocateInternalIPRequest) returns (AllocateIPResponse) {
    option (kacho.iam.authz.v1.permission) = "<exempt>";
  }

  // AllocateInternalIPv6 — как AllocateInternalIP, но для internal_ipv6 Address:
  // резолвит target subnet через addresses.internal_ipv6.subnet_id, выбирает
  // адрес из subnet.v6_cidr_blocks[0] (random-from-prefix + retry на UNIQUE).
  rpc AllocateInternalIPv6(AllocateInternalIPRequest) returns (AllocateIPResponse) {
    option (kacho.iam.authz.v1.permission) = "<exempt>";
  }

  // AllocateExternalIP резолвит pool через cascade:
  //   1. address_pool_address_override (если есть) → использовать этот пул.
  //   2. address_pool_network_default (через subnet→network если у Address-а
  //      указан subnet, иначе из folder-default association) — этот пул.
  //   3. region default pool (AddressPool.is_default=true в данном region).
  // Атомарно вставляет в БД под защитой UNIQUE (pool_id, external_ip) constraint.
  rpc AllocateExternalIP(AllocateExternalIPRequest) returns (AllocateIPResponse) {
    option (kacho.iam.authz.v1.permission) = "<exempt>";
  }

  // AllocateExternalIPv6 — как AllocateExternalIP, но для external_ipv6 Address:
  // резолвит pool тем же cascade'ом (override → network_default → region default),
  // фильтруя пулы по IPv6-family (kind=EXTERNAL_PUBLIC, v6_cidr_blocks). Выделяет
  // адрес sparse counter-аллокатором (pop released offset → fresh cursor) под
  // защитой UNIQUE (pool_id, ip). Идемпотентно по address_id.
  //
  // Errors:
  //   - NotFound: address не существует.
  //   - FailedPrecondition: у address нет external_ipv6-spec, pool без
  //     v6_cidr_blocks, либо pool исчерпан. Idempotent повтор на уже-allocated
  //     address возвращает Ok с existing IP без error'а.
  rpc AllocateExternalIPv6(AllocateExternalIPRequest) returns (AllocateIPResponse) {
    option (kacho.iam.authz.v1.permission) = "<exempt>";
  }

  // SetAddressReference устанавливает (upsert) referrer для адреса — кто его
  // использует. Идемпотентно: повторный вызов с тем же/другим referrer'ом
  // перезаписывает запись. Также выставляет `Address.used = true`. Один
  // referrer на адрес (control-plane модель одна-ВМ↔один-адрес).
  //
  // Errors:
  //   - NotFound: address не существует.
  //   - InvalidArgument: пустой address_id / referrer_type / referrer_id.
  rpc SetAddressReference(SetAddressReferenceRequest) returns (AddressReference) {
    option (kacho.iam.authz.v1.permission) = "<exempt>";
  }

  // ClearAddressReference удаляет referrer-запись адреса (если есть) и
  // выставляет `Address.used = false`. No-op если referrer'а нет.
  //
  // Errors:
  //   - NotFound: address не существует.
  //   - InvalidArgument: пустой address_id.
  rpc ClearAddressReference(ClearAddressReferenceRequest) returns (ClearAddressReferenceResponse) {
    option (kacho.iam.authz.v1.permission) = "<exempt>";
  }

  // GetAddressReference возвращает referrer-запись адреса.
  //
  // Errors:
  //   - NotFound: address не существует ИЛИ у него нет referrer'а.
  //   - InvalidArgument: пустой address_id.
  rpc GetAddressReference(GetAddressReferenceRequest) returns (AddressReference) {
    option (kacho.iam.authz.v1.permission) = "<exempt>";
  }

  // MarkAddressEphemeralInUse атомарно (в одной tx): выставляет
  // `Address.reserved = false`, `Address.used = true` и upsert'ит referrer-row
  // (= SetAddressReference). Используется kacho-compute для эфемерных NIC/NAT
  // Address-ресурсов, которые он сам создал: те создаются через публичный
  // AddressService.Create с `reserved = true`, но для авто-аллоцированного
  // NIC-адреса это неверно — такой адрес НЕ должен быть reserved.
  // Идемпотентно.
  //
  // Errors:
  //   - NotFound: address не существует.
  //   - InvalidArgument: пустой address_id / referrer_type / referrer_id.
  rpc MarkAddressEphemeralInUse(MarkAddressEphemeralInUseRequest) returns (MarkAddressEphemeralInUseResponse) {
    option (kacho.iam.authz.v1.permission) = "<exempt>";
  }
}

message AllocateInternalIPRequest {
  string address_id = 1;
}

message AllocateExternalIPRequest {
  string address_id = 1;
}

message AllocateIPResponse {
  // Allocated IPv4 string (e.g. "10.0.0.7" or "203.0.113.42").
  string ip = 1;
  // Resolved pool_id (только для external; для internal — пусто).
  string pool_id = 2;
  // Если true — IP не аллоцирован сейчас, а уже был allocated ранее (idempotency).
  bool already_allocated = 3;
}

// AddressReference — кто использует Address (YC-like referrer-tracking).
message AddressReference {
  // ID адреса.
  string address_id = 1;
  // Тип ресурса-владельца, напр. "compute_instance" (расширяемо).
  string referrer_type = 2;
  // ID ресурса-владельца, напр. id ВМ.
  string referrer_id = 3;
  // Имя ресурса-владельца на момент привязки (best-effort; может устареть).
  string referrer_name = 4;
  // Когда привязка установлена.
  google.protobuf.Timestamp attached_at = 5;
  // owned — referrer владеет адресом (lifecycle адреса связан с referrer'ом), а
  // не просто ссылается. true — адрес заказан referrer'ом неявно (release =
  // ClearReference + Delete); false — адрес создан tenant'ом заранее и
  // залинкован (release = только ClearReference, адрес остается).
  bool owned = 6;
}

message SetAddressReferenceRequest {
  string address_id = 1;
  string referrer_type = 2;
  string referrer_id = 3;
  string referrer_name = 4;
  // owned — объявляет владение адресом (см. AddressReference.owned). Default
  // false (link-семантика).
  bool owned = 5;
}

message ClearAddressReferenceRequest {
  string address_id = 1;
}

message ClearAddressReferenceResponse {}

message GetAddressReferenceRequest {
  string address_id = 1;
}

message MarkAddressEphemeralInUseRequest {
  string address_id = 1;
  string referrer_type = 2;
  string referrer_id = 3;
  string referrer_name = 4;
}

message MarkAddressEphemeralInUseResponse {}
