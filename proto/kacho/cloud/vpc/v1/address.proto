syntax = "proto3";

package kacho.cloud.vpc.v1;

import "google/protobuf/timestamp.proto";
import "kacho/cloud/reference/reference.proto";
import "kacho/cloud/validation.proto";

option go_package = "github.com/PRO-Robotech/kacho/pkg/api/kacho/cloud/vpc/v1;vpcv1";

// An Address resource. For more information, see [Address](/docs/vpc/concepts/address).
message Address {
  reserved 9 to 14;

  enum Type {
    TYPE_UNSPECIFIED = 0;

    // Internal IP address.
    INTERNAL = 1;

    // Public IP address.
    EXTERNAL = 2;
  }

  enum IpVersion {
    IP_VERSION_UNSPECIFIED = 0;

    // IPv4 address.
    IPV4 = 1;

    // IPv6 address.
    IPV6 = 2;
  }

  // ID of the address. Generated at creation time.
  string id = 1;

  // ID of the folder that the address belongs to.
  string project_id = 2;

  // Creation timestamp.
  google.protobuf.Timestamp created_at = 3;

  // Name of the address.
  // The name is unique within the folder.
  // Value must match the regular expression ``\|[a-zA-Z]([-_a-zA-Z0-9]{0,61}[a-zA-Z0-9])?``.
  string name = 4;

  // Description of the address. 0-256 characters long.
  string description = 5;

  // Address labels as `key:value` pairs. 
  // No more than 64 per resource. 
  // The maximum string length in characters for each value is 63.
  // Each value must match the regular expression `[-_0-9a-z]*`. 
  // The string length in characters for each key must be 1-63. 
  // Each key must match the regular expression `[a-z][-_0-9a-z]*`.
  map<string, string> labels = 6;

  oneof address {
    option (exactly_one) = true;

    // External ipv4 address specification.
    ExternalIpv4Address external_ipv4_address = 7;
    // Internal ipv4 address specification
    InternalIpv4Address internal_ipv4_address = 8;
    // Internal ipv6 address specification (IPv6 vertical).
    InternalIpv6Address internal_ipv6_address = 22;
    // External ipv6 address specification.
    ExternalIpv6Address external_ipv6_address = 23;
  }

  // Specifies if address is reserved or not.
  bool reserved = 15;

  // Specifies if address is used or not.
  bool used = 16;

  // Type of the IP address.
  Type type = 17;

  // Version of the IP address.
  IpVersion ip_version = 18;

  // Specifies if address protected from deletion.
  bool deletion_protection = 19;

  // Optional DNS record specifications
  repeated DnsRecord dns_records = 20;

  // Resources currently using
  // this address. Output-only — populated by the service on Get/List; ignored
  // on Create/Update. For compute instance NIC/NAT addresses, contains a
  // reference with referrer.type='compute_instance' and referrer.id=<instance_id>.
  // Mirrors the shape of SubnetService UsedAddress.references[].
  repeated kacho.cloud.reference.Reference used_by = 21;
}

message ExternalIpv4Address {
  // Value of address.
  string address = 1;

  // Availability zone from which the address will be allocated.
  string zone_id = 2;

  // Parameters of the allocated address, for example DDoS Protection.
  AddressRequirements requirements = 3;
}

message InternalIpv4Address {
  // Value of address.
  string address = 1;

  oneof scope {
    option (exactly_one) = true;

    // Subnet from which the address will be allocated
    string subnet_id = 2;
  }
}

message InternalIpv6Address {
  // Value of address.
  string address = 1;

  oneof scope {
    option (exactly_one) = true;

    // Subnet (with a v6_cidr_block) from which the address will be allocated
    string subnet_id = 2;
  }
}

// External IPv6 address. Mirrors ExternalIpv4Address;
// allocated from a global address pool (kind=EXTERNAL_PUBLIC) with an IPv6
// CIDR block via the sparse IPv6 IPAM allocator (counter-based).
message ExternalIpv6Address {
  // Value of address.
  string address = 1;

  // Availability zone from which the address will be allocated.
  string zone_id = 2;

  // Parameters of the allocated address. Same wire shape as for
  // ExternalIpv4Address, even if some attributes are not relevant for v6.
  AddressRequirements requirements = 3;
}


message AddressRequirements {
  // DDoS protection provider ID.
  string ddos_protection_provider = 1;

  // Capability to send SMTP traffic.
  string outgoing_smtp_capability = 2;
}

message DnsRecord {
  // DNS record name (absolute or relative to the DNS zone in use).
  string fqdn = 1;

  // ID of the public DNS zone.
  string dns_zone_id = 2;

  // TTL of record.
  int64 ttl = 3;

  // If the PTR record is required, this parameter must be set to "true".
  bool ptr = 4;
}
