syntax = "proto3";

package kacho.cloud.geo.v1;

import "google/api/annotations.proto";
import "kacho/cloud/geo/v1/region.proto";
import "kacho/cloud/validation.proto";
import "kacho/iam/authz/v1/authz_options.proto";

option go_package = "github.com/PRO-Robotech/kacho/pkg/api/kacho/cloud/geo/v1;geov1";

// A set of methods to retrieve information about regions (public, read-only).
// Admin CRUD over regions — see InternalRegionService in
// internal_catalog_service.proto. Region/Zone is owned by kacho-geo (leaf
// platform-topology service).
service RegionService {
  // Returns the information about the specified region.
  rpc Get (GetRegionRequest) returns (Region) {
    option (google.api.http) = { get: "/geo/v1/regions/{region_id}" };
    // Ambient placement-catalog read: project-scope EXEMPT (authN-only). Region/
    // Zone is an admin-curated global catalog every authenticated tenant must
    // read to launch any placeable resource (zoneId/regionId originate here), so
    // the gateway waives the per-RPC FGA Check (<exempt>) — a project-scope Check
    // would 403 a zero-binding tenant. authN (JWT) stays mandatory. Documented
    // exception, see security.md (geo public-read EXEMPT), mirrors iam JWKS-route.
    option (kacho.iam.authz.v1.permission) = "<exempt>";
  }

  // Retrieves the list of regions.
  rpc List (ListRegionsRequest) returns (ListRegionsResponse) {
    option (google.api.http) = { get: "/geo/v1/regions" };
    // Ambient placement-catalog read — project-scope EXEMPT (authN-only); see
    // RegionService.Get. authN (JWT) stays; per-RPC FGA Check waived (<exempt>).
    option (kacho.iam.authz.v1.permission) = "<exempt>";
  }
}

message GetRegionRequest {
  // ID of the region to return information about.
  string region_id = 1 [(required) = true, (length) = "<=50"];
}

message ListRegionsRequest {
  // The maximum number of results per page to return.
  int64 page_size = 1 [(value) = "<=1000"];

  // Page token. To get the next page of results, set [page_token] to the
  // [ListRegionsResponse.next_page_token] returned by a previous list request.
  string page_token = 2 [(length) = "<=100"];

  // If true, return only regions that are open for placement (derived
  // open_for_placement°=true, i.e. status==UP). This is the ONLY placement
  // filter — there is no raw ?status=UP on the public surface.
  bool open_for_placement = 3;
}

message ListRegionsResponse {
  // List of regions.
  repeated Region regions = 1;

  // Token for getting the next page of results.
  string next_page_token = 2;
}
