syntax = "proto3";

package kacho.cloud.registry.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/PRO-Robotech/kacho/pkg/api/kacho/cloud/registry/v1;registryv1";

// Namespace — тенант-namespace OCI/Docker-реестра Kachō.
//
// Плоский ресурс (без K8s-envelope). Namespace — НЕ отдельный инстанс движка, а
// namespace над общим zot-бэкендом: клиент адресует образ как
// `registry.kacho.local/<registry-id>/<repo>:tag`. Метаданные namespace хранит
// kacho-registry; сами блобы/манифесты — в zot (S3-backed). Образы/теги в БД не
// хранятся — это read-only проекция из zot (см. Repository/Tag).
//
// project_id — cross-domain ссылка на iam.Project (TEXT, без FK, валидируется
// через iam.ProjectService.Get на Create). Owner-иерархия в FGA пишется через
// fga-proxy (RegisterResource), object-type `registry_registry`.
message Namespace {
  // ID реестра. Prefix "reg" (kacho-corelib/ids.NewID). Immutable PK.
  string id = 1;

  // ID project-владельца (iam). Immutable после Create.
  string project_id = 2;

  // Момент создания (truncate до секунд в ответе).
  google.protobuf.Timestamp created_at = 3;

  // Имя реестра — DNS-safe, UNIQUE в рамках project (partial UNIQUE WHERE
  // status<>'DELETING'). Mutable через Update (смена не трогает endpoint/zot по id).
  string name = 4;

  // Описание (mutable через Update).
  string description = 5;

  // Метки — участвуют в authz label-scoping (mutable через Update).
  map<string, string> labels = 6;

  // Output-only: базовый OCI-endpoint namespace, напр. registry.kacho.local/<id>.
  string endpoint = 7;

  // Output-only: число repositories в namespace (проекция из zot, не источник истины).
  int32 repository_count = 8;

  // Состояние жизненного цикла.
  NamespaceStatus status = 10;

  // Дефолтная публичность для НОВЫХ repo в namespace — сид Repository.visibility
  // на CreateRepository, когда явное visibility не задано (mutable через Update,
  // дефолт PRIVATE / fail-safe). Переход default_repository_visibility→PUBLIC требует registry
  // admin (D-6: любой путь к PUBLIC — admin-gated). Смена НЕ перекрашивает
  // существующие repo (per-repo Repository.visibility остаётся authoritative).
  Visibility default_repository_visibility = 9;
}

// NamespaceStatus — терминальность DELETING обязательна (forward-only delete):
// revert DELETING→ACTIVE запрещён, иначе partial-UNIQUE(project,name) конфликтует
// с re-Create нового ACTIVE того же (project,name).
enum NamespaceStatus {
  NAMESPACE_STATUS_UNSPECIFIED = 0;
  NAMESPACE_STATUS_ACTIVE = 1;
  NAMESPACE_STATUS_DELETING = 2;
}

// ArtifactType — тип OCI-артефакта образа, классифицированный по config.mediaType
// репрезентативного манифеста (и top-level mediaType для multi-arch index).
// Дискриминатор docker-образа от helm-чарта: оба несут одинаковый top-level
// manifest media-type, различие только в config.mediaType.
enum ArtifactType {
  ARTIFACT_TYPE_UNSPECIFIED = 0;  // не классифицирован (нет тегов / манифест непрочитан)
  ARTIFACT_TYPE_CONTAINER_IMAGE = 1;  // docker/OCI контейнерный образ (вкл. multi-arch index)
  ARTIFACT_TYPE_HELM_CHART = 2;  // Helm-чарт (config vnd.cncf.helm.config)
  ARTIFACT_TYPE_OTHER = 3;  // иной OCI-артефакт (SBOM/WASM/signature/…)
}

// Visibility — публичность репозитория (overlay-authoritative на Repository;
// сид-дефолт на Namespace.default_repository_visibility). Дефолт PRIVATE (fail-safe).
// PUBLIC ⟺ FGA-tuple `user:* v_get registry_repository:<reg>/<repo>` (anonymous
// pull через data-plane). ЛЮБОЙ путь, где принципал сам приводит ресурс к PUBLIC
// (per-repo flip, create-with-PUBLIC, default_repository_visibility→PUBLIC), требует registry
// admin (D-6). Аноним к PRIVATE|absent-repo → uniform 404 (public-ность НЕ
// existence-oracle).
enum Visibility {
  VISIBILITY_UNSPECIFIED = 0;  // не задано → наследует Namespace.default_repository_visibility
  PRIVATE = 1;  // приватный (дефолт) — только авторизованный v_get
  PUBLIC = 2;  // публичный — анонимный pull разрешён (user:* v_get tuple)
}

// Repository — OCI-репозиторий (образ) внутри namespace. Два ортогональных слоя
// над натуральным ключом `(namespace_id, name)` (D-1): (a) config-overlay —
// DB-owned строка `repository_configs` в kacho-registry, несёт tenant-intent
// (description/labels/visibility/created_at), переживает пустой repo (durable);
// (b) проекция из zot (source of truth = zot) — счётчики/размеры/типы/timestamps
// тегов (output-only, `°`). Публичный Repository = LEFT JOIN overlay+projection.
// Ephemeral-repo (проекция без overlay, register-on-first-push) несёт пустые
// overlay-поля (description=''/labels={}/visibility=PRIVATE/created_at пуст) и
// исчезает при опустошении; durable-repo (есть overlay) — survives-empty.
// Инфра-поля (zot namespace/bucket/host/числовой инфра-id) НИКОГДА не на публичной
// поверхности (security.md §Инфра-данные) — те только в Internal*/:9091.
// Per-repo authz object-type `registry_repository` (parent registry_registry).
message Repository {
  // ID реестра-владельца.
  string namespace_id = 1;

  // Имя репозитория внутри namespace (напр. "backend/api"). Immutable — смена
  // только через RenameRepository (не Update). Натуральный ключ (namespace_id, name).
  string name = 2;

  // Число тегов.
  int32 tag_count = 3;

  // Суммарный размер (байт) уникальных блобов репозитория.
  int64 size_bytes = 4;

  // Момент последнего push в репозиторий (last-pushed).
  google.protobuf.Timestamp updated_at = 5;

  // Output-only: доминирующий тип артефакта (первый из artifact_types) — для
  // обратной совместимости фильтра. Полный набор — в artifact_types.
  ArtifactType artifact_type = 6;

  // Output-only: НАБОР типов артефактов среди тегов репозитория. Репозиторий может
  // одновременно содержать контейнерные образы И helm-чарты (mixed) — тогда набор
  // несёт оба значения. Пустой набор — нет тегов / не классифицировано.
  repeated ArtifactType artifact_types = 11;

  // Output-only: момент последнего pull любого тега репозитория (last-pulled).
  // Нулевой timestamp — ни один тег ещё не скачивался.
  google.protobuf.Timestamp last_pulled_at = 12;

  // Output-only: суммарное число скачиваний тегов репозитория (zot download-count).
  int64 download_count = 13;

  // --- config-overlay (tenant-intent, DB-owned; пусто у ephemeral-repo) ---

  // Описание репозитория (overlay, mutable через UpdateRepository). Пусто, если
  // overlay-строки нет (ephemeral-repo — проекция без конфигурации).
  string description = 7;

  // Метки репозитория (overlay, mutable через UpdateRepository). Пусто у ephemeral.
  map<string, string> labels = 8;

  // Публичность (overlay-authoritative, дефолт PRIVATE — наследуется из
  // Namespace.default_repository_visibility на create; admin-gate на →PUBLIC, D-6). Ephemeral
  // repo несёт PRIVATE by default.
  Visibility visibility = 9;

  // Output-only: момент создания overlay-строки (durable-repo), truncate до секунд.
  // Пусто у ephemeral-repo (проекция без overlay — своей строки/created_at нет).
  google.protobuf.Timestamp created_at = 10;
}

// Tag — тегированный образ (манифест) в репозитории. Read-only проекция из zot.
message Tag {
  // ID реестра-владельца.
  string namespace_id = 1;

  // Имя репозитория.
  string repository = 2;

  // Тег (напр. "v1.2.0", "latest").
  string tag = 3;

  // Digest манифеста (sha256:...).
  string digest = 4;

  // Размер манифеста + слоёв (байт).
  int64 size_bytes = 5;

  // MediaType манифеста (OCI image / artifact / index).
  string media_type = 6;

  // Момент создания образа (из image-config, поле "created"). Пусто, если config
  // его не несёт (напр. минимальный образ) или артефакт не контейнерный (helm).
  google.protobuf.Timestamp created_at = 7;

  // Платформа образа "<os>/<arch>" (напр. "linux/amd64"); для multi-arch index —
  // "multi-arch"; для helm-чарта / неизвестного — пусто.
  string architecture = 8;

  // Output-only: момент последнего pull тега (last-pulled). Нулевой timestamp —
  // тег ещё не скачивался.
  google.protobuf.Timestamp last_pulled_at = 9;

  // Output-only: субъект последнего push (zot pushed-by), если известен.
  string pushed_by = 10;

  // Output-only: число скачиваний тега (zot download-count).
  int64 download_count = 11;
}

// Referrer — узел referrer-графа OCI (подпись / SBOM / аттестация / generic-
// артефакт), привязанный к subject-манифесту по его digest. Read-only проекция
// из zot (source of truth = zot; OCI `/v2/.../referrers/<digest>`). Якорь под
// будущие signing/scanning/SBOM под-фазы.
//
// Публичная поверхность несёт ТОЛЬКО tenant-intent + результат: НИ engine
// namespace/bucket/host, НИ scanner-engine-id, НИ blob-layout, НИ числовой
// инфра-id (security.md §Инфра-данные — те исключительно Internal*/:9091).
// Per-repo existence-hiding: unauthorized|absent repo → NOT_FOUND (как Repository).
message Referrer {
  // ID реестра-владельца.
  string namespace_id = 1;

  // Имя репозитория, к которому привязан referrer.
  string repository = 2;

  // Digest subject-манифеста, на который ссылается referrer (напр. "sha256:...").
  string subject_digest = 3;

  // Output-only: digest самого referrer-артефакта ("sha256:...").
  string digest = 4;

  // Output-only: OCI artifactType referrer'а (media-type facet — тип подписи /
  // SBOM / аттестации; server-side фильтруемый в ListReferrers).
  string artifact_type = 5;

  // Output-only: размер referrer-манифеста (байт).
  int64 size_bytes = 6;

  // Output-only: OCI-аннотации referrer-манифеста.
  map<string, string> annotations = 7;

  // Output-only: момент создания referrer-артефакта (truncate до секунд).
  google.protobuf.Timestamp created_at = 8;
}
