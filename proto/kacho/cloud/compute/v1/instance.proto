syntax = "proto3";

package kacho.cloud.compute.v1;

import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";
import "kacho/cloud/compute/v1/kek.proto";
import "kacho/cloud/compute/v1/application.proto";
import "kacho/cloud/compute/v1/hardware_generation.proto";
import "kacho/cloud/compute/v1/machine_type.proto";
import "kacho/cloud/compute/v1/maintenance.proto";
import "kacho/cloud/reference/reference.proto";

option go_package = "github.com/PRO-Robotech/kacho/pkg/api/kacho/cloud/compute/v1;computev1";

// An Instance resource (COMP-1 redesign). A flat control-plane record for a single
// compute workload. `instance_kind` is the strong first discriminator gating exactly
// one of `vm_spec`/`container_spec`; sizing flows through the single `machine_type_id`
// channel (raw ResourcesSpec/platform_id retired, ban #2); the OS enters through the
// single `boot_source{type,id}` channel with an imageKind discriminator (storage.image
// vs registry.image, B13). Infra-sensitive placement (host/host-group/scheduler) is
// NOT on this public projection (two-projection; security §infra-sensitive) — the
// Internal* infra projection is a follow-on (COMP-4).
message Instance {

  // COMP-1 YC-cruft retire (ban #2): the raw YC sizing/boot/placement surface is
  // removed from the public message. Field numbers AND names are reserved so they
  // can never be reused on the public wire. platform_id/resources → machine_type_id
  // (F2); scheduling_policy{preemptible}/gpu_settings/reserved_instance_pool_id/
  // application → gone; the old MetadataOptions{gce_*,aws_*} → vendor-agnostic
  // vm_spec.metadata_options (F9); placement_policy (HostAffinityRule{yc.*}) →
  // Internal* (COMP-4); bare string image (#34) + image_digest (#35) → boot_source
  // (F3); service_account_id (string, #18) → reference.Referrer service_account (B2, F4).
  reserved 8, 9, 17, 18, 20, 23, 26, 32, 33, 34, 35;
  reserved "platform_id", "resources", "scheduling_policy", "service_account_id",
    "placement_policy", "metadata_options", "gpu_settings",
    "reserved_instance_pool_id", "application", "image", "image_digest";

  // BREAKING (KAC contract-authz 2026-07-05): host_group_id (27) and host_id (28)
  // removed from the PUBLIC Instance projection. Dedicated-host / host-group
  // placement is infra-sensitive (maps a tenant instance to a physical host) and
  // MUST NOT be exposed on the public API — see workspace ban §"Инфра-чувствительные
  // данные" / §6. Field numbers AND names are reserved so they can never be reused.
  reserved 15, 25, 27, 28;
  reserved "host_group_id", "host_id";

  enum Status {
    STATUS_UNSPECIFIED = 0;

    // Instance is waiting for resources to be allocated.
    PROVISIONING = 1;

    // Instance is running normally.
    RUNNING = 2;

    // Instance is being stopped.
    STOPPING = 3;

    // Instance stopped.
    STOPPED = 4;

    // Instance is being started.
    STARTING = 5;

    // Instance is being restarted.
    RESTARTING = 6;

    // Instance is being updated.
    UPDATING = 7;

    // Instance encountered a problem and cannot operate.
    ERROR = 8;

    // Instance crashed and will be restarted automatically.
    CRASHED = 9;

    // Instance is being deleted.
    DELETING = 10;
  }

  // ID of the instance (canonical "ins-<base32>").
  string id = 1;

  // ID of the project that the instance belongs to.
  string project_id = 2;

  // The date and time when the instance was created (truncated to seconds on the wire).
  google.protobuf.Timestamp created_at = 3;

  // Name of the instance. 1-63 characters long.
  string name = 4;

  // Description of the instance. 0-256 characters long.
  string description = 5;

  // Resource labels as `key:value` pairs. Maximum of 64 per resource.
  map<string, string> labels = 6;

  // ID of the availability zone where the instance resides.
  string zone_id = 7;

  // Status of the instance. Rests at PROVISIONING after Create (durable; the launch
  // sagas + transition to RUNNING are a follow-on, COMP-2).
  Status status = 10;

  // Free-form metadata `key:value` pairs (returned only on the FULL view). Redesign
  // VM configuration moves to vm_spec.user_data; this stays for back-compat.
  map<string, string> metadata = 11;

  // Output-only launch mirrors — materialized by the COMP-2 attach sagas; empty in
  // COMP-1, which persists the durable record without materialize.
  AttachedDisk boot_disk = 12;
  repeated AttachedDisk secondary_disks = 13;
  repeated NetworkInterface network_interfaces = 14;
  repeated AttachedFilesystem filesystems = 21;
  repeated AttachedLocalDisk local_disks = 22;

  // A domain name of the instance. Output-only (server-derived).
  string fqdn = 16;

  // Legacy network/serial/maintenance/hardware surface (retained; not part of the
  // COMP-1 sizing/boot retire).
  NetworkSettings network_settings = 19;
  SerialPortSettings serial_port_settings = 24;
  MaintenancePolicy maintenance_policy = 29;
  google.protobuf.Duration maintenance_grace_period = 30;
  HardwareGeneration hardware_generation = 31;

  // Guaranteed CPU baseline per vCPU, in percent.
  //   0        = best-effort / burstable (no guarantee);
  //   1..100   = guaranteed percentage (CHECK 0..100).
  // Family-gated: applies only to STANDARD/COMPUTE/MEMORY; accepted-and-ignored for
  // GPU. Sizing is mutable only while the instance is STOPPED.
  int32 cpu_guarantee_percent = 36;

  // --- COMP-1 redesign (NET-NEW) ---

  // Strong first discriminator (F1): VM XOR CONTAINER. Immutable after Create.
  InstanceKind instance_kind = 37;

  // The single sizing channel (F2): canonical "mt-" slug. A stable name is accepted
  // on input (resolved in the project scope) and echoed here as the mt- slug.
  string machine_type_id = 38;

  // Output-only authoritative size mirror resolved from the MachineType catalog (F2).
  EffectiveResources effective_resources = 39;

  // The single OS entry (F3): {type,id} on input; name°/resolved_digest°/
  // materialized_volume° are output-only (resolve/materialize → COMP-2).
  BootSource boot_source = 40;

  // Opaque placement-group slug (COMP-1 passthrough; existence/coherence → COMP-3).
  string placement_group_id = 41;

  // Output-only human reason for the current status / a deferred change
  // ("takes effect on next boot").
  string status_reason = 42;

  // Service account used inside the instance (F4, B2): class-C graceful-dangling
  // reference.Referrer{type:"iam.service_account"}. Empty for public images.
  kacho.cloud.reference.Referrer service_account = 43;

  // kind-gated spec (F1): exactly one, matching instance_kind (spoken-exclusion XOR).
  oneof spec {
    // VM configuration (instance_kind = VM).
    VmSpec vm_spec = 44;
    // CONTAINER configuration (instance_kind = CONTAINER).
    ContainerSpec container_spec = 45;
  }
}

// InstanceKind — the strong first discriminator (F1). VM and CONTAINER have distinct
// lifecycles; the value gates exactly one nested spec and is immutable after Create.
enum InstanceKind {
  INSTANCE_KIND_UNSPECIFIED = 0;
  // Virtual machine: persistent OS from a storage.image, vm_spec.
  VM = 1;
  // Container job: ephemeral rootfs from a registry.image, container_spec.
  CONTAINER = 2;
}

// BootSource — the single OS entry (F3, B13). On INPUT only {type,id} are accepted;
// name°/resolved_digest°/materialized_volume° are output-only (the resolve/materialize
// saga is COMP-2). tag/digest live INSIDE id (one grammar for all inputs).
message BootSource {
  // Owner discriminator: "storage.image" (OS/disk image, VM) or "registry.image"
  // (OCI container image, CONTAINER). Routes the resolve to storage vs registry.
  string type = 1;

  // Image id with a tag or digest inside: "img-<base32>:<tag>" /
  // "img-<base32>@sha256:<hex>" (storage.image) or "repo/name:tag" (registry.image).
  string id = 2;

  // Output-only image display name at bind time (best-effort; filled by resolve, COMP-2).
  string name = 3;

  // Output-only immutable content digest that `id` was pinned to (filled by resolve, COMP-2).
  string resolved_digest = 4;

  // Output-only materialized boot Volume (filled by the boot-Volume saga, COMP-2).
  // Absent by construction for CONTAINER (ephemeral rootfs).
  MaterializedVolume materialized_volume = 5;

  // Form-only imageKind discriminator (B13): storage.image vs registry.image.
  ImageKind image_kind = 6;
}

// ImageKind — the formal imageKind discriminator (B13). Distinguishes a storage.image
// (OS/disk image) from a registry.image (OCI artifact) at the type level.
enum ImageKind {
  IMAGE_KIND_UNSPECIFIED = 0;
  // storage.image — an OS/disk image owned by kacho-storage (img-).
  STORAGE_IMAGE = 1;
  // registry.image — an OCI artifact owned by kacho-registry.
  OCI_IMAGE = 2;
}

// MaterializedVolume — output-only mirror of the boot Volume the OS was materialized
// onto (filled by the COMP-2 boot-Volume saga). Sizes are echoed in both bytes and GiB.
message MaterializedVolume {
  // ID of the storage Volume the boot image was materialized onto.
  string volume_id = 1;
  // Size in bytes.
  int64 size_bytes = 2;
  // Size in GiB (human-scale echo).
  int64 size_gib = 3;
  // Volume type the boot Volume was created with.
  string volume_type_id = 4;
}

// VmSpec — VM configuration (instance_kind = VM).
message VmSpec {
  // cloud-config / cloud-init user data.
  string user_data = 1;
  // Vendor-agnostic metadata-service options.
  MetadataOptions metadata_options = 2;
}

// ContainerSpec — CONTAINER job configuration (instance_kind = CONTAINER). A
// first-class job: SUCCEEDED/FAILED terminal states carry exit_code°.
message ContainerSpec {
  // Entry point.
  repeated string command = 1;
  // Arguments to the entry point.
  repeated string args = 2;
  // Environment variables.
  map<string, string> env = 3;
  // Working directory.
  string working_dir = 4;
  // Exposed ports.
  repeated ContainerPort ports = 5;
  // Restart policy (default NEVER).
  RestartPolicy restart_policy = 6;
  // Output-only exit code (set on a terminal SUCCEEDED/FAILED job; empty until then).
  int32 exit_code = 7;
}

// ContainerPort — a container port declaration.
message ContainerPort {
  // Container port number.
  int32 container_port = 1;
  // Protocol ("TCP"/"UDP"; empty = TCP).
  string protocol = 2;
}

// RestartPolicy — CONTAINER restart policy.
enum RestartPolicy {
  RESTART_POLICY_UNSPECIFIED = 0;
  // Never restart (default).
  NEVER = 1;
  // Restart on non-zero exit.
  ON_FAILURE = 2;
  // Always restart.
  ALWAYS = 3;
}

message Resources {
  // The amount of memory available to the instance, specified in bytes.
  int64 memory = 1;

  // The number of cores available to the instance.
  int64 cores = 2;

  // Baseline level of CPU performance with the ability to burst performance above that baseline level.
  // This field sets baseline performance for each core.
  int64 core_fraction = 3;

  // The number of GPUs available to the instance.
  int64 gpus = 4;
}

message AttachedDisk {
  enum Mode {
    MODE_UNSPECIFIED = 0;

    // Read-only access.
    READ_ONLY = 1;

    // Read/Write access.
    READ_WRITE = 2;
  }

  // Access mode to the Disk resource.
  Mode mode = 1;

  // Serial number that is reflected into the /dev/disk/by-id/ tree
  // of a Linux operating system running within the instance.
  //
  // This value can be used to reference the device for mounting, resizing, and so on, from within the instance.
  string device_name = 2;

  // Specifies whether the disk will be auto-deleted when the instance is deleted.
  bool auto_delete = 3;

  // ID of the storage Volume (`kacho.cloud.storage.v1.Volume`, prefix "vol") that
  // is attached to the instance. Cross-service reference (no FK); source of truth
  // is the storage `volume_attachments` row.
  string volume_id = 4;
}

message AttachedLocalDisk {
  // Size of the disk, specified in bytes.
  int64 size = 1;

  // Serial number that is reflected into the /dev/disk/by-id/ tree
  // of a Linux operating system running within the instance.
  //
  // This value can be used to reference the device for mounting, resizing, and so on, from within the instance.
  string device_name = 2;

  oneof type {
    // Local disk configuration
    PhysicalLocalDisk physical_local_disk = 3;
  }
}

message PhysicalLocalDisk {
  // Key encryption key info.
  KMSKey kms_key = 1;
}

message AttachedFilesystem {
  enum Mode {
    MODE_UNSPECIFIED = 0;

    // Read-only access.
    READ_ONLY = 1;

    // Read/Write access.
    READ_WRITE = 2;
  }

  // Access mode to the filesystem.
  Mode mode = 1;

  // Name of the device representing the filesystem on the instance.
  //
  // The name should be used for referencing the filesystem from within the instance
  // when it's being mounted, resized etc.
  string device_name = 2;

  // ID of the filesystem that is attached to the instance.
  string filesystem_id = 3;
}

message NetworkInterface {
  // The index of the network interface, will be generated by the server, 0,1,2... etc if not specified.
  string index = 1;

  // MAC address that is assigned to the network interface.
  string mac_address = 2;

  // ID of the subnet.
  string subnet_id = 3;

  // Primary IPv4 address that is assigned to the instance for this network interface.
  PrimaryAddress primary_v4_address = 4;

  // Primary IPv6 address that is assigned to the instance for this network interface. IPv6 not available yet.
  PrimaryAddress primary_v6_address = 5;

  // ID's of security groups attached to the interface
  repeated string security_group_ids = 6;

  // ID of the kacho-vpc NetworkInterface (NIC) resource backing this interface.
  // The NIC resource is the source of truth for the interface (address, security
  // groups, data-plane wiring); `subnet_id` / `primary_v4_address` above are a
  // read-only denormalised mirror of it. See vpc/v1/network_interface.proto.
  string nic_id = 7;
}

message PrimaryAddress {
  // An IPv4 internal network address that is assigned to the instance for this network interface.
  string address = 1;

  // One-to-one NAT configuration. If missing, NAT has not been set up.
  OneToOneNat one_to_one_nat = 2;

  // Internal DNS configuration
  repeated DnsRecord dns_records = 3;
}

message OneToOneNat {
  // An external IP address associated with this instance.
  string address = 1;

  // IP version for the external IP address.
  IpVersion ip_version = 2;

  // External DNS configuration
  repeated DnsRecord dns_records = 3;
}

message DnsRecord {
  // Name of the A/AAAA record as specified when creating the instance.
  // Note that if `fqdn' has no trailing '.', it is specified relative to the zone (@see dns_zone_id).
  string fqdn = 1;

  // DNS zone id for the record (optional, if not set, some private zone is used).
  string dns_zone_id = 2;

  // DNS record ttl (optional, if not set, a reasonable default is used.)
  int64 ttl = 3;

  // When true, indicates there is a corresponding auto-created PTR DNS record.
  bool ptr = 4;
}

enum IpVersion {
  IP_VERSION_UNSPECIFIED = 0;

  // IPv4 address, for example 192.0.2.235.
  IPV4 = 1;

  // IPv6 address. Not available yet.
  IPV6 = 2;
}

message SchedulingPolicy {
  // True for short-lived compute instances. For more information, see [Preemptible VMs](/docs/compute/concepts/preemptible-vm).
  bool preemptible = 1;
}

message NetworkSettings {
  enum Type {
    TYPE_UNSPECIFIED = 0;

    // Standard network.
    STANDARD = 1;

    // Software accelerated network.
    SOFTWARE_ACCELERATED = 2;

    // Hardware accelerated network (not available yet, reserved for future use).
    HARDWARE_ACCELERATED = 3;
  }

  // Network Type
  Type type = 1;
}

message GpuSettings {
  // Attach instance to specified GPU cluster.
  string gpu_cluster_id = 1;
}

message PlacementPolicy {
  // Affinity definition
  message HostAffinityRule {
    enum Operator {
      OPERATOR_UNSPECIFIED = 0;
      // Include action
      IN = 1;
      // Exclude action
      NOT_IN = 2;
    }

    // Affinity label or one of reserved values - 'yc.hostId', 'yc.hostGroupId'
    string key = 1;
    // Include or exclude action
    Operator op = 2;
    // Affinity value or host ID or host group ID
    repeated string values = 3;
  }

  // Placement group ID.
  string placement_group_id = 1;

  // List of affinity rules. Scheduler will attempt to allocate instances according to order of rules.
  repeated HostAffinityRule host_affinity_rules = 2;

  // Placement group partition
  int64 placement_group_partition = 3;
}

// MetadataOptions — vendor-agnostic metadata-service options (F9, ban #2). The
// brand-flavored gce_*/aws_* surface is retired (field numbers + names reserved so
// they can never be reused). Lives under vm_spec.
message MetadataOptions {
  reserved 1, 2, 3, 4, 5, 6;
  reserved "gce_http_endpoint", "aws_v1_http_endpoint", "gce_http_token",
    "aws_v1_http_token", "aws_v2_http_endpoint", "aws_v2_http_token";

  // Whether the instance metadata endpoint is reachable from the guest.
  MetadataOption metadata_endpoint = 7;

  // Whether a session token is required to read metadata (hardened IMDS-equivalent).
  bool metadata_token_required = 8;
}

enum MetadataOption {
  METADATA_OPTION_UNSPECIFIED = 0;

  // Option is enabled
  ENABLED = 1;

  // Option is disabled
  DISABLED = 2;
}

message SerialPortSettings {
  enum SSHAuthorization {
    SSH_AUTHORIZATION_UNSPECIFIED = 0;

    // Authentication and authorization using SSH keys in instance metadata
    INSTANCE_METADATA = 1;

    // Authentication and authorization using Oslogin service
    OS_LOGIN = 2;
  }

  // Authentication and authorization in serial console when using SSH protocol
  SSHAuthorization ssh_authorization = 1;
}
