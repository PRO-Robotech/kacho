message UpdateInstanceRequest {
  // COMP-1 YC-cruft retire (ban #2): raw sizing/boot input removed. Field numbers +
  // names reserved so they can never be reused. platform_id/resources_spec →
  // machine_type_id (STOPPED-gated); scheduling_policy/reserved_instance_pool_id/
  // application → gone; metadata_options (old) → vm_spec.metadata_options;
  // placement_policy → placement_group_id; image → Reinstall-only (rejected here).
  reserved 6, 7, 11, 12, 13, 17, 18, 19;
  reserved "platform_id", "resources_spec", "placement_policy", "scheduling_policy",
    "metadata_options", "reserved_instance_pool_id", "application", "image";

