syntax = "proto3";

package kacho.cloud.compute.v1;

import "google/api/annotations.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/field_mask.proto";
import "kacho/cloud/access/access.proto";
import "kacho/cloud/api/operation.proto";
import "kacho/cloud/compute/v1/application.proto";
import "kacho/cloud/compute/v1/disk.proto";
import "kacho/cloud/compute/v1/instance.proto";
import "kacho/cloud/compute/v1/maintenance.proto";
import "kacho/cloud/operation/operation.proto";
import "kacho/cloud/validation.proto";
import "kacho/iam/authz/v1/authz_options.proto";

option go_package = "github.com/PRO-Robotech/kacho/pkg/api/kacho/cloud/compute/v1;computev1";

// A set of methods for managing Instance resources.
service InstanceService {
  // Returns the specified Instance resource.
  //
  // To get the list of available Instance resources, make a [List] request.
  rpc Get(GetInstanceRequest) returns (Instance) {
    option (google.api.http) = {get: "/compute/v1/instances/{instance_id}"};
    option (kacho.iam.authz.v1.permission)        = "compute.instances.get";
    option (kacho.iam.authz.v1.required_relation) = "v_get";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "compute_instance"
      from_request_field: "instance_id"
    };
    option (kacho.iam.authz.v1.required_acr_min) = "1";
  }

  // Retrieves the list of Instance resources in the specified folder.
  rpc List(ListInstancesRequest) returns (ListInstancesResponse) {
    option (google.api.http) = {get: "/compute/v1/instances"};
    option (kacho.iam.authz.v1.permission)        = "compute.instanceses.list";
    option (kacho.iam.authz.v1.required_relation) = "v_list";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "project"
      from_request_field: "project_id"
    };
    option (kacho.iam.authz.v1.required_acr_min) = "1";
  }

  // Creates an instance in the specified folder.
  // Method starts an asynchronous operation that can be cancelled while it is in progress.
  rpc Create(CreateInstanceRequest) returns (operation.Operation) {
    option (google.api.http) = {
      post: "/compute/v1/instances"
      body: "*"
    };
    option (kacho.cloud.api.operation) = {
      metadata: "CreateInstanceMetadata"
      response: "Instance"
    };
    option (kacho.iam.authz.v1.permission)        = "compute.instances.create";
    option (kacho.iam.authz.v1.required_relation) = "editor";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "project"
      from_request_field: "project_id"
    };
    option (kacho.iam.authz.v1.required_acr_min) = "1";
  }

  // Updates the specified instance.
  rpc Update(UpdateInstanceRequest) returns (operation.Operation) {
    option (google.api.http) = {
      patch: "/compute/v1/instances/{instance_id}"
      body: "*"
    };
    option (kacho.cloud.api.operation) = {
      metadata: "UpdateInstanceMetadata"
      response: "Instance"
    };
    option (kacho.iam.authz.v1.permission)        = "compute.instances.update";
    option (kacho.iam.authz.v1.required_relation) = "v_update";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "compute_instance"
      from_request_field: "instance_id"
    };
    option (kacho.iam.authz.v1.required_acr_min) = "1";
  }

  // Deletes the specified instance.
  rpc Delete(DeleteInstanceRequest) returns (operation.Operation) {
    option (google.api.http) = {delete: "/compute/v1/instances/{instance_id}"};
    option (kacho.cloud.api.operation) = {
      metadata: "DeleteInstanceMetadata"
      response: "google.protobuf.Empty"
    };
    option (kacho.iam.authz.v1.permission)        = "compute.instances.delete";
    option (kacho.iam.authz.v1.required_relation) = "v_delete";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "compute_instance"
      from_request_field: "instance_id"
    };
    option (kacho.iam.authz.v1.required_acr_min) = "1";
  }

  // Updates the metadata of the specified instance. For more information on metadata, see [VM metadata](/docs/compute/concepts/vm-metadata).
  rpc UpdateMetadata(UpdateInstanceMetadataRequest) returns (operation.Operation) {
    option (google.api.http) = {
      post: "/compute/v1/instances/{instance_id}/updateMetadata"
      body: "*"
    };
    option (kacho.cloud.api.operation) = {
      metadata: "UpdateInstanceMetadataMetadata"
      response: "Instance"
    };
    option (kacho.iam.authz.v1.permission)        = "compute.instance_metadatas.updateMetadata";
    option (kacho.iam.authz.v1.required_relation) = "v_update";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "compute_instance"
      from_request_field: "instance_id"
    };
    option (kacho.iam.authz.v1.required_acr_min) = "1";
  }

  // Returns the serial port output of the specified Instance resource.
  rpc GetSerialPortOutput(GetInstanceSerialPortOutputRequest) returns (GetInstanceSerialPortOutputResponse) {
    option (google.api.http) = {get: "/compute/v1/instances/{instance_id}:serialPortOutput"};
    option (kacho.iam.authz.v1.permission)        = "compute.instance_serial_port_outputs.getSerialPortOutput";
    option (kacho.iam.authz.v1.required_relation) = "v_get";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "compute_instance"
      from_request_field: "instance_id"
    };
    option (kacho.iam.authz.v1.required_acr_min) = "1";
  }

  // Stops the running instance.
  //
  // You can start the instance later using the [InstanceService.Start] method.
  rpc Stop(StopInstanceRequest) returns (operation.Operation) {
    option (google.api.http) = {post: "/compute/v1/instances/{instance_id}:stop"};
    option (kacho.cloud.api.operation) = {
      metadata: "StopInstanceMetadata"
      response: "google.protobuf.Empty"
    };
    option (kacho.iam.authz.v1.permission)        = "compute.instances.stop";
    option (kacho.iam.authz.v1.required_relation) = "v_update";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "compute_instance"
      from_request_field: "instance_id"
    };
    option (kacho.iam.authz.v1.required_acr_min) = "1";
  }

  // Starts the stopped instance.
  rpc Start(StartInstanceRequest) returns (operation.Operation) {
    option (google.api.http) = {post: "/compute/v1/instances/{instance_id}:start"};
    option (kacho.cloud.api.operation) = {
      metadata: "StartInstanceMetadata"
      response: "Instance"
    };
    option (kacho.iam.authz.v1.permission)        = "compute.instances.start";
    option (kacho.iam.authz.v1.required_relation) = "v_update";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "compute_instance"
      from_request_field: "instance_id"
    };
    option (kacho.iam.authz.v1.required_acr_min) = "1";
  }

  // Restarts the running instance.
  rpc Restart(RestartInstanceRequest) returns (operation.Operation) {
    option (google.api.http) = {post: "/compute/v1/instances/{instance_id}:restart"};
    option (kacho.cloud.api.operation) = {
      metadata: "RestartInstanceMetadata"
      response: "google.protobuf.Empty"
    };
    option (kacho.iam.authz.v1.permission)        = "compute.instances.restart";
    option (kacho.iam.authz.v1.required_relation) = "v_update";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "compute_instance"
      from_request_field: "instance_id"
    };
    option (kacho.iam.authz.v1.required_acr_min) = "1";
  }

  // Attaches the disk to the instance.
  rpc AttachDisk(AttachInstanceDiskRequest) returns (operation.Operation) {
    option (google.api.http) = {
      post: "/compute/v1/instances/{instance_id}:attachDisk"
      body: "*"
    };
    option (kacho.cloud.api.operation) = {
      metadata: "AttachInstanceDiskMetadata"
      response: "Instance"
    };
    option (kacho.iam.authz.v1.permission)        = "compute.instance_disks.attachDisk";
    option (kacho.iam.authz.v1.required_relation) = "v_update";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "compute_instance"
      from_request_field: "instance_id"
    };
    option (kacho.iam.authz.v1.required_acr_min) = "1";
  }

  // Detaches the disk from the instance.
  rpc DetachDisk(DetachInstanceDiskRequest) returns (operation.Operation) {
    option (google.api.http) = {
      post: "/compute/v1/instances/{instance_id}:detachDisk"
      body: "*"
    };
    option (kacho.cloud.api.operation) = {
      metadata: "DetachInstanceDiskMetadata"
      response: "Instance"
    };
    option (kacho.iam.authz.v1.permission)        = "compute.instance_disks.detachDisk";
    option (kacho.iam.authz.v1.required_relation) = "v_update";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "compute_instance"
      from_request_field: "instance_id"
    };
    option (kacho.iam.authz.v1.required_acr_min) = "1";
  }

  // Attaches the filesystem to the instance.
  //
  // The instance and the filesystem must reside in the same availability zone.
  //
  // To use the instance with an attached filesystem, the latter must be mounted.
  // For details, see [documentation](/docs/compute/operations/filesystem/attach-to-vm).
  rpc AttachFilesystem(AttachInstanceFilesystemRequest) returns (operation.Operation) {
    option (google.api.http) = {
      post: "/compute/v1/instances/{instance_id}:attachFilesystem"
      body: "*"
    };
    option (kacho.cloud.api.operation) = {
      metadata: "AttachInstanceFilesystemMetadata"
      response: "Instance"
    };
    option (kacho.iam.authz.v1.permission)        = "compute.instance_filesystems.attachFilesystem";
    option (kacho.iam.authz.v1.required_relation) = "v_update";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "compute_instance"
      from_request_field: "instance_id"
    };
    option (kacho.iam.authz.v1.required_acr_min) = "1";
  }

  // Detaches the filesystem from the instance.
  rpc DetachFilesystem(DetachInstanceFilesystemRequest) returns (operation.Operation) {
    option (google.api.http) = {
      post: "/compute/v1/instances/{instance_id}:detachFilesystem"
      body: "*"
    };
    option (kacho.cloud.api.operation) = {
      metadata: "DetachInstanceFilesystemMetadata"
      response: "Instance"
    };
    option (kacho.iam.authz.v1.permission)        = "compute.instance_filesystems.detachFilesystem";
    option (kacho.iam.authz.v1.required_relation) = "v_update";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "compute_instance"
      from_request_field: "instance_id"
    };
    option (kacho.iam.authz.v1.required_acr_min) = "1";
  }

  // Attaches an existing kacho-vpc NetworkInterface (NIC) to the instance by id.
  //
  // The NIC is a first-class kacho-vpc resource; this RPC binds it to the instance
  // (multiple NICs per instance are allowed). The instance must be `RUNNING` or
  // `STOPPED` ([Instance.status]). kacho-vpc owns the binding and enforces
  // zone-coherence (anycast/REGIONAL subnets excepted).
  rpc AttachNetworkInterface(AttachInstanceNetworkInterfaceRequest) returns (operation.Operation) {
    option (google.api.http) = {
      post: "/compute/v1/instances/{instance_id}:attachNetworkInterface"
      body: "*"
    };
    option (kacho.cloud.api.operation) = {
      metadata: "AttachInstanceNetworkInterfaceMetadata"
      response: "Instance"
    };
    option (kacho.iam.authz.v1.permission)        = "compute.instance_network_interfaces.attachNetworkInterface";
    option (kacho.iam.authz.v1.required_relation) = "v_update";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "compute_instance"
      from_request_field: "instance_id"
    };
    option (kacho.iam.authz.v1.required_acr_min) = "1";
  }

  // Detaches a network interface (NIC) from the instance, by nic_id or slot index.
  //
  // The instance must be `RUNNING` or `STOPPED` ([Instance.status]). The NIC itself
  // (a kacho-vpc resource) is not deleted; only the binding is released.
  rpc DetachNetworkInterface(DetachInstanceNetworkInterfaceRequest) returns (operation.Operation) {
    option (google.api.http) = {
      post: "/compute/v1/instances/{instance_id}:detachNetworkInterface"
      body: "*"
    };
    option (kacho.cloud.api.operation) = {
      metadata: "DetachInstanceNetworkInterfaceMetadata"
      response: "Instance"
    };
    option (kacho.iam.authz.v1.permission)        = "compute.instance_network_interfaces.detachNetworkInterface";
    option (kacho.iam.authz.v1.required_relation) = "v_update";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "compute_instance"
      from_request_field: "instance_id"
    };
    option (kacho.iam.authz.v1.required_acr_min) = "1";
  }

  // Enables One-to-one NAT on the network interface.
  rpc AddOneToOneNat(AddInstanceOneToOneNatRequest) returns (operation.Operation) {
    option (google.api.http) = {
      post: "/compute/v1/instances/{instance_id}/addOneToOneNat"
      body: "*"
    };
    option (kacho.cloud.api.operation) = {
      metadata: "AddInstanceOneToOneNatMetadata"
      response: "Instance"
    };
    option (kacho.iam.authz.v1.permission)        = "compute.instance_one_to_one_nats.addOneToOneNat";
    option (kacho.iam.authz.v1.required_relation) = "v_update";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "compute_instance"
      from_request_field: "instance_id"
    };
    option (kacho.iam.authz.v1.required_acr_min) = "1";
  }

  // Removes One-to-one NAT from the network interface.
  rpc RemoveOneToOneNat(RemoveInstanceOneToOneNatRequest) returns (operation.Operation) {
    option (google.api.http) = {
      post: "/compute/v1/instances/{instance_id}/removeOneToOneNat"
      body: "*"
    };
    option (kacho.cloud.api.operation) = {
      metadata: "RemoveInstanceOneToOneNatMetadata"
      response: "Instance"
    };
    option (kacho.iam.authz.v1.permission)        = "compute.instance_one_to_one_nats.removeOneToOneNat";
    option (kacho.iam.authz.v1.required_relation) = "v_update";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "compute_instance"
      from_request_field: "instance_id"
    };
    option (kacho.iam.authz.v1.required_acr_min) = "1";
  }

  // Updates the specified instance network interface.
  rpc UpdateNetworkInterface(UpdateInstanceNetworkInterfaceRequest) returns (operation.Operation) {
    option (google.api.http) = {
      patch: "/compute/v1/instances/{instance_id}/updateNetworkInterface"
      body: "*"
    };
    option (kacho.cloud.api.operation) = {
      metadata: "UpdateInstanceNetworkInterfaceMetadata"
      response: "Instance"
    };
    option (kacho.iam.authz.v1.permission)        = "compute.instance_network_interfaces.updateNetworkInterface";
    option (kacho.iam.authz.v1.required_relation) = "v_update";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "compute_instance"
      from_request_field: "instance_id"
    };
    option (kacho.iam.authz.v1.required_acr_min) = "1";
  }

  // Lists operations for the specified instance.
  rpc ListOperations(ListInstanceOperationsRequest) returns (ListInstanceOperationsResponse) {
    option (google.api.http) = {get: "/compute/v1/instances/{instance_id}/operations"};
    option (kacho.iam.authz.v1.permission)        = "compute.instance_operationses.listOperations";
    option (kacho.iam.authz.v1.required_relation) = "v_list";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "compute_instance"
      from_request_field: "instance_id"
    };
    option (kacho.iam.authz.v1.required_acr_min) = "1";
  }

  // Moves the specified instance to another availability zone
  //
  // Running instance will be restarted during this operation.
  rpc Relocate(RelocateInstanceRequest) returns (operation.Operation) {
    option (google.api.http) = {
      post: "/compute/v1/instances/{instance_id}:relocate"
      body: "*"
    };
    option (kacho.cloud.api.operation) = {
      metadata: "RelocateInstanceMetadata"
      response: "Instance"
    };
    option (kacho.iam.authz.v1.permission)        = "compute.instances.relocate";
    option (kacho.iam.authz.v1.required_relation) = "v_update";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "compute_instance"
      from_request_field: "instance_id"
    };
    option (kacho.iam.authz.v1.required_acr_min) = "1";
  }

  // maintenance

  rpc SimulateMaintenanceEvent(SimulateInstanceMaintenanceEventRequest) returns (operation.Operation) {
    option (google.api.http) = {
      post: "/compute/v1/instances/{instance_id}:simulateMaintenanceEvent"
      body: "*"
    };
    option (kacho.cloud.api.operation) = {
      metadata: "SimulateInstanceMaintenanceEventMetadata"
      response: "google.protobuf.Empty"
    };
    option (kacho.iam.authz.v1.permission)        = "compute.instance_maintenance_events.simulateMaintenanceEvent";
    option (kacho.iam.authz.v1.required_relation) = "v_update";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "compute_instance"
      from_request_field: "instance_id"
    };
    option (kacho.iam.authz.v1.required_acr_min) = "1";
  }

  // access

  // Lists access bindings for the instance.
  rpc ListAccessBindings(access.ListAccessBindingsRequest) returns (access.ListAccessBindingsResponse) {
    option (google.api.http) = {get: "/compute/v1/instances/{resource_id}:listAccessBindings"};
    option (kacho.iam.authz.v1.permission)        = "compute.access_bindingses.listAccessBindings";
    option (kacho.iam.authz.v1.required_relation) = "viewer";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "project"
      from_request_field: "*"
    };
    option (kacho.iam.authz.v1.required_acr_min) = "1";
  }

  // Sets access bindings for the instance.
  rpc SetAccessBindings(access.SetAccessBindingsRequest) returns (operation.Operation) {
    option (google.api.http) = {
      post: "/compute/v1/instances/{resource_id}:setAccessBindings"
      body: "*"
    };
    option (kacho.cloud.api.operation) = {
      metadata: "access.SetAccessBindingsMetadata"
      response: "access.AccessBindingsOperationResult"
    };
    option (kacho.iam.authz.v1.permission)        = "compute.access_bindingses.setAccessBindings";
    option (kacho.iam.authz.v1.required_relation) = "editor";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "project"
      from_request_field: "*"
    };
    option (kacho.iam.authz.v1.required_acr_min)  = "2";
  }

  // Updates access bindings for the instance.
  rpc UpdateAccessBindings(access.UpdateAccessBindingsRequest) returns (operation.Operation) {
    option (google.api.http) = {
      post: "/compute/v1/instances/{resource_id}:updateAccessBindings"
      body: "*"
    };
    option (kacho.cloud.api.operation) = {
      metadata: "access.UpdateAccessBindingsMetadata"
      response: "access.AccessBindingsOperationResult"
    };
    option (kacho.iam.authz.v1.permission)        = "compute.access_bindingses.updateAccessBindings";
    option (kacho.iam.authz.v1.required_relation) = "editor";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "project"
      from_request_field: "*"
    };
    option (kacho.iam.authz.v1.required_acr_min)  = "2";
  }
}

enum InstanceView {

  // Doesn't include the metadata of the instance in the server response.
  BASIC = 0;

  // Returns the metadata of the instance in the server response.
  FULL = 1;
}

message GetInstanceRequest {
  // ID of the Instance resource to return.
  // To get the instance ID, use a [InstanceService.List] request.
  string instance_id = 1 [
    (required) = true,
    (length) = "<=50"
  ];

  // Defines which information about the Instance resource should be returned in the server response.
  InstanceView view = 2;
}

message ListInstancesRequest {
  // ID of the Folder to list instances in.
  // To get the project ID, use a [kacho.cloud.iam.v1.ProjectService.List] request.
  string project_id = 1 [
    (required) = true,
    (length) = "<=50"
  ];

  // The maximum number of results per page to return. If the number of available
  // results is larger than [page_size],
  // the service returns a [ListInstancesResponse.next_page_token]
  // that can be used to get the next page of results in subsequent list requests.
  int64 page_size = 2 [(value) = "<=1000"];

  // Page token. To get the next page of results,
  // set [page_token] to the [ListInstancesResponse.next_page_token]
  // returned by a previous list request.
  string page_token = 3 [(length) = "<=100"];

  // A filter expression that filters resources listed in the response.
  // The expression consists of one or more conditions united by `AND` operator: `<condition1> [AND <condition2> [<...> AND <conditionN>]]`.
  //
  // Each condition has the form `<field> <operator> <value>`, where:
  // 1. `<field>` is the field name. Currently you can use filtering on these fields only:
  //     - `id`: ID of the instance.
  //     - `name`: name of the instance.
  //     - `created_at`: timestamp representing the moment in time the instance was created at.
  //     - `status`: [status](/docs/compute/concepts/vm-statuses) of the instance.
  //     - `zone_id`: ID of the [availability zone](/docs/overview/concepts/geo-scope) where the instance resides.
  //     - `platform_id`: ID of the hardware [platform configuration](/docs/compute/concepts/vm-platforms) the instance is created on.
  //     - `host_id`: ID of the [dedicated host](/docs/compute/concepts/dedicated-host) that the instance belongs to.
  // 2. `<operator>` is a logical operator, one of `=`, `!=`, `IN`, `NOT IN`.
  // 3. `<value>` represents a value.
  // String values should be written in double (`"`) or single (`'`) quotes. C-style escape sequences are supported (`\"` turns to `"`, `\'` to `'`, `\\` to backslash).
  string filter = 4 [(length) = "<=1000"];

  // By which column the listing should be ordered and in which direction,
  // format is "createdAt desc". "id asc" if omitted.
  // The default sorting order is ascending
  string order_by = 5 [(length) = "<=100"];
}

message ListInstancesResponse {
  // List of Instance resources.
  repeated Instance instances = 1;

  // This token allows you to get the next page of results for list requests. If the number of results
  // is larger than [ListInstancesRequest.page_size], use
  // the [next_page_token] as the value
  // for the [ListInstancesRequest.page_token] query parameter
  // in the next list request. Each subsequent list request will have its own
  // [next_page_token] to continue paging through the results.
  string next_page_token = 2;
}

message CreateInstanceRequest {
  // COMP-1 YC-cruft retire (ban #2): the raw YC sizing/boot input is removed from
  // the request. Field numbers + names reserved so they can never be reused.
  // platform_id/resources_spec → machine_type_id; scheduling_policy/gpu_settings/
  // reserved_instance_pool_id/application → gone; metadata_options (old) →
  // vm_spec.metadata_options; boot_disk_spec/secondary_disk_specs → boot_source /
  // secondary_volume_specs.
  reserved 6, 7, 9, 10, 13, 16, 19, 20, 24, 25, 26;
  reserved "platform_id", "resources_spec", "boot_disk_spec", "secondary_disk_specs",
    "scheduling_policy", "placement_policy", "metadata_options", "gpu_settings",
    "reserved_instance_pool_id", "application", "image";

  // ID of the project to create an instance in.
  string project_id = 1 [
    (required) = true,
    (length) = "<=50"
  ];

  // Name of the instance.
  string name = 2 [(pattern) = "|[a-z]([-_a-z0-9]{0,61}[a-z0-9])?"];

  // Description of the instance.
  string description = 3 [(length) = "<=256"];

  // Resource labels as `key:value` pairs.
  map<string, string> labels = 4 [
    (kacho.cloud.size) = "<=64",
    (length) = "<=63",
    (pattern) = "[-_./\\@0-9a-z]*",
    (map_key).length = "1-63",
    (map_key).pattern = "[a-z][-_./\\@0-9a-z]*"
  ];

  // ID of the availability zone where the instance resides.
  // To get a list of available zones, use the [kacho.cloud.geo.v1.ZoneService.List] request.
  string zone_id = 5 [
    (required) = true,
    (length) = "<=50"
  ];

  // The metadata `key:value` pairs assigned to this instance (legacy free-form).
  map<string, string> metadata = 8;

  // Network interfaces to attach (F6 launch skeleton). Either this OR
  // use_default_network must be set; content is structurally validated in COMP-1,
  // the IPAM/NIC materialize saga is COMP-2.
  repeated NetworkInterfaceSpec network_interface_specs = 11;

  // Host name for the instance (used to derive fqdn).
  string hostname = 12 [(pattern) = "|[a-z]([-_a-z0-9]{0,61}[a-z0-9])?"];

  // ID of the service account to use inside the instance (F4). Optional for public
  // images; echoed as the reference.Referrer on the Instance.
  string service_account_id = 14 [(length) = "<=50"];

  // Network settings (legacy).
  NetworkSettings network_settings = 15;

  // Filesystems to attach (legacy).
  repeated AttachedFilesystemSpec filesystem_specs = 17;

  // Local disks to attach (legacy).
  repeated AttachedLocalDiskSpec local_disk_specs = 18;

  // Behaviour on maintenance events (legacy).
  MaintenancePolicy maintenance_policy = 21;

  // Time between notification via metadata service and maintenance (legacy).
  google.protobuf.Duration maintenance_grace_period = 22 [(value) = "1s-24h"];

  // Serial port settings (legacy).
  SerialPortSettings serial_port_settings = 23;

  // --- COMP-1 redesign (NET-NEW) ---

  // Strong first discriminator (F1): VM XOR CONTAINER. Required; immutable after Create.
  InstanceKind instance_kind = 27;

  // The single sizing channel (F2): "mt-" slug OR a stable machine-type name. Required.
  string machine_type_id = 28 [(length) = "<=63"];

  // The single OS entry (F3): {type,id} only — output-only fields on input → 400.
  BootSource boot_source = 29;

  // kind-gated spec (F1): exactly one, matching instance_kind (spoken-exclusion XOR).
  oneof spec {
    // VM configuration (instance_kind = VM).
    VmSpec vm_spec = 30;
    // CONTAINER configuration (instance_kind = CONTAINER).
    ContainerSpec container_spec = 31;
  }

  // Guaranteed CPU baseline per vCPU, in percent (0..100; 0 = burstable). Family-gated.
  int32 cpu_guarantee_percent = 32;

  // SSH public keys to inject (F5/F6). Accepted + structurally validated in COMP-1.
  repeated string ssh_public_keys = 33;

  // Secondary Volumes to attach (F6 launch skeleton). Structurally validated in
  // COMP-1 (size_gib > 0, mount_path); materialize is COMP-2.
  repeated SecondaryVolumeSpec secondary_volume_specs = 34 [(size) = "<=8"];

  // Use the project-default subnet+SG instead of network_interface_specs (F6). One of
  // network_interface_specs / use_default_network is required.
  bool use_default_network = 35;

  // Request an external address (F5 unreachable-guard signal). A VM with neither
  // ssh_public_keys nor an external address is unreachable unless acknowledged.
  bool assign_external_address = 36;

  // Acknowledge that the VM will be RUNNING but unreachable (no ssh, no external),
  // lifting the unreachable-guard (F5). Not needed for CONTAINER.
  bool acknowledge_unreachable = 37;

  // Opaque placement-group slug (COMP-1 passthrough; existence/coherence → COMP-3).
  // Well-formed "plg-" slug OR empty; malformed → 400.
  string placement_group_id = 38 [(length) = "<=50"];
}

// SecondaryVolumeSpec — a secondary Volume to attach on launch (F6 skeleton).
// Structurally validated in COMP-1; the materialize saga is COMP-2.
message SecondaryVolumeSpec {
  // Size in GiB (human-scale; must be > 0).
  int64 size_gib = 1;
  // Volume type to create the Volume with.
  string volume_type_id = 2;
  // Guest mount path.
  string mount_path = 3;
  // Whether the Volume is deleted together with the instance.
  bool auto_delete = 4;
}

