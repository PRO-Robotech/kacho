syntax = "proto3";

package kacho.cloud.loadbalancer.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/PRO-Robotech/kacho/pkg/api/kacho/cloud/loadbalancer/v1;loadbalancerv1";

// Listener is a standalone first-class resource in kacho-nlb (divergence from
// upstream YC where Listener was an inline child of NetworkLoadBalancer).
// Reasons: independent FGA object type `nlb_listener`, independent VIP
// allocation lifecycle, per-Listener operations history, hierarchy tuple
// `nlb_listener#load_balancer@nlb_load_balancer:<lb_id>` (design §6.1).
message Listener {
  // Reserved for future Listener-level extensions (mirror policy, TLS opts,
  // PROXY-protocol variants beyond v2). Numbers 50-59 are claimed up front to
  // keep low numbers contiguous for hot-path fields.
  //
  // VIP переехал Listener→LoadBalancer: листенер больше не несёт собственного
  // адреса (один anycast VIP на LB на семейство). Сняты ip_version=12,
  // address_id=13, allocated_address=14, subnet_id=15 → reserved 12-15. Денорм
  // region_id=4 уходит (region нативно на load_balancers); тег и имя
  // резервируются ради wire-safety — переиспользование тега 4 с несовместимой
  // семантикой запрещено (иначе buf breaking непоследователен).
  reserved 4, 12, 13, 14, 15;
  reserved "region_id", "ip_version", "address_id", "allocated_address", "subnet_id";
  reserved 50 to 59;

  // Lifecycle status (design §2.3). Distinct from NetworkLoadBalancer.Status —
  // a Listener can be UPDATING while its LB stays ACTIVE.
  enum Status {
    STATUS_UNSPECIFIED = 0;
    CREATING = 1;
    ACTIVE = 2;
    UPDATING = 3;
    DELETING = 4;
  }

  // L4 protocol carried by the listener. Inlined here (and not on the
  // embedded-listener message in network_load_balancer.proto) because the
  // standalone Listener is now the source of truth.
  enum Protocol {
    PROTOCOL_UNSPECIFIED = 0;
    TCP = 1;
    UDP = 2;
  }

  // Substatus — NLB-1b EXPAND (additive, output-only, derived): whether the
  // listener resolves a target group. OK when target_group_id resolves to an
  // existing TargetGroup; MISCONFIGURED when it does not (no/dangling TG). A
  // pure server/client-derived value (not persisted).
  enum Substatus {
    SUBSTATUS_UNSPECIFIED = 0;
    OK = 1;
    MISCONFIGURED = 2;
  }

  // Address — NLB-1b F5 (MIGRATE): the managed VIP projection of a Listener
  // (output-only). The VIP anchor returns to the Listener as an immutable input
  // (CreateListenerRequest.address_id / subnet_id); its resolved form is echoed
  // here as a SINGLE projection — the immutable addressId is carried by `id`
  // (NOT duplicated as a separate flat field, NLB-1-27). A plain new message
  // (deliberately NOT the generic reference.Referrer): the VIP is nlb-managed,
  // graceful-dangling on the underlying vpc.Address.
  message Address {
    // Dotted shared-catalog type of the referent — always "vpc.address".
    string type = 1;
    // Resolved vpc Address id (the immutable addressId input, BYO or the
    // auto-allocated address id). Empty until the worker resolves the VIP.
    string id = 2;
    // Output-only best-effort mirror of the vpc Address name at bind time.
    string name = 3;
    // Resolved VIP IP string (output-only).
    string ip = 4;
    // Managed stable DNS name (CNAME-target over the migrating anycast IP),
    // output-only best-effort.
    string hostname = 5;
  }

  // ID of the listener (prefix `lst`).
  string id = 1;

  // ID of the project that owns the listener. Denormalized from the parent
  // load balancer; kept in sync via Move (design §4.7) so keyset pagination
  // by (project_id, id) can skip a join.
  string project_id = 2;

  // ID of the parent NetworkLoadBalancer (FK `listeners.load_balancer_id`).
  string load_balancer_id = 3;

  // Creation timestamp.
  google.protobuf.Timestamp created_at = 5;

  // Name of the listener. Unique per parent load balancer.
  string name = 6;

  // Description.
  string description = 7;

  // Resource labels.
  map<string, string> labels = 8;

  // L4 protocol of the listener.
  Protocol protocol = 9;

  // Port for incoming traffic.
  int64 port = 10;

  // Port on which targets receive forwarded traffic.
  int64 target_port = 11;

  // Enables PROXY-protocol v2 framing on accepted connections.
  bool proxy_protocol_v2 = 16;

  // Optional target group that receives traffic when no per-listener routing
  // rule matches. Soft reference to a target group attached to the parent LB.
  string default_target_group_id = 17;

  // Current lifecycle status.
  Status status = 18;

  // target_group_id — NLB-1b EXPAND (additive, output + Create/Update input).
  // The single (soon authoritative) target group the listener wires to. In
  // EXPAND it maps to the same underlying reference as default_target_group_id
  // (both coexist); the M:N pivot + FK-RESTRICT authority switch land in
  // NLB-1c/MIGRATE. LIVE-mutable (repoint).
  string target_group_id = 19;

  // resolved_backend_port — NLB-1b EXPAND (additive, output-only, derived).
  // Echo of the wired TargetGroup.port (NLB-1-19); 0 when no TG resolves. Not
  // the frontend `port`.
  int64 resolved_backend_port = 20;

  // substatus — NLB-1b EXPAND (additive, output-only, derived). OK when the
  // wired target group resolves, MISCONFIGURED otherwise.
  Substatus substatus = 21;

  // address — NLB-1b F5 (MIGRATE): managed VIP projection (output-only). Single
  // projection of the resolved VIP; the immutable addressId input is carried by
  // address.id (not duplicated as a flat field). Empty until the worker resolves
  // the VIP. The VIP anchor is set on Create via CreateListenerRequest.address_id
  // (BYO) or subnet_id (auto-alloc); both are immutable after Create (NLB-1-29).
  Address address = 22;
}