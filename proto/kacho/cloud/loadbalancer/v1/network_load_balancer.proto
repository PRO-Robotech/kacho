syntax = "proto3";

package kacho.cloud.loadbalancer.v1;

import "google/protobuf/timestamp.proto";
import "kacho/cloud/loadbalancer/v1/health_check.proto";
import "kacho/cloud/validation.proto";

option go_package = "github.com/PRO-Robotech/kacho/pkg/api/kacho/cloud/loadbalancer/v1;loadbalancerv1";

// IP version of the addresses that the load balancer works with.
enum IpVersion {
  IP_VERSION_UNSPECIFIED = 0;
  IPV4 = 1;
  IPV6 = 2;
}

// NetworkLoadBalancer — L4 regional load balancer.
//
// Плоский ресурс: источник VIP задаётся пофамильно на Create через VipSource
// oneof (subnet-auto / address-link / platform-public) и резолвится в связанный
// vpc Address (v4_address_id / v6_address_id, output-only). Сам VIP-IP лежит в
// связанном Address (vpc.AddressService.Get) — здесь не дублируется.
message NetworkLoadBalancer {
  // Reserved: 8/16/17 — vestigial. 12 — прежний inline `repeated Listener`
  // (Listener теперь standalone-ресурс). 15/18 — прежние per-zone-поля (placement-
  // leak, несовместимо с anycast). 19-23,26 — снятые tenant-поля прежней VIP-модели
  // (cross_zone_enabled/network_id/security_group_ids/address_v4/address_v6/
  // ip_families): network derived, SG на таргетах, VIP-источник теперь VipSource.
  // 30-39 — зарезервированы под будущий GlobalLoadBalancer composition-слой.
  reserved 8, 12, 15, 16, 17, 18;
  reserved 19, 20, 21, 22, 23, 26;
  reserved "listeners", "allow_zonal_shift", "disable_zone_statuses";
  reserved "network_id";
  reserved "address_v4", "address_v6", "ip_families";
  reserved 30 to 39;

  enum Status {
    STATUS_UNSPECIFIED = 0;
    CREATING = 1;
    STARTING = 2;
    ACTIVE = 3;
    STOPPING = 4;
    STOPPED = 5;
    DELETING = 6;
    // No active listeners or attached target groups; no health-checks issued,
    // no traffic forwarded.
    INACTIVE = 7;
    // NLB-1b F3 (NLB-1-18): enabled with >=1 listener but at least one listener
    // has no resolvable target group (misconfigured) — surfaced, not masked as
    // ACTIVE. Auto-recomputed from listener target-group resolution.
    DEGRADED = 8;
    // NLB-1b F3 (NLB-1-13): administratively disabled (admin_state=DISABLED);
    // configuration intact, not a failure state. Auto-recomputed from admin_state.
    DISABLED = 9;
  }

  enum Type {
    TYPE_UNSPECIFIED = 0;
    EXTERNAL = 1;
    INTERNAL = 2;
  }

  // PlacementType — размещение INTERNAL-LB (для EXTERNAL неприменим).
  // ZONAL — unicast-VIP в одной зоне (зональная подсеть/адрес); REGIONAL —
  // anycast-VIP, region-scoped (региональная подсеть/адрес, анонс active-active
  // из здоровых зон региона; announce — data plane).
  enum PlacementType {
    PLACEMENT_TYPE_UNSPECIFIED = 0;
    ZONAL = 1;
    REGIONAL = 2;
  }

  enum SessionAffinity {
    // Treated as the FIVE_TUPLE default when persisted.
    SESSION_AFFINITY_UNSPECIFIED = 0;
    // 5-tuple affinity (src ip+port, dst ip+port, proto).
    FIVE_TUPLE = 1;
    // Client-IP-only affinity (src ip).
    CLIENT_IP_ONLY = 2;
  }

  // AdminState — NLB-1b EXPAND (additive): desired administrative state, the
  // redesign replacement for the :start/:stop power-verbs. LIVE-mutable. In
  // EXPAND it is stored + echoed but does not yet gate status recompute (that
  // arrives with the 0013 status-trigger rewrite in NLB-1c). Legacy Start/Stop
  // RPCs are NOT removed in EXPAND.
  enum AdminState {
    ADMIN_STATE_UNSPECIFIED = 0;
    ADMIN_STATE_ENABLED = 1;
    ADMIN_STATE_DISABLED = 2;
  }

  // Placement — NLB-1b EXPAND (additive): merged placement discriminator that
  // fuses type + placement_type into one value. "external+zonal" is
  // inexpressible by construction. In EXPAND it is derived-consistent with the
  // legacy type/placement_type (which remain the authoritative inputs); the
  // authority switch + write-reject of type/placement_type land in NLB-1c.
  enum Placement {
    PLACEMENT_UNSPECIFIED = 0;
    EXTERNAL_REGIONAL = 1;
    INTERNAL_REGIONAL = 2;
    INTERNAL_ZONAL = 3;
  }

  string id = 1;

  // ID of the project the NLB belongs to.
  string project_id = 2;

  google.protobuf.Timestamp created_at = 3;
  string name = 4;
  string description = 5;
  map<string, string> labels = 6;

  string region_id = 7;

  Status status = 9;
  Type type = 10;
  SessionAffinity session_affinity = 11;

  // Inline attached target groups snapshot — DEPRECATED. The
  // `attached_target_groups` DB pivot (M:N managed via
  // AttachTargetGroup/DetachTargetGroup RPCs) is the source of truth.
  repeated AttachedTargetGroup attached_target_groups = 13 [deprecated = true];

  bool deletion_protection = 14;

  // v4_address_id / v6_address_id — output-only: связанный vpc Address (IPv4/IPv6),
  // в который резолвится VipSource. Пуст, пока status=CREATING (durable-handle до
  // bind). Один Address на семейство (single-VIP-per-LB, инвариант на DB-уровне:
  // кардинальность строки + CAS-attach). Сам VIP-IP — в Address (vpc.AddressService.Get).
  string v4_address_id = 24;
  string v6_address_id = 25;

  // placement_type — только для INTERNAL (immutable). Для EXTERNAL пуст.
  PlacementType placement_type = 27;

  // disabled_announce_zones — только для REGIONAL (mutable): deny-list зон, из
  // которых anycast-VIP НЕ анонсируется (drain). Пусто = анонс из всех здоровых зон.
  // Реальный withdraw — data plane; здесь только intent.
  repeated string disabled_announce_zones = 28;

  // placement — NLB-1b EXPAND (additive, output + Create input). Merged
  // placement discriminator; derived-consistent with type/placement_type.
  Placement placement = 40;

  // admin_state — NLB-1b EXPAND (additive, output + Create/Update input).
  // LIVE-mutable desired administrative state (ENABLED|DISABLED).
  AdminState admin_state = 41;

  // cross_zone_enabled — NLB-1b MIGRATE (revival, output + Create/Update input).
  // REGIONAL-only cross-zone load-balancing toggle; inapplicable to ZONAL placement
  // (a ZONAL LB serves a single zone) — setting it true on ZONAL → InvalidArgument.
  // LIVE-mutable for REGIONAL. REGIONAL/anycast is excluded from the zonal check by
  // construction.
  bool cross_zone_enabled = 42;

  // security_group_ids — NLB-1b MIGRATE (revival, output + Create/Update input).
  // vpc SecurityGroup refs firewalling the LB VIP (frontend access control), TEXT
  // ids without FK; same-project existence is peer-validated via
  // vpc.SecurityGroupService.Get (fail-closed UNAVAILABLE). LIVE-mutable (the set is
  // replaced whole). Valid only for INTERNAL placement (SGs are network-scoped).
  // No region-coherence check (SGs carry no zone/region).
  repeated string security_group_ids = 43;
}

// PublicVip — parameterless marker платформенного public-источника VIP
// (EXTERNAL auto-alloc). Underlying-зона деривится worker'ом из региона и скрыта
// от публичной поверхности (placement-leak не нарушается).
message PublicVip {}

// VipSource — per-family источник VIP LoadBalancer'а (design §3.3):
//   - address_id — линк существующего vpc Address (kind internal|external по type);
//   - subnet_id  — авто-аллокация свежего internal Address из подсети (INTERNAL);
//   - public     — платформенный public Address (EXTERNAL).
message VipSource {
  oneof source {
    string address_id = 1;
    string subnet_id = 2;
    PublicVip public = 3;
  }
}

// AttachedTargetGroup — yc-shim-compat snapshot of a single
// `attached_target_groups` pivot row. Source of truth is the DB pivot
// (design §5.2). Retained solely as the element type for
// NetworkLoadBalancer.attached_target_groups (deprecated field).
message AttachedTargetGroup {
  string target_group_id = 1 [
    (required) = true,
    (length) = "<=50"
  ];

  // Snapshot of HealthCheck configuration from the parent target group at
  // attach time. Source of truth is `target_groups.health_check` (JSONB).
  repeated HealthCheck health_checks = 2 [(size) = "1"];
}

// TargetState — per-target health snapshot returned by
// NetworkLoadBalancerService.GetTargetStates / TargetGroupService.GetTargetStates
// (design §4.6, computed sync). Not a stored entity.
message TargetState {
  enum Status {
    STATUS_UNSPECIFIED = 0;
    INITIAL = 1;
    HEALTHY = 2;
    UNHEALTHY = 3;
    DRAINING = 4;
    INACTIVE = 5;
  }

  string subnet_id = 1;
  string address = 2;
  Status status = 3;
  bool zone_shifted = 4;
}