syntax = "proto3";

package kacho.cloud.iam.v1;

import "google/api/annotations.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "kacho/cloud/api/operation.proto";
import "kacho/cloud/iam/v1/condition.proto";
import "kacho/cloud/operation/operation.proto";
import "kacho/cloud/validation.proto";
import "kacho/iam/authz/v1/authz_options.proto";

option go_package = "github.com/PRO-Robotech/kacho/pkg/api/kacho/cloud/iam/v1;iamv1";

// A set of methods for managing reusable Condition resources.
// Conditions are CEL-like expressions stored at folder scope and
// referenced from AccessBindings via `condition_ref.condition_id`.
//
// All mutations return `operation.Operation` (flat resources + Operations
// contract); reads are synchronous.
service ConditionsService {
  // Get — return a Condition by id.
  rpc Get (GetConditionRequest) returns (Condition) {
    option (google.api.http) = { get: "/iam/v1/conditions/{condition_id}" };
    option (kacho.iam.authz.v1.permission)        = "iam.conditions.get";
    option (kacho.iam.authz.v1.required_relation) = "viewer";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "iam_condition"
      from_request_field: "condition_id"
    };
    option (kacho.iam.authz.v1.required_acr_min) = "1";
  }

  // List — page Conditions in a folder.
  rpc List (ListConditionsRequest) returns (ListConditionsResponse) {
    option (google.api.http) = { get: "/iam/v1/conditions" };
    option (kacho.iam.authz.v1.permission)        = "iam.conditions.list";
    option (kacho.iam.authz.v1.required_relation) = "viewer";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "project"
      from_request_field: "folder_id"
    };
    option (kacho.iam.authz.v1.required_acr_min) = "1";
  }

  // Create — create a Condition. CEL `expression` is validated by the
  // FGA-engine (`WriteAuthorizationModel`); compilation failures are
  // surfaced via Operation.error.
  rpc Create (CreateConditionRequest) returns (operation.Operation) {
    option (google.api.http) = { post: "/iam/v1/conditions" body: "*" };
    option (kacho.cloud.api.operation) = {
      metadata: "CreateConditionMetadata"
      response: "Condition"
    };
    option (kacho.iam.authz.v1.permission)        = "iam.conditions.create";
    option (kacho.iam.authz.v1.required_relation) = "editor";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "project"
      from_request_field: "folder_id"
    };
    option (kacho.iam.authz.v1.required_acr_min) = "1";
  }

  // Update — update mutable fields (description, labels, expression,
  // parameters_schema). `name` is immutable after Create
  // (InvalidArgument if `update_mask` includes it).
  rpc Update (UpdateConditionRequest) returns (operation.Operation) {
    option (google.api.http) = { patch: "/iam/v1/conditions/{condition_id}" body: "*" };
    option (kacho.cloud.api.operation) = {
      metadata: "UpdateConditionMetadata"
      response: "Condition"
    };
    option (kacho.iam.authz.v1.permission)        = "iam.conditions.update";
    option (kacho.iam.authz.v1.required_relation) = "editor";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "iam_condition"
      from_request_field: "condition_id"
    };
    option (kacho.iam.authz.v1.required_acr_min)  = "2";
  }

  // Delete — delete a Condition. Returns FailedPrecondition if any
  // AccessBinding still references this condition (cleanup the bindings
  // first; cross-DB FK is not feasible — software refcheck is best-effort
  // and races are mitigated by tombstoning the row through `DELETING`
  // status).
  rpc Delete (DeleteConditionRequest) returns (operation.Operation) {
    option (google.api.http) = { delete: "/iam/v1/conditions/{condition_id}" };
    option (kacho.cloud.api.operation) = {
      metadata: "DeleteConditionMetadata"
      response: "google.protobuf.Empty"
    };
    option (kacho.iam.authz.v1.permission)        = "iam.conditions.delete";
    option (kacho.iam.authz.v1.required_relation) = "editor";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "iam_condition"
      from_request_field: "condition_id"
    };
    option (kacho.iam.authz.v1.required_acr_min)  = "2";
  }

  // Evaluate — admin/diagnostic endpoint: evaluate a Condition's CEL
  // expression against a supplied input context WITHOUT involving FGA. Used
  // by admin-UI to sanity-check a freshly-authored expression.
  //
  // No tuples are written; no AccessBinding state changes. The result is a
  // boolean (allow / deny) plus a free-form trace string (CEL evaluation
  // diagnostics — non-stable across releases, intended for human reading).
  rpc Evaluate (EvaluateConditionRequest) returns (EvaluateConditionResponse) {
    option (google.api.http) = { post: "/iam/v1/conditions/{condition_id}:evaluate" body: "*" };
    option (kacho.iam.authz.v1.permission)        = "iam.conditions.evaluate";
    option (kacho.iam.authz.v1.required_relation) = "viewer";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "iam_condition"
      from_request_field: "condition_id"
    };
    option (kacho.iam.authz.v1.required_acr_min) = "1";
  }
}

message GetConditionRequest {
  // ID of the Condition resource to return.
  string condition_id = 1 [(required) = true, (length) = "<=20", (pattern) = "cnd_[0-9a-z]+"];
}

message ListConditionsRequest {
  // Folder to enumerate Conditions in. Required (no cluster-wide list).
  string folder_id = 1 [(required) = true, (length) = "<=20"];

  // Page size; default 100, max 1000.
  int64 page_size = 2 [(value) = "<=1000"];

  // Page token.
  string page_token = 3 [(length) = "<=100"];

  // label/name filter (label=…, name=…). Optional; ≤ 1000 chars.
  string filter = 4 [(length) = "<=1000"];
}

message ListConditionsResponse {
  // Page of Conditions.
  repeated Condition conditions = 1;

  // Continuation token; empty when no more pages.
  string next_page_token = 2;
}

message CreateConditionRequest {
  // Folder to create the Condition in. Cross-service ref to kacho-iam
  // Project. Required.
  string folder_id = 1 [(required) = true, (length) = "<=20"];

  // Required human-readable name (UNIQUE within folder_id).
  string name = 2 [(required) = true, (length) = "1-63", (pattern) = "[a-z]([-a-z0-9]{0,61}[a-z0-9])?"];

  // Optional description.
  string description = 3 [(length) = "<=256"];

  // Optional labels.
  map<string, string> labels = 4;

  // CEL-like expression.
  string expression = 5 [(required) = true, (length) = "1-2048"];

  // Optional JSON Schema for params; structure validated at handler.
  google.protobuf.Struct parameters_schema = 6;
}

message UpdateConditionRequest {
  // ID of the Condition resource to update.
  string condition_id = 1 [(required) = true, (length) = "<=20", (pattern) = "cnd_[0-9a-z]+"];

  // Field mask. Acceptable paths: `description`, `labels`, `expression`,
  // `parameters_schema`. `name` and `folder_id` are immutable
  // (InvalidArgument if present in mask).
  google.protobuf.FieldMask update_mask = 2;

  // New description (when `update_mask` includes `description`).
  string description = 3 [(length) = "<=256"];

  // New labels (full-replace semantics when included in mask).
  map<string, string> labels = 4;

  // New CEL expression.
  string expression = 5 [(length) = "<=2048"];

  // New parameters_schema.
  google.protobuf.Struct parameters_schema = 6;
}

message DeleteConditionRequest {
  // ID of the Condition resource to delete.
  string condition_id = 1 [(required) = true, (length) = "<=20", (pattern) = "cnd_[0-9a-z]+"];
}

message EvaluateConditionRequest {
  // ID of the Condition whose expression is being evaluated.
  string condition_id = 1 [(required) = true, (length) = "<=20", (pattern) = "cnd_[0-9a-z]+"];

  // Per-evaluation context — the same keys that `corelib/authz` builds at
  // request time (`acr_value`, `amr_claims`, `current_time`, `mfa_at`,
  // `client_ip`, `device_attestation`, …). Stored as Struct so the wire
  // schema does not need to enumerate every key. `current_time` is taken
  // from this Struct if set; otherwise the server uses `now()`.
  google.protobuf.Struct context = 2 [(required) = true];

  // Optional override params (typically not used outside admin debugging —
  // production conditions take params from AccessBinding.condition_ref).
  google.protobuf.Struct params = 3;
}

message EvaluateConditionResponse {
  // True iff the expression evaluated to allow.
  bool allowed = 1;

  // Free-form trace string. Non-stable across releases.
  string trace = 2;

  // Timestamp at which the server evaluated the expression (truncated to
  // seconds).
  google.protobuf.Timestamp evaluated_at = 3;
}
