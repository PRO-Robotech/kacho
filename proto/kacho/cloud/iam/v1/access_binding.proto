syntax = "proto3";

package kacho.cloud.iam.v1;

import "google/protobuf/timestamp.proto";
import "kacho/cloud/iam/v1/builtin_condition.proto";

option go_package = "github.com/PRO-Robotech/kacho/pkg/api/kacho/cloud/iam/v1;iamv1";

// An AccessBinding resource. –°–≤—è–∑—ã–≤–∞–µ—Ç (subject_type, subject_id) —Å (role_id) –Ω–∞
// scope-anchor (scope_type, scope_id) ‚Äî redesign-2026 F7 rename (–±—ã–ª–æ
// resource_type/resource_id; —Å–ª–æ–≤–æ ¬´resource¬ª –æ—Ç–¥–∞–Ω–æ target'—É).
//
// NB: —ç—Ç–æ –∫–∞–Ω–æ–Ω–∏—á–µ—Å–∫–∏–π AccessBinding –∏–∑ kacho.cloud.iam.v1 ‚Äî –µ–¥–∏–Ω—Å—Ç–≤–µ–Ω–Ω—ã–π
// –∏—Å—Ç–æ—á–Ω–∏–∫ –∏—Å—Ç–∏–Ω—ã –¥–ª—è grant-–ø—Ä–∏–≤—è–∑–æ–∫ –¥–æ–º–µ–Ω–∞ IAM.
//
// Runtime-Check –≥—Ä–∞–Ω—Ç–æ–≤ –≤—ã–ø–æ–ª–Ω—è–µ—Ç—Å—è —á–µ—Ä–µ–∑ OpenFGA ReBAC
// (InternalIAMService.Check); tuple-sync ‚Äî —á–µ—Ä–µ–∑ fga_outbox drainer.
//
// –Ý–µ—Å—É—Ä—Å –Ω–µ—Å–µ—Ç lifecycle (`status`), Conditions overlay
// (`condition_id`), TTL (`expires_at`) –∏ audit-–º–µ—Ç–∞–¥–∞–Ω–Ω—ã–µ
// (`granted_by_user_id` / `revoked_at` / `revoked_by_user_id`). State machine
// (PENDING ‚Üí ACTIVE ‚Üí REVOKED, REVOKED terminal); transitions
// only via conditional CAS UPDATE.
//
// Constraint (DB-level): UNIQUE (subject_type, subject_id, role_id, resource_type,
// resource_id) ‚Äî –∏–¥–µ–º–ø–æ—Ç–µ–Ω—Ç–Ω—ã–π INSERT (–¥—É–±–ª—å –≤–æ–∑–≤—Ä–∞—â–∞–µ—Ç existing).
//
// Resource id prefix: `acb-`.
message AccessBinding {
  // Lifecycle status. PENDING is reserved for a JIT approval workflow;
  // ACTIVE is the steady state; REVOKED is terminal.
  enum Status {
    STATUS_UNSPECIFIED = 0;
    PENDING            = 1;
    ACTIVE             = 2;
    REVOKED            = 3;
  }

  // ID of the access binding.
  string id = 1;

  // –¢–∏–ø subject'–∞: "user" | "service_account" | "group".
  string subject_type = 2;

  // ID subject'–∞ (User id / ServiceAccount id / Group id).
  string subject_id = 3;

  // ID of the Role assigned to the subject.
  string role_id = 4;

  // Scope-anchor TYPE ‚Äî the hierarchy tier this binding anchors at, in dotted
  // form: `iam.cluster` | `iam.account` | `iam.project` (redesign-2026 F7). The
  // word "resource" is reserved for the `target` (F8); the anchor the grant applies
  // AT is the scope. The within-service storage keeps the bare kind
  // (cluster/account/project); the dotted form is the API projection. Immutable
  // after Create.
  string scope_type = 5;

  // Scope-anchor ID ‚Äî the anchor object id (`cluster_kacho_root` | `acc‚Ä¶` | `prj‚Ä¶`).
  // Immutable after Create.
  string scope_id = 6;

  // Creation timestamp.
  google.protobuf.Timestamp created_at = 7;

  // Lifecycle status. Backfill DEFAULT 'ACTIVE' for legacy rows.
  Status status = 8;

  // Optional FK to AccessBindingCondition (1:1) for ABAC overlay. Empty when
  // no conditions apply.
  //
  // Logical-oneof with `builtin_condition` (field 14): at most one
  // of the two MAY be set; setting both is InvalidArgument at the service
  // layer (the wire schema cannot express this as a proto3 oneof without
  // breaking existing field 9 callers).
  string condition_id = 9;

  // Optional hard-expiry timestamp. Unset = no TTL. When set, OPA
  // gates evaluation by `now() < expires_at`.
  google.protobuf.Timestamp expires_at = 10;

  // ID of the User who created this binding (audit). Required at INSERT time
  // for new bindings; NULL for legacy rows.
  string granted_by_user_id = 11;

  // Timestamp when the binding transitioned to REVOKED. Unset while not yet
  // revoked.
  google.protobuf.Timestamp revoked_at = 12;

  // ID of the User who revoked the binding (audit). Unset until revoked.
  string revoked_by_user_id = 13;

  // Optional reference to a `BuiltinCondition` catalog entry. Logical-oneof
  // with `condition_id` (field 9) ‚Äî at most one MAY
  // be set; setting both is InvalidArgument at the service layer.
  // `BUILTIN_CONDITION_UNSPECIFIED` means "no built-in condition is bound"
  // (the binding may still carry a `condition_id` instead, or be
  // unconditional).
  BuiltinCondition builtin_condition = 14;

  // Scope tier enum ‚Äî the level of the cluster ‚ñ∂ account ‚ñ∂ project hierarchy at
  // which a binding anchors. Retained as the projection type of
  // `SubjectPrivilege.scope`; the AccessBinding itself now carries the flattened
  // dotted `scope_type`/`scope_id` (redesign-2026 F7) instead of a separate tier
  // field.
  enum Scope {
    SCOPE_UNSPECIFIED = 0;
    CLUSTER           = 1;
    ACCOUNT           = 2;
    PROJECT           = 3;
  }

  // TOMBSTONE. Tag 15 (`Scope scope`) and tag 17 (`ScopeRef scope_ref`) held the
  // legacy triple-redundant scope projection; redesign-2026 F7 flattens them into
  // `scope_type` (tag 5, dotted) + `scope_id` (tag 6). Tags 15/17 and names
  // `scope`/`scope_ref` are RESERVED tombstones ‚Äî never reused (append-only).
  //
  // Tags 16/18 held the earlier `target`/`target_ref`/`selector` object-selection
  // machinery (dropped in a prior clean-cut); F8 REINTRODUCES `target` at a NEW tag
  // (`target = 22`) ‚Äî tags 16/18 stay tombstoned, never reused.
  reserved 15, 16, 17, 18;
  reserved "scope", "scope_ref", "target", "target_ref", "selector";

  // Multi-subject set. A binding may
  // grant the same role+scope to 1..32 subjects at once. Each subject yields an
  // INDEPENDENT FGA tuple-set and an independent emitted-tuple ledger lineage,
  // so per-subject revoke/audit never touches another subject's tuples (no
  // double-grant anomaly when, e.g., a user and a group containing that user
  // are both listed).
  //
  // Two-way read-projection with the legacy single `subject_type`/`subject_id`,
  // active during the back-compat window:
  //   - On Create the canonical input is `subjects[]` (preferred); when only the
  //     legacy single pair is set the server projects it to a one-element
  //     `subjects[]`. If BOTH `subjects[]` AND the legacy single pair are set
  //     and the single is NOT subjects[0], that is INVALID_ARGUMENT.
  //   - On read the server fills BOTH: `subjects[]` (full set) AND the legacy
  //     `subject_type`/`subject_id` (= the FIRST subject) so pre-existing clients
  //     do not break. The projection is output-only, not the source of truth.
  // A future cleanup drops the legacy single fields and the projection.
  repeated Subject subjects = 19;

  // Specifies if the binding is protected from deletion (modeled after
  // `vpc.address.deletion_protection`).
  // Default false. The owner auto-binding created on `Account.Create` sets this
  // to `true`, so the account creator cannot accidentally delete
  // their own owner grant. `DeleteAccessBinding` on a binding with
  // `deletion_protection=true` is rejected sync with FAILED_PRECONDITION
  // ("access binding <id> has deletion_protection enabled; clear it via Update
  // before Delete"), plus an atomic CAS-backstop `DELETE ‚Ä¶ WHERE
  // deletion_protection=false` against TOCTOU. To delete, clear the
  // flag first via `Update(update_mask=["deletion_protection"])`, then Delete.
  // Settable on input and populated on every read.
  bool deletion_protection = 20;

  // Tenant-facing –º–µ—Ç–∫–∏ —Å–∞–º–æ–≥–æ —Ä–µ—Å—É—Ä—Å–∞ AccessBinding. –ï–¥–∏–Ω–∞—è –º–æ–¥–µ–ª—å –≤–∏–¥–∏–º–æ—Å—Ç–∏
  // IAM-—Ä–µ—Å—É—Ä—Å–æ–≤: AccessBinding ‚Äî label-selectable, –∫–∞–∫ account/project;
  // ARM_LABELS-–≥—Ä–∞–Ω—Ç –Ω–∞ iam.accessBinding –º–∞—Ç–µ—Ä–∏–∞–ª–∏–∑—É–µ—Ç v_list –ø–æ —Å–æ–≤–ø–∞–¥–µ–Ω–∏—é
  // `labels @> matchLabels` (iam-direct same-DB), –∞ List —Ñ–∏–ª—å—Ç—Ä—É–µ—Ç —á–µ—Ä–µ–∑
  // `viewer ‚à™ v_list`. Mutable —á–µ—Ä–µ–∑ Update (`labels` –≤ update_mask).
  map<string, string> labels = 21;
}

// Subject is one grantee of an AccessBinding. `type` is the closed
// `SubjectType` (USER / SERVICE_ACCOUNT /
// GROUP); `id` is the subject id whose prefix matches the type (`usr‚Ä¶` /
// `sva‚Ä¶` / `grp‚Ä¶`). A GROUP subject grants the role to every member (userset),
// which `ExpandAccess` resolves to concrete principals and which, for
// admin/editor-tier roles, requires `requireGrantAuthority` on the scope
// (group-amplification guard).
message Subject {
  // Type of the subject (USER / SERVICE_ACCOUNT / GROUP).
  SubjectType type = 1;

  // Subject id (`usr‚Ä¶` | `sva‚Ä¶` | `grp‚Ä¶`), prefix-consistent with `type`.
  string id = 2;
}

// SubjectType is the closed set of AccessBinding grantee kinds.
// Value names are enum-prefixed (SUBJECT_TYPE_*) because proto3 enum values
// share the enclosing C++ scope (package level here) ‚Äî bare USER/
// SERVICE_ACCOUNT collide with ClusterGrantSubjectType and GROUP with
// Derivation.
enum SubjectType {
  SUBJECT_TYPE_UNSPECIFIED       = 0;
  SUBJECT_TYPE_USER              = 1;
  SUBJECT_TYPE_SERVICE_ACCOUNT   = 2;
  SUBJECT_TYPE_GROUP             = 3;
}

message CreateAccessBindingMetadata {
  // ID of the AccessBinding that is being created.
  string access_binding_id = 1;

  // ID of the owning Account (denormalized for account-scoped operations
  // listing ‚Äî AccountService.ListAllOperations). Non-first field so the
  // corelib resource_id extractor (first `_id`-suffix match) still picks
  // `access_binding_id`. Read by exact field name `account_id` by corelib.
  // Populated ONLY for account-scoped bindings (resource_type=="account");
  // project/cluster/cross-service bindings leave it empty
  // (SQL NULL ‚Äî excluded from the account-scoped list).
  string account_id = 2;
}

message DeleteAccessBindingMetadata {
  // ID of the AccessBinding that is being deleted.
  string access_binding_id = 1;

  // ID of the owning Account (denormalized; non-first, populated only for
  // account-scoped bindings ‚Äî see CreateAccessBindingMetadata).
  string account_id = 2;
}

message UpdateAccessBindingMetadata {
  // ID of the AccessBinding that is being updated.
  string access_binding_id = 1;

  // ID of the owning Account (denormalized; non-first, populated only for
  // account-scoped bindings ‚Äî see CreateAccessBindingMetadata).
  string account_id = 2;
}

message RevokeAccessBindingMetadata {
  // ID of the AccessBinding that is being soft-revoked (status ACTIVE‚ÜíREVOKED).
  string access_binding_id = 1;

  // ID of the owning Account (denormalized; non-first, populated only for
  // account-scoped bindings ‚Äî see CreateAccessBindingMetadata).
  string account_id = 2;
}
