syntax = "proto3";

package kacho.cloud.iam.v1;

import "google/api/annotations.proto";
import "google/protobuf/field_mask.proto";
import "kacho/cloud/api/operation.proto";
import "kacho/cloud/iam/v1/user.proto";
import "kacho/cloud/operation/operation.proto";
import "kacho/cloud/validation.proto";
import "kacho/iam/authz/v1/authz_options.proto";

option go_package = "github.com/PRO-Robotech/kacho/pkg/api/kacho/cloud/iam/v1;iamv1";

// A set of methods for managing User resources per-Account scope.
//
// Модель User (per-Account):
// - User per-Account: каждый User-row принадлежит ровно одному Account.
// - Invite RPC — admin Account'а приглашает email; backend создает PENDING-row.
// - Activate-on-first-login — при первом login через Kratos с матчингом email
//   PENDING → ACTIVE через InternalUserService.UpsertFromIdentity.
// - Create RPC — DEPRECATED; возвращает FailedPrecondition «Use Invite».
service UserService {
  // Returns the specified User resource.
  rpc Get (GetUserRequest) returns (User) {
    option (google.api.http) = { get: "/iam/v1/users/{user_id}" };
    option (kacho.iam.authz.v1.permission)        = "iam.users.get";
    option (kacho.iam.authz.v1.required_relation) = "v_get";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "iam_user"
      from_request_field: "user_id"
    };
    option (kacho.iam.authz.v1.required_acr_min) = "1";
  }

  // Retrieves the list of User resources scoped by Account.
  rpc List (ListUsersRequest) returns (ListUsersResponse) {
    option (google.api.http) = { get: "/iam/v1/users" };
    // User.List is default-deny via a SCOPE-FILTER, not
    // a PermissionDenied. The kacho-iam handler returns 200 with only the
    // Users in Accounts where the principal is a member (EMPTY list when the
    // caller is not a member of the requested Account — never 403). The
    // handler is the authoritative scope-filter gate, so the gateway
    // middleware exempts this RPC. Anonymous is still rejected by the IAM
    // anti-anonymous interceptor.
    option (kacho.iam.authz.v1.permission) = "<exempt>";
  }

  // Invite a user by email. Если user уже invited в этот Account
  // (idempotent re-invite) — Operation возвращается, AB опционально создается.
  // Permission: requires `admin` OR `editor` relation на account_id (OpenFGA Check).
  rpc Invite (InviteUserRequest) returns (operation.Operation) {
    option (google.api.http) = {
      post: "/iam/v1/users:invite"
      body: "*"
    };
    option (kacho.cloud.api.operation) = {
      metadata: "InviteUserMetadata"
      response: "User"
    };
    // CanInviteUsers == `editor` on the target Account.
    option (kacho.iam.authz.v1.permission)        = "iam.users.invite";
    option (kacho.iam.authz.v1.required_relation) = "editor";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "account"
      from_request_field: "account_id"
    };
    option (kacho.iam.authz.v1.required_acr_min) = "1";
  }

  // Updates the specified User. Единственное mutable-поле — `labels` (User —
  // label-selectable наравне с account/project). Identity-поля (`external_id`
  // — IdP `sub`, и иные IdP-projected identity-ключи) hard-immutable: их наличие
  // в update_mask → INVALID_ARGUMENT "<field> is immutable after User.Create".
  // Async — возвращает Operation (как Update всех iam-ресурсов).
  rpc Update (UpdateUserRequest) returns (operation.Operation) {
    option (google.api.http) = { patch: "/iam/v1/users/{user_id}" body: "*" };
    option (kacho.cloud.api.operation) = {
      metadata: "UpdateUserMetadata"
      response: "User"
    };
    option (kacho.iam.authz.v1.permission)        = "iam.users.update";
    option (kacho.iam.authz.v1.required_relation) = "v_update";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "iam_user"
      from_request_field: "user_id"
    };
    option (kacho.iam.authz.v1.required_acr_min) = "1";
  }

  // Deletes the specified user.
  rpc Delete (DeleteUserRequest) returns (operation.Operation) {
    option (google.api.http) = { delete: "/iam/v1/users/{user_id}" };
    option (kacho.cloud.api.operation) = {
      metadata: "DeleteUserMetadata"
      response: "google.protobuf.Empty"
    };
    option (kacho.iam.authz.v1.permission)        = "iam.users.delete";
    option (kacho.iam.authz.v1.required_relation) = "v_delete";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "iam_user"
      from_request_field: "user_id"
    };
    option (kacho.iam.authz.v1.required_acr_min) = "1";
  }

  // Lists operations for the specified user.
  rpc ListOperations (ListUserOperationsRequest) returns (ListUserOperationsResponse) {
    option (google.api.http) = { get: "/iam/v1/users/{user_id}/operations" };
    option (kacho.iam.authz.v1.permission)        = "iam.user_operationses.listOperations";
    option (kacho.iam.authz.v1.required_relation) = "v_list";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "iam_user"
      from_request_field: "user_id"
    };
    option (kacho.iam.authz.v1.required_acr_min) = "1";
  }
}

message GetUserRequest {
  // ID of the User resource to return.
  string user_id = 1 [(required) = true, (length) = "<=20"];
}

message ListUsersRequest {
  // Account-scope filter. Required для регулярного user (default-deny
  // фильтрует Users по Account). system-admin может оставить пустым (видит всех).
  string account_id = 4 [(length) = "<=20"];

  // The maximum number of results per page to return. Default value: 100.
  int64 page_size = 1 [(value) = "<=1000"];

  // Page token.
  string page_token = 2 [(length) = "<=100"];

  // A filter expression. Supports filtering by [User.email] / [User.external_id] /
  // [User.invite_status].
  string filter = 3 [(length) = "<=1000"];
}

message ListUsersResponse {
  // List of User resources.
  repeated User users = 1;

  // This token allows you to get the next page of results for list requests.
  string next_page_token = 2;
}

// Invite a user by email.
message InviteUserRequest {
  // Account where the user is invited. Required.
  string account_id = 1 [(required) = true, (length) = "<=20"];

  // Email of the invitee. Required, case-insensitive lookup.
  string email = 2 [(required) = true, (length) = "1..256"];

  // Display name to seed the User-row (optional; will be overwritten on first
  // login from Kratos identity traits).
  string display_name = 3 [(length) = "<=256"];

  // Optional: project_id + role_id pair to create AccessBinding atomically.
  // Если оба не заполнены — только invite-row создается (admin позже выдает роли
  // через AccessBindingService.Create).
  string project_id = 4 [(length) = "<=20"];
  string role_id = 5 [(length) = "<=20"];
}

message UpdateUserRequest {
  // Flat-форма request'а (паритет с UpdateRole/ServiceAccount/AccessBinding/...):
  // mutable-поля лежат на верхнем уровне, без вложенного ресурса.
  reserved 3;
  reserved "user";

  // ID of the User resource to update.
  string user_id = 1 [(required) = true, (length) = "<=20"];

  // Field mask. Allowed field: `labels` (единственное mutable-поле).
  // external_id и иные IdP-projected identity-поля immutable: их наличие в
  // update_mask → INVALID_ARGUMENT. Пустой mask → full-PATCH над mutable
  // `labels` (immutable-поля resource-пути silently игнорируются).
  google.protobuf.FieldMask update_mask = 2;

  // Tenant-facing метки самого ресурса User (mutable; `labels` в update_mask).
  // Единственное применяемое mutable-поле; identity-поля (`external_id` и иные
  // IdP-projected) hard-immutable и в request не переносятся. Аннотации
  // (size/key/value pattern) — паритет account/project/group/role request `labels`.
  map<string, string> labels = 4 [(kacho.cloud.size) = "<=64", (length) = "<=63", (pattern) = "[-_0-9a-z]*", (map_key).length = "1-63", (map_key).pattern = "[a-z][-_0-9a-z]*"];
}

message DeleteUserRequest {
  // ID of the User resource to delete.
  string user_id = 1 [(required) = true, (length) = "<=20"];
}

message ListUserOperationsRequest {
  // ID of the User resource to list operations for.
  string user_id = 1 [(required) = true, (length) = "<=20"];

  // The maximum number of results per page that should be returned.
  int64 page_size = 2 [(value) = "<=1000"];

  // Page token.
  string page_token = 3 [(length) = "<=100"];
}

message ListUserOperationsResponse {
  // List of operations for the specified user.
  repeated operation.Operation operations = 1;

  // This token allows you to get the next page of results for list requests.
  string next_page_token = 2;
}
