syntax = "proto3";

package kacho.cloud.iam.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/PRO-Robotech/kacho/pkg/api/kacho/cloud/iam/v1;iamv1";

// A Group resource. Collection of subjects (Users / ServiceAccounts) within an Account,
// to which AccessBinding can be assigned in bulk.
//
// Members хранятся в отдельной таблице group_members; добавляются/удаляются через
// GroupService.AddMember / RemoveMember.
//
// Resource id prefix: `grp-`.
message Group {
  // ID of the group.
  string id = 1;

  // ID of the Account that this Group belongs to.
  string account_id = 2;

  // Name of the group. Unique within an Account. 3-63 characters long.
  string name = 3;

  // Optional description of the group.
  string description = 4;

  // Resource labels as `key:value` pairs.
  map<string, string> labels = 5;

  // Creation timestamp.
  google.protobuf.Timestamp created_at = 6;
}

// A GroupMember represents membership of a subject (User / ServiceAccount) in a Group.
message GroupMember {
  // Тип member'а: "user" | "service_account".
  string member_type = 1;

  // ID member'а (User id или ServiceAccount id, в зависимости от member_type).
  string member_id = 2;

  // Когда member был добавлен в Group.
  google.protobuf.Timestamp added_at = 3;
}

message CreateGroupMetadata {
  // ID of the Group that is being created.
  string group_id = 1;

  // ID of the owning Account (denormalized for account-scoped operations
  // listing — AccountService.ListAllOperations). Non-first field so the
  // corelib resource_id extractor (first `_id`-suffix match) still picks
  // `group_id`. Read by exact field name `account_id` by corelib.
  string account_id = 2;
}

message UpdateGroupMetadata {
  // ID of the Group that is being updated.
  string group_id = 1;

  // ID of the owning Account (denormalized; non-first, see CreateGroupMetadata).
  string account_id = 2;
}

message DeleteGroupMetadata {
  // ID of the Group that is being deleted.
  string group_id = 1;

  // ID of the owning Account (denormalized; non-first, see CreateGroupMetadata).
  string account_id = 2;
}

message AddGroupMemberMetadata {
  // ID of the Group.
  string group_id = 1;

  // Тип добавленного member'а.
  string member_type = 2;

  // ID добавленного member'а.
  string member_id = 3;

  // ID of the owning Account (denormalized for account-scoped operations
  // listing — AccountService.ListAllOperations). Non-first field so the
  // corelib resource_id extractor (first `_id`-suffix match) still picks
  // `group_id`. Read by exact field name `account_id` by corelib.
  string account_id = 4;
}

message RemoveGroupMemberMetadata {
  // ID of the Group.
  string group_id = 1;

  // Тип удаленного member'а.
  string member_type = 2;

  // ID удаленного member'а.
  string member_id = 3;

  // ID of the owning Account (denormalized; non-first, see AddGroupMemberMetadata).
  string account_id = 4;
}
