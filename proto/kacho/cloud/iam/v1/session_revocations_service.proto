syntax = "proto3";

package kacho.cloud.iam.v1;

import "google/protobuf/timestamp.proto";
import "kacho/cloud/api/operation.proto";
import "kacho/cloud/iam/v1/session_revocation.proto";
import "kacho/cloud/operation/operation.proto";
import "kacho/cloud/validation.proto";
import "kacho/iam/authz/v1/authz_options.proto";

option go_package = "github.com/PRO-Robotech/kacho/pkg/api/kacho/cloud/iam/v1;iamv1";

// InternalSessionRevocationsService — cluster-internal RPCs for the session
// revocation hot-path (port 9091).
//
// `session_revocations` is queryable from api-gateway on
// every access-token verification: api-gateway maintains an in-memory cache
// pre-loaded via `ListByUser` + a LISTEN/NOTIFY subscription on
// `session_revoked`. `IsRevoked` is the slow-path fallback
// when a token's `jti` is not in cache (e.g. cold start window).
//
// Revocation sources:
//   - User-initiated logout (kacho-iam OAuth2 logout handler).
//   - Admin force-logout (InternalIAMService.ForceLogout — see
//     internal_iam_service.proto extensions).
//   - CAEP receiver (external IdP signal).
//   - Back-channel logout from Hydra (see back_channel_logout_service.proto).
//
// All revocations write to the same `session_revocations` table (PK =
// `token_jti`); LISTEN/NOTIFY fans out to every api-gateway pod ≤ 1s.
service InternalSessionRevocationsService {
  // Revoke — mark a token (and optionally cascade to all user's active tokens
  // via Hydra introspection) as revoked. Async — writes
  // `session_revocations` row + `audit_outbox` row in a single TX, then
  // returns Operation; worker NOTIFY-es `session_revoked` channel.
  //
  // Idempotent on `token_jti` (INSERT ... ON CONFLICT (token_jti) DO NOTHING).
  rpc Revoke (RevokeRequest) returns (operation.Operation) {
    option (kacho.cloud.api.operation) = {
      metadata: "RevokeMetadata"
      response: "SessionRevocation"
    };
    // Cluster-internal listener-protected; callers are
    // kacho-iam internal logout handler, ForceLogout admin RPC,
    // back-channel logout, CAEP receiver — all server-side.
    option (kacho.iam.authz.v1.permission) = "<exempt>";
  }

  // IsRevoked — sync hot-path lookup for api-gateway: `SELECT 1 FROM
  // session_revocations WHERE token_jti = $1`. Latency budget ≤ 5ms p95
  // (PK lookup on indexed table). Called only on cache miss.
  rpc IsRevoked (IsRevokedRequest) returns (IsRevokedResponse) {
    // Cluster-internal listener-protected; called by api-gateway itself
    // before authz can possibly run — chicken-and-egg means this MUST
    // bypass per-RPC authz.
    option (kacho.iam.authz.v1.permission) = "<exempt>";
  }

  // ListByUser — admin / audit endpoint: enumerate active revocations for a
  // user. Used by admin-UI to display "force-logged-out at" history and by
  // CAEP forwarder to bulk-emit events.
  rpc ListByUser (ListByUserRequest) returns (ListByUserResponse) {
    // Cluster-internal listener-protected; admin-UI authz gating happens at
    // the api-gateway internal mux layer.
    option (kacho.iam.authz.v1.permission) = "<exempt>";
  }
}

// RevokeRequest — input to InternalSessionRevocationsService.Revoke.
message RevokeRequest {
  // JWT `jti` of the token being revoked. Required when revoking a single
  // token; may be empty when `revoke_all_user_tokens=true` is set (then the
  // RPC enumerates active tokens via Hydra introspection and revokes each
  // individually).
  string token_jti = 1 [(length) = "<=64"];

  // User whose token is revoked. Required.
  string user_id = 2 [(required) = true, (length) = "<=20"];

  // Free-form reason — see SessionRevocation.reason for the canonical
  // vocabulary (`user-logout`, `password-change`, `caep-event`,
  // `admin-revoke`, `back-channel-logout`, `force-logout`).
  string reason = 3 [(required) = true, (length) = "1-128"];

  // After this timestamp the revocation row may be pruned (defaults to
  // `now() + 30d`). Should be ≥ original token's `exp` claim so the cache
  // stays authoritative for the token's lifetime.
  google.protobuf.Timestamp ttl_expires_at = 4;

  // When true, kacho-iam enumerates ALL active access tokens for the user
  // (Hydra introspection) and inserts a row per `jti`. Used by admin
  // ForceLogout and password-change flows.
  bool revoke_all_user_tokens = 5;
}

// RevokeMetadata — Operation.metadata payload.
message RevokeMetadata {
  // Number of token_jti rows that were newly inserted (excludes idempotent
  // no-ops on conflict).
  int32 revoked_count = 1;

  // User whose session(s) were revoked.
  string user_id = 2;
}

// IsRevokedRequest — sync hot-path lookup.
message IsRevokedRequest {
  // JWT `jti` to look up.
  string token_jti = 1 [(required) = true, (length) = "<=64"];
}

// IsRevokedResponse — sync hot-path response.
message IsRevokedResponse {
  // True if a non-expired row exists in `session_revocations`.
  bool revoked = 1;

  // When the revocation row was inserted.
  google.protobuf.Timestamp revoked_at = 2;

  // Reason recorded at insertion (echo of SessionRevocation.reason).
  string reason = 3;
}

// ListByUserRequest — admin/audit enumeration.
message ListByUserRequest {
  // User whose revocations to list.
  string user_id = 1 [(required) = true, (length) = "<=20"];

  // Page size (default 100, max 1000).
  int64 page_size = 2 [(value) = "<=1000"];

  // Page token.
  string page_token = 3 [(length) = "<=100"];
}

// ListByUserResponse — admin/audit page.
message ListByUserResponse {
  // Active revocation rows for the user (not yet pruned).
  repeated SessionRevocation revocations = 1;

  // Continuation token.
  string next_page_token = 2;
}
