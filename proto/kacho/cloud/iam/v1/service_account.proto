syntax = "proto3";

package kacho.cloud.iam.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/PRO-Robotech/kacho/pkg/api/kacho/cloud/iam/v1;iamv1";

// A ServiceAccount resource. Machine-identity (non-human) субъект внутри Account.
//
// Текущая поверхность — только CRUD без key-credentials. Key-creds RPC (CreateKey/ListKeys через Ory Hydra
// client_credentials, OAuth2 token endpoint) появятся позже.
//
// Добавлены optional `project_id` (project-scoped SAs in
// addition to legacy account-scoped) и `enabled` toggle.
//
// Resource id prefix: `sva-`.
message ServiceAccount {
  // ID of the service account.
  string id = 1;

  // ID of the Account that this ServiceAccount belongs to.
  string account_id = 2;

  // Name of the service account. Unique within an Account. 3-63 characters long.
  string name = 3;

  // Optional description of the service account.
  string description = 4;

  // Creation timestamp.
  google.protobuf.Timestamp created_at = 5;

  // Optional ID of the Project that owns this ServiceAccount. Empty =
  // account-scoped (legacy compatible).
  string project_id = 6;

  // Whether this ServiceAccount can authenticate. Defaults to true; toggle
  // false to disable without deletion.
  bool enabled = 7;

  // Tenant-facing метки. Единая модель видимости IAM-ресурсов: ServiceAccount —
  // label-selectable, как account/project; ARM_LABELS-грант на
  // iam.serviceAccount материализует v_list по совпадению `labels @>
  // matchLabels` (iam-direct same-DB), а List фильтрует через `viewer ∪ v_list`.
  // Mutable через Update (`labels` в update_mask).
  map<string, string> labels = 8;
}

message CreateServiceAccountMetadata {
  // ID of the ServiceAccount that is being created.
  string service_account_id = 1;

  // ID of the owning Account (denormalized for account-scoped operations
  // listing — AccountService.ListAllOperations). Non-first field so the
  // corelib resource_id extractor (first `_id`-suffix match) still picks
  // `service_account_id`. Read by exact field name `account_id` by corelib.
  string account_id = 2;
}

message UpdateServiceAccountMetadata {
  // ID of the ServiceAccount that is being updated.
  string service_account_id = 1;

  // ID of the owning Account (denormalized; non-first, see CreateServiceAccountMetadata).
  string account_id = 2;
}

message DeleteServiceAccountMetadata {
  // ID of the ServiceAccount that is being deleted.
  string service_account_id = 1;

  // ID of the owning Account (denormalized; non-first, see CreateServiceAccountMetadata).
  string account_id = 2;
}
