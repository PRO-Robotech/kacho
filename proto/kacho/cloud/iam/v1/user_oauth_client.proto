syntax = "proto3";

package kacho.cloud.iam.v1;

import "google/protobuf/timestamp.proto";
import "kacho/cloud/validation.proto";

option go_package = "github.com/PRO-Robotech/kacho/pkg/api/kacho/cloud/iam/v1;iamv1";

// UserOAuthClient — персональный access-токен пользователя (Hydra static
// client, поток private_key_jwt).
//
// kacho-iam генерирует пару ключей ECDSA P-256 на каждый токен, регистрирует
// публичный JWK в Hydra (`token_endpoint_auth_method = private_key_jwt`) и
// возвращает приватный PEM вызывающему ровно один раз. Hydra хранит только JWK;
// kacho-iam держит SPKI public PEM (для диагностики) плюс алгоритм. Секрет
// (private key) не хранится нигде.
//
// N:1 — у одного User может быть несколько токенов (в отличие от 1:1 SA-key до
// релакса). `hydra_client_id` UNIQUE по всем строкам.
//
// FK на `users(id) ON DELETE CASCADE` — при удалении пользователя его токены
// снимаются вместе с ним.
//
// Resource id prefix: `uoc`.
message UserOAuthClient {
  // ID строки-маппинга (он же key_id / JWK `kid`).
  // Конвенция Kachō: новый формат `uoc<17-crockford>` (ids.NewID, без underscore);
  // legacy `uoc_<body>` принимается для существующих строк (credential-id/JWK kid,
  // неизменяем). Оба формата валидны.
  string id = 1 [(required) = true, (length) = "<=21", (pattern) = "uoc(_[0-9a-z]+|[0-9a-hjkmnp-tv-z]{17})"];

  // ID пользователя, которому принадлежит токен.
  string user_id = 2 [(required) = true, (length) = "<=20"];

  // Hydra OAuth 2.0 client id, зарегистрированный в Ory Hydra. UNIQUE.
  string hydra_client_id = 3 [(required) = true, (length) = "1-128"];

  // Свободное описание (например `laptop CLI`). 0-256 символов.
  string description = 4 [(length) = "<=256"];

  // Опциональный срок действия. Не заполнен = бессрочный токен.
  google.protobuf.Timestamp expires_at = 5;

  // Время последнего успешного выпуска токена. Не заполнено до первого
  // использования.
  google.protobuf.Timestamp last_used_at = 6;

  // ID пользователя, создавшего токен (audit).
  string created_by_user_id = 7 [(required) = true, (length) = "<=20"];

  // Время создания.
  google.protobuf.Timestamp created_at = 8;

  // SPKI-encoded ECDSA P-256 публичный ключ, зарегистрированный в Hydra как JWK.
  string public_key_pem = 9;

  // JOSE alg зарегистрированного ключа. Всегда "ES256" для новых токенов.
  string key_algorithm = 10;

  // Tenant-facing имя токена (задаётся при выпуске, immutable). Пусто → в UI
  // показывается description/id. Человекочитаемая метка токена, не идентификатор.
  string name = 11 [(length) = "<=63"];

  // Пользовательские метки токена (задаются при выпуске, immutable).
  map<string, string> labels = 12;
}
