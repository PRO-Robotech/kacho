syntax = "proto3";

package kacho.cloud.iam.v1;

import "google/api/annotations.proto";
import "google/protobuf/field_mask.proto";
import "kacho/cloud/api/operation.proto";
import "kacho/cloud/iam/v1/group.proto";
import "kacho/cloud/operation/operation.proto";
import "kacho/cloud/validation.proto";
import "kacho/iam/authz/v1/authz_options.proto";

option go_package = "github.com/PRO-Robotech/kacho/pkg/api/kacho/cloud/iam/v1;iamv1";

// A set of methods for managing Group resources and their members.
service GroupService {
  // Returns the specified Group resource.
  rpc Get (GetGroupRequest) returns (Group) {
    option (google.api.http) = { get: "/iam/v1/groups/{group_id}" };
    option (kacho.iam.authz.v1.permission)        = "iam.groups.get";
    option (kacho.iam.authz.v1.required_relation) = "v_get";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "iam_group"
      from_request_field: "group_id"
    };
    option (kacho.iam.authz.v1.required_acr_min)  = "2";
  }

  // Retrieves the list of Group resources within an Account.
  //
  // Default-deny реализован SCOPE-FILTER'ом, а не PermissionDenied: in-handler
  // фильтр — авторитетный гейт видимости. Handler возвращает 200 и оставляет
  // только группы, видимые вызывающему через объединение FGA-отношений
  // viewer и v_list (пустой список, если ничего не видно — никогда 403).
  // Поэтому gateway-middleware exempt'ит этот RPC от per-RPC FGA-Check.
  // `<exempt>` снимает authz, но не аутентификацию — валидный JWT обязателен,
  // anonymous отвергается anti-anonymous интерсептором IAM. Без ACR
  // step-up-floor — паритет с остальными account-scoped List
  // (user / serviceAccount / role).
  rpc List (ListGroupsRequest) returns (ListGroupsResponse) {
    option (google.api.http) = { get: "/iam/v1/groups" };
    option (kacho.iam.authz.v1.permission) = "<exempt>";
  }

  // Creates a group within the specified account.
  rpc Create (CreateGroupRequest) returns (operation.Operation) {
    option (google.api.http) = { post: "/iam/v1/groups" body: "*" };
    option (kacho.cloud.api.operation) = {
      metadata: "CreateGroupMetadata"
      response: "Group"
    };
    option (kacho.iam.authz.v1.permission)        = "iam.groups.create";
    option (kacho.iam.authz.v1.required_relation) = "editor";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "account"
      from_request_field: "account_id"
    };
    option (kacho.iam.authz.v1.required_acr_min)  = "2";
  }

  // Updates the specified group.
  rpc Update (UpdateGroupRequest) returns (operation.Operation) {
    option (google.api.http) = { patch: "/iam/v1/groups/{group_id}" body: "*" };
    option (kacho.cloud.api.operation) = {
      metadata: "UpdateGroupMetadata"
      response: "Group"
    };
    option (kacho.iam.authz.v1.permission)        = "iam.groups.update";
    option (kacho.iam.authz.v1.required_relation) = "v_update";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "iam_group"
      from_request_field: "group_id"
    };
    option (kacho.iam.authz.v1.required_acr_min)  = "2";
  }

  // Deletes the specified group.
  rpc Delete (DeleteGroupRequest) returns (operation.Operation) {
    option (google.api.http) = { delete: "/iam/v1/groups/{group_id}" };
    option (kacho.cloud.api.operation) = {
      metadata: "DeleteGroupMetadata"
      response: "google.protobuf.Empty"
    };
    option (kacho.iam.authz.v1.permission)        = "iam.groups.delete";
    option (kacho.iam.authz.v1.required_relation) = "v_delete";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "iam_group"
      from_request_field: "group_id"
    };
    option (kacho.iam.authz.v1.required_acr_min)  = "2";
  }

  // Adds a member (User или ServiceAccount) to the group.
  // Идемпотентно: повторное добавление того же member'а — no-op.
  // Несуществующий member → FailedPrecondition.
  rpc AddMember (AddGroupMemberRequest) returns (operation.Operation) {
    option (google.api.http) = { post: "/iam/v1/groups/{group_id}:addMember" body: "*" };
    option (kacho.cloud.api.operation) = {
      metadata: "AddGroupMemberMetadata"
      response: "google.protobuf.Empty"
    };
    option (kacho.iam.authz.v1.permission)        = "iam.group_members.addMember";
    option (kacho.iam.authz.v1.required_relation) = "v_update";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "iam_group"
      from_request_field: "group_id"
    };
    option (kacho.iam.authz.v1.required_acr_min)  = "2";
  }

  // Removes a member from the group.
  // Идемпотентно: удаление несуществующего членства — no-op.
  rpc RemoveMember (RemoveGroupMemberRequest) returns (operation.Operation) {
    option (google.api.http) = { post: "/iam/v1/groups/{group_id}:removeMember" body: "*" };
    option (kacho.cloud.api.operation) = {
      metadata: "RemoveGroupMemberMetadata"
      response: "google.protobuf.Empty"
    };
    option (kacho.iam.authz.v1.permission)        = "iam.group_members.removeMember";
    option (kacho.iam.authz.v1.required_relation) = "v_update";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "iam_group"
      from_request_field: "group_id"
    };
    option (kacho.iam.authz.v1.required_acr_min)  = "2";
  }

  // Lists members of the specified group.
  rpc ListMembers (ListGroupMembersRequest) returns (ListGroupMembersResponse) {
    option (google.api.http) = { get: "/iam/v1/groups/{group_id}:listMembers" };
    option (kacho.iam.authz.v1.permission)        = "iam.group_memberses.listMembers";
    option (kacho.iam.authz.v1.required_relation) = "v_list";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "iam_group"
      from_request_field: "group_id"
    };
    option (kacho.iam.authz.v1.required_acr_min)  = "2";
  }

  // Lists operations for the specified group.
  rpc ListOperations (ListGroupOperationsRequest) returns (ListGroupOperationsResponse) {
    option (google.api.http) = { get: "/iam/v1/groups/{group_id}/operations" };
    option (kacho.iam.authz.v1.permission)        = "iam.group_operationses.listOperations";
    option (kacho.iam.authz.v1.required_relation) = "v_list";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "iam_group"
      from_request_field: "group_id"
    };
    option (kacho.iam.authz.v1.required_acr_min)  = "2";
  }
}

message GetGroupRequest {
  // ID of the Group resource to return.
  string group_id = 1 [(required) = true, (length) = "<=20"];
}

message ListGroupsRequest {
  // ID of the Account to list groups in.
  string account_id = 1 [(required) = true, (length) = "<=20"];

  // The maximum number of results per page to return. Default value: 100.
  int64 page_size = 2 [(value) = "<=1000"];

  // Page token.
  string page_token = 3 [(length) = "<=100"];

  // A filter expression. Supports filtering by [Group.name].
  string filter = 4 [(length) = "<=1000"];
}

message ListGroupsResponse {
  // List of Group resources.
  repeated Group groups = 1;

  // This token allows you to get the next page of results for list requests.
  string next_page_token = 2;
}

message CreateGroupRequest {
  // ID of the Account that the Group will belong to.
  string account_id = 1 [(required) = true, (length) = "<=20"];

  // Name of the group. 3-63 characters long, unique within an Account.
  string name = 2 [(required) = true, (length) = "3-63", (pattern) = "[a-z]([-a-z0-9]{0,61}[a-z0-9])?"];

  // Description of the group.
  string description = 3 [(length) = "<=256"];

  // Resource labels as `key:value` pairs.
  map<string, string> labels = 4 [(kacho.cloud.size) = "<=64", (length) = "<=63", (pattern) = "[-_0-9a-z]*", (map_key).length = "1-63", (map_key).pattern = "[a-z][-_0-9a-z]*"];
}

message UpdateGroupRequest {
  // ID of the Group resource to update.
  string group_id = 1 [(required) = true, (length) = "<=20"];

  // Field mask. Allowed fields: name, description, labels.
  google.protobuf.FieldMask update_mask = 2;

  // Name of the group.
  string name = 3 [(pattern) = "|[a-z]([-a-z0-9]{0,61}[a-z0-9])?"];

  // Description of the group.
  string description = 4 [(length) = "<=256"];

  // Resource labels as `key:value` pairs.
  map<string, string> labels = 5 [(kacho.cloud.size) = "<=64", (length) = "<=63", (pattern) = "[-_0-9a-z]*", (map_key).length = "1-63", (map_key).pattern = "[a-z][-_0-9a-z]*"];
}

message DeleteGroupRequest {
  // ID of the Group resource to delete.
  string group_id = 1 [(required) = true, (length) = "<=20"];
}

message AddGroupMemberRequest {
  // ID of the Group to add member to.
  string group_id = 1 [(required) = true, (length) = "<=20"];

  // Тип member'а: "user" | "service_account".
  string member_type = 2 [(required) = true, (length) = "<=32"];

  // ID member'а (User id или ServiceAccount id).
  string member_id = 3 [(required) = true, (length) = "<=20"];
}

message RemoveGroupMemberRequest {
  // ID of the Group to remove member from.
  string group_id = 1 [(required) = true, (length) = "<=20"];

  // Тип member'а.
  string member_type = 2 [(required) = true, (length) = "<=32"];

  // ID member'а.
  string member_id = 3 [(required) = true, (length) = "<=20"];
}

message ListGroupMembersRequest {
  // ID of the Group to list members for.
  string group_id = 1 [(required) = true, (length) = "<=20"];

  // The maximum number of results per page to return. Default value: 100.
  int64 page_size = 2 [(value) = "<=1000"];

  // Page token.
  string page_token = 3 [(length) = "<=100"];
}

message ListGroupMembersResponse {
  // List of members of the specified group.
  repeated GroupMember members = 1;

  // This token allows you to get the next page of results for list requests.
  string next_page_token = 2;
}

message ListGroupOperationsRequest {
  // ID of the Group resource to list operations for.
  string group_id = 1 [(required) = true, (length) = "<=20"];

  // The maximum number of results per page that should be returned.
  int64 page_size = 2 [(value) = "<=1000"];

  // Page token.
  string page_token = 3 [(length) = "<=100"];
}

message ListGroupOperationsResponse {
  // List of operations for the specified group.
  repeated operation.Operation operations = 1;

  // This token allows you to get the next page of results for list requests.
  string next_page_token = 2;
}
