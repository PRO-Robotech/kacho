syntax = "proto3";

package kacho.cloud.iam.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "kacho/cloud/api/operation.proto";
import "kacho/cloud/iam/v1/user_oauth_client.proto";
import "kacho/cloud/operation/operation.proto";
import "kacho/cloud/validation.proto";
import "kacho/iam/authz/v1/authz_options.proto";

option go_package = "github.com/PRO-Robotech/kacho/pkg/api/kacho/cloud/iam/v1;iamv1";

// UserTokenService — публичный CRUD для персональных access-токенов
// пользователя (private_key_jwt). Каждый токен маппится на Hydra OAuth 2.0
// client (`grant_types=[client_credentials]`, `token_endpoint_auth_method =
// private_key_jwt`); клиент сам подписывает `client_assertion` (ES256) и
// обменивает его в Hydra `/oauth2/token` на kacho-JWT, принципалом которого
// становится `user:<user_id>`.
//
// Приватный ключ (`private_key_pem`) возвращается РОВНО ОДИН РАЗ в ответе Issue
// и не хранится нигде — kacho-iam держит только публичную часть в
// `user_oauth_clients`; подпись проверяется по публичному ключу в OAuth2-обмене.
//
// authz: parent-scoped на `iam_user` (зеркалит SAKeyService на
// `iam_service_account`). Мутации требуют `v_update`, чтение — `v_list`;
// `required_acr_min="2"` (step-up) на ВСЕХ трёх RPC — выпуск/просмотр
// креденшала чувствителен.
service UserTokenService {
  rpc Issue (IssueUserTokenRequest) returns (operation.Operation) {
    option (google.api.http) = {
      post: "/iam/v1/users/{user_id}/tokens"
      body: "*"
    };
    option (kacho.cloud.api.operation) = {
      metadata: "IssueUserTokenMetadata"
      response: "IssueUserTokenResponse"
    };
    option (kacho.iam.authz.v1.permission)        = "iam.issue_user_tokens.issue";
    option (kacho.iam.authz.v1.required_relation) = "v_update";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "iam_user"
      from_request_field: "user_id"
    };
    option (kacho.iam.authz.v1.required_acr_min)  = "2";
  }

  rpc List (ListUserTokensRequest) returns (ListUserTokensResponse) {
    option (google.api.http) = {
      get: "/iam/v1/users/{user_id}/tokens"
    };
    option (kacho.iam.authz.v1.permission)        = "iam.user_tokens.list";
    option (kacho.iam.authz.v1.required_relation) = "v_list";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "iam_user"
      from_request_field: "user_id"
    };
    option (kacho.iam.authz.v1.required_acr_min)  = "2";
  }

  rpc Revoke (RevokeUserTokenRequest) returns (operation.Operation) {
    option (google.api.http) = {
      delete: "/iam/v1/users/{user_id}/tokens/{token_id}"
    };
    option (kacho.cloud.api.operation) = {
      metadata: "RevokeUserTokenMetadata"
      response: "RevokeUserTokenResponse"
    };
    option (kacho.iam.authz.v1.permission)        = "iam.revoke_user_tokens.revoke";
    option (kacho.iam.authz.v1.required_relation) = "v_update";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "iam_user"
      from_request_field: "user_id"
    };
    option (kacho.iam.authz.v1.required_acr_min)  = "2";
  }
}

message IssueUserTokenRequest {
  string user_id = 1 [(required) = true, (length) = "<=20"];
  string description = 2 [(length) = "<=256"];
  // Опциональный TTL в секундах; 0 → бессрочный.
  int64 ttl_seconds = 3 [(value) = "<=63072000"];
  string created_by_user_id = 4 [(required) = true, (length) = "<=20"];
  // Tenant-facing имя токена (человекочитаемая метка). Задаётся при выпуске, immutable.
  string name = 5 [(length) = "<=63"];
  // Пользовательские метки токена. Задаются при выпуске, immutable.
  map<string, string> labels = 6;
}

message IssueUserTokenResponse {
  UserOAuthClient token = 1;
  // Публичный OAuth client_id (зарегистрированный в Hydra).
  string client_id = 2;
  // PEM-encoded PKCS#8 ECDSA P-256 приватный ключ — ПОКАЗЫВАЕТСЯ ОДИН РАЗ;
  // невосстановим. Вызывающий подписывает им `client_assertion` (RFC 7521/7523)
  // в OAuth2 client_credentials-запросах к Hydra.
  string private_key_pem = 3;
  // PEM-encoded SPKI публичный ключ (информационно; Hydra держит каноническую
  // копию как JWK в метаданных зарегистрированного клиента).
  string public_key_pem = 4;
  // JOSE signing algorithm приватного ключа. Всегда "ES256".
  string algorithm = 5;
  // JWK `kid` зарегистрированного публичного ключа. Вызывающий ОБЯЗАН выставить
  // `kid`-header подписанных assertion'ов в это значение, чтобы Hydra выбрала
  // правильный ключ.
  string key_id = 6;
}

message IssueUserTokenMetadata {
  string user_id = 1;
  string key_id = 2;
  // Read by exact field name `account_id` by corelib operations (extractAccountID)
  // → операция попадает в account-scoped фид `/iam/operations`.
  string account_id = 3;
}

message ListUserTokensRequest {
  string user_id    = 1 [(required) = true, (length) = "<=20"];
  int64  page_size  = 2 [(value) = "<=1000"];
  string page_token = 3 [(length) = "<=100"];
}

message ListUserTokensResponse {
  repeated UserOAuthClient tokens = 1;
  string next_page_token = 2;
}

message RevokeUserTokenRequest {
  string user_id  = 1 [(required) = true, (length) = "<=20"];
  string token_id = 2 [(required) = true, (length) = "<=21"];
}

message RevokeUserTokenResponse {
  string token_id = 1;
  google.protobuf.Timestamp revoked_at = 2;
}

message RevokeUserTokenMetadata {
  string user_id = 1;
  string token_id = 2;
  // Read by exact field name `account_id` by corelib operations → revoke-операция
  // тоже попадает в account-scoped фид `/iam/operations`.
  string account_id = 3;
}
