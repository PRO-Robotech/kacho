syntax = "proto3";

package kacho.cloud.iam.v1;

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "kacho/cloud/api/operation.proto";
import "kacho/cloud/iam/v1/builtin_condition.proto";
import "kacho/cloud/operation/operation.proto";
import "kacho/cloud/validation.proto";
import "kacho/iam/authz/v1/authz_options.proto";

option go_package = "github.com/PRO-Robotech/kacho/pkg/api/kacho/cloud/iam/v1;iamv1";

// InternalAuthorizeService — cluster-internal RPCs for FGA store / model
// administration (port 9091). НЕ публикуется на external TLS
// listener.
//
// Callers:
//   - kacho-iam outbox-worker — `WriteTuples` on AccessBinding lifecycle
//     events (the worker IS the only legitimate `tuple_writer`).
//   - admin-UI / oncall tooling — `ReadTuples` / `GetFGAStoreInfo` for
//     debugging.
//   - openfga-bootstrap-job — `ReloadModel` after re-publishing the
//     OpenFGA Authorization Model v2.
//
// Tuple-format vocabulary matches OpenFGA upstream:
//   subject: "<type>:<id>"           (or "<type>:<id>#<relation>" for usersets)
//   relation: "<name>"               (model-defined)
//   object:  "<type>:<id>"
//   condition: optional, see `Tuple.condition`.
service InternalAuthorizeService {
  // WriteTuples — write / delete a batch of FGA tuples atomically with
  // respect to the FGA-engine (one transactional Write call). Used by the
  // AccessBinding outbox-worker.
  //
  // Returns Operation; the worker waits for done=true before declaring the
  // binding ACTIVE.
  rpc WriteTuples (WriteTuplesRequest) returns (operation.Operation) {
    option (kacho.cloud.api.operation) = {
      metadata: "WriteTuplesMetadata"
      response: "WriteTuplesResult"
    };
    // Cluster-internal listener-protected; callers are
    // server-side workers and admin tooling.
    option (kacho.iam.authz.v1.permission) = "<exempt>";
  }

  // ReadTuples — read tuples matching a filter. Used by audit tooling
  // ("show every tuple where subject=usr_alice") and by access
  // review materialisers.
  rpc ReadTuples (ReadTuplesRequest) returns (ReadTuplesResponse) {
    // Cluster-internal listener-protected.
    option (kacho.iam.authz.v1.permission) = "<exempt>";
  }

  // TOMBSTONE. The advertised-but-never-
  // implemented `RunRegoTest` RPC (evaluate an OPA Rego bundle against an
  // `input`) is REMOVED: it had zero consumers (not in the api-gateway internal
  // allowlist/mux, the server returned codes.Unimplemented) and its
  // `RunRegoTestRequest`/`RunRegoTestResponse` messages were dead. The method
  // name `RunRegoTest` is a tombstone — never re-add an RPC under that name.
  // Intentional breaking change (documented in buf.yaml).

  // ReloadModel — hot-reload the OpenFGA Authorization Model and the
  // condition catalogue without restarting kacho-iam. Used by the
  // `openfga-bootstrap-job` after writing a new model_id.
  //
  // Side effects:
  //   - in-memory `KACHO_OPENFGA_MODEL_ID` is updated to the new id.
  //   - the per-service Check-cache is invalidated (NOTIFY
  //     `kacho_iam_model` payload `{model_id}`).
  //   - in-flight Checks against the previous model are allowed to drain
  //     for ≤ 5s (graceful cutover).
  rpc ReloadModel (ReloadModelRequest) returns (ReloadModelResponse) {
    // Cluster-internal listener-protected.
    option (kacho.iam.authz.v1.permission) = "<exempt>";
  }

  // GetFGAStoreInfo — return current store_id, model_id, tuple_count and
  // model age. Used by admin-UI dashboard + monitoring exporters.
  rpc GetFGAStoreInfo (GetFGAStoreInfoRequest) returns (GetFGAStoreInfoResponse) {
    // Cluster-internal listener-protected.
    option (kacho.iam.authz.v1.permission) = "<exempt>";
  }
}

// Tuple — single OpenFGA tuple representation on the wire.
message Tuple {
  // FGA-style subject string. Required.
  string subject = 1 [(required) = true, (length) = "<=128"];

  // FGA relation name. Required.
  string relation = 2 [(required) = true, (length) = "<=32"];

  // FGA-style object string ("<type>:<id>"). Required.
  string object = 3 [(required) = true, (length) = "<=128"];

  // Optional Conditional tuple overlay. When set, the tuple is only valid
  // when the named condition evaluates to true at Check time.
  TupleCondition condition = 4;
}

// TupleCondition — either a Condition resource ref or a Builtin enum.
message TupleCondition {
  // The named condition. Exactly one must be set.
  oneof selector {
    // Reference to a `Condition` resource (folder-scoped). 1-20 chars.
    string condition_id = 1;

    // Reference to a built-in condition catalogued in
    // `BuiltinCondition`.
    BuiltinCondition builtin = 2;
  }

  // Pre-resolved CEL-condition context (passed to FGA `Write` so the
  // context travels with the tuple instead of being injected on every
  // Check). Optional — usually empty; populated for tuples where the
  // condition takes per-binding parameters
  // (e.g. `source_ip_in_range.allowed_cidrs`).
  google.protobuf.Struct context = 3;
}

message WriteTuplesRequest {
  // Tuples to insert. ≤ 100 entries.
  repeated Tuple writes = 1;

  // Tuples to delete. ≤ 100 entries.
  repeated Tuple deletes = 2;

  // Idempotency-key used to dedupe retried Write calls (the worker
  // includes the AccessBinding id; FGA-engine itself accepts duplicates
  // silently, but this helps trace logs).
  string idempotency_key = 3 [(length) = "<=64"];
}

message WriteTuplesMetadata {
  // Echo of idempotency_key for downstream observability.
  string idempotency_key = 1;
}

message WriteTuplesResult {
  // Number of tuples newly inserted (excludes idempotent no-ops).
  int32 inserted = 1;

  // Number of tuples deleted.
  int32 deleted = 2;
}

message ReadTuplesRequest {
  // Optional subject filter ("user:usr_alice" — case-insensitive prefix
  // match if the value ends with `*`).
  string subject_filter = 1 [(length) = "<=128"];

  // Optional relation filter (exact match).
  string relation_filter = 2 [(length) = "<=32"];

  // Optional object filter ("vpc_network:enp_xxx" or `vpc_network:*` for
  // type-only filter).
  string object_filter = 3 [(length) = "<=128"];

  // Page size; default 100, max 1000.
  int64 page_size = 4 [(value) = "<=1000"];

  // Page token.
  string page_token = 5 [(length) = "<=100"];
}

message ReadTuplesResponse {
  // Matched tuples (page).
  repeated Tuple tuples = 1;

  // Continuation token.
  string next_page_token = 2;
}

// TOMBSTONE: `RunRegoTestRequest` and
// `RunRegoTestResponse` were removed together with the unimplemented
// `RunRegoTest` RPC (zero consumers). Never re-add messages under these names.

message ReloadModelRequest {
  // New model id to pin. When empty, the server reads the
  // `openfga-model-id` Secret's `current` key.
  string authorization_model_id = 1 [(length) = "<=64"];
}

message ReloadModelResponse {
  // The model id now in effect.
  string authorization_model_id = 1;

  // When the reload completed.
  google.protobuf.Timestamp reloaded_at = 2;
}

message GetFGAStoreInfoRequest {}

message GetFGAStoreInfoResponse {
  // Current FGA store id.
  string store_id = 1;

  // Current (pinned) Authorization Model id.
  string authorization_model_id = 2;

  // Total number of tuples in the store at the moment of the call
  // (best-effort counter; can lag by a few seconds under heavy write
  // load).
  int64 tuple_count = 3;

  // When the current model was written to the FGA-engine.
  google.protobuf.Timestamp model_created_at = 4;

  // git-SHA of the kacho-iam build that wrote the current model (echoed
  // from the openfga-bootstrap-job).
  string model_build_sha = 5;

  // FGA-engine version string ("openfga/openfga:1.6.x").
  string fga_engine_version = 6;
}
