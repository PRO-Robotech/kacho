syntax = "proto3";

package kacho.cloud.iam.v1;

import "google/api/annotations.proto";
import "google/protobuf/field_mask.proto";
import "kacho/cloud/api/operation.proto";
import "kacho/cloud/iam/v1/role.proto";
import "kacho/cloud/operation/operation.proto";
import "kacho/cloud/validation.proto";
import "kacho/iam/authz/v1/authz_options.proto";

option go_package = "github.com/PRO-Robotech/kacho/pkg/api/kacho/cloud/iam/v1;iamv1";

// A set of methods for managing Role resources.
//
// Mutating RPC применимы только к custom roles. System roles read-only публично:
// Update/Delete на system-role вернет FailedPrecondition.
service RoleService {
  // Returns the specified Role resource.
  rpc Get (GetRoleRequest) returns (Role) {
    option (google.api.http) = { get: "/iam/v1/roles/{role_id}" };
    // The Role catalog is a tenant-wide reference list — any
    // authenticated principal may read it (no per-role FGA scope). Exempt at
    // the middleware; anonymous still rejected by the IAM interceptor.
    option (kacho.iam.authz.v1.permission) = "<exempt>";
  }

  // Retrieves the list of Role resources. Поддерживает фильтры:
  //   - is_system=true  → только system roles;
  //   - is_system=false → только custom roles;
  //   - account_id="..." → только custom roles указанного Account.
  rpc List (ListRolesRequest) returns (ListRolesResponse) {
    option (google.api.http) = { get: "/iam/v1/roles" };
    // Role catalog read — exempt (see Get above).
    option (kacho.iam.authz.v1.permission) = "<exempt>";
  }

  // Creates a custom role in the specified account.
  // Имя дублирующее system-role → AlreadyExists.
  rpc Create (CreateRoleRequest) returns (operation.Operation) {
    option (google.api.http) = { post: "/iam/v1/roles" body: "*" };
    option (kacho.cloud.api.operation) = {
      metadata: "CreateRoleMetadata"
      response: "Role"
    };
    option (kacho.iam.authz.v1.permission)        = "iam.roles.create";
    option (kacho.iam.authz.v1.required_relation) = "editor";
    // Scope = the role's home account (`editor@account:<account_id>`). For a
    // PROJECT-scoped role (account_id empty, project_id set) the extractor finds
    // no account_id and the gateway wildcard-defaults the scope; project-scoped
    // authz-scope refinement (editor@project:<project_id>) is a follow-up —
    // there is no single request field carrying the scope type, so the
    // `object_type_from_request_field` polymorphism used by AccessBinding.Create
    // does not directly apply.
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "account"
      from_request_field: "account_id"
    };
    option (kacho.iam.authz.v1.required_acr_min)  = "2";
  }

  // Updates the specified custom role.
  // System role → FailedPrecondition.
  rpc Update (UpdateRoleRequest) returns (operation.Operation) {
    option (google.api.http) = { patch: "/iam/v1/roles/{role_id}" body: "*" };
    option (kacho.cloud.api.operation) = {
      metadata: "UpdateRoleMetadata"
      response: "Role"
    };
    option (kacho.iam.authz.v1.permission)        = "iam.roles.update";
    option (kacho.iam.authz.v1.required_relation) = "v_update";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "iam_role"
      from_request_field: "role_id"
    };
    option (kacho.iam.authz.v1.required_acr_min)  = "2";
  }

  // Deletes the specified custom role.
  // System role → FailedPrecondition.
  // Custom role с активными AccessBinding'ами → FailedPrecondition.
  rpc Delete (DeleteRoleRequest) returns (operation.Operation) {
    option (google.api.http) = { delete: "/iam/v1/roles/{role_id}" };
    option (kacho.cloud.api.operation) = {
      metadata: "DeleteRoleMetadata"
      response: "google.protobuf.Empty"
    };
    option (kacho.iam.authz.v1.permission)        = "iam.roles.delete";
    option (kacho.iam.authz.v1.required_relation) = "v_delete";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "iam_role"
      from_request_field: "role_id"
    };
    option (kacho.iam.authz.v1.required_acr_min)  = "2";
  }

  // Lists operations for the specified role.
  rpc ListOperations (ListRoleOperationsRequest) returns (ListRoleOperationsResponse) {
    option (google.api.http) = { get: "/iam/v1/roles/{role_id}/operations" };
    option (kacho.iam.authz.v1.permission)        = "iam.role_operationses.listOperations";
    option (kacho.iam.authz.v1.required_relation) = "v_list";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "iam_role"
      from_request_field: "role_id"
    };
    option (kacho.iam.authz.v1.required_acr_min)  = "2";
  }
}

message GetRoleRequest {
  // ID of the Role resource to return.
  string role_id = 1 [(required) = true, (length) = "<=20"];
}

message ListRolesRequest {
  // The maximum number of results per page to return. Default value: 100.
  int64 page_size = 1 [(value) = "<=1000"];

  // Page token.
  string page_token = 2 [(length) = "<=100"];

  // A filter expression. Supports filtering by is_system / name.
  string filter = 3 [(length) = "<=1000"];

  // Scope the role catalog to a single Account.
  // When set, the response contains system roles (always visible, account_id is
  // empty) PLUS the custom roles owned by this Account — never another Account's
  // custom roles. Empty → unscoped catalog (subject to per-object visibility).
  string account_id = 4 [(length) = "<=20"];
}

message ListRolesResponse {
  // List of Role resources.
  repeated Role roles = 1;

  // This token allows you to get the next page of results for list requests.
  string next_page_token = 2;
}

message CreateRoleRequest {
  // Scope of the custom Role — EXACTLY ONE of account_id / project_id must be
  // set (request-level XOR; enforced by the service, since proto cannot express
  // it). account_id → an ACCOUNT-scoped role (assignable on its own account);
  // project_id → a PROJECT-scoped role (assignable on its own project,
  // project-anchor). System roles are seeded by migration, never via this RPC.
  //
  // No longer (required): a project-scoped role leaves account_id empty. The XOR
  // (account XOR project, both-empty and both-set → INVALID_ARGUMENT) is
  // enforced in the Role.Create use-case + DB CHECK `roles_scope_xor`.
  string account_id = 1 [(length) = "<=20"];

  // Name of the role. 1-41 characters long.
  string name = 2 [(required) = true, (length) = "1-41", (pattern) = "[a-z]([-a-z0-9_]{0,39}[a-z0-9])?"];

  // Description of the role.
  string description = 3 [(length) = "<=256"];

  // DEPRECATED: compiled-форма output-only. На входе
  // Create НЕ принимается (client-sent non-empty → INVALID_ARGUMENT). Tag
  // сохранен append-only; политика теперь авторится через `rules`.
  repeated string permissions = 4 [deprecated = true, (kacho.cloud.size) = "<=1024", (length) = "<=128"];

  // Authored-политика роли: 1..64 правил.
  // permissions[] на входе НЕ принимается — политика задается только здесь.
  repeated Rule rules = 5 [(kacho.cloud.size) = "1-64"];

  // ID of the Project that a PROJECT-scoped custom Role belongs to. Mutually
  // exclusive with account_id (XOR — see account_id). A project-scoped role is
  // assignable only on its OWN project (`project:<project_id>`, STRICT — no
  // hierarchy-down), unblocking the project-anchor materialization path.
  // The read-side Role message already carries project_id.
  string project_id = 6 [(length) = "<=20"];

  // Tenant-facing метки самого ресурса Role (НЕ путать с `Rule.match_labels`,
  // которое отбирает ОБЪЕКТЫ под грантом). Делают Role label-selectable
  // наравне с account/project. Аннотации (size/key/value pattern) — паритет
  // account/project/group request `labels`.
  map<string, string> labels = 7 [(kacho.cloud.size) = "<=64", (length) = "<=63", (pattern) = "[-_0-9a-z]*", (map_key).length = "1-63", (map_key).pattern = "[a-z][-_0-9a-z]*"];

  // Definition tier (redesign-2026 F4) — the CANONICAL scope input, superseding the
  // legacy account_id/project_id pair: `tier_type` dotted (`iam.account` |
  // `iam.project`; `iam.cluster` rejected — system roles are seeded, not API-created)
  // + `tier_id` the anchor id. Pre-Phase-0 `tier_type` is REQUIRED (prefix-derivation
  // is B3-gated). When set it takes precedence; the legacy account_id/project_id are
  // still accepted for back-compat when definition_tier is omitted.
  DefinitionTier definition_tier = 8;
}

message UpdateRoleRequest {
  // ID of the Role resource to update.
  string role_id = 1 [(required) = true, (length) = "<=20"];

  // Field mask. Allowed fields: name, description, rules, labels.
  // is_system / account_id / project_id / cluster_id / permissions (derived)
  // are immutable.
  google.protobuf.FieldMask update_mask = 2;

  // Name of the role.
  string name = 3 [(pattern) = "|[a-z]([-a-z0-9_]{0,39}[a-z0-9])?"];

  // Description of the role.
  string description = 4 [(length) = "<=256"];

  // DEPRECATED: compiled-форма derived/immutable. В
  // update_mask → INVALID_ARGUMENT. Tag сохранен append-only.
  repeated string permissions = 5 [deprecated = true, (kacho.cloud.size) = "<=1024", (length) = "<=128"];

  // Authored-политика роли: 1..64 правил.
  // Применяется когда update_mask содержит `rules`.
  repeated Rule rules = 6 [(kacho.cloud.size) = "1-64"];

  // Optimistic-concurrency token (xmin-backed). Обязателен, когда update_mask
  // содержит `rules` (OCC под конкуренцией); mismatch →
  // FAILED_PRECONDITION.
  string resource_version = 7;

  // Tenant-facing метки самого ресурса Role (mutable; `labels` в update_mask).
  // НЕ путать с `Rule.match_labels`. Аннотации (size/key/value pattern) —
  // паритет account/project/group request `labels`.
  map<string, string> labels = 8 [(kacho.cloud.size) = "<=64", (length) = "<=63", (pattern) = "[-_0-9a-z]*", (map_key).length = "1-63", (map_key).pattern = "[a-z][-_0-9a-z]*"];
}

message DeleteRoleRequest {
  // ID of the Role resource to delete.
  string role_id = 1 [(required) = true, (length) = "<=20"];
}

message ListRoleOperationsRequest {
  // ID of the Role resource to list operations for.
  string role_id = 1 [(required) = true, (length) = "<=20"];

  // The maximum number of results per page that should be returned.
  int64 page_size = 2 [(value) = "<=1000"];

  // Page token.
  string page_token = 3 [(length) = "<=100"];
}

message ListRoleOperationsResponse {
  // List of operations for the specified role.
  repeated operation.Operation operations = 1;

  // This token allows you to get the next page of results for list requests.
  string next_page_token = 2;
}
