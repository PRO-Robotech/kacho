syntax = "proto3";

package kacho.cloud.iam.v1;

import "google/protobuf/timestamp.proto";
import "kacho/cloud/validation.proto";

option go_package = "github.com/PRO-Robotech/kacho/pkg/api/kacho/cloud/iam/v1;iamv1";

// Subject type for cluster-admin grants.
enum ClusterGrantSubjectType {
  CLUSTER_GRANT_SUBJECT_TYPE_UNSPECIFIED = 0;
  USER = 1;
  SERVICE_ACCOUNT = 2;
}

// A ClusterAdminGrant resource — permanent grant of cluster-admin authority.
//
// Single source of truth for the OpenFGA tuple
// `cluster:cluster_kacho_root#system_admin@user:<id>` (or `@service_account:<id>`).
// Removed via soft revoke (CAEP push); hard delete is reserved for
// GDPR erasure. DB FK `ON DELETE RESTRICT` preserves audit trail.
//
// Resource id prefix: `cag`.
message ClusterAdminGrant {
  // ID of the grant.
  string id = 1 [(required) = true, (length) = "<=20", (pattern) = "cag_[0-9a-z]+"];

  // Type of the granted subject.
  ClusterGrantSubjectType subject_type = 2 [(required) = true];

  // ID of the subject (User id when subject_type=USER, ServiceAccount id when
  // subject_type=SERVICE_ACCOUNT). Cross-service ref — no DB FK.
  string subject_id = 3 [(required) = true, (length) = "<=20"];

  // ID of the User who granted this admin role. Recorded for audit.
  string granted_by_user_id = 4 [(required) = true, (length) = "<=20"];

  // Free-form rationale string. 0-512 characters. Recorded for audit /
  // periodic access review.
  string rationale = 5 [(length) = "<=512"];

  // Timestamp when the grant was created.
  google.protobuf.Timestamp granted_at = 6;
}
