syntax = "proto3";

package kacho.cloud.iam.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "kacho/cloud/api/operation.proto";
import "kacho/cloud/iam/v1/service_account_oauth_client.proto";
import "kacho/cloud/operation/operation.proto";
import "kacho/cloud/validation.proto";
import "kacho/iam/authz/v1/authz_options.proto";

option go_package = "github.com/PRO-Robotech/kacho/pkg/api/kacho/cloud/iam/v1;iamv1";

// SAKeyService — public-facing CRUD for static ServiceAccount OAuth keys
// (Class A workload identity). Each key maps to a Hydra OAuth 2.0 client
// registered with `grant_types=[client_credentials]`; external workloads
// authenticate via Hydra's standard `/oauth2/token` endpoint using basic-auth
// `<client_id>:<client_secret>` and obtain a Kachō-issued JWT.
//
// The plaintext `client_secret` is returned EXACTLY ONCE in the Issue
// response — never persisted by kacho-iam; Hydra stores a bcrypt hash on its
// side, and kacho-iam keeps only the `hydra_client_id` → ServiceAccount
// mapping in `service_account_oauth_clients`.
service SAKeyService {
  rpc Issue (IssueSAKeyRequest) returns (operation.Operation) {
    option (google.api.http) = {
      post: "/iam/v1/serviceAccounts/{service_account_id}/keys"
      body: "*"
    };
    option (kacho.cloud.api.operation) = {
      metadata: "IssueSAKeyMetadata"
      response: "IssueSAKeyResponse"
    };
    option (kacho.iam.authz.v1.permission)        = "iam.issue_s_a_keies.issue";
    option (kacho.iam.authz.v1.required_relation) = "v_update";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "iam_service_account"
      from_request_field: "service_account_id"
    };
    option (kacho.iam.authz.v1.required_acr_min)  = "2";
  }

  rpc List (ListSAKeysRequest) returns (ListSAKeysResponse) {
    option (google.api.http) = {
      get: "/iam/v1/serviceAccounts/{service_account_id}/keys"
    };
    option (kacho.iam.authz.v1.permission)        = "iam.s_a_keyses.list";
    option (kacho.iam.authz.v1.required_relation) = "v_list";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "iam_service_account"
      from_request_field: "service_account_id"
    };
    option (kacho.iam.authz.v1.required_acr_min)  = "2";
  }

  rpc Revoke (RevokeSAKeyRequest) returns (operation.Operation) {
    option (google.api.http) = {
      delete: "/iam/v1/serviceAccounts/{service_account_id}/keys/{key_id}"
    };
    option (kacho.cloud.api.operation) = {
      metadata: "RevokeSAKeyMetadata"
      response: "RevokeSAKeyResponse"
    };
    option (kacho.iam.authz.v1.permission)        = "iam.revoke_s_a_keies.revoke";
    option (kacho.iam.authz.v1.required_relation) = "v_update";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "iam_service_account"
      from_request_field: "service_account_id"
    };
    option (kacho.iam.authz.v1.required_acr_min)  = "2";
  }
}

message IssueSAKeyRequest {
  string service_account_id = 1 [(required) = true, (length) = "<=20"];
  string description = 2 [(length) = "<=256"];
  // Optional ISO duration in seconds; if 0 → no expiry.
  int64 ttl_seconds = 3 [(value) = "<=63072000"];
  string created_by_user_id = 4 [(required) = true, (length) = "<=20"];

  // Federation IN. When non-empty, the SA-key is registered in
  // FEDERATED mode: kacho-iam does NOT mint a keypair, the Hydra OAuth2
  // client is registered with `grant_types=[urn:ietf:params:oauth:grant-
  // type:jwt-bearer]` + `token_endpoint_auth_method=none`, and the response
  // contains NO `private_key_pem` / `public_key_pem`. External workloads
  // (CI runners, Kubernetes pods, customer OIDC IdPs)
  // present their OWN OIDC JWT to Hydra `/oauth2/token` via the RFC 7521 /
  // 7523 jwt-bearer grant — Hydra validates the assertion against the
  // configured trusted issuers (helm umbrella `hydra.config.oauth2.grant.jwt`
  // + admin trust-grants), maps the asserting client to this Hydra client by
  // `client_id`, and mints a kacho-issued access_token. Each entry restricts
  // *which* external subjects are allowed to assert this SA: `issuer` is the
  // external OIDC `iss` URL, `subject_pattern` is a regex the external `sub`
  // claim must match. Empty slice = `private_key_jwt` mode (legacy
  // default).
  repeated TrustedSubject trusted_subjects = 5;

  // Federation OUT. When non-empty, the kacho-minted access_token
  // is issued with these values in the `aud` claim, making the token
  // verifiable by external OIDC-trust-federation consumers — external STS
  // services (which require a specific `aud` value), external workload-
  // identity-federation providers (which require an `aud` naming the
  // federation pool/provider), generic OIDC RPs, etc. The list is
  // stored on the Hydra OAuth2 client and applied to every token minted for
  // it. Empty → kacho-internal audience only (legacy `AudiencePrefix`
  // behaviour: `kacho:iam:/sa/<sva_id>`); the resulting token is NOT
  // accepted by external IdPs. Order is preserved; duplicates are dropped.
  // Examples:
  //   audience: ["sts.example.com"]
  //   audience: ["//iam.example.com/projects/123/locations/global/workloadIdentityPools/kacho/providers/main"]
  //   audience: ["api://acme-prod"]          // external federated credential
  repeated string audience = 6 [(length) = "<=512"];
}

// TrustedSubject — one (issuer, subject_pattern) tuple allowed to assert this
// SA under the RFC 7523 jwt-bearer grant.
message TrustedSubject {
  // External OIDC issuer URL (matches the `iss` claim of the assertion).
  // Examples:
  //   https://token.actions.githubusercontent.com   (GitHub Actions)
  //   https://gitlab.com                            (GitLab CI)
  //   https://kubernetes.default.svc.cluster.local  (in-cluster k8s SAs)
  //   https://idp.example.com/<tenant>/v2.0          (external OIDC IdP)
  string issuer = 1 [(required) = true, (length) = "<=512"];

  // RE2 regex the external `sub` claim must match. Anchor with ^ and $ to
  // avoid substring footguns. Examples:
  //   ^repo:acme/infra:ref:refs/heads/main$
  //   ^system:serviceaccount:kacho-prod:ci-runner$
  string subject_pattern = 2 [(required) = true, (length) = "<=512"];
}

message IssueSAKeyResponse {
  ServiceAccountOAuthClient key = 1;
  // Plaintext OAuth client_id (Hydra-registered).
  string client_id = 2;
  // DEPRECATED — with private_key_jwt client auth the secret no
  // longer exists; this field is always empty for new keys. Kept for wire
  // compatibility only. Removed in a future major.
  string client_secret = 3 [deprecated = true];
  // PEM-encoded PKCS#8 ECDSA P-256 private key — SHOWN ONCE; never
  // recoverable. Caller uses it to sign `client_assertion` (RFC 7521/7523)
  // in OAuth2 client_credentials requests against Hydra.
  string private_key_pem = 4;
  // PEM-encoded SPKI public key (informational; Hydra holds the canonical
  // copy as a JWK in the registered client metadata).
  string public_key_pem = 5;
  // JOSE signing algorithm used by the private key. Always "ES256".
  string algorithm = 6;
  // JWK `kid` of the registered public key. Caller MUST set the `kid`
  // header of signed assertions to this value so Hydra picks the right key.
  string key_id = 7;
  // Federation OUT. Echoes back the resolved `aud` claim list
  // that will appear in every token minted for this SA. Informational —
  // operators can confirm the audience binding without re-reading Hydra
  // admin. Empty list signals kacho-internal-only audience (the request
  // omitted `audience`).
  repeated string audiences = 8;
}

message IssueSAKeyMetadata {
  string service_account_id = 1;
  string key_id = 2;
}

message ListSAKeysRequest {
  string service_account_id = 1 [(required) = true, (length) = "<=20"];
  int64  page_size           = 2 [(value) = "<=1000"];
  string page_token          = 3 [(length) = "<=100"];
}

message ListSAKeysResponse {
  repeated ServiceAccountOAuthClient keys = 1;
  string next_page_token = 2;
}

message RevokeSAKeyRequest {
  string service_account_id = 1 [(required) = true, (length) = "<=20"];
  string key_id              = 2 [(required) = true, (length) = "<=20"];
}

message RevokeSAKeyResponse {
  string key_id = 1;
  google.protobuf.Timestamp revoked_at = 2;
}

message RevokeSAKeyMetadata {
  string service_account_id = 1;
  string key_id = 2;
}
