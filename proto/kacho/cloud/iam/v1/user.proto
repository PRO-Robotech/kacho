syntax = "proto3";

package kacho.cloud.iam.v1;

import "google/protobuf/timestamp.proto";
import "kacho/cloud/validation.proto";

option go_package = "github.com/PRO-Robotech/kacho/pkg/api/kacho/cloud/iam/v1;iamv1";

// A User resource. Local mirror of Kratos identity per-Account scope.
//
// Per-Account User scope: один Kratos identity = N User-rows (по одному
// per Account, куда invited). External_id (Kratos sub) уникален per-Account, не
// глобально. Активируется при первом login через Kratos с матчингом email.
//
// Resource id prefix: `usr-`.
message User {
  // ID of the user (kacho-iam internal id).
  string id = 1;

  // External identity provider id (Kratos `sub` claim). Может быть пустым для
  // PENDING (invited but never logged in).
  string external_id = 2;

  // Email (case-insensitive lookup). При Invite — email указывается admin'ом;
  // при first-login через Kratos — матчится с identity email.
  string email = 3;

  // Human-readable display name (snapshot из Kratos identity traits).
  string display_name = 4;

  // Creation timestamp.
  google.protobuf.Timestamp created_at = 5;

  // Account-scope. NOT NULL — каждый User-row принадлежит ровно одному
  // Account. Один Kratos identity может иметь N User-rows (по одному per Account).
  string account_id = 6;

  // invite-status.
  // PENDING — invited, еще не login'нулся.
  // ACTIVE  — login'нулся через Kratos, external_id заполнен.
  // BLOCKED — admin disabled access.
  InviteStatus invite_status = 7;

  // User.id того, кто пригласил (nullable для self-signup bootstrap-row).
  string invited_by = 8;

  // Tenant-facing метки. Единая модель видимости IAM-ресурсов: User —
  // label-selectable, как account/project; ARM_LABELS-грант на iam.user
  // материализует v_list по совпадению `labels @> matchLabels` (iam-direct
  // same-DB), а List фильтрует через `viewer ∪ v_list`. Mutable через
  // UserService.Update (`labels` в update_mask). Аннотации (size/key/value
  // pattern) энфорсят sync-INVALID_ARGUMENT на request-layer — паритет
  // account/project/group request `labels`; это request-input для UpdateUser
  // (тело UpdateUserRequest.user).
  map<string, string> labels = 9 [(kacho.cloud.size) = "<=64", (length) = "<=63", (pattern) = "[-_0-9a-z]*", (map_key).length = "1-63", (map_key).pattern = "[a-z][-_0-9a-z]*"];

  enum InviteStatus {
    INVITE_STATUS_UNSPECIFIED = 0;
    PENDING = 1;
    ACTIVE = 2;
    BLOCKED = 3;
  }
}

message DeleteUserMetadata {
  // ID of the User that is being deleted.
  string user_id = 1;

  // ID of the owning Account (denormalized for account-scoped operations
  // listing — AccountService.ListAllOperations). Non-first field so the
  // corelib resource_id extractor (first `_id`-suffix match) still picks
  // `user_id`. Read by exact field name `account_id` by corelib. May be
  // empty for account-less users (written as SQL NULL — excluded from the
  // account-scoped list).
  string account_id = 2;
}

message UpdateUserMetadata {
  // ID of the User that is being updated.
  string user_id = 1;

  // ID of the owning Account (denormalized for account-scoped operations
  // listing — AccountService.ListAllOperations). Non-first field so the
  // corelib resource_id extractor (first `_id`-suffix match) still picks
  // `user_id`. Read by exact field name `account_id` by corelib. May be empty
  // for account-less users (written as SQL NULL — excluded from the
  // account-scoped list).
  string account_id = 2;
}

// Invite-flow.
message InviteUserMetadata {
  string user_id = 1;
  string account_id = 2;
  // Kratos recovery / magic-link URL. Admin копирует и отправляет вручную
  // (email-sending не интегрирован). Пустой если re-invite-existing-active.
  string magic_link_url = 3;
}
