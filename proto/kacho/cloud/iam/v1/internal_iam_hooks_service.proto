syntax = "proto3";

package kacho.cloud.iam.v1;

import "google/protobuf/struct.proto";
import "kacho/cloud/validation.proto";
import "kacho/iam/authz/v1/authz_options.proto";

option go_package = "github.com/PRO-Robotech/kacho/pkg/api/kacho/cloud/iam/v1;iamv1";

// InternalIamHooksService — cluster-internal RPCs for Ory Hydra token-issuance
// hooks (port 9091). НЕ публикуется на external TLS listener.
//
// Synchronous Hydra → kacho-iam hooks invoked on
// every access-token issuance and refresh ceremony. Hydra calls these endpoints
// to enrich session claims (`active_account`, `principal_type`,
// `device_attestation`, `mfa_at`) before signing the JWT.
//
// Protocol: synchronous request/response — НЕ Operation envelope. Hydra blocks
// signing until the hook returns (timeout = 5s default; on failure → token
// issuance fails fail-closed).
//
// Wire shape matches Hydra's token hook contract
// (https://www.ory.sh/docs/hydra/guides/claims-at-refresh) — request payload is
// passed as `google.protobuf.Struct` so additional Hydra fields can be carried
// through without proto churn. Response contains the `session` blob whose keys
// Hydra splices into `id_token` / `access_token` claims.
//
// Transport: registered behind a cluster-internal mux in api-gateway that
// translates Hydra's REST hook call into this gRPC RPC; Hydra config points to
// the api-gateway internal listener (NOT directly at kacho-iam — keeps the
// service boundary clean and authz uniform).
service InternalIamHooksService {
  // TokenHook — invoked by Hydra on initial token issuance (after a successful
  // login / consent flow). kacho-iam returns the claims to be embedded in the
  // signed id_token / access_token (`active_account`, `principal_type`,
  // `device_attestation`, `mfa_at`).
  //
  // Latency budget: ≤ 50ms p95 (Hydra default hook timeout = 5s,
  // fail-closed).
  rpc TokenHook (TokenHookRequest) returns (TokenHookResponse) {
    // Cluster-internal listener-protected; Hydra is the only
    // authorized caller via mTLS-secured pod-to-pod link. No per-RPC authz
    // check — the listener boundary IS the gate.
    option (kacho.iam.authz.v1.permission) = "<exempt>";
  }

  // RefreshTokenHook — invoked by Hydra on every refresh-token grant. kacho-iam
  // re-validates that the session is still active (`session_revocations`
  // lookup, account/project still alive) and injects fresh ext_claims.
  //
  // On revocation → return `error` field set; Hydra rejects the refresh and
  // the client must re-authenticate. Latency budget: ≤ 50ms p95.
  rpc RefreshTokenHook (RefreshTokenHookRequest) returns (RefreshTokenHookResponse) {
    // Cluster-internal listener-protected. Same gate as TokenHook.
    option (kacho.iam.authz.v1.permission) = "<exempt>";
  }
}

// TokenHookRequest — Hydra's token-hook payload (shape per Hydra docs).
message TokenHookRequest {
  // OIDC `sub` claim — Hydra-side subject (== kacho-iam `users.external_id`).
  string subject = 1 [(required) = true, (length) = "<=128"];

  // OAuth2 client_id requesting the token.
  string client_id = 2 [(required) = true, (length) = "<=128"];

  // Free-form Hydra-side context about the token use (grant_type, requested_at,
  // remote_ip, user_agent, etc.). Passed through as Struct so Hydra can add
  // fields without breaking the contract.
  google.protobuf.Struct token_use_context = 3;

  // OAuth2 scopes the client requested.
  google.protobuf.ListValue scopes = 4;

  // Original request URL Hydra captured (for audit / abuse correlation).
  google.protobuf.Struct request_url = 5;
}

// TokenHookResponse — Hydra-compatible response: session claims to embed in
// id_token / access_token + final granted scope list.
message TokenHookResponse {
  // `session.id_token` / `session.access_token` extra claims. Keys spliced
  // into the signed JWT verbatim by Hydra (e.g. `active_account`,
  // `principal_type`, `device_attestation`, `mfa_at`).
  google.protobuf.Struct session = 1;

  // Final granted scopes (kacho-iam may narrow client's requested scopes based
  // on principal_type / acr).
  google.protobuf.ListValue scopes = 2;
}

// RefreshTokenHookRequest — Hydra's refresh-token-hook payload.
message RefreshTokenHookRequest {
  // OIDC `sub` claim of the refresh token being exchanged.
  string subject = 1 [(required) = true, (length) = "<=128"];

  // OAuth2 client_id presenting the refresh token.
  string client_id = 2 [(required) = true, (length) = "<=128"];

  // The session blob Hydra previously stored at token issuance — passed back
  // to kacho-iam so it can mutate / re-stamp claims (e.g. update `mfa_at`).
  google.protobuf.Struct original_session = 3;

  // Scopes attached to the refresh token.
  google.protobuf.ListValue requested_scopes = 4;

  // `jti` of the access token being refreshed (when known to Hydra) — used by
  // kacho-iam to look up `session_revocations`.
  string original_token_jti = 5 [(length) = "<=64"];
}

// RefreshTokenHookResponse — Hydra-compatible response.
message RefreshTokenHookResponse {
  // Updated session claims (fresh `mfa_at`, possibly narrowed `active_account`).
  google.protobuf.Struct session = 1;

  // Final granted scopes for the new access token.
  google.protobuf.ListValue scopes = 2;
}
