syntax = "proto3";

package kacho.cloud.iam.v1;

import "google/api/annotations.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/timestamp.proto";
import "kacho/cloud/api/operation.proto";
import "kacho/cloud/iam/v1/access_binding.proto";
import "kacho/cloud/iam/v1/builtin_condition.proto";
import "kacho/cloud/operation/operation.proto";
import "kacho/cloud/validation.proto";
import "kacho/iam/authz/v1/authz_options.proto";

option go_package = "github.com/PRO-Robotech/kacho/pkg/api/kacho/cloud/iam/v1;iamv1";

// A set of methods for managing AccessBinding resources.
//
// kacho-iam ведет собственный ресурс AccessBinding в пакете
// kacho.cloud.iam.v1 — это канонический AccessBinding домена IAM,
// единственный источник истины для grant-привязок.
service AccessBindingService {
  // Returns the specified AccessBinding resource.
  rpc Get (GetAccessBindingRequest) returns (AccessBinding) {
    option (google.api.http) = { get: "/iam/v1/accessBindings/{access_binding_id}" };
    option (kacho.iam.authz.v1.permission)        = "iam.access_bindings.get";
    option (kacho.iam.authz.v1.required_relation) = "v_get";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "iam_access_binding"
      from_request_field: "access_binding_id"
    };
    option (kacho.iam.authz.v1.required_acr_min) = "1";
  }

  // Creates an access binding.
  // Strict INSERT — дубль активного гранта (subject, role_id, scope_type,
  // scope_id) → ALREADY_EXISTS (partial UNIQUE WHERE revoked_at IS NULL).
  rpc Create (CreateAccessBindingRequest) returns (operation.Operation) {
    option (google.api.http) = { post: "/iam/v1/accessBindings" body: "*" };
    option (kacho.cloud.api.operation) = {
      metadata: "CreateAccessBindingMetadata"
      response: "AccessBinding"
    };
    // AccessBinding.Create grants a role on an ARBITRARY scope anchor
    // — the FGA object type varies per request (`scope_type` is a
    // request field: iam.account / iam.project / iam.cluster). The api-gateway
    // permission catalog can only carry a STATIC object_type, so it cannot
    // build the correct `<type>:<id>` Check object here. Therefore the
    // middleware exempts this RPC and the kacho-iam handler is the
    // authoritative gate: `requireGrantAuthority` performs the precise
    // per-resource_type check (owner of the owning Account OR FGA `admin` on
    // the actual scope object). Anonymous is still rejected by the IAM
    // anti-anonymous interceptor.
    option (kacho.iam.authz.v1.permission) = "<exempt>";
    option (kacho.iam.authz.v1.required_acr_min) = "2";
  }

  // Deletes the specified access binding.
  rpc Delete (DeleteAccessBindingRequest) returns (operation.Operation) {
    option (google.api.http) = { delete: "/iam/v1/accessBindings/{access_binding_id}" };
    option (kacho.cloud.api.operation) = {
      metadata: "DeleteAccessBindingMetadata"
      response: "google.protobuf.Empty"
    };
    option (kacho.iam.authz.v1.permission)        = "iam.access_bindings.delete";
    option (kacho.iam.authz.v1.required_relation) = "v_delete";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "iam_access_binding"
      from_request_field: "access_binding_id"
    };
    option (kacho.iam.authz.v1.required_acr_min)  = "2";
  }

  // Updates mutable fields of the specified access binding. The ONLY mutable
  // field is `deletion_protection`:
  // an owner / admin clears the flag (`update_mask=["deletion_protection"]`,
  // `deletion_protection=false`) so a protected binding can subsequently be
  // deleted. All other fields are immutable (AccessBinding is otherwise
  // Delete+Create); an `update_mask` referencing any non-mutable field →
  // INVALID_ARGUMENT. Async (returns Operation), like the other mutations.
  rpc Update (UpdateAccessBindingRequest) returns (operation.Operation) {
    option (google.api.http) = { patch: "/iam/v1/accessBindings/{access_binding_id}" body: "*" };
    option (kacho.cloud.api.operation) = {
      metadata: "UpdateAccessBindingMetadata"
      response: "AccessBinding"
    };
    option (kacho.iam.authz.v1.permission)        = "iam.access_bindings.update";
    option (kacho.iam.authz.v1.required_relation) = "v_update";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "iam_access_binding"
      from_request_field: "access_binding_id"
    };
    option (kacho.iam.authz.v1.required_acr_min)  = "2";
  }

  // Lists access bindings (redesign-2026 F11). The single, plain List that
  // supersedes the legacy `ListByScope`/`ListBySubject`/`ListByRole`/`ListByAccount`
  // family: one paginated read with an OPTIONAL whitelist `filter`
  // (`subject="…"` | `role="…"` | `scope="iam.…"` | `scopeId="…"`; an unknown filter
  // key → INVALID_ARGUMENT). Page format (`page_token`/`page_size`) is validated
  // BEFORE the listauthz row-filter, so a garbage token / `page_size>1000` is
  // INVALID_ARGUMENT regardless of grant state. The result is the caller's
  // `viewer ∪ v_list` visible set on `iam_access_binding` (anonymous → empty;
  // FGA error → UNAVAILABLE, never an unfiltered leak). Introspection-merge
  // (ListSubjectPrivileges/ExpandAccess) stays separate (IAM-4).
  rpc List (ListAccessBindingsRequest) returns (ListAccessBindingsResponse) {
    option (google.api.http) = { get: "/iam/v1/accessBindings" };
    // Cluster-scoped catalog gate (anti-anon + ACR floor, parity with
    // `ListBySubject`); the precise per-object visibility (viewer ∪ v_list) is
    // enforced authoritatively in the kacho-iam handler.
    option (kacho.iam.authz.v1.permission)        = "iam.access_bindings.list";
    option (kacho.iam.authz.v1.required_relation) = "viewer";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "cluster"
      from_request_field: "*"
    };
    option (kacho.iam.authz.v1.required_acr_min) = "1";
  }

  // Lists access bindings attached to the specified scope (renamed from the
  // legacy `ListByResource`, whose wire-name is removed). The
  // `resource_type`/`resource_id` request pair names the scope anchor
  // (project|account|cluster).
  rpc ListByScope (ListAccessBindingsByScopeRequest) returns (ListAccessBindingsResponse) {
    option (google.api.http) = { get: "/iam/v1/accessBindings:listByScope" };
    option (kacho.iam.authz.v1.permission)        = "iam.access_bindings_by_resources.listByScope";
    option (kacho.iam.authz.v1.required_relation) = "viewer";
    // Scope-polymorphic: the FGA object type is carried by the request's
    // `resource_type` field (project|account|cluster). `object_type` is only
    // the fallback; `object_type_from_request_field` makes the gateway derive
    // the real type per request (a static `project` made account/
    // cluster-scoped reads check `project:<id>` → 403).
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:                    "project"
      from_request_field:             "resource_id"
      object_type_from_request_field: "resource_type"
    };
    option (kacho.iam.authz.v1.required_acr_min) = "1";
  }

  // Lists access bindings assigned to the specified subject. Cluster-scoped
  // gate: any authenticated user can call (handler then filters returned
  // bindings — typical pattern is self-list, so subject=principal yields the
  // user's own bindings; cross-subject reads still require admin role on
  // each binding's target resource via per-row filter in the handler).
  rpc ListBySubject (ListAccessBindingsBySubjectRequest) returns (ListAccessBindingsResponse) {
    option (google.api.http) = { get: "/iam/v1/accessBindings:listBySubject" };
    option (kacho.iam.authz.v1.permission)        = "iam.access_bindings_by_subjects.listBySubject";
    option (kacho.iam.authz.v1.required_relation) = "viewer";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "cluster"
      from_request_field: "*"
    };
    option (kacho.iam.authz.v1.required_acr_min) = "1";
  }

  // Lists the privileges (enriched access bindings) attached to the specified
  // subject (User or ServiceAccount). Sync read (NOT an Operation). Unlike
  // `ListBySubject` (strict self-list, raw bindings, no existence-check), this
  // RPC:
  //   - resolves the human-readable `role_name` server-side via a within-DB
  //     JOIN `access_bindings ⋈ roles` (no N+1 client round-trips);
  //   - broadens authz to "self OR account-admin of the subject's home
  //     account" — caller may view another member's privileges if they
  //     own/admin the subject's home Account; cross-account reads → 403;
  //   - returns NOT_FOUND for a well-formed-but-missing subject
  //     (existence-resolve is required for authz);
  //   - is DIRECT-only in v1 (`derivation=DIRECT`); GROUP-derived (effective)
  //     roles are reserved forward-compat.
  //
  // Cluster-scoped catalog gate (anti-anon + ACR floor, parity with
  // `ListBySubject`); the precise self/account-admin policy is enforced
  // authoritatively in the kacho-iam handler. `subject_type ∈
  // {"user","service_account"}` for v1; malformed subject_id /
  // prefix↔type mismatch → INVALID_ARGUMENT.
  rpc ListSubjectPrivileges (ListSubjectPrivilegesRequest) returns (ListSubjectPrivilegesResponse) {
    option (google.api.http) = { get: "/iam/v1/accessBindings:listSubjectPrivileges" };
    option (kacho.iam.authz.v1.permission)        = "iam.access_bindings_by_subjects.listSubjectPrivileges";
    option (kacho.iam.authz.v1.required_relation) = "viewer";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "cluster"
      from_request_field: "*"
    };
    option (kacho.iam.authz.v1.required_acr_min) = "1";
  }

  // Lists the roles that are assignable on the specified resource.
  // Sync read (NOT an Operation). Returns ONLY the roles that
  // `AccessBinding.Create` would accept on (resource_type, resource_id) — the
  // single `isRoleAssignable` predicate is shared by this RPC (WHERE-filter)
  // and by Create-enforcement, so "what can be shown" == "what can be
  // created" (no bypass via direct API). Each returned `AssignableRole` is
  // annotated with a server-computed `scope_group` (SYSTEM / ACCOUNT /
  // PROJECT) so the UI groups without any client-side scope logic.
  //
  //   - `resource_type ∈ {"account","project","cluster"}` for v1; otherwise
  //     INVALID_ARGUMENT. `resource_id` must match the type's prefix
  //     (account⇒acc, project⇒prj; cluster⇒exactly cluster_kacho_root) —
  //     mismatch → INVALID_ARGUMENT.
  //   - well-formed-but-missing resource → NOT_FOUND (existence-resolve is
  //     required for authz); existing resource with 0 assignable roles →
  //     empty `roles` (not an error).
  //   - lean picker: `AssignableRole` carries no `permissions`.
  //
  // Scope-polymorphic catalog gate (anti-anon + ACR floor, parity with
  // `ListByScope`); the precise grant-authority policy is enforced
  // authoritatively in the kacho-iam handler via `requireGrantAuthority`
  // (owner of the owning Account/Project OR FGA `admin` on the scope object) —
  // same gate as `AccessBinding.Create` on this resource.
  rpc ListAssignableRoles (ListAssignableRolesRequest) returns (ListAssignableRolesResponse) {
    option (google.api.http) = { get: "/iam/v1/accessBindings:listAssignableRoles" };
    option (kacho.iam.authz.v1.permission)        = "iam.access_bindings_by_resources.listAssignableRoles";
    option (kacho.iam.authz.v1.required_relation) = "viewer";
    // Scope-polymorphic: the FGA object type is carried by the request's
    // `resource_type` field (account|project|cluster). `object_type` is only
    // the fallback; `object_type_from_request_field` makes the gateway derive
    // the real type per request (parity with `ListByScope` —
    // a static `project` would make account/cluster-scoped reads check
    // `project:<id>` → 403).
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:                    "project"
      from_request_field:             "resource_id"
      object_type_from_request_field: "resource_type"
    };
    option (kacho.iam.authz.v1.required_acr_min) = "1";
  }

  // Lists the access bindings that carry a given Role (audit "who holds role R").
  // Sync read (NOT an Operation).
  // Each returned `AccessBinding` is the full dual-projection: both the
  // new `subjects[]`/`scope_ref` and the legacy `subject_type`/`subject_id`/
  // `resource_type`/`resource_id`/`scope`. Scope-filtered like the other List
  // RPCs — a caller sees only bindings on scope objects they may read.
  //
  // Cluster-scoped catalog gate (anti-anon + ACR floor, parity with
  // `ListBySubject`); the precise grant-authority/admin policy is enforced
  // authoritatively in the kacho-iam handler (only a grant-authority holder /
  // admin on each binding's scope sees the row). Ordered by (created_at, id)
  // ASC; keyset paginated.
  rpc ListByRole (ListAccessBindingsByRoleRequest) returns (ListAccessBindingsResponse) {
    option (google.api.http) = { get: "/iam/v1/accessBindings:listByRole" };
    option (kacho.iam.authz.v1.permission)        = "iam.access_bindings_by_roles.listByRole";
    option (kacho.iam.authz.v1.required_relation) = "viewer";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "cluster"
      from_request_field: "*"
    };
    option (kacho.iam.authz.v1.required_acr_min) = "1";
  }

  // Expands a userset on an object+relation into the concrete principals that
  // hold it. Sync read (NOT an
  // Operation). Answers "who can actually do X on this object" by resolving FGA
  // group-membership usersets (group → members) to concrete USER/SERVICE_ACCOUNT
  // principals — closing the effective-principal audit gap (a binding on a GROUP
  // subject otherwise only shows "group G", not its current members). Read-only,
  // viewer-floor gate.
  //
  // Cluster-scoped catalog gate (anti-anon + ACR floor); the precise read policy
  // (viewer on the queried object) is enforced authoritatively in the kacho-iam
  // handler.
  rpc ExpandAccess (ExpandAccessRequest) returns (ExpandAccessResponse) {
    option (google.api.http) = { get: "/iam/v1/accessBindings:expandAccess" };
    option (kacho.iam.authz.v1.permission)        = "iam.access_bindings_by_resources.expandAccess";
    option (kacho.iam.authz.v1.required_relation) = "viewer";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "cluster"
      from_request_field: "*"
    };
    option (kacho.iam.authz.v1.required_acr_min) = "1";
  }

  // Lists access bindings in an account (all subjects). Requires `admin`
  // relation on the account (account-admin sees all who has access to the
  // account, including subjects he didn't grant himself). Returns:
  //
  //   - bindings directly attached to the account (resource_type='account',
  //     resource_id=<accountId>); plus
  //   - bindings on every project whose account_id matches.
  //
  // Filter by subject_type (optional) and include_revoked (default false).
  // Ordered by (created_at DESC, id ASC); keyset paginated.
  rpc ListByAccount (ListAccessBindingsByAccountRequest) returns (ListAccessBindingsResponse) {
    option (google.api.http) = { get: "/iam/v1/accounts/{account_id}/accessBindings" };
    option (kacho.iam.authz.v1.permission)        = "iam.access_bindings_by_account.list";
    option (kacho.iam.authz.v1.required_relation) = "v_list";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "account"
      from_request_field: "account_id"
    };
    option (kacho.iam.authz.v1.required_acr_min) = "1";
  }

  // Lists operations for the specified access binding.
  rpc ListOperations (ListAccessBindingOperationsRequest) returns (ListAccessBindingOperationsResponse) {
    option (google.api.http) = { get: "/iam/v1/accessBindings/{access_binding_id}/operations" };
    option (kacho.iam.authz.v1.permission)        = "iam.access_binding_operationses.listOperations";
    option (kacho.iam.authz.v1.required_relation) = "v_list";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "iam_access_binding"
      from_request_field: "access_binding_id"
    };
    option (kacho.iam.authz.v1.required_acr_min) = "1";
  }

  // Soft-revokes the specified access binding (redesign-2026 F10 IAM-1-28).
  //
  // Two distinct removal outcomes coexist (product-spine parity):
  //   - Delete = HARD: the row is physically removed; a subsequent Get → NOT_FOUND.
  //   - Revoke = SOFT: the row is RETAINED with status transitioned ACTIVE→REVOKED
  //     (terminal), revoked_at / revoked_by_user_id set for audit-retention; a
  //     subsequent Get still returns the row (status=REVOKED). Either way the
  //     emitted FGA-tuple set (persisted access_binding_emitted_tuples ledger) is
  //     removed in the same writer-tx, so access is denied once the Operation is
  //     done. Re-granting the same (subject, role, scope) after a revoke yields a
  //     NEW ACTIVE row (the partial active-grant UNIQUE excludes revoked rows).
  //
  // deletion_protection is honored (owner auto-binding): revoking a protected
  // binding is rejected sync FAILED_PRECONDITION plus an atomic CAS-backstop
  // (`UPDATE … WHERE status='ACTIVE' AND deletion_protection=false`) against
  // TOCTOU — clear the flag via Update first, exactly like Delete.
  // Async (returns Operation), like the other mutations.
  rpc Revoke (RevokeAccessBindingRequest) returns (operation.Operation) {
    option (google.api.http) = { post: "/iam/v1/accessBindings/{access_binding_id}:revoke" body: "*" };
    option (kacho.cloud.api.operation) = {
      metadata: "RevokeAccessBindingMetadata"
      response: "AccessBinding"
    };
    option (kacho.iam.authz.v1.permission)        = "iam.access_bindings.revoke";
    option (kacho.iam.authz.v1.required_relation) = "v_delete";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "iam_access_binding"
      from_request_field: "access_binding_id"
    };
    option (kacho.iam.authz.v1.required_acr_min)  = "2";
  }

}

message GetAccessBindingRequest {
  // ID of the AccessBinding resource to return.
  string access_binding_id = 1 [(required) = true, (length) = "<=20"];
}

message CreateAccessBindingRequest {
  // Тип subject'а: "user" | "service_account" | "group".
  string subject_type = 1 [(required) = true, (length) = "<=32"];

  // ID subject'а.
  string subject_id = 2 [(required) = true, (length) = "<=20"];

  // ID of the Role to assign.
  string role_id = 3 [(required) = true, (length) = "<=20"];

  // Scope-anchor TYPE in dotted form: `iam.cluster` | `iam.account` |
  // `iam.project` (redesign-2026 F7 — renamed from `resource_type`; «resource» is
  // reserved for `target`). REQUIRED (pre-Phase-0: prefix-derivation from scope_id
  // is B3-gated, so the tier must be given explicitly). An empty / non-dotted /
  // unknown value → sync INVALID_ARGUMENT.
  string scope_type = 4 [(required) = true, (length) = "<=32"];

  // Scope-anchor ID — the anchor object id (`cluster_kacho_root` | `acc…` | `prj…`).
  string scope_id = 5 [(required) = true, (length) = "<=64"];

  // Optional reference to an `AccessBindingCondition` row (`cond_xxx`) for
  // an ABAC overlay. Logical-oneof with
  // `builtin_condition` (field 7) — setting both is InvalidArgument.
  string condition_id = 6 [(length) = "<=20"];

  // Optional reference to a `BuiltinCondition` catalog entry. Logical-oneof
  // with `condition_id` (field 6).
  BuiltinCondition builtin_condition = 7;

  // Optional hard-expiry timestamp. Unset = no TTL. When set, must be in
  // the future by at least 5 minutes (otherwise InvalidArgument) — OPA
  // gates the binding evaluation by `now() < expires_at`.
  google.protobuf.Timestamp expires_at = 8;

  // TOMBSTONE. Tag 9 (`AccessTarget target`) / tag 11 (`AccessTargetRef target_ref`)
  // held the earlier per-object target machinery; tag 10 (`ScopeRef scope_ref`) held
  // the canonical scope pair now flattened into `scope_type`/`scope_id`
  // (redesign-2026 F7). Tags 9/10/11 and names `target`/`target_ref`/`scope_ref` are
  // RESERVED tombstones — tags 9/10/11 never reused as tag numbers (append-only).
  // F8 REINTRODUCES `target` at a NEW tag (`target = 15`); the NAME `target` is reused
  // at the new tag (tag-tombstone, not name-tombstone).
  reserved 9, 10, 11;
  reserved "target_ref", "scope_ref";

  // Multi-subject set. 1..32
  // subjects; each yields an INDEPENDENT FGA tuple-set + emitted-tuple ledger
  // lineage (per-subject revoke/audit). This is the canonical (preferred) input;
  // when only the legacy single `subject_type`/`subject_id` (fields 1/2) is set
  // the server projects it to a one-element `subjects[]`. If BOTH this AND the
  // legacy single pair are set and the single is NOT subjects[0],
  // INVALID_ARGUMENT. Empty `subjects[]` with no legacy single → also
  // INVALID_ARGUMENT ("Illegal argument subjects (must be 1..32)"); >32 → same.
  // admin/editor-tier role + a GROUP subject requires `requireGrantAuthority` on
  // the scope (group-amplification guard).
  repeated Subject subjects = 12;

  // Optional deletion-protection flag for the created binding. Default
  // false. Set `true` so the
  // owner auto-binding and admins can protect a binding from accidental
  // `DeleteAccessBinding` at creation time. Once set, Delete is rejected sync
  // (FAILED_PRECONDITION) until cleared via `Update(update_mask=
  // ["deletion_protection"])` — see `AccessBinding.deletion_protection`.
  bool deletion_protection = 13;

  // Tenant-facing метки самого ресурса AccessBinding (делают binding
  // label-selectable наравне с account/project). Аннотации (size/key/value
  // pattern) — паритет account/project/group request `labels`. Tags 9/10/11
  // зарезервированы (target/target_ref/scope_ref tombstone) — 14 первый свободный.
  map<string, string> labels = 14 [(kacho.cloud.size) = "<=64", (length) = "<=63", (pattern) = "[-_0-9a-z]*", (map_key).length = "1-63", (map_key).pattern = "[a-z][-_0-9a-z]*"];

  // Which objects UNDER the scope-anchor the grant applies to (redesign-2026 F8,
  // least-privilege spine). REQUIRED — a Create with no `target` (neither
  // `resources` nor `allInScope`) → sync INVALID_ARGUMENT
  // "target is required; use target.allInScope{} to grant all objects under the
  // anchor". NEW tag (tags 9/11 stay tombstoned).
  AccessTarget target = 15;
}

message DeleteAccessBindingRequest {
  // ID of the AccessBinding resource to delete.
  string access_binding_id = 1 [(required) = true, (length) = "<=20"];
}

message RevokeAccessBindingRequest {
  // ID of the AccessBinding resource to soft-revoke (status ACTIVE→REVOKED).
  string access_binding_id = 1 [(required) = true, (length) = "<=20"];
}

// UpdateAccessBindingRequest carries the mutable-field update for an
// AccessBinding. Mutable
// fields: `deletion_protection`, `labels`. Все прочие поля immutable
// (role/subjects/scope/resource_type/resource_id — Delete+Create).
message UpdateAccessBindingRequest {
  // ID of the AccessBinding resource to update.
  string access_binding_id = 1 [(required) = true, (length) = "<=20"];

  // Field mask of fields to update. Allowed fields: `deletion_protection`,
  // `labels`. Any other field referenced in the mask → INVALID_ARGUMENT. An
  // empty mask applies the mutable fields present in the body (full-object
  // PATCH over the mutable fields).
  google.protobuf.FieldMask update_mask = 2;

  // New deletion-protection value (clears it to `false` so a protected
  // owner-binding can be deleted).
  bool deletion_protection = 3;

  // Tenant-facing метки самого ресурса AccessBinding (mutable; `labels` в
  // update_mask). Аннотации (size/key/value pattern) — паритет
  // account/project/group request `labels`.
  map<string, string> labels = 4 [(kacho.cloud.size) = "<=64", (length) = "<=63", (pattern) = "[-_0-9a-z]*", (map_key).length = "1-63", (map_key).pattern = "[a-z][-_0-9a-z]*"];
}

message ListAccessBindingsRequest {
  // The maximum number of results per page to return. Default 100; >1000 →
  // INVALID_ARGUMENT (rejected, not clamped).
  int64 page_size = 1 [(value) = "<=1000"];

  // Page token. A malformed token → INVALID_ARGUMENT (validated before the
  // listauthz row-filter).
  string page_token = 2 [(length) = "<=100"];

  // Optional whitelist filter expression (redesign-2026 F11). Exactly one
  // predicate of the form `<key>="<value>"`, key ∈ {subject, role, scope, scopeId}
  // (`scope` is the dotted scope-type `iam.account|iam.project|iam.cluster`). An
  // unknown key → INVALID_ARGUMENT. Empty → no filter (all visible bindings).
  string filter = 3 [(length) = "<=1000"];
}

message ListAccessBindingsByScopeRequest {
  // Тип resource'а ("account" | "project" | т.п.).
  string resource_type = 1 [(required) = true, (length) = "<=32"];

  // ID resource'а.
  string resource_id = 2 [(required) = true, (length) = "<=64"];

  // The maximum number of results per page to return. Default value: 100.
  int64 page_size = 3 [(value) = "<=1000"];

  // Page token.
  string page_token = 4 [(length) = "<=100"];
}

message ListAccessBindingsBySubjectRequest {
  // Тип subject'а.
  string subject_type = 1 [(required) = true, (length) = "<=32"];

  // ID subject'а.
  string subject_id = 2 [(required) = true, (length) = "<=20"];

  // The maximum number of results per page to return. Default value: 100.
  int64 page_size = 3 [(value) = "<=1000"];

  // Page token.
  string page_token = 4 [(length) = "<=100"];
}

message ListAccessBindingsByAccountRequest {
  // ID of the Account whose access bindings are listed. Includes bindings
  // directly attached to the account AND bindings on every project owned by
  // the account.
  string account_id = 1 [(required) = true, (length) = "<=20"];

  // The maximum number of results per page to return. Default value: 100.
  int64 page_size = 2 [(value) = "<=1000"];

  // Page token.
  string page_token = 3 [(length) = "<=100"];

  // Optional: filter by subject_type ("user" | "service_account" | "group").
  // Empty = no filter.
  string subject_type_filter = 4 [(length) = "<=32"];

  // Optional: include revoked bindings (status='REVOKED'). Default false
  // (only PENDING/ACTIVE are returned).
  bool include_revoked = 5;
}

message ListAccessBindingsResponse {
  // List of AccessBinding resources.
  repeated AccessBinding access_bindings = 1;

  // This token allows you to get the next page of results for list requests.
  string next_page_token = 2;
}

message ListAccessBindingOperationsRequest {
  // ID of the AccessBinding resource to list operations for.
  string access_binding_id = 1 [(required) = true, (length) = "<=20"];

  // The maximum number of results per page that should be returned.
  int64 page_size = 2 [(value) = "<=1000"];

  // Page token.
  string page_token = 3 [(length) = "<=100"];
}

message ListAccessBindingOperationsResponse {
  // List of operations for the specified access binding.
  repeated operation.Operation operations = 1;

  // This token allows you to get the next page of results for list requests.
  string next_page_token = 2;
}

message ListSubjectPrivilegesRequest {
  // Тип subject'а. v1 принимает только "user" | "service_account" (group —
  // вне scope, см. ListBySubject). Несоответствие prefix(subject_id)↔type →
  // InvalidArgument.
  string subject_type = 1 [(required) = true, (length) = "<=32"];

  // ID subject'а (User id `usr-…` / ServiceAccount id `sva-…`).
  string subject_id = 2 [(required) = true, (length) = "<=20"];

  // The maximum number of results per page to return. Default value: 50,
  // max 1000.
  int64 page_size = 3 [(value) = "<=1000"];

  // Opaque base64 cursor (created_at, id) для следующей страницы.
  string page_token = 4 [(length) = "<=100"];
}

message ListSubjectPrivilegesResponse {
  // Subject privileges (enriched access bindings), ordered by (created_at, id)
  // ASC.
  repeated SubjectPrivilege privileges = 1;

  // This token allows you to get the next page of results for list requests.
  string next_page_token = 2;
}

// How a subject obtained the privilege.
enum Derivation {
  DERIVATION_UNSPECIFIED = 0;
  // The binding's subject_id is literally the requested subject (direct grant).
  DIRECT = 1;
  // Reserved forward-compat: the privilege is derived from
  // the subject's membership in a group that carries the binding. v1 never
  // emits this value.
  GROUP = 2;
}

// SubjectPrivilege is the enriched, public-safe projection of an AccessBinding
// for the subject-privileges view. The `role_name` is resolved
// server-side via a within-DB JOIN `access_bindings ⋈ roles`; a dangling
// role yields an empty `role_name` (UI falls back to raw `role_id`). Carries
// only tenant-facing, publicly-safe fields — никаких инфра-чувствительных
// данных и никаких condition/builtin_condition-internals (вне scope v1).
message SubjectPrivilege {
  // ID of the underlying AccessBinding (`acb-…`).
  string binding_id = 1;

  // ID of the Role granted (`rol-…`).
  string role_id = 2;

  // Human-readable Role name, resolved server-side (output-only; empty for a
  // dangling/deleted role).
  string role_name = 3;

  // Тип resource'а на который выдан binding ("account" | "project" | т.п.).
  string resource_type = 4;

  // ID resource'а на который выдан binding.
  string resource_id = 5;

  // Scope tier of the binding (CLUSTER / ACCOUNT / PROJECT). Reuses the
  // AccessBinding.Scope enum.
  AccessBinding.Scope scope = 6;

  // Lifecycle status (PENDING / ACTIVE / REVOKED). Reuses the
  // AccessBinding.Status enum.
  AccessBinding.Status status = 7;

  // Creation timestamp (truncated to seconds per api-conventions).
  google.protobuf.Timestamp created_at = 8;

  // ID of the User who granted this privilege (audit).
  string granted_by_user_id = 9;

  // Optional hard-expiry timestamp. Unset = no TTL.
  google.protobuf.Timestamp expires_at = 10;

  // How the subject obtained this privilege. v1 always DIRECT.
  Derivation derivation = 11;
}

message ListAssignableRolesRequest {
  // Тип resource'а на который подбираются assignable-роли. v1 принимает
  // только "account" | "project" | "cluster" — иначе InvalidArgument.
  string resource_type = 1 [(required) = true, (length) = "<=32"];

  // ID resource'а. Должен соответствовать prefix'у типа (account⇒acc,
  // project⇒prj; cluster⇒ровно cluster_kacho_root) — иначе InvalidArgument.
  string resource_id = 2 [(required) = true, (length) = "<=64"];

  // The maximum number of results per page to return. Default value: 50,
  // max 1000.
  int64 page_size = 3 [(value) = "<=1000"];

  // Opaque base64 cursor (created_at, id) для следующей страницы.
  string page_token = 4 [(length) = "<=100"];
}

message ListAssignableRolesResponse {
  // Roles assignable on the requested resource, ordered by (created_at, id)
  // ASC. Each carries a server-computed `scope_group`.
  repeated AssignableRole roles = 1;

  // This token allows you to get the next page of results for list requests.
  string next_page_token = 2;
}

// The scope tier of a Role as projected for the assignable-roles view.
// Computed server-side from the Role's scope columns
// (is_system / account_id / project_id) — the UI groups the picker by this
// field without any client-side scope logic. A custom role is scoped to
// exactly one of {account, project} (Organization scope fully removed —
// enforced by `roles_scope_xor`).
enum ScopeGroup {
  SCOPE_GROUP_UNSPECIFIED = 0;
  // System role (is_system, cluster-scoped) — assignable everywhere.
  SYSTEM = 1;
  // Account-scoped custom role (account_id set) — assignable on its own account.
  ACCOUNT = 2;
  // Project-scoped custom role (project_id set) — assignable on its own project.
  PROJECT = 3;
}

// AssignableRole is the lean, public-safe projection of a Role for the grant
// form's role picker. It carries only the fields the picker
// needs (id / resolved name / description / is_system / server-computed
// scope_group / created_at) — NO `permissions` array (picker ≠
// role-detail) and no infra-sensitive fields. The
// `scope_group` is derived server-side via the shared `isRoleAssignable`
// predicate domain, so the client never computes scope.
message AssignableRole {
  // ID of the Role (`rol-…`).
  string role_id = 1;

  // Human-readable Role name, resolved server-side (no separate
  // `GET /roles/{id}` round-trip needed).
  string name = 2;

  // Role description.
  string description = 3;

  // Whether this is a built-in system role (is_system).
  bool is_system = 4;

  // Server-computed scope tier (SYSTEM / ACCOUNT / PROJECT) — the UI groups by
  // this field directly.
  ScopeGroup scope_group = 5;

  // Creation timestamp (truncated to seconds per api-conventions).
  google.protobuf.Timestamp created_at = 6;
}

message ListAccessBindingsByRoleRequest {
  // ID of the Role whose bindings are listed (`rol-…`). Audit "who holds role
  // R". Malformed id → INVALID_ARGUMENT.
  string role_id = 1 [(required) = true, (length) = "<=20"];

  // The maximum number of results per page to return. Default value: 50,
  // max 1000.
  int64 page_size = 2 [(value) = "<=1000"];

  // Opaque base64 cursor (created_at, id) для следующей страницы.
  string page_token = 3 [(length) = "<=100"];

  // Optional: include revoked bindings (status='REVOKED'). Default false
  // (only PENDING/ACTIVE are returned).
  bool include_revoked = 4;
}

// ExpandAccessRequest asks "who can perform <relation> on <object_type>:<object_id>".
// `object_type` is a closed `<module>.<resource>` key or an FGA
// object type (e.g. "compute.instance", "iam_access_binding"); `relation` is the
// FGA relation/verb-derived relation (e.g. "delete", "viewer"). The server
// resolves the userset (direct grants + group memberships) into concrete
// principals.
message ExpandAccessRequest {
  // Object type to expand access on — closed `<module>.<resource>` key or FGA
  // object type. Unknown type → INVALID_ARGUMENT.
  string object_type = 1 [(required) = true, (length) = "1-64"];

  // Object id to expand access on. Format-validated only (soft-ref).
  string object_id = 2 [(required) = true, (length) = "1-64"];

  // Relation/verb to expand (e.g. "delete", "viewer"). Unknown relation →
  // INVALID_ARGUMENT.
  string relation = 3 [(required) = true, (length) = "1-64"];

  // The maximum number of concrete principals to return. Default 1000, max
  // 10000 (fan-out limit). Truncation sets `truncated=true`.
  int64 max_results = 4 [(value) = "<=10000"];
}

// Principal is a concrete grantee resolved by ExpandAccess — a USER or
// SERVICE_ACCOUNT (never a GROUP; groups are expanded to their members).
message Principal {
  // Type of the principal (USER / SERVICE_ACCOUNT). Reuses SubjectType.
  SubjectType type = 1;

  // Principal id (`usr…` | `sva…`).
  string id = 2;
}

message ExpandAccessResponse {
  // Concrete principals who hold <relation> on the object (group-expanded).
  // Deduplicated; a principal granted both directly and via a group appears
  // once (no double-grant anomaly).
  repeated Principal principals = 1;

  // True when the userset exceeded `max_results` and was truncated (the audit
  // answer is then a lower bound — narrow the query).
  bool truncated = 2;
}
