syntax = "proto3";

package kacho.cloud.iam.v1;

import "google/api/annotations.proto";
import "google/protobuf/field_mask.proto";
import "kacho/cloud/api/operation.proto";
import "kacho/cloud/iam/v1/service_account.proto";
import "kacho/cloud/operation/operation.proto";
import "kacho/cloud/validation.proto";
import "kacho/iam/authz/v1/authz_options.proto";

option go_package = "github.com/PRO-Robotech/kacho/pkg/api/kacho/cloud/iam/v1;iamv1";

// A set of methods for managing ServiceAccount resources.
//
// Без key-credentials RPC (CreateKey/ListKeys появятся позже через Ory Hydra
// client_credentials, OAuth2 token endpoint).
service ServiceAccountService {
  // Returns the specified ServiceAccount resource.
  rpc Get (GetServiceAccountRequest) returns (ServiceAccount) {
    option (google.api.http) = { get: "/iam/v1/serviceAccounts/{service_account_id}" };
    option (kacho.iam.authz.v1.permission)        = "iam.service_accounts.get";
    option (kacho.iam.authz.v1.required_relation) = "v_get";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "iam_service_account"
      from_request_field: "service_account_id"
    };
    option (kacho.iam.authz.v1.required_acr_min)  = "2";
  }

  // Retrieves the list of ServiceAccount resources. account_id фильтр обязателен.
  rpc List (ListServiceAccountsRequest) returns (ListServiceAccountsResponse) {
    option (google.api.http) = { get: "/iam/v1/serviceAccounts" };
    // ServiceAccount.List is default-deny via a SCOPE-FILTER, not
    // a PermissionDenied (the same model as User.List). The
    // kacho-iam handler returns 200 with only the ServiceAccounts in Accounts
    // where the principal is a member (EMPTY list when the caller is not a
    // member of the requested Account — never 403). The handler is the
    // authoritative scope-filter gate, so the gateway middleware exempts this
    // RPC from the per-RPC FGA Check. `<exempt>` skips authz, NOT
    // authentication — a valid JWT is still required.
    option (kacho.iam.authz.v1.permission) = "<exempt>";
  }

  // Creates a service account in the specified account.
  rpc Create (CreateServiceAccountRequest) returns (operation.Operation) {
    option (google.api.http) = { post: "/iam/v1/serviceAccounts" body: "*" };
    option (kacho.cloud.api.operation) = {
      metadata: "CreateServiceAccountMetadata"
      response: "ServiceAccount"
    };
    option (kacho.iam.authz.v1.permission)        = "iam.service_accounts.create";
    option (kacho.iam.authz.v1.required_relation) = "editor";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "account"
      from_request_field: "account_id"
    };
    option (kacho.iam.authz.v1.required_acr_min)  = "2";
  }

  // Updates the specified service account.
  // account_id is immutable.
  rpc Update (UpdateServiceAccountRequest) returns (operation.Operation) {
    option (google.api.http) = { patch: "/iam/v1/serviceAccounts/{service_account_id}" body: "*" };
    option (kacho.cloud.api.operation) = {
      metadata: "UpdateServiceAccountMetadata"
      response: "ServiceAccount"
    };
    option (kacho.iam.authz.v1.permission)        = "iam.service_accounts.update";
    option (kacho.iam.authz.v1.required_relation) = "v_update";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "iam_service_account"
      from_request_field: "service_account_id"
    };
    option (kacho.iam.authz.v1.required_acr_min)  = "2";
  }

  // Deletes the specified service account.
  // ServiceAccount с висящим AccessBinding → FailedPrecondition.
  rpc Delete (DeleteServiceAccountRequest) returns (operation.Operation) {
    option (google.api.http) = { delete: "/iam/v1/serviceAccounts/{service_account_id}" };
    option (kacho.cloud.api.operation) = {
      metadata: "DeleteServiceAccountMetadata"
      response: "google.protobuf.Empty"
    };
    option (kacho.iam.authz.v1.permission)        = "iam.service_accounts.delete";
    option (kacho.iam.authz.v1.required_relation) = "v_delete";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "iam_service_account"
      from_request_field: "service_account_id"
    };
    option (kacho.iam.authz.v1.required_acr_min)  = "2";
  }

  // Lists operations for the specified service account.
  rpc ListOperations (ListServiceAccountOperationsRequest) returns (ListServiceAccountOperationsResponse) {
    option (google.api.http) = { get: "/iam/v1/serviceAccounts/{service_account_id}/operations" };
    option (kacho.iam.authz.v1.permission)        = "iam.service_account_operationses.listOperations";
    option (kacho.iam.authz.v1.required_relation) = "v_list";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "iam_service_account"
      from_request_field: "service_account_id"
    };
    option (kacho.iam.authz.v1.required_acr_min)  = "2";
  }
}

message GetServiceAccountRequest {
  // ID of the ServiceAccount resource to return.
  string service_account_id = 1 [(required) = true, (length) = "<=20"];
}

message ListServiceAccountsRequest {
  // ID of the Account to list service accounts in. Required.
  string account_id = 1 [(required) = true, (length) = "<=20"];

  // The maximum number of results per page to return. Default value: 100.
  int64 page_size = 2 [(value) = "<=1000"];

  // Page token.
  string page_token = 3 [(length) = "<=100"];

  // A filter expression. Supports filtering by [ServiceAccount.name].
  string filter = 4 [(length) = "<=1000"];
}

message ListServiceAccountsResponse {
  // List of ServiceAccount resources.
  repeated ServiceAccount service_accounts = 1;

  // This token allows you to get the next page of results for list requests.
  string next_page_token = 2;
}

message CreateServiceAccountRequest {
  // ID of the Account that the ServiceAccount will belong to.
  string account_id = 1 [(required) = true, (length) = "<=20"];

  // Name of the service account. 3-63 characters long, unique within an Account.
  string name = 2 [(required) = true, (length) = "3-63", (pattern) = "[a-z]([-a-z0-9]{0,61}[a-z0-9])?"];

  // Description of the service account.
  string description = 3 [(length) = "<=256"];

  // Tenant-facing метки (делают SA label-selectable наравне с account/project).
  // Аннотации (size/key/value pattern) — паритет account/project/group request.
  map<string, string> labels = 4 [(kacho.cloud.size) = "<=64", (length) = "<=63", (pattern) = "[-_0-9a-z]*", (map_key).length = "1-63", (map_key).pattern = "[a-z][-_0-9a-z]*"];
}

message UpdateServiceAccountRequest {
  // ID of the ServiceAccount resource to update.
  string service_account_id = 1 [(required) = true, (length) = "<=20"];

  // Field mask. Allowed fields: name, description, labels.
  // account_id is immutable.
  google.protobuf.FieldMask update_mask = 2;

  // Name of the service account.
  string name = 3 [(pattern) = "|[a-z]([-a-z0-9]{0,61}[a-z0-9])?"];

  // Description of the service account.
  string description = 4 [(length) = "<=256"];

  // Tenant-facing метки (mutable; `labels` в update_mask).
  // Аннотации (size/key/value pattern) — паритет account/project/group request.
  map<string, string> labels = 5 [(kacho.cloud.size) = "<=64", (length) = "<=63", (pattern) = "[-_0-9a-z]*", (map_key).length = "1-63", (map_key).pattern = "[a-z][-_0-9a-z]*"];
}

message DeleteServiceAccountRequest {
  // ID of the ServiceAccount resource to delete.
  string service_account_id = 1 [(required) = true, (length) = "<=20"];
}

message ListServiceAccountOperationsRequest {
  // ID of the ServiceAccount resource to list operations for.
  string service_account_id = 1 [(required) = true, (length) = "<=20"];

  // The maximum number of results per page that should be returned.
  int64 page_size = 2 [(value) = "<=1000"];

  // Page token.
  string page_token = 3 [(length) = "<=100"];
}

message ListServiceAccountOperationsResponse {
  // List of operations for the specified service account.
  repeated operation.Operation operations = 1;

  // This token allows you to get the next page of results for list requests.
  string next_page_token = 2;
}
