syntax = "proto3";

package kacho.cloud.iam.v1;

import "google/api/annotations.proto";
import "google/protobuf/field_mask.proto";
import "kacho/cloud/api/operation.proto";
import "kacho/cloud/iam/v1/account.proto";
import "kacho/cloud/operation/operation.proto";
import "kacho/cloud/validation.proto";
import "kacho/iam/authz/v1/authz_options.proto";

option go_package = "github.com/PRO-Robotech/kacho/pkg/api/kacho/cloud/iam/v1;iamv1";

// A set of methods for managing Account resources.
service AccountService {
  // Returns the specified Account resource.
  rpc Get (GetAccountRequest) returns (Account) {
    option (google.api.http) = { get: "/iam/v1/accounts/{account_id}" };
    option (kacho.iam.authz.v1.permission)        = "iam.accounts.get";
    option (kacho.iam.authz.v1.required_relation) = "v_get";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "account"
      from_request_field: "account_id"
    };
    option (kacho.iam.authz.v1.required_acr_min) = "1";
  }

  // Retrieves the list of Account resources.
  rpc List (ListAccountsRequest) returns (ListAccountsResponse) {
    option (google.api.http) = { get: "/iam/v1/accounts" };
    // top-level List has no scope id — the gateway cannot build a
    // single `<type>:<id>` Check object, and a `project:*` Check would
    // wrongly deny every caller with 403. List is default-deny via a
    // SCOPE-FILTER instead: the kacho-iam handler returns 200 with only the
    // Accounts the principal is a member of (EMPTY list when none — never a
    // PermissionDenied). The handler is the authoritative gate, so the
    // gateway middleware exempts this RPC. Anonymous is still rejected by the
    // IAM anti-anonymous interceptor.
    option (kacho.iam.authz.v1.permission) = "<exempt>";
  }

  // Creates an account using the data specified in the request.
  // Method starts an asynchronous operation that can be cancelled while it is in progress.
  rpc Create (CreateAccountRequest) returns (operation.Operation) {
    option (google.api.http) = { post: "/iam/v1/accounts" body: "*" };
    option (kacho.cloud.api.operation) = {
      metadata: "CreateAccountMetadata"
      response: "Account"
    };
    // Account.Create is self-service — a freshly-authenticated user
    // creates their own Account (no parent scope to FGA-check). The IAM
    // handler enforces `RequireOwnerMatchesPrincipal` (owner_user_id must
    // equal the calling principal — anti-hijacking). The
    // api-gateway per-RPC middleware therefore exempts it; anonymous is still
    // rejected by the IAM anti-anonymous interceptor.
    option (kacho.iam.authz.v1.permission) = "<exempt>";
  }

  // Updates the specified account.
  // Note: owner_user_id is immutable after Account.Create. Attempt to include it in
  // update_mask returns InvalidArgument.
  rpc Update (UpdateAccountRequest) returns (operation.Operation) {
    option (google.api.http) = { patch: "/iam/v1/accounts/{account_id}" body: "*" };
    option (kacho.cloud.api.operation) = {
      metadata: "UpdateAccountMetadata"
      response: "Account"
    };
    option (kacho.iam.authz.v1.permission)        = "iam.accounts.update";
    option (kacho.iam.authz.v1.required_relation) = "v_update";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "account"
      from_request_field: "account_id"
    };
    option (kacho.iam.authz.v1.required_acr_min) = "1";
  }

  // Deletes the specified account.
  // Account with non-empty Projects returns FailedPrecondition.
  rpc Delete (DeleteAccountRequest) returns (operation.Operation) {
    option (google.api.http) = { delete: "/iam/v1/accounts/{account_id}" };
    option (kacho.cloud.api.operation) = {
      metadata: "DeleteAccountMetadata"
      response: "google.protobuf.Empty"
    };
    option (kacho.iam.authz.v1.permission)        = "iam.accounts.delete";
    option (kacho.iam.authz.v1.required_relation) = "v_delete";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "account"
      from_request_field: "account_id"
    };
    option (kacho.iam.authz.v1.required_acr_min)  = "2";
  }

  // Lists operations for the specified account (operations on the account
  // resource itself, filtered by resource_id=account_id).
  rpc ListOperations (ListAccountOperationsRequest) returns (ListAccountOperationsResponse) {
    option (google.api.http) = { get: "/iam/v1/accounts/{account_id}/operations" };
    option (kacho.iam.authz.v1.permission)        = "iam.account_operationses.listOperations";
    option (kacho.iam.authz.v1.required_relation) = "v_list";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "account"
      from_request_field: "account_id"
    };
    option (kacho.iam.authz.v1.required_acr_min) = "1";
  }

  // Lists ALL IAM operations whose owning resource belongs to the specified
  // account — the module-level account-scoped operations feed. Aggregates
  // operations of every account-owned resource (Account/Project/SA/Group +
  // their member-changes + DeleteUser + account-scoped AccessBinding) via the
  // denormalized `account_id` column written synchronously at op-creation
  // Sync read; cursor `(created_at,id)` ASC.
  rpc ListAllOperations (ListAllAccountOperationsRequest) returns (ListAllAccountOperationsResponse) {
    option (google.api.http) = { get: "/iam/v1/accounts/{account_id}/operations:all" };
    option (kacho.iam.authz.v1.permission)        = "iam.account_operationses.listAll";
    option (kacho.iam.authz.v1.required_relation) = "v_list";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "account"
      from_request_field: "account_id"
    };
    option (kacho.iam.authz.v1.required_acr_min) = "1";
  }
}

message GetAccountRequest {
  // ID of the Account resource to return.
  string account_id = 1 [(required) = true, (length) = "<=20"];
}

message ListAccountsRequest {
  // The maximum number of results per page to return. Default value: 100.
  int64 page_size = 1 [(value) = "<=1000"];

  // Page token. To get the next page of results, set [page_token] to the
  // [ListAccountsResponse.next_page_token] returned by a previous list request.
  string page_token = 2 [(length) = "<=100"];

  // A filter expression that filters resources listed in the response.
  // The expression must specify:
  // 1. The field name. Currently you can use filtering only on the [Account.name] field.
  // 2. An `=` operator.
  // 3. The value in double quotes (`"`).
  string filter = 3 [(length) = "<=1000"];
}

message ListAccountsResponse {
  // List of Account resources.
  repeated Account accounts = 1;

  // This token allows you to get the next page of results for list requests.
  string next_page_token = 2;
}

message CreateAccountRequest {
  // Name of the account. Must be unique within the IAM domain. 3-63 characters long.
  string name = 1 [(required) = true, (length) = "3-63", (pattern) = "[a-z]([-a-z0-9]{0,61}[a-z0-9])?"];

  // Description of the account.
  string description = 2 [(length) = "<=256"];

  // Resource labels as `key:value` pairs.
  map<string, string> labels = 3 [(kacho.cloud.size) = "<=64", (length) = "<=63", (pattern) = "[-_0-9a-z]*", (map_key).length = "1-63", (map_key).pattern = "[a-z][-_0-9a-z]*"];

  // OUTPUT-ONLY (redesign-2026 F1). ownerUserId° is derived from the
  // authenticated caller — it MUST NOT be set on input. Supplying ANY value
  // (even the caller's own id) is rejected sync with INVALID_ARGUMENT
  // "Illegal argument ownerUserId (derived from caller)", first statement,
  // before the Operation is minted. The verified principal becomes the owner
  // and the subject of the owner AccessBinding co-committed by the Create saga.
  string owner_user_id = 4 [(length) = "<=20"];
}

message UpdateAccountRequest {
  // ID of the Account resource to update.
  string account_id = 1 [(required) = true, (length) = "<=20"];

  // Field mask that specifies which fields of the Account resource are going to be updated.
  // Allowed fields: name, description, labels.
  // owner_user_id is immutable; включение в update_mask вернет InvalidArgument.
  google.protobuf.FieldMask update_mask = 2;

  // Name of the account.
  string name = 3 [(pattern) = "|[a-z]([-a-z0-9]{0,61}[a-z0-9])?"];

  // Description of the account.
  string description = 4 [(length) = "<=256"];

  // Resource labels as `key:value` pairs.
  map<string, string> labels = 5 [(kacho.cloud.size) = "<=64", (length) = "<=63", (pattern) = "[-_0-9a-z]*", (map_key).length = "1-63", (map_key).pattern = "[a-z][-_0-9a-z]*"];
}

message DeleteAccountRequest {
  // ID of the Account resource to delete.
  string account_id = 1 [(required) = true, (length) = "<=20"];
}

message ListAccountOperationsRequest {
  // ID of the Account resource to list operations for.
  string account_id = 1 [(required) = true, (length) = "<=20"];

  // The maximum number of results per page that should be returned. Default value: 100.
  int64 page_size = 2 [(value) = "<=1000"];

  // Page token. To get the next page of results, set [page_token] to the
  // [ListAccountOperationsResponse.next_page_token] returned by a previous list request.
  string page_token = 3 [(length) = "<=100"];
}

message ListAccountOperationsResponse {
  // List of operations for the specified account.
  repeated operation.Operation operations = 1;

  // This token allows you to get the next page of results for list requests.
  string next_page_token = 2;
}

message ListAllAccountOperationsRequest {
  // ID of the Account whose IAM operations are aggregated. Filters by the
  // denormalized `account_id` column on the operations rows.
  string account_id = 1 [(required) = true, (length) = "<=20"];

  // The maximum number of results per page that should be returned. Default value: 100.
  int64 page_size = 2 [(value) = "<=1000"];

  // Page token. To get the next page of results, set [page_token] to the
  // [ListAllAccountOperationsResponse.next_page_token] returned by a previous list request.
  string page_token = 3 [(length) = "<=100"];
}

message ListAllAccountOperationsResponse {
  // List of IAM operations aggregated for the specified account.
  repeated operation.Operation operations = 1;

  // This token allows you to get the next page of results for list requests.
  string next_page_token = 2;
}
