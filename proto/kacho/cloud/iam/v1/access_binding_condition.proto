syntax = "proto3";

package kacho.cloud.iam.v1;

import "google/protobuf/timestamp.proto";
import "kacho/cloud/validation.proto";

option go_package = "github.com/PRO-Robotech/kacho/pkg/api/kacho/cloud/iam/v1;iamv1";

// An AccessBindingCondition resource — Conditions overlay on top of an
// AccessBinding (ABAC over ReBAC).
//
// One Condition row attaches to at most one AccessBinding (`UNIQUE (binding_id)`).
// The `expression_kind` is restricted by DB CHECK to a whitelisted predicate
// set (see Kind enum below); `params` carries kind-specific JSON (e.g.
// `{"max_age_seconds":900,"required_amr":["webauthn"]}` for MFA_FRESH or
// `{"cidrs":["10.0.0.0/8"]}` for SOURCE_IP_IN_RANGE). Full CEL evaluation is
// performed by OPA bundles; storage validates schema only.
//
// Resource id prefix: `cond`.
message AccessBindingCondition {
  // Whitelisted predicate kinds.
  enum Kind {
    KIND_UNSPECIFIED    = 0;
    MFA_FRESH           = 1;
    NON_EXPIRED         = 2;
    SOURCE_IP_IN_RANGE  = 3;
    BREAK_GLASS_WINDOW  = 4;
    JIT_WINDOW          = 5;
    BUSINESS_HOURS      = 6;
    DEVICE_COMPLIANT    = 7;
  }

  // ID of the condition.
  string id = 1 [(required) = true, (length) = "<=20", (pattern) = "cond_[0-9a-z]+"];

  // ID of the AccessBinding this condition applies to. 1:1
  // (one Condition row max per AccessBinding).
  string binding_id = 2 [(required) = true, (length) = "<=20"];

  // Predicate kind. Must be one of the whitelisted Kind values; the DB
  // CHECK constraint `access_binding_conditions_expression_whitelist_ck`
  // enforces this at storage time (the on-the-wire string form is
  // stored as `mfa_fresh` / `non_expired` / … in lowercase).
  Kind expression_kind = 3 [(required) = true];

  // Kind-specific JSON parameters. Shape validated against `expression_kind`
  // at the service layer; storage layer treats this as opaque JSONB.
  bytes params_json = 4;

  // Creation timestamp.
  google.protobuf.Timestamp created_at = 5;
}
