syntax = "proto3";

package kacho.cloud.storage.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/PRO-Robotech/kacho/pkg/api/kacho/cloud/storage/v1;storagev1";

// A Snapshot resource — a point-in-time copy of a Volume, owned by kacho-storage.
message Snapshot {

  enum Status {
    STATUS_UNSPECIFIED = 0;

    // Snapshot is being created.
    CREATING = 1;

    // Snapshot is ready to use.
    READY = 2;

    // Snapshot is being deleted.
    DELETING = 3;

    // Snapshot encountered a problem and cannot operate.
    ERROR = 4;
  }

  // ID of the snapshot. Prefix "snp". Immutable.
  string id = 1;

  // ID of the project that owns the snapshot. Immutable.
  string project_id = 2;

  // Creation timestamp. Truncated to seconds on the wire.
  google.protobuf.Timestamp created_at = 3;

  // Name of the snapshot. 1-63 characters long.
  string name = 4;

  // Description of the snapshot. 0-256 characters long.
  string description = 5;

  // Resource labels as `key:value` pairs. Maximum of 64 per resource.
  map<string, string> labels = 6;

  // ID of the source volume used to create this snapshot. Same-DB reference to
  // Volume. Immutable.
  string source_volume_id = 7;

  // Size of the snapshot, specified in bytes.
  int64 size_bytes = 8;

  // Current status of the snapshot.
  Status status = 9;
}
