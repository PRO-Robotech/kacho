version: v2
plugins:
  - local: protoc-gen-go
    out: ../pkg/api
    opt: paths=source_relative
  - local: protoc-gen-go-grpc
    out: ../pkg/api
    opt:
      - paths=source_relative
      - require_unimplemented_servers=true
  - local: protoc-gen-grpc-gateway
    out: ../pkg/api
    opt:
      - paths=source_relative
      - generate_unbound_methods=true
inputs:
  - directory: .
    paths:
      - kacho
