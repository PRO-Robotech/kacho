name: continuous-fuzz

# Nightly fuzzing of the user-controlled parsers: FuzzDPoPProof drives the real
# DPoP proof validator, FuzzAuthzMiddleware drives the real REST route resolver.
# A crash fails the job (pipefail) and uploads the reproducing corpus entry.
# Single-repo: kacho-corelib and proto-stubs resolve from GitHub via go.mod.

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      fuzztime:
        description: 'Duration (e.g. 1h)'
        required: false
        default: '1h'

permissions:
  contents: read
  issues: write

jobs:
  fuzz:
    name: fuzz ${{ matrix.target }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        target:
          - FuzzDPoPProof
          - FuzzAuthzMiddleware
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: restore fuzz corpus
        uses: actions/cache@v4
        with:
          path: internal/fuzz/testdata/fuzz/${{ matrix.target }}
          key: fuzz-corpus-${{ matrix.target }}-${{ github.run_id }}
          restore-keys: |
            fuzz-corpus-${{ matrix.target }}-

      - name: run fuzz
        env:
          FUZZTIME: ${{ inputs.fuzztime || '1h' }}
        run: |
          set -o pipefail
          go test -run='^$' -fuzz="${{ matrix.target }}" -fuzztime="${FUZZTIME}" \
            ./internal/fuzz/ 2>&1 | tee fuzz-output.log

      - name: upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-failure-${{ matrix.target }}
          path: |
            internal/fuzz/testdata/fuzz/${{ matrix.target }}/
            fuzz-output.log
