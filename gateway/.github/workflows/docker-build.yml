# docker-build — multi-arch DockerHub image build & push.
#
# Назначение: собирает Docker-образ kacho-api-gateway под linux/amd64 + linux/arm64 и
# пушит multi-arch manifest в DockerHub. Дополняет (НЕ заменяет) `ci.yaml`.
#
# ─── Почему ОДНА job, а не per-arch + manifest-combine ───────────────────
# Manifest-combine (`docker manifest create`/`imagetools create`) ЧИТАЕТ
# (pull!) per-arch манифесты из docker.io. На free-tier DockerHub pull-бюджет
# (200/6h на аккаунт) выжирается newman-e2e (kind тянет ~15 docker.io-образов
# на прогон) + самими билдами — и при исчерпанном бюджете combine падает с
# `toomanyrequests`, хотя оба билда зеленые. Любая сборка манифеста ОБЯЗАНА
# перечитать source-манифесты из реестра, поэтому combine-подход для нас
# неприемлем.
#
# Решение: ОДИН `buildx build --platform linux/amd64,linux/arm64 --push` —
# собирает обе платформы локально в buildkit и пушит ОДИН index напрямую.
# НИ ОДНОГО docker.io-pull: base-образы с mirror.gcr.io, buildkit/binfmt с
# mirror.gcr.io, а `push` против pull-лимита не считается. Dockerfile —
# cross-compile-aware (`FROM --platform=$BUILDPLATFORM golang` + `GOARCH=
# $TARGETARCH go build`), поэтому Go-компиляция идет нативно на amd64 и
# кросс-компилит arm64 (быстро); под QEMU эмулируется только крошечный
# финальный alpine-слой (`apk add ca-certificates`).
#
# ─── Требуемые GitHub secrets ────────────────────────────────────────────
# DOCKERHUB_USERNAME — Docker Hub username (он же namespace для образов).
# DOCKERHUB_TOKEN    — Docker Hub access token (Read/Write/Delete scope).
#
# Tags: <branch>-<sha8> (multiarch index).

name: docker-build

on:
  push:
    branches:
      - main
      - "KAC-*"
      - "fix/*"
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+rc[0-9]+"

permissions:
  contents: read

env:
  IMAGE_NAME: kacho-api-gateway

jobs:
  docker-build:
    name: build & push multiarch
    runs-on: ubuntu-latest
    steps:
      # Single-repo build: per-service proto-stubs (kacho-compute/geo/iam/nlb/vpc)
      # и kacho-corelib тянутся как versioned-модули из GitHub (go.mod без replace),
      # поэтому sibling-checkout'ы больше не нужны.
      - uses: actions/checkout@v4
        with: { path: kacho-api-gateway }

      - uses: benjlevesque/short-sha@v3.0
        id: short-sha
        with: { length: 8 }

      - name: Create sanitized branch name
        id: sanitize
        run: echo "branch=$(echo "${GITHUB_REF_NAME}" | sed 's/\//-/g')" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Enable QEMU emulation
        uses: docker/setup-qemu-action@v3
        with:
          # binfmt from a mirror — keeps the DockerHub pull budget free.
          image: mirror.gcr.io/tonistiigi/binfmt:latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          # buildkit from a mirror, not docker.io.
          driver-opts: image=mirror.gcr.io/moby/buildkit:buildx-stable-1

      - name: Configure Buildx cache
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.ref_name }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build and push (multiarch)
        uses: docker/build-push-action@v6
        with:
          context: kacho-api-gateway
          file: ./kacho-api-gateway/Dockerfile
          push: true
          provenance: false
          platforms: linux/amd64,linux/arm64
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.sanitize.outputs.branch }}-${{ steps.short-sha.outputs.sha }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Move new cache
        if: always()
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache 2>/dev/null || true
