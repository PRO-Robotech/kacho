name: api-gateway
replicas: 1
image: kacho-api-gateway:dev
imagePullPolicy: IfNotPresent

port: 8080
tlsPort: 8443
# Dedicated cluster-internal admin REST listener. It is the ONLY listener that
# serves Internal* REST paths (/vpc/v1/addressPools, `:internal` projections,
# InternalRegistry/Cluster/Operations admin). SECURITY (ban #6): the ingress
# MUST NOT target this port ‚Äî it is exposed only as the cluster-internal
# `internal-rest` Service port for admin-UI / port-forward / in-cluster tooling.
# Every other listener (cmux :8080 that the ingress hits, and TLS :8443) is
# external and 404s Internal* REST. Set internalRestPort to "" to disable.
internalRestPort: 8081

# –ê–¥—Ä–µ—Å–∞ –∞–∫—Ç–∏–≤–Ω—ã—Ö backend-—Å–µ—Ä–≤–∏—Å–æ–≤ (KACHO_API_GATEWAY_*_GRPC env vars).
# –ü—É–±–ª–∏—á–Ω—ã–µ RPC nlb –æ–±—Å–ª—É–∂–∏–≤–∞—é—Ç—Å—è –ø–æ–¥ /nlb/v1/*.
backends:
  vpc: vpc.kacho.svc.cluster.local:9090
  vpcInternal: vpc.kacho.svc.cluster.local:9091
  compute: compute.kacho.svc.cluster.local:9090
  computeInternal: compute.kacho.svc.cluster.local:9091
  # kacho-iam public + internal endpoints
  iam: kacho-iam.kacho.svc.cluster.local:9090
  iamInternal: kacho-iam-internal.kacho.svc.cluster.local:9091
  # kacho-nlb public + internal endpoints
  nlb: kacho-nlb.kacho.svc.cluster.local:9090
  nlbInternal: kacho-nlb.kacho.svc.cluster.local:9091
  # kacho-geo public + internal endpoints (Geography Region/Zone leaf service).
  # The geo k8s Service is "kacho-geo" / "kacho-geo-internal" (mirrors kacho-iam /
  # kacho-iam-internal). The bare "geo.kacho.svc.cluster.local" host does NOT resolve
  # (NXDOMAIN) ‚Üí grpc "no children to pick from" 503 on every /geo/v1/* request.
  geo: kacho-geo.kacho.svc.cluster.local:9090
  geoInternal: kacho-geo-internal.kacho.svc.cluster.local:9091
  # kacho-registry public + internal endpoints (OCI/Docker image registry leaf).
  # Public RegistryService on /registries/v1/*; InternalRegistryService (GC/stats)
  # on the internal :9091 mux (ban #6). The registry data-plane :8080 is NOT
  # gateway-routed ‚Äî docker push/pull go through the registry.kacho.local ingress.
  registry: kacho-registry.kacho.svc.cluster.local:9090
  registryInternal: kacho-registry.kacho.svc.cluster.local:9091

# TLS termination –Ω–∞ api-gateway pod. –í–∫–ª—é—á–∞–µ—Ç—Å—è –∞–≤—Ç–æ–º–∞—Ç–∏—á–µ—Å–∫–∏ –∫–æ–≥–¥–∞ tls.secretName —É–∫–∞–∑–∞–Ω.
# Cert –ø–æ—Å—Ç–∞–≤–ª—è–µ—Ç—Å—è –≤–Ω–µ—à–Ω–µ —á–µ—Ä–µ–∑ `kubectl create secret tls api-gateway-tls --cert=tls.crt --key=tls.key`.
# –ò—Å–ø–æ–ª—å–∑—É–µ—Ç—Å—è TLS-only –∫–ª–∏–µ–Ω—Ç–∞–º–∏.
tls:
  enabled: true
  secretName: api-gateway-tls
  certPath: /etc/api-gateway/tls/tls.crt
  keyPath: /etc/api-gateway/tls/tls.key

ingress:
  enabled: true
  host: api.kacho.local
  proxyReadTimeout: "120"

# Externally advertised endpoint that clients dial for every service.
# Production: api.kacho.local:443 (or whatever externally resolvable host:port).
# Dev (kind + port-forward): override to localhost:18443.
advertisedEndpoint: api.kacho.local:443

# OIDC ‚Äî Zitadel auth-flow handlers /iam/v1/auth/{login,callback,me,logout}.
# Server-side (token exchange + userinfo) —Ö–æ–¥–∏—Ç –Ω–∞ `issuer` (cluster-internal),
# browser-redirect ‚Äî –Ω–∞ `externalIssuer` (publicly reachable host).
# Off-by-default. –í–∫–ª—é—á–∞–µ—Ç—Å—è –≤ per-cluster overrides.
oidc:
  enabled: false
  issuer: ""           # cluster-internal Zitadel URL (token exchange / userinfo)
  externalIssuer: ""   # public-facing Zitadel URL (browser redirect)
  clientId: ""
  # ClientId —á–µ—Ä–µ–∑ k8s Secret (–∑–∞–ø–æ–ª–Ω—è–µ—Ç—Å—è zitadel-oidc-bootstrap Job –∏–∑ umbrella).
  # –ï—Å–ª–∏ –∑–∞–¥–∞–Ω ‚Äî –ø–µ—Ä–µ–±–∏–≤–∞–µ—Ç clientId. Optional=true ‚Üí pod —Å—Ç–∞—Ä—Ç—É–µ—Ç –¥–∞–∂–µ –µ—Å–ª–∏ secret
  # –µ—â–µ –Ω–µ —Å–æ–∑–¥–∞–Ω (post-install Job –µ–≥–æ apply'–∏—Ç).
  # clientIdSecretRef:
  #   name: kacho-iam-oidc-client
  #   key: client_id
  #   optional: true
  clientIdSecretRef: {}
  redirectUri: ""
  # Confidential client secret. Prefer clientSecretSecretRef (k8s Secret) over the
  # inline clientSecret so the secret is never rendered into the PodSpec / Helm
  # release (CWE-522). When set it overrides clientSecret. Optional=true ‚Üí pod
  # starts even if the Secret is not yet created (post-install Job applies it).
  # clientSecretSecretRef:
  #   name: kacho-iam-oidc-client
  #   key: client_secret
  #   optional: true
  clientSecretSecretRef: {}
  clientSecret: ""

# AuthN ‚Äî auth-interceptor configuration.
#   mode:
#     - "dev"               : Bearer optional. Valid HS256 Bearer signed with
#                             `devSecret` ‚Üí real Principal; missing/invalid ‚Üí
#                             anonymous.
#     - "production"        : Bearer required, Hydra JWKS RS256 validation.
#     - "production-strict" : production + reject missing Bearer.
#   devSecret: HS256 signing secret for dev-mode JWT validation. Empty ‚Üí all
#     Bearer tokens are ignored in dev-mode (every principal collapses to
#     anonymous / system:bootstrap). MUST be set on the dev stand so per-user
#     JWTs are distinguishable. Dev-only ‚Äî production uses RS256 / Hydra JWKS,
#     never this secret.
#
# Default {} ‚Üí no KACHO_API_GATEWAY_AUTHN_* env emitted; the api-gateway Go
# config default (mode=dev, empty devSecret) applies ‚Äî identical to the
# behaviour before this block existed, so prod overlays that omit `authn`
# are unaffected. The dev overlay (values.dev.yaml) sets this explicitly.
#
# Prefer devSecretSecretRef (k8s Secret) over the inline devSecret so the HMAC
# signing key is never rendered into the PodSpec / Helm release (CWE-522). When
# set it overrides devSecret. Example:
#   authn:
#     mode: dev
#     devSecretSecretRef:
#       name: kacho-api-gateway-authn
#       key: dev_secret
#       optional: true
authn: {}

# Hydra ‚Äî OAuth2/OIDC token verification.
# The auth path verifies Hydra-issued RS256 access tokens by fetching Hydra's
# JWKS. config.go reads KACHO_HYDRA_JWKS_URL (explicit) and otherwise derives
# `{KACHO_HYDRA_ISSUER}/.well-known/jwks.json` ‚Äî whose default issuer
# (`https://hydra.api.kacho.cloud`) is NOT reachable from inside the cluster
# (in dev Hydra's self.issuer is `http://localhost:28080/...`). So the JWKS URL
# MUST be set explicitly to the cluster-internal Hydra PUBLIC Service. Unset ‚Üí
# no env emitted; the Go config default applies (zero regression for overlays
# that don't opt in). The dev/prod overlays set `jwksUrl` to the in-cluster
# `kacho-umbrella-hydra-public:4444/.well-known/jwks.json`.
#   jwksUrl:    explicit cluster-internal Hydra JWKS endpoint (reachable from
#               the gateway pod). Drives KACHO_HYDRA_JWKS_URL.
#   issuer:     expected `iss` claim + base for endpoint derivation. Drives
#               KACHO_HYDRA_ISSUER. Optional; jwksUrl alone is enough for JWKS.
hydra:
  jwksUrl: ""
  issuer: ""

# AuthZ ‚Äî per-RPC authorization middleware.
#   enabled: when true, every authenticated request is gated by a
#     `kacho.cloud.iam.v1.AuthorizeService.Check` fan-out. When false (the
#     Go-config default) the middleware is wired but pass-through ‚Äî only
#     anonymous-mutating requests are blocked (by kacho-iam authzguard), so
#     authenticated-but-unauthorized requests leak through.
#   failOpen: when true, transient IAM-Check failures (Unavailable / timeout)
#     ALLOW the request. Production edition MUST set false (fail-closed). The
#     access-matrix newman suite also needs false so DENY decisions are not
#     masked by IAM hiccups.
#   iamAuthorizeUrl: explicit gRPC address of kacho-iam AuthorizeService
#     (public port 9090). Empty ‚Üí derived from the `iam` backend address
#     (KACHO_API_GATEWAY_IAM_GRPC). AuthorizeService is the PUBLIC RPC ‚Äî it is
#     NOT routed through the internal :9091 listener (loop-prevention #6).
#
# Default {} ‚Üí no KACHO_API_GATEWAY_AUTHZ_* env emitted; Go-config defaults
# (enabled=false, failOpen=false) apply. The dev overlay enables it.
authz: {}

# ‚îÄ‚îÄ‚îÄ Deployment-environment label (KACHO_APP_ENV) ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
# Cross-cutting, domain-LESS label (config.go binds `envconfig:"KACHO_APP_ENV"`,
# NOT the per-domain KACHO_API_GATEWAY_* scheme) that keys the composition-root
# production guards: validateProductionAuthzConfig (refuses authn.mode=dev / dev
# HMAC secret) AND validateProductionInternalListener (refuses an insecure internal
# :9091 listener). Secure-by-default: only the explicit dev-class labels
# "dev"/"local"/"test" tolerate the dev auth + insecure-listener posture; every
# other value ‚Äî INCLUDING empty/unset ‚Äî is production-class and fails closed, so a
# forgotten label can never silently downgrade to dev.
#
# Default "" ‚Üí no env emitted ‚Üí the Go default "" (production-class) applies (zero
# regression for overlays that omit it). The dev overlay sets appEnv: dev; the
# production overlays set appEnv: production (explicit) ‚Äî both first-class here,
# replacing the earlier generic extraEnv.KACHO_APP_ENV passthrough.
appEnv: ""

# ‚îÄ‚îÄ‚îÄ cluster-internal :9091 gRPC listener security (InternalAuthzCacheService) ‚îÄ‚îÄ
# The dedicated internal listener hosts InternalAuthzCacheService.InvalidateSubject,
# dialed by the kacho-iam subject-change push-drainer. security.md invariant #1/#4:
# the internal perimeter is NOT a trusted zone ‚Üí mTLS transport (AuthN) + a per-RPC
# SPIFFE caller allow-list (AuthZ) are mandatory. In a production-class env (appEnv
# not dev/local/test) validateProductionInternalListener FATAL-fails the boot unless
# mtls.enable=true here ‚Äî before this first-class block the only way to wire it was
# the generic extraEnv passthrough, a dev-masked gap that crash-looped the gateway
# under values.prod.yaml.
#
# Server cert: reuses the pod's already-mounted EXTERNAL TLS server secret (tls.*
# above ‚Üí /etc/api-gateway/tls) ‚Äî cert-manager issues it from the internal CA on the
# mTLS stands, so the iam push-drainer verifies it against the same internal CA it
# dials with. Incoming client certs are verified against the internal CA
# (KACHO_API_GATEWAY_MTLS_CA_FILE = mtls.mountPath/ca.crt), so this block REQUIRES
# mtls.enable=true (which mounts the internal-CA bundle + sets MTLS_CA_FILE); the
# deployment template hard-fails the render otherwise (fail-fast, not a silent
# half-secured boot). allowedSpiffe = the verified client SANs authorised to invoke
# the listener ‚Äî the iam module identity is the ONLY legitimate caller.
internalListener:
  mtls:
    enable: false
    certFile: /etc/api-gateway/tls/tls.crt
    keyFile: /etc/api-gateway/tls/tls.key
  allowedSpiffe:
    - spiffe://kacho.cloud/ns/kacho/sa/kacho-iam
  # gRPC server-reflection on the internal listener ‚Äî debug/incident only (it
  # enumerates the internal admin surface). Default off.
  reflection: false

# ‚îÄ‚îÄ‚îÄ mTLS ‚Äî per-edge backend-dial (cert-manager internal-CA) ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
# api-gateway is a backend-dial CLIENT (it terminates EXTERNAL TLS separately via
# `tls.*` above ‚Äî that is unrelated). enable=false (default) ‚Üí –ù–ò client-cert
# secret, –ù–ò KACHO_API_GATEWAY_MTLS_* env ‚Üí every backend dial insecure, —Ç–µ–∫—É—â–µ–µ
# dev (–Ω—É–ª–µ–≤–∞—è —Ä–µ–≥—Ä–µ—Å—Å–∏—è). umbrella –ø—Ä–æ–∫–∏–¥—ã–≤–∞–µ—Ç .mtls.enable + per-edge —Ñ–ª–∞–≥–∏.
#
# One shared "api-gateway" client identity across all edges: the cert-manager
# `api-gateway-client-tls` secret. Per-edge ENABLE toggles each edge
# independently. SERVER_NAME is INTENTIONALLY left unset ‚Üí config.go
# EdgeTLSClient derives it from each dial-host (`hostFromAddr`), so the iam/nlb
# edges verify against BOTH their public (kacho-iam / kacho-nlb) AND internal
# (kacho-iam-internal / kacho-nlb-internal) dial-hosts ‚Äî both are in the peer
# server-SAN. A single override would force one name and break the other.
mtls:
  enable: false
  # ‚îÄ‚îÄ‚îÄ internal-CA leaf-cert issuance (this chart owns its Certificate) ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
  # client-only: api-gateway dials backends over mTLS; its external server TLS uses
  # the separate `tls.*` secret above. URI-SAN saName MUST match the IAM module-SA
  # seed: kacho-api-gateway ‚Üí sva(md5("kacho-api-gateway")) (identity-only role).
  issuer:
    name: kacho-internal-ca
    kind: ClusterIssuer   # ClusterIssuer (cluster-scoped), NOT namespaced Issuer
  spiffe:
    trustDomain: kacho.cloud
    namespace: kacho
    saName: kacho-api-gateway
  leafDuration: 2160h
  leafRenewBefore: 720h
  clientSecretName: api-gateway-client-tls   # cert key = api-gateway
  mountPath: /etc/api-gateway/mtls           # <mp>/{tls.crt,tls.key,ca.crt}
  # hybrid: external TLS listener = VerifyClientCertIfGiven + internal CA as
  # ClientCAs ‚Üí cert-bearing client authenticates by cert SPIFFE identity, browser
  # (no cert) falls back to JWT. Internal listeners stay strict mTLS. Default off.
  hybridExternal: false
  edges:
    vpc: false        # gateway‚Üívpc (+ vpcInternal)
    compute: false    # gateway‚Üícompute (+ computeInternal)
    iam: false        # gateway‚Üíiam (+ iamInternal); shared by authz/subject dials
    nlb: false        # gateway‚Üínlb (+ nlbInternal)
    geo: false        # gateway‚Üígeo (+ geoInternal); SERVER_NAME unset ‚Üí derived per
                      # dial-host (kacho-geo / kacho-geo-internal), both in peer SAN
    registry: false   # gateway‚Üíregistry (+ registryInternal); SERVER_NAME unset ‚Üí
                      # derived per dial-host (kacho-registry / kacho-registry-internal)
    storage: false    # gateway‚Üístorage (+ storageInternal); SERVER_NAME unset ‚Üí
                      # derived per dial-host (kacho-storage), in peer SAN

# Arbitrary env vars escape-hatch (key: value).
extraEnv: {}

# Default replicas=1; HPA autoscales up to 10 on CPU 70%.
# api-gateway is the request-side bottleneck (~3500 RPS/pod baseline)
# under the in-cluster 10k load test.
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 1000m
    memory: 512Mi

# NOTE (per-pod state under HPA): the Idempotency-Key single-flight store and the
# DPoP jti replay cache are per-pod in-memory. With maxReplicas > 1 they are NOT
# global ‚Äî same-key double-submits that land on different pods can each proceed,
# and a captured DPoP proof can be replayed at most once per replica within the
# 60s iat-freshness window. This is an accepted residual with compensating
# controls (downstream services are the real exactly-once authority via DB-level
# invariants; replay is bounded by freshness). See
# docs/architecture/known-divergences.md ¬ß3. Do NOT cap maxReplicas to 1 to
# "fix" it ‚Äî that trades an edge case for a capacity regression on the RPS
# bottleneck; the correct fix is a shared store (Postgres/Redis).
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

# INFRA sec-hardening ‚Äî –µ–¥–∏–Ω—ã–π security-floor, –∏–¥–µ–Ω—Ç–∏—á–Ω—ã–π kacho-iam/geo/nlb/registry.
#
# –ó–∞–≤–µ–¥—ë–Ω 2026-07-16: trivy config-—Å–∫–∞–Ω –≤–ø–µ—Ä–≤—ã–µ –ø–æ–∫—Ä—ã–ª –í–ï–°–¨ —Ä–µ–ø–æ–∑–∏—Ç–æ—Ä–∏–π –∏ –Ω–∞—à—ë–ª, —á—Ç–æ
# securityContext –µ—Å—Ç—å –ª–∏—à—å —É –ø–æ–ª–æ–≤–∏–Ω—ã —Å–µ—Ä–≤–∏—Å–æ–≤. –í polyrepo IaC-—Å–∫–∞–Ω –±—ã–ª –¢–û–õ–¨–ö–û —É
# kacho-iam, –∞ –≤ —Ç–æ–º —Ä–µ–ø–æ –Ω–µ—Ç –Ω–∏ –æ–¥–Ω–æ–≥–æ k8s-–º–∞–Ω–∏—Ñ–µ—Å—Ç–∞ (—á–∞—Ä—Ç—ã –∂–∏–ª–∏ –≤ kacho-deploy) ‚Äî
# –≥–µ–π—Ç –∑–µ–ª–µ–Ω–µ–ª, –Ω–µ –ø—Ä–æ–≤–µ—Ä—è—è –Ω–∏—á–µ–≥–æ.
#
# runAsUser 65532 —Å–æ–≤–ø–∞–¥–∞–µ—Ç —Å `USER 65532` –≤ Dockerfile ‚Äî –æ–±—Ä–∞–∑ —É–∂–µ —Å–æ–±—Ä–∞–Ω –ø–æ–¥ nonroot.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

# readOnlyRootFilesystem —Ç—Ä–µ–±—É–µ—Ç writable-scratch: –∫–æ–Ω—Ç–µ–π–Ω–µ—Ä –º–æ–Ω—Ç–∏—Ä—É–µ—Ç emptyDir –Ω–∞ /tmp
# (—Å–º. deployment.yaml). –ë–µ–∑ –Ω–µ–≥–æ —Å–µ—Ä–≤–∏—Å –ø–∞–¥–∞–µ—Ç –Ω–∞ –ø–µ—Ä–≤–æ–π –∂–µ –∑–∞–ø–∏—Å–∏ –≤–æ –≤—Ä–µ–º–µ–Ω–Ω—ã–π —Ñ–∞–π–ª.
containerSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]
  seccompProfile:
    type: RuntimeDefault
