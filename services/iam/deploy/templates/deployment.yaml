apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name }}
  namespace: kacho
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.name }}
      annotations:
        # ConfigMap-content hash → pod rolling-restart при изменении config.yaml.
        kacho.cloud/config-checksum: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        # Prometheus scrape — /metrics on the dedicated internal port (never the
        # public gRPC surface).
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.ports.metrics | quote }}
        prometheus.io/path: /metrics
    spec:
      # Hardened pod security context (trivy AVD-KSV-0118): run as a
      # non-root user, drop the default ambient context.
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: config
          configMap:
            name: {{ .Values.name }}-config
      initContainers:
        # Миграции БД исполняет отдельный binary `kacho-migrator`
        # (cobra-based CLI), не subcommand основного.
        - name: migrate
          image: "{{ .Values.image }}"
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          command: ["/usr/local/bin/kacho-migrator", "up"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: config
              mountPath: /etc/kacho-iam
              readOnly: true
          env:
            - name: KACHO_IAM_CONFIG_PATH
              value: /etc/kacho-iam/config.yaml
            - name: KACHO_IAM_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.db.passwordSecretName }}
                  key: {{ .Values.db.passwordSecretKey }}
      containers:
        - name: {{ .Values.name }}
          image: "{{ .Values.image }}"
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          command: ["/usr/local/bin/kacho-iam", "serve"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - name: grpc
              containerPort: {{ .Values.ports.grpc }}
            - name: grpc-internal
              containerPort: {{ .Values.ports.internalGrpc }}
            - name: metrics
              containerPort: {{ .Values.ports.metrics }}
          volumeMounts:
            - name: config
              mountPath: /etc/kacho-iam
              readOnly: true
          env:
            - name: KACHO_IAM_CONFIG_PATH
              value: /etc/kacho-iam/config.yaml
            - name: KACHO_IAM_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.db.passwordSecretName }}
                  key: {{ .Values.db.passwordSecretKey }}
            {{- range $k, $v := .Values.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 10
            periodSeconds: 30
