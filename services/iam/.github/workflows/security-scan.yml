name: security-scan

# Security scan gates for IAM:
#   - trivy: container image + IaC scan
#   - grype: SBOM scan (consumes syft SBOM)
#   - gosec: Go static analysis
#
# Threshold: zero HIGH / zero CRITICAL → PR merge blocked.
# Outputs SARIF → GitHub Security tab.

on:
  push:
    branches: [main, KAC-*]
  pull_request:

permissions:
  contents: read
  security-events: write   # SARIF upload to Security tab
  pull-requests: write     # PR comments

defaults:
  run:
    working-directory: kacho-iam

jobs:
  gosec:
    name: gosec (Go static analysis)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { path: kacho-iam }
      - uses: actions/setup-go@v6
        with: { go-version-file: kacho-iam/go.mod }

      - name: install gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: run gosec
        run: |
          set +e
          # Сгенерированные proto-stubs (proto/gen) исключены: gosec G101
          # ложно срабатывает на FullMethodName-константах с подстрокой
          # "Token"/"LogoutToken" (OIDC/IAM RPC). Ручной код gosec проверяет
          # полностью; golangci-lint аналогично исключает gen/go.
          "$(go env GOPATH)/bin/gosec" -exclude-dir=proto/gen -fmt sarif -out gosec.sarif ./...
          ec=$?
          # gosec emits duplicate entries in rule properties.tags, which the
          # codeql SARIF validator rejects ("contains duplicate item"). Dedupe
          # every rule's tags, or substitute an empty schema-valid document.
          if jq -e . gosec.sarif >/dev/null 2>&1; then
            jq '(.runs[].tool.driver.rules[]?.properties.tags) |= (if . then unique else . end)' \
              gosec.sarif > gosec.sanitized.sarif && mv gosec.sanitized.sarif gosec.sarif
          else
            printf '%s' '{"version":"2.1.0","$schema":"https://json.schemastore.org/sarif-2.1.0.json","runs":[{"tool":{"driver":{"name":"gosec","rules":[]}},"results":[]}]}' > gosec.sarif
          fi
          # gosec exit codes: 0 = no issues, 1 = issues found.
          # We tolerate issues but never let them merge — they will appear in Security tab.
          exit 0

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: kacho-iam/gosec.sarif
          category: gosec

      - name: fail on HIGH / CRITICAL
        run: |
          if [[ ! -f gosec.sarif ]]; then exit 0; fi
          # Count rules with severity error (HIGH) — block merge.
          err=$(jq '[.runs[].results[] | select(.level == "error")] | length' gosec.sarif)
          echo "gosec HIGH count: $err"
          if (( err > 0 )); then
            echo "::error::gosec found $err HIGH-severity issues. See Security tab."
            exit 1
          fi

  trivy:
    name: trivy (container + IaC)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { path: kacho-iam }

      # Each scan runs twice: once as SARIF for the Security tab (exit-code 0 —
      # never gates), once as a `table`-format gate. With `format: sarif` the
      # trivy-action's `exit-code` fires on ANY rule present in the SARIF
      # regardless of the `severity` filter (known trivy-action behaviour) —
      # the table-format pass is what actually enforces CRITICAL/HIGH.
      - name: trivy filesystem scan (SARIF → Security tab)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: 'kacho-iam'
          format: 'sarif'
          output: 'trivy-fs.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          ignore-unfixed: true

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

      - name: trivy filesystem scan (gate on CRITICAL/HIGH)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: 'kacho-iam'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true

      - name: trivy config scan (SARIF → Security tab)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'config'
          scan-ref: 'kacho-iam'
          format: 'sarif'
          output: 'trivy-config.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-config.sarif
          category: trivy-config

      - name: trivy config scan (gate on CRITICAL/HIGH)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'config'
          scan-ref: 'kacho-iam'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { path: kacho-iam }
      - uses: actions/setup-go@v6
        with: { go-version-file: kacho-iam/go.mod }

      - name: install + run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          "$(go env GOPATH)/bin/govulncheck" -mode=source -format=sarif ./... > govulncheck.sarif || true
          # govulncheck emits nothing on a build error → upload-sarif chokes on
          # "Unexpected end of JSON input"; it also emits duplicate entries in
          # rule properties.tags, which the codeql validator rejects. Sanitize:
          # dedupe every rule's tags, or substitute an empty schema-valid doc.
          if jq -e . govulncheck.sarif >/dev/null 2>&1; then
            jq '(.runs[].tool.driver.rules[]?.properties.tags) |= (if . then unique else . end)' \
              govulncheck.sarif > govulncheck.sanitized.sarif && mv govulncheck.sanitized.sarif govulncheck.sarif
          else
            echo "govulncheck produced no/invalid SARIF — substituting empty document"
            printf '%s' '{"version":"2.1.0","$schema":"https://json.schemastore.org/sarif-2.1.0.json","runs":[{"tool":{"driver":{"name":"govulncheck","rules":[]}},"results":[]}]}' > govulncheck.sarif
          fi
          # Inspect SARIF — any non-suppressed advisory blocks the merge (parity
          # with the gosec HIGH gate). A known-vulnerable dependency must never
          # merge green: report the advisories and fail the job.
          #
          # SUPPRESS — documented allowlist of advisories that are (a) not
          # imported/called by kacho-iam and (b) have NO fixed version, so they
          # can never be cleared by a bump. Each entry MUST be justified here and
          # confirmed not-called; the authoritative `govulncheck ./...` in ci.yaml
          # (exit-code mode) also treats these as non-actionable (exit 0).
          #   GO-2026-5932 — golang.org/x/crypto/openpgp, deprecated "unsafe by
          #     design", Fixed: N/A. `go mod why golang.org/x/crypto/openpgp` →
          #     "main module does not need package …": pulled only transitively
          #     into the module graph (testcontainers test infra), never imported
          #     or called by any kacho-iam package (prod or test). SARIF still
          #     lists it at module level; exclude it from the blocking count.
          SUPPRESS='GO-2026-5932'
          all=$(jq '[.runs[].results[]] | length' govulncheck.sarif 2>/dev/null || echo 0)
          fnd=$(jq --arg s "$SUPPRESS" '[.runs[].results[] | select((.ruleId // "") as $r | ($s|split(",")) | index($r) | not)] | length' govulncheck.sarif 2>/dev/null || echo 0)
          echo "govulncheck findings: $fnd blocking ($all total, $(($all-$fnd)) suppressed)"
          if (( fnd > 0 )); then
            jq --arg s "$SUPPRESS" -r '.runs[].results[] | select((.ruleId // "") as $r | ($s|split(",")) | index($r) | not) | "- \(.ruleId): \(.message.text)"' govulncheck.sarif
            echo "::error::govulncheck found $fnd non-suppressed vulnerability advisor(ies). See Security tab."
            exit 1
          fi

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: kacho-iam/govulncheck.sarif
          category: govulncheck
