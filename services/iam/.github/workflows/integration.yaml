name: integration

on:
  push:
  pull_request:

permissions:
  contents: read

# Integration tests (testcontainers Postgres). HARD gate: `go test` failure fails
# the job (NO continue-on-error — it would silently hide `--- FAIL` and
# `panic: test timed out`).
#
# Scope is the WHOLE module (`./...`), NOT just `./internal/repo/...`: integration
# tests also live in internal/clients, internal/apps/kacho/seed, and
# internal/apps/kacho/api/{cluster,internal_iam} (use-case-level integration). A
# narrower `./internal/repo/...` scope would silently skip those files. `-short`
# is NOT passed, so testcontainers integration tests run (the unit job runs the
# same packages WITH -short — fast, no Docker). Tests guard themselves with
# `if testing.Short()`. The pg package alone spins up one Postgres container per
# test (~187), so the go-test timeout is generous (1800s) and the job timeout
# sits just above it.

defaults:
  run:
    working-directory: kacho-iam

jobs:
  integration:
    name: integration (testcontainers Postgres)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v6
        with: { path: kacho-iam }
      - uses: actions/setup-go@v6
        with: { go-version-file: kacho-iam/go.mod, cache-dependency-path: kacho-iam/go.sum }
      - run: go mod download
      # HARD gate: a failing or timed-out integration test fails the PR.
      # Whole module (./...) — see header: integration tests live outside repo/ too.
      # -p 1 serialises package execution: many internal/repo/kacho/pg packages
      # each spin their own testcontainers Postgres, and running them concurrently
      # on a shared runner invites container-startup contention → flaky timeouts
      # (testing.md: «Под нагрузкой Docker может таймаутить — гонять -p 1 при contention»).
      - run: go test ./... -race -count=1 -timeout 1800s -p 1
