name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

# kacho-vpc собирается из своего репо; зависимости (kacho-corelib, kacho-iam,
# kacho-geo) — versioned-модули с GitHub (go.mod без replace), поэтому siblings
# checkout не нужен: `go mod download` тянет их с public proxy.

defaults:
  run:
    working-directory: kacho-vpc

jobs:
  build-vet-test:
    name: build + vet + test (unit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { path: kacho-vpc }
      - uses: actions/setup-go@v6
        with: { go-version-file: kacho-vpc/go.mod, cache-dependency-path: kacho-vpc/go.sum }
      - run: go mod download
      - run: go build ./...
      - run: go vet ./...
      # Каждый публичный List обязан гейтиться через listauthz.
      - run: make audit-list-filter
      - run: go test -race -short -count=1 -timeout 5m ./...

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { path: kacho-vpc }
      - uses: actions/setup-go@v6
        with: { go-version-file: kacho-vpc/go.mod, cache-dependency-path: kacho-vpc/go.sum }
      - uses: golangci/golangci-lint-action@v9
        with:
          working-directory: kacho-vpc
          args: --timeout 5m

  govuln:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { path: kacho-vpc }
      - uses: actions/setup-go@v6
        with: { go-version-file: kacho-vpc/go.mod, cache-dependency-path: kacho-vpc/go.sum }
      - run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.5.0
          "$(go env GOPATH)/bin/govulncheck" ./...

  integration:
    name: integration (testcontainers Postgres)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { path: kacho-vpc }
      - uses: actions/setup-go@v6
        with: { go-version-file: kacho-vpc/go.mod, cache-dependency-path: kacho-vpc/go.sum }
      - run: go mod download
      # internal/repo/*integration_test.go поднимают postgres:16 через testcontainers
      # (Docker есть на ubuntu-latest runner'ах). Без -cover (covdata-инструменты в
      # отдельных toolchain-сборках бывают неполны; coverage здесь не нужен).
      # -p 1: пакеты тестов сериализуются, чтобы не поднимать несколько postgres-
      # контейнеров одновременно — под -race + Docker-contention CI-runner'а параллельные
      # testcontainers-пакеты голодают друг у друга ресурсы и concurrent-race-кейсы
      # (AllocateInternalIP idempotent) флакают. Серийный прогон — как в kacho-nlb.
      - run: go test ./internal/repo/... ./internal/clients/... -race -count=1 -timeout 600s -p 1

  authz-deny-suite:
    name: authz-deny suite — generate + validate
    runs-on: ubuntu-latest
    needs: [build-vet-test]
    steps:
      - uses: actions/checkout@v6
        with: { path: kacho-vpc }
      - uses: actions/setup-python@v6
        with: { python-version: '3.12' }
      - name: generate authz-deny collection
        run: python3 tests/newman/scripts/gen.py authz-deny
      - name: assert collection non-empty
        run: |
          test -s tests/newman/collections/authz-deny.postman_collection.json
          # must have at least 200 cases
          n=$(python3 -c "import json; print(len(json.load(open('tests/newman/collections/authz-deny.postman_collection.json'))['item']))")
          echo "authz-deny cases: $n"
          test "$n" -ge 200
      - uses: actions/upload-artifact@v7
        with:
          name: authz-deny-collection
          path: kacho-vpc/tests/newman/collections/authz-deny.postman_collection.json
