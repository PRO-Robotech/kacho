name: security-scan

# Security scan gates for VPC: trivy + gosec + govulncheck.

on:
  push:
    branches: [main, KAC-*]
  pull_request:

permissions:
  contents: read
  security-events: write
  pull-requests: write

defaults:
  run:
    working-directory: kacho-vpc

jobs:
  gosec:
    name: gosec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { path: kacho-vpc }
      - uses: actions/setup-go@v6
        with: { go-version-file: kacho-vpc/go.mod }
      - run: |
          go install github.com/securego/gosec/v2/cmd/gosec@v2.27.1
          # Сгенерированные proto-stubs (proto/gen) исключаем — G101-false-positive на
          # FullMethodName-константах; hand-written код сканируется полностью.
          "$(go env GOPATH)/bin/gosec" -exclude-dir=proto/gen -fmt sarif -out gosec.sarif ./... || true
          # gosec дублирует записи в properties.tags, что отвергает codeql-валидатор
          # SARIF. Дедупим теги каждого правила либо подставляем пустой схема-валидный документ.
          if jq -e . gosec.sarif >/dev/null 2>&1; then
            jq '(.runs[].tool.driver.rules[]?.properties.tags) |= (if . then unique else . end)' \
              gosec.sarif > gosec.sanitized.sarif && mv gosec.sanitized.sarif gosec.sarif
          else
            printf '%s' '{"version":"2.1.0","$schema":"https://json.schemastore.org/sarif-2.1.0.json","runs":[{"tool":{"driver":{"name":"gosec","rules":[]}},"results":[]}]}' > gosec.sarif
          fi
      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        with: { sarif_file: kacho-vpc/gosec.sarif, category: gosec }
      - name: gate — fail on HIGH-severity gosec findings
        run: |
          # gosec мапит severity HIGH → SARIF level "error"; блокируем job при любой
          # HIGH-находке (MEDIUM/LOW остаются информативными в code-scanning).
          n=$(jq '[.runs[].results[]? | select(.level=="error")] | length' gosec.sarif)
          echo "gosec HIGH (error-level) findings: $n"
          test "$n" -eq 0

  trivy:
    name: trivy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { path: kacho-vpc }
      - uses: aquasecurity/trivy-action@master  # aquasec публикует только v-префиксные теги — pin на конкретную версию без `v` не резолвится
        with:
          scan-type: 'fs'
          scan-ref: 'kacho-vpc'
          format: 'sarif'
          output: 'trivy-fs.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true
          limit-severities-for-sarif: true
      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        with: { sarif_file: trivy-fs.sarif, category: trivy-fs }

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { path: kacho-vpc }
      - uses: actions/setup-go@v6
        with: { go-version-file: kacho-vpc/go.mod }
      - run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.5.0
          # SARIF для code-scanning; генерацию не валим (upload должен пройти).
          "$(go env GOPATH)/bin/govulncheck" -mode=source -format=sarif ./... > govulncheck.sarif || true
      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        with: { sarif_file: kacho-vpc/govulncheck.sarif, category: govulncheck }
      - name: gate — fail on known reachable vulnerabilities
        # govulncheck возвращает non-zero при уязвимостях в reachable-коде — блокирующий gate.
        run: "$(go env GOPATH)/bin/govulncheck -mode=source ./..."
