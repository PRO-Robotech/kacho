# docker-build — multi-arch DockerHub image build & push (KAC-127).
#
# Назначение: собирает Docker-образ kacho-storage под linux/amd64 + linux/arm64 и
# пушит multi-arch manifest в DockerHub. Дополняет (НЕ заменяет) `ci.yaml`.
#
# ─── Почему ОДНА job, а не per-arch + manifest-combine ───────────────────
# Раньше было 3 job'ы: build-amd64, build-arm64, manifest-push. Последняя
# звала `docker manifest create`/`imagetools create`, которые ЧИТАЮТ
# (pull!) per-arch манифесты из docker.io. На free-tier DockerHub pull-бюджет
# (200/6h на аккаунт) выжирается newman-e2e (kind тянет ~15 docker.io-образов
# на прогон) + самими билдами — и manifest-combine падал с `toomanyrequests`,
# хотя оба билда зелёные. Любая сборка манифеста ОБЯЗАНА перечитать source-
# манифесты из реестра, поэтому combine-подход неустраним при исчерпанном
# бюджете.
#
# Решение: ОДИН `buildx build --platform linux/amd64,linux/arm64 --push` —
# собирает обе платформы локально в buildkit и пушит ОДИН index напрямую.
# НИ ОДНОГО docker.io-pull: base-образы с mirror.gcr.io, buildkit/binfmt с
# mirror.gcr.io, а `push` против pull-лимита не считается. Dockerfile —
# cross-compile-aware (`FROM --platform=$BUILDPLATFORM golang` + `GOARCH=
# $TARGETARCH go build`), поэтому Go-компиляция идёт нативно на amd64 и
# кросс-компилит arm64 (быстро); под QEMU эмулируется только крошечный
# финальный alpine-слой (`apk add ca-certificates`).
#
# ─── Требуемые GitHub secrets ────────────────────────────────────────────
# DOCKERHUB_USERNAME — Docker Hub username (он же namespace для образов).
# DOCKERHUB_TOKEN    — Docker Hub access token (Read/Write/Delete scope).
#
# Tags: <branch>-<sha8> (multiarch index).

name: docker-build

on:
  push:
    branches:
      - main
      - "KAC-*"
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+rc[0-9]+"

permissions:
  contents: read

env:
  IMAGE_NAME: kacho-storage
  # Namespace used for the tag when DOCKERHUB_USERNAME is unset. The build-only path
  # still has to produce a WELL-FORMED reference (see the gate step) — this image is
  # never pushed, so the namespace is arbitrary and local-only.
  FALLBACK_NS: local

jobs:
  docker-build:
    name: build & push multiarch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { path: kacho-storage }

      - uses: benjlevesque/short-sha@v3.0
        id: short-sha
        with: { length: 8 }

      - name: Create sanitized branch name
        id: sanitize
        run: echo "branch=$(echo "${GITHUB_REF_NAME}" | sed 's/\//-/g')" >> "$GITHUB_OUTPUT"

      - name: Gate on DockerHub secrets
        id: gate
        env:
          DH_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          DH_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          # Emits BOTH `push` and the tag namespace `ns`. The namespace must NEVER be
          # interpolated straight from the secret: an unset DOCKERHUB_USERNAME renders
          # tags as "/kacho-storage:<tag>", which buildx rejects with
          #   ERROR: failed to build: invalid tag "/kacho-storage:main-a185fa07":
          #          invalid reference format
          # …and the job fails EVEN with push=false — defeating the build-only path this
          # gate exists to provide (that is exactly how main-a185fa07 / CS-1 failed to
          # build, run 29417934635). Docker's reference grammar forbids an empty name
          # component, so the fallback keeps the reference well-formed.
          if [ -n "$DH_USER" ] && [ -n "$DH_TOKEN" ]; then
            echo "push=true" >> "$GITHUB_OUTPUT"
            echo "ns=$DH_USER" >> "$GITHUB_OUTPUT"
          else
            echo "push=false" >> "$GITHUB_OUTPUT"
            echo "ns=$FALLBACK_NS" >> "$GITHUB_OUTPUT"
            echo "::warning::DOCKERHUB secrets unset — build only, no push (tag namespaced '$FALLBACK_NS', never pushed)"
          fi

      - name: Login to Docker Hub
        if: steps.gate.outputs.push == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Enable QEMU emulation
        uses: docker/setup-qemu-action@v4
        with:
          # binfmt from a mirror — keeps the DockerHub pull budget free.
          image: mirror.gcr.io/tonistiigi/binfmt:latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          # buildkit from a mirror, not docker.io.
          driver-opts: image=mirror.gcr.io/moby/buildkit:buildx-stable-1

      - name: Configure Buildx cache
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.ref_name }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build and push (multiarch)
        uses: docker/build-push-action@v6
        with:
          context: kacho-storage
          file: ./kacho-storage/Dockerfile
          push: ${{ steps.gate.outputs.push == 'true' }}
          provenance: false
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.gate.outputs.ns }}/${{ env.IMAGE_NAME }}:${{ steps.sanitize.outputs.branch }}-${{ steps.short-sha.outputs.sha }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Move new cache
        if: always()
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache 2>/dev/null || true
