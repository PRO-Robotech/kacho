apiVersion: v1
kind: Service
metadata:
  name: {{ include "storage.fullname" . }}
  labels:
    {{- include "storage.labels" . | nindent 4 }}
spec:
  selector:
    app: {{ include "storage.fullname" . }}
  ports:
    - name: grpc-public
      port: {{ .Values.ports.public }}
      targetPort: {{ .Values.ports.public }}
    - name: grpc-internal
      port: {{ .Values.ports.internal }}
      targetPort: {{ .Values.ports.internal }}
    - name: metrics
      port: {{ .Values.ports.metrics }}
      targetPort: {{ .Values.ports.metrics }}
