# Helm-values kacho-storage (skeleton). Реальные mTLS-секреты / peer-адреса /
# ресурсные лимиты донастраивает kacho-deploy при интеграции в стенд.

replicaCount: 1

image:
  repository: kacho-storage
  tag: dev
  pullPolicy: IfNotPresent

# Порты сервиса.
ports:
  public: 9090     # Volume/Snapshot/DiskType Service
  internal: 9091   # Internal* (cluster-internal only, ban #6)
  metrics: 9095    # /healthz diagnostic listener

# Env (KACHO_STORAGE_*). Секреты (DB_PASSWORD, mTLS) — через secret.yaml.
config:
  authMode: production
  dbHost: kacho-storage-postgres
  dbPort: "5432"
  dbUser: storage
  dbName: kacho_storage
  dbSslMode: require
  # Peer-адреса (runtime cross-domain edges). Пусто → клиент fail-closed.
  geoGrpcAddr: ""
  iamGrpcAddr: ""
  authzIamGrpcAddr: ""

# Init-контейнер миграций (cmd/migrator up) до старта основного pod.
migrator:
  enabled: true

serviceMonitor:
  enabled: false
  interval: 30s

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

# INFRA sec-hardening — единый security-floor, идентичный kacho-iam/geo/nlb/registry.
#
# Заведён 2026-07-16: trivy config-скан впервые покрыл ВЕСЬ репозиторий и нашёл, что
# securityContext есть лишь у половины сервисов. В polyrepo IaC-скан был ТОЛЬКО у
# kacho-iam, а в том репо нет ни одного k8s-манифеста (чарты жили в kacho-deploy) —
# гейт зеленел, не проверяя ничего.
#
# runAsUser 65532 совпадает с `USER 65532` в Dockerfile — образ уже собран под nonroot.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

# readOnlyRootFilesystem требует writable-scratch: контейнер монтирует emptyDir на /tmp
# (см. deployment.yaml). Без него сервис падает на первой же записи во временный файл.
containerSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]
  seccompProfile:
    type: RuntimeDefault
