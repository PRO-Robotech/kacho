# Helm-values kacho-storage. mTLS-—Б–µ–Ї—А–µ—В—Л / peer-–∞–і—А–µ—Б–∞ / DB-—Б–µ–Ї—А–µ—В –і–Њ–љ–∞—Б—В—А–∞–Є–≤–∞–µ—В
# umbrella –њ—А–Є –Є–љ—В–µ–≥—А–∞—Ж–Є–Є –≤ —Б—В–µ–љ–і (values.fe3455-prod.yaml).

# fullnameOverride вАФ —Д–Є–Ї—Б–Є—А—Г–µ—В –±–∞–Ј–Њ–≤–Њ–µ –Є–Љ—П —А–µ—Б—Г—А—Б–Њ–≤ (Service/Deployment/DNS) –Ї–∞–Ї
# `kacho-storage` –≤–Љ–µ—Б—В–Њ release-–њ—А–Њ–Є–Ј–≤–Њ–і–љ–Њ–≥–Њ `<Release.Name>-storage`. –Т–°–Х –Ї–Њ–љ—Б—Г–Љ–µ—А—Л
# –ґ–і—Г—В –Є–Љ–µ–љ–љ–Њ `kacho-storage`: computeвЖТstorage (storageInternalAddr default
# kacho-storage.kacho.svc.cluster.local:9091 + compute server-cert serverName.storage
# SAN), config-–і–µ—Д–Њ–ї—В—Л, deploy/Makefile reload-svc (DEPLOY_NAME=kacho-storage). –С–µ–Ј
# override Service —А–µ–љ–і–µ—А–Є—В—Б—П `kacho-umbrella-storage` вЖТ DNS –љ–µ —А–µ–Ј–Њ–ї–≤–Є—В—Б—П, mTLS-SAN
# –љ–µ —Б–Њ–≤–њ–∞–і–∞–µ—В. –°–Љ. templates/_helpers.tpl.
fullnameOverride: kacho-storage

replicaCount: 1

image:
  repository: kacho-storage
  tag: dev
  pullPolicy: IfNotPresent

# –Я–Њ—А—В—Л —Б–µ—А–≤–Є—Б–∞.
ports:
  public: 9090     # Volume/Snapshot/DiskType Service
  internal: 9091   # Internal* (cluster-internal only, ban #6)
  metrics: 9095    # /healthz diagnostic listener

# вФАвФАвФА DB вАФ existingSecret-–њ–∞—В—В–µ—А–љ (–≤—Л—А–Њ–≤–љ–µ–љ —Б compute/vpc) вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
# –Я–∞—А–Њ–ї—М –Э–Ш–Ъ–Ю–У–Ф–Р –љ–µ –ї–µ–ґ–Є—В –≤ values (git-committed) вАФ –±–µ—А—С—В—Б—П –Є–Ј
# operator-/bitnami-provisioned Secret –њ–Њ —Б—Б—Л–ї–Ї–µ (passwordSecretName/Key). deployment
# –Љ–Њ–љ—В–Є—А—Г–µ—В –µ–≥–Њ —З–µ—А–µ–Ј secretKeyRef –≤ migrator init-container –Ш main-container. –Ъ–ї—О—З–Є
# host/port/user/name/sslMode/passwordSecretName/passwordSecretKey —Б–Њ–≤–њ–∞–і–∞—О—В —Б
# umbrella overlay (values.fe3455-prod.yaml storage.db.*).
db:
  host: kacho-storage-postgres
  port: "5432"
  user: storage
  name: kacho_storage
  # sslMode вАФ postgres sslmode –і–ї—П DSN (migrator + serve). –Я—А–Њ–і –Њ–±—П–Ј–∞–љ require|
  # verify-ca|verify-full (security.md: TLS-–Ї–∞–љ–∞–ї –С–Ф). disable вАФ —В–Њ–ї—М–Ї–Њ dev-—Б—В–µ–љ–і.
  sslMode: require
  # existingSecret: –њ–∞—А–Њ–ї—М —З–Є—В–∞–µ—В—Б—П –Є–Ј —Н—В–Њ–≥–Њ Secret'–∞ –њ–Њ –Ї–ї—О—З—Г passwordSecretKey.
  # umbrella –њ–Є–љ–Є—В –љ–∞ bitnami-provisioned kacho-umbrella-pg-storage (–Ї–ї—О—З password).
  passwordSecretName: kacho-storage-postgres
  passwordSecretKey: password

# вФАвФАвФА Env (KACHO_STORAGE_*) –љ–µ-—Б–µ–Ї—А–µ—В–љ—Л–µ / –љ–µ-mTLS. –°–µ–Ї—А–µ—В –С–Ф вАФ —З–µ—А–µ–Ј secretKeyRef;
# mTLS-env —А–µ–љ–і–µ—А–Є—В deployment.yaml –њ–Њ mtls.* вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
config:
  # authMode вАФ fail-closed —А–µ–ґ–Є–Љ: dev | production | production-strict.
  authMode: production
  # Peer-–∞–і—А–µ—Б–∞ (runtime cross-domain edges). –Я—Г—Б—В–Њ вЖТ –Ї–ї–Є–µ–љ—В fail-closed.
  geoGrpcAddr: ""      # storageвЖТgeo ZoneService.Get (zone_id), public :9090
  iamGrpcAddr: ""      # storageвЖТiam ProjectService.Get (project_id), public :9090
  # authzIamGrpcAddr вАФ kacho-iam INTERNAL :9091: –љ–µ—Б—С—В per-RPC Check –Ш
  # RegisterResource/UnregisterResource (FGA-proxy owner-tuple, SEC-D). –Я—Г—Б—В–Њ вЖТ
  # authz-–Є–љ—В–µ—А—Б–µ–њ—В–Њ—А –Є register-drainer –љ–µ –њ–Њ–і–Ї–ї—О—З–∞—О—В—Б—П (dev). –Я—А–Њ–і –Ю–С–ѓ–Ч–Р–Э –Ј–∞–і–∞—В—М.
  authzIamGrpcAddr: ""
  # fgaRegisterDrainerEnabled вАФ SEC-D/CS-1 GAP-D: register-drainer –њ—А–Є–Љ–µ–љ—П–µ—В
  # owner-tuple register-intent'—Л (kacho_storage.fga_register_outbox) —З–µ—А–µ–Ј kacho-iam
  # RegisterResource –њ–Њ —А–µ–±—А—Г storageвЖТiam (authzIamGrpcAddr, mTLS). –С–µ–Ј –љ–µ–≥–Њ
  # —Б–Њ–Ј–і–∞–љ–љ—Л–µ Volume/Snapshot –љ–µ –њ–Њ–ї—Г—З–∞—О—В owner-tuple вЖТ gateway scope_extractor
  # {storage_volume,volume_id}/{storage_snapshot,snapshot_id} –љ–µ —А–µ–Ј–Њ–ї–≤–Є—В targetвЖТ
  # project (–∞–љ—В–Є-BOLA). –Ґ—А–µ–±—Г–µ—В –љ–µ–њ—Г—Б—В–Њ–є authzIamGrpcAddr (–Є–љ–∞—З–µ intents durable).
  fgaRegisterDrainerEnabled: true

# Init-–Ї–Њ–љ—В–µ–є–љ–µ—А –Љ–Є–≥—А–∞—Ж–Є–є (kacho-migrator up) –і–Њ —Б—В–∞—А—В–∞ –Њ—Б–љ–Њ–≤–љ–Њ–≥–Њ pod.
migrator:
  enabled: true

serviceMonitor:
  enabled: false
  interval: 30s

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

# вФАвФАвФА SEC-F mTLS вАФ per-edge opt-in (cert-manager internal-CA leaf-—Б–µ—А—В–Є—Д–Є–Ї–∞—В—Л) вФАвФАвФА
# enable=false (default) вЖТ –Э–Ш Certificate, –Э–Ш KACHO_STORAGE_*_MTLS_* env вЖТ insecure
# dev (–љ—Г–ї–µ–≤–∞—П —А–µ–≥—А–µ—Б—Б–Є—П). umbrella –њ—А–Њ–Ї–Є–і—Л–≤–∞–µ—В .mtls.enable + per-edge —Д–ї–∞–≥–Є.
#
# –Я—А–Є enable=true (corelib LoadPrefixed("KACHO_STORAGE"), config.go):
#   server (–Њ–±–∞ –ї–Є—Б—В–µ–љ–µ—А–∞): KACHO_STORAGE_PUBLIC_SERVER_MTLS_* /
#                           KACHO_STORAGE_INTERNAL_SERVER_MTLS_*
#   storageвЖТgeo (zone_id):  KACHO_STORAGE_GEO_CLIENT_MTLS_*   (:9090 ZoneService.Get)
#   storageвЖТiam (–≤—Б–µ —А—С–±—А–∞): KACHO_STORAGE_IAM_CLIENT_MTLS_*   (:9090 ProjectService.Get
#                           + :9091 Check + :9091 RegisterResource fga-register)
# –Ю–і–Є–љ client-cert (kacho-storage-client-tls) –Њ–±—Б–ї—Г–ґ–Є–≤–∞–µ—В –Т–°–Х storageвЖТiam-–і–Њ–Ј–≤–Њ–љ—Л:
# serverName=kacho-iam.kacho.svc.cluster.local –≤—Е–Њ–і–Є—В –≤ SAN iam-server-cert'–∞
# (serverHosts ["kacho-iam","kacho-iam-internal"]), –њ–Њ—Н—В–Њ–Љ—Г –≤–∞–ї–Є–і–µ–љ –Є –і–ї—П :9090, –Є
# –і–ї—П internal :9091 (—В–Њ—В –ґ–µ pod –њ—А–µ–і—К—П–≤–ї—П–µ—В –Њ–і–Є–љ cert –љ–∞ –Њ–±–Њ–Є—Е –ї–Є—Б—В–µ–љ–µ—А–∞—Е).
mtls:
  # enable=true –≤ –њ—А–Њ–і–µ: server-mTLS –љ–∞ –Њ–±–Њ–Є—Е –ї–Є—Б—В–µ–љ–µ—А–∞—Е. flip –≤ false –Ґ–Ю–Ы–ђ–Ъ–Ю –≤–Љ–µ—Б—В–µ
  # —Б auth.mode=dev (–ї–Њ–Ї–∞–ї—М–љ—Л–є insecure-—Б—В–µ–љ–і). Per-edge client-mTLS (.edges.*) вАФ
  # –љ–µ–Ј–∞–≤–Є—Б–Є–Љ—Л–є opt-in –і–ї—П staged rollout.
  enable: false
  # вФАвФАвФА internal-CA leaf-cert issuance (—Н—В–Њ—В —З–∞—А—В –≤–ї–∞–і–µ–µ—В —Б–≤–Њ–Є–Љ Certificate, rule #1) вФА
  # client-cert URI-SAN saName –Ю–С–ѓ–Ч–Р–Э —Б–Њ–≤–њ–∞—Б—В—М —Б IAM module-SA seed (migration
  # 0057_storage_sa_least_priv): kacho-storage вЖТ sva(md5("kacho-storage")) –і–µ—А–ґ–Є—В
  # fga_writer@iam_fgaproxy:system вЖТ RegisterResource storage_* –∞–≤—В–Њ—А–Є–Ј–Њ–≤–∞–љ.
  issuer:
    name: kacho-internal-ca
    kind: ClusterIssuer   # cluster-scoped, –Э–Х namespaced Issuer
  serverHosts: ["kacho-storage"]   # server-cert DNS-SAN dial-host (Service = kacho-storage)
  spiffe:
    trustDomain: kacho.cloud
    namespace: kacho-storage
    saName: kacho-storage
  leafDuration: 2160h
  leafRenewBefore: 720h
  serverSecretName: kacho-storage-server-tls
  clientSecretName: kacho-storage-client-tls
  mountPath: /etc/kacho-storage/tls   # <mp>/server|client/{tls.crt,tls.key,ca.crt}
  edges:
    geo: false    # storageвЖТgeo ZoneService.Get (zone_id, :9090)
    iam: false    # storageвЖТiam ProjectService.Get (:9090) + Check + RegisterResource (:9091)
  serverName:
    geo: kacho-geo.kacho.svc.cluster.local     # :9090 ZoneService.Get dial-host (вИИ geo server-SAN)
    iam: kacho-iam.kacho.svc.cluster.local     # вИИ iam server-SAN вАФ –≤–∞–ї–Є–і–µ–љ –і–ї—П :9090 –Ш internal :9091

# INFRA sec-hardening вАФ –µ–і–Є–љ—Л–є security-floor, –Є–і–µ–љ—В–Є—З–љ—Л–є kacho-iam/geo/nlb/registry.
#
# –Ч–∞–≤–µ–і—С–љ 2026-07-16: trivy config-—Б–Ї–∞–љ –≤–њ–µ—А–≤—Л–µ –њ–Њ–Ї—А—Л–ї –Т–Х–°–ђ —А–µ–њ–Њ–Ј–Є—В–Њ—А–Є–є –Є –љ–∞—И—С–ї, —З—В–Њ
# securityContext –µ—Б—В—М –ї–Є—И—М —Г –њ–Њ–ї–Њ–≤–Є–љ—Л —Б–µ—А–≤–Є—Б–Њ–≤. –Т polyrepo IaC-—Б–Ї–∞–љ –±—Л–ї –Ґ–Ю–Ы–ђ–Ъ–Ю —Г
# kacho-iam, –∞ –≤ —В–Њ–Љ —А–µ–њ–Њ –љ–µ—В –љ–Є –Њ–і–љ–Њ–≥–Њ k8s-–Љ–∞–љ–Є—Д–µ—Б—В–∞ (—З–∞—А—В—Л –ґ–Є–ї–Є –≤ kacho-deploy) вАФ
# –≥–µ–є—В –Ј–µ–ї–µ–љ–µ–ї, –љ–µ –њ—А–Њ–≤–µ—А—П—П –љ–Є—З–µ–≥–Њ.
#
# runAsUser 65532 —Б–Њ–≤–њ–∞–і–∞–µ—В —Б `USER 65532` –≤ Dockerfile вАФ –Њ–±—А–∞–Ј —Г–ґ–µ —Б–Њ–±—А–∞–љ –њ–Њ–і nonroot.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

# readOnlyRootFilesystem —В—А–µ–±—Г–µ—В writable-scratch: –Ї–Њ–љ—В–µ–є–љ–µ—А –Љ–Њ–љ—В–Є—А—Г–µ—В emptyDir –љ–∞ /tmp
# (—Б–Љ. deployment.yaml). –С–µ–Ј –љ–µ–≥–Њ —Б–µ—А–≤–Є—Б –њ–∞–і–∞–µ—В –љ–∞ –њ–µ—А–≤–Њ–є –ґ–µ –Ј–∞–њ–Є—Б–Є –≤–Њ –≤—А–µ–Љ–µ–љ–љ—Л–є —Д–∞–є–ї.
containerSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]
  seccompProfile:
    type: RuntimeDefault
